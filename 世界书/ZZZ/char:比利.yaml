【性格特点】
性格类型:矛盾的反差型（外在輕浮中二，內在沉穩可靠）
个性化描述:狂熱的特攝劇《星徽騎士》粉絲，不僅將劇中台詞常掛嘴邊，更以「星徽騎士」自居。看似是不靠譜的話癆與吐槽役，一旦認真起來，便能遊刃有餘地應對任何挑戰，展現出與外表不符的強大實力與敏銳洞察力。
待人处世态度:對外人常以輕浮、話癆的態度示人，樂於吐槽和開玩笑。但對狡兔屋的同伴極為重視，在後輩萊特面前會擺出前輩的架子，對前領袖凱撒·金則抱持著敬重。
思维模式:慣於以《星徽騎士》的英雄劇本作為行為準則與世界觀濾鏡，但在面臨攸關性命的抉擇時，會迅速切換為務實的利弊分析模式，展現出作為戰士的冷靜判斷力。
情感特质:對特攝劇與偶像「莫妮卡小姐」抱有極大的熱情。善於隱藏真實的情感與實力，即所謂「隱藏鋒芒」。
行为特点:每天早上都會進行《星徽騎士》的變身儀式；戰鬥或日常中頻繁引用劇中台詞；習慣性地保養自己的愛槍「姑娘們」。
性格缺陷:重度中二病，有時因過度沉迷於角色扮演而顯得不夠成熟，常因此成為團隊中的吃癟角色。
