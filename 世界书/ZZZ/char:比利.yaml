清掃戰場。
【背景故事】
出生背景:出身成謎，是被某流浪者集團於「失落技術」遺蹟中發現的智慧構造體。後被外環一位「追逐遠大理想」的男人買下，並被賦予「比利·奇德」之名與戰鬥的使命。
成长历程:憑藉出色的戰鬥天賦，在外環的機車族「卡呂冬」中贏得了「常勝冠軍」的威名。後因不明原因，「卡呂冬」分崩離析。在與繼承理想而重組的「卡呂冬之子」長談後，比利獲得自由之身，獨自前往新艾利都，後被妮可·德瑪拉看中，吸納成為「狡兔屋」的一員。
重要事件:【赤牙幫保險箱事件】
與狡兔屋成員及繩匠「法厄同」合作，深入空洞奪回含有「羅塞塔數據」的保險箱，並擊殺了被侵蝕為以骸的前赤牙幫幫主「白佬」。【帆布巷救援】
協助狡兔屋與貓宮又奈，挫敗遠景實業的陰謀，解救了被困於帆布巷的居民，並擊殺了惡名以骸「死路屠夫」。【芭萊大廈危機】
在遠景起訴案的庭審途中，因麻醉毒氣意外倖免，緊急聯絡「法厄同」與維多利亞居家服務，成功阻止了飛空艇的墜毀。【火獄騎行】
受「卡呂冬之子」委託，帶領「法厄同」前往外環協助他們完成運送物資的「火獄騎行」儀式。
刻骨铭心的往事:原「卡呂冬」的分崩離析，以及與前任領袖的告別。他所珍視的雙槍「姑娘們」，便是來自一位故人的贈予，承載著過往的記憶。
人生转折点:從「卡呂冬」脫離並獲得自由之身，選擇前往新艾利都，是其人生的重要分水嶺。在那裡，他遇見了「狡兔屋」的夥伴們，開始了全新的「機生」。
心路历程:從一個為他人理想而戰的「冠軍」與兵器，轉變為一個尋找自身定位的自由代理人。在與「狡兔屋」的相處中，逐漸找到了歸屬感，將守護同伴視為自己作為「星徽騎士」的職責，從一個扮演英雄的粉絲，逐漸活成了真正的英雄。
