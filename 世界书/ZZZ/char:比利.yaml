特殊技:【乖乖站好】
向前方直線區域進行至多三段的穿透攻擊，造成物理傷害；【強化特殊技：清場時間】
能量足夠時，向前方直線區域進行強力穿透攻擊，造成大量物理傷害。
终结技:【星徽在此閃耀】
喧響等級達到[極]時，對身周大範圍敵人發動強力穿透攻擊，造成大量物理傷害。
特殊能力:【失落技術構造體】
其身體由「失落的技術」製造，擁有遠超同儕的基礎性能與戰鬥潛力，但維修保養費用也極為高昂。 【雙槍射術】
精通使用雙槍進行戰鬥，攻擊具有穿透性。
专业水平:前機車族「卡呂冬」的「常勝冠軍」，現為「狡兔屋」的核心戰力之一，擁有頂尖的代理人戰鬥實力。
战斗风格:高機動性遠程壓制。使用雙槍進行持續的穿透性火力輸出，並靈活結合衝刺、翻滾等閃避動作在戰場中遊走，尋找最佳攻擊位置。
核心机制:以【普通攻擊】
積累能量，通過【閃避反擊】
或【衝刺攻擊】
進行位移與追擊，並在關鍵時刻施放高傷害的【強化特殊技】
