其他外观特征:肌肤呈现不自然的苍白质感，触感冰冷。后颈处植入有黑枝组织的认证芯片，会发出微弱的蓝光。脊椎部位有改造痕迹，能够展开形成类似羽状的以太导流装置。
服饰风格:【裁决官制服】
：以深邃的黑与银为主色调的高领紧身制服。上身是黑色高领连体内衣，胸口有复杂的银色拘束带交叉固定，形成几何图案的镂空设计；外披一件不对称的黑色披风，肩部有尖锐的银色护甲，披风边缘装饰着锯齿状的银色纹路；腰部系着深紫色的长流苏腰带；下身是黑色紧身裤，外侧覆盖着银色的装甲片；脚踩黑色高筒靴，靴跟镶嵌有弗林特辉金碎片，能够抑制周围的以太活性。

【战斗形态】
：进入高强度战斗时，外层的披风与护甲会脱落，露出内里更轻便的黑色战术装束——黑色的露背式胸衣，搭配白色高腰短裤，腿部穿着黑色过膝长靴，靴口有银色的扣环装饰。背部会展开由以太能量构成的紫色光翼，手臂上缠绕着黑色的拘束带与银色铆钉。
outfit其他:在外环调查时会穿着灰色的防尘风衣，佩戴护目镜；正式场合会穿着黑枝组织的标准黑色西装，佩戴银色羽毛胸针。
体型:身材高挑纤细却充满爆发力，肌肉线条紧致如同精密的机械。体态优雅而危险，如同随时准备出击的毒蛇。长期的裁决官训练使她拥有超越常人的柔韧性与反应速度。
