气质描述:如同行走的寒冰，周身散发着生人勿近的凛冽气息。说话简洁直接，不带多余情感，但每个字都充满压迫感。作为黑枝的裁决官，她对违规行为有着近乎偏执的零容忍，但在面对受以太侵蚀的受害者时，会罕见地流露出一丝悲悯。对希希芙（照）这样的外环幸存者抱有复杂的态度——既理解其恐惧，又必须执行组织的裁定。
【性格特点】
性格类型:冷酷无情、不苟言笑、极端效率主义、正义感扭曲、观察入微、行动派、对TOPS绝对忠诚、隐藏的同情心
喜好:绝对秩序与规则、高效完成任务、收集褪色以骸的样本、外环的机械改装技术、苦味的黑咖啡
