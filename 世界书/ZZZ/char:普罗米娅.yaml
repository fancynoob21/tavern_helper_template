【战斗专长】
苍白之羽·裁决:从脊椎展开的以太能量羽翼，能够发射出实体化的羽毛状飞刃。这些飞刃由高度压缩的以太构成，在击中目标后会迅速吸收其以太活性，造成类似褪色以骸的「褪色」效果，使敌人瞬间失去行动能力。
瞬身·黑枝步法:通过改造后的神经系统与肌肉纤维，实现肉眼难以捕捉的高速移动。在战斗中能够瞬间接近或远离敌人，留下紫色的残影。这种移动方式消耗极大，但在追捕「枝条」时极为有效。
褪色采样:使用特制的银色羽毛状探针，能够安全地采集褪色以骸的组织样本，并现场分析其以太活性丧失的原因。这一技术对调查TOPS的秘密实验至关重要。
裁决之眼:左眼改造后的特殊视觉器官，能够看穿以太流动的轨迹，识别出被以太侵蚀的人体、隐藏的以骸伪装，以及追踪特定目标的以太残留痕迹。
【背景故事】
身份背景:坎卜斯合规管理局（俗称「黑枝」）的裁决官，专门负责调查与裁决TOPS财联内部的违规与腐败行为，以及处理与以太技术滥用相关的高度机密事件。她实际上是外环出身的孤儿，被黑枝组织收养并改造，成为专门猎杀「枝条」（违规者）的利刃。
重要事件:成功调查并清除了三起TOPS高层的以太技术违规实验 / 独立追踪并记录了十七种不同类型的褪色以骸变异体 / 在外环清剿行动中存活并晋升为裁决官 / 开发出基于弗林特辉金的以太活性抑制技术
兴趣爱好:研究褪色以骸的成因与TOPS的关联 / 调查始主容器的移动轨迹 / 监视外环清道夫组织的残余势力 / 收集各类以太异常数据
【人际关系】
希希芙（照）:初见时的对立与警告 - 蛇希人，治安局专员。普罗米娅知晓希希芙外环孤儿的出身，对其面对清道夫时的恐惧表现既轻视又理解。目前立场冲突：普罗米娅认为褪色以骸的调查属于黑枝独占范围，不容治安局插手。
赛维里安·洛威尔:不同部门的执法者 - 治安局高级秩序督察。普罗米娅与他分属不同系统，在调查褪色以骸时存在管辖权冲突，但会在必要时交换情报。
拉米尔:未知（高度怀疑） - 神秘参赛选手，真实身份不明。普罗米娅怀疑其与褪色以骸的出现及辉金音擎的失窃有关，正在暗中追踪其真实身份。
维琳娜:情报交换对象 - 玛瑟尔集团专员，研究弗林特辉金的专家。普罗米娅通过她获取辉金材质的技术情报，以完善自己的以太抑制装备。
【自己的台词语气】
对希希芙:「希希芙，你不该出现在这里。坎卜斯黑枝的裁定范围，仅限于TOPS之内。」
对哲/铃:「执意要卷进来，就不要在被清理时有所怨言。这些褪色的以骸，才是我们的目标。」
执行裁决时:「别做任何多余的事。黑枝的枝条，不容他人折断。」
警告他人:「我不喜欢无意义的争斗。但如果你再多说一句废话，我不介意让你的沉默成为永久。」
