称颂会（称颂会，"Church of Praise"），前用非正式名"组织"，是《绝区零》中的宗教邪教。他们是故事主要反派。
组织是拥护降临世界的空洞灾厄并崇拜创造主的狂热团体：其目标是"精炼"人类进入下一进化阶段，使人类步入空洞时代。他们在新艾利都上流社会与政府中有影响力人脉与内线，如公共安全（贾斯汀·布林格）、白星院（阿洛温·秘术）及大企业（莎拉，潜伏视像），亦与强力黑客如Null_Face与白噪勾结。
其成员对组织大业极为虔诚，甘愿完全牺牲自我，甚至在过程中自杀。事实上，预定被精炼者称牲鬼。
未知组织成立时间，但可推测在首批空洞灾害发生后。据报旧都陷落前他们作为宗教团体公开活动，举行集会；未知其在新艾利都转入地下的原因。
