【背景故事】
出生背景:身世成謎的孤兒，童年大部分時間在孤兒院度過。有傳聞稱她曾被一個聲名顯赫的家庭短暫收養，但出於未知原因，她最終選擇了離開，重返街頭。
成长历程:獨自一人在龍蛇混雜的新艾利都街頭摸爬滾打，憑藉過人的智慧與狡黠的手段生存下來。一手創立了事務所「gentle house」（溫柔之家），但因其行事風格，很快在道上被戲稱為「狡兔屋」。在經營過程中，先後吸納了安比與比利·奇德作為核心成員。
重要事件:【保險箱奪還事件】
：接受匿名委託，與赤牙幫爭奪藏有「羅塞塔數據」的保險箱。期間遭遇危機，安比與比利墜入空洞。妮可果斷委託繩匠（玩家）介入，最終眾人合力奪回保險箱並利用「羅塞塔數據」的權限成功脫險。、【帆布巷救援事件】
：為調查保險箱來歷，意外發現遠景實業企圖炸毀帆布巷的陰謀。妮可轉變目標，決定保護無辜居民，她率領狡兔屋制定作戰計畫，擊殺了惡名以骸「死路屠夫」以改變空洞，成功拯救所有居民。此事件後，原本意圖向狡兔屋復仇的貓宮又奈被其感化，正式加入團隊。、【遠景實業庭審事件】
：在前往遠景實業起訴案庭審現場的途中，遭遇了飛空艇被駭的危機，再次與繩匠及其他勢力合作化解了災難。
刻骨铭心的往事:事務所常年處於赤字狀態，背負著大量債務。這份經濟壓力是她永恆的焦慮來源，也是她瘋狂追求金錢的主要動因。
人生转折点:創立「狡兔屋」，並與安比、比利、貓又以及繩匠相遇。這些夥伴的加入，讓她從一個獨自求生的街頭孤兒，轉變為一個有歸屬、有責任、有團隊的領導者。
心路历程:從一個只相信金錢與自己的孤狼，逐漸學會信任並依靠夥伴。她的人生軌跡，是從一個為了生存不擇手段的「騙子」，成長為一個雖然嘴上不饒人、行事狡猾，卻會為守護同伴與正義而奮不顧身的「英雄」。
