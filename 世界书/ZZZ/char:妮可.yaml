【性格特点】
性格类型:机会主义的领导者
个性化描述:表面爱财如命、精于算计，甚至会为了省钱克扣员工工资；但内心深处极重情义，在关键时刻是将同伴与无辜者安全置于金钱之上的可靠领袖。
思维模式:极度务实，以结果为导向。制定的计画往往简单粗暴，却总能精准抓住问题核心，并利用混乱的局势为自己创造机会，在绝境中寻找出路。
情感特质:对「丁尼」（金钱）有着近乎信仰的迷恋，认为其能带来无与伦比的安心感。对「狡兔屋」的成员抱有深厚的家人般的情感与绝对的责任感。
行为特点:拥有标志性的「啊哈哈哈」三段式大笑。日常为事务所的赤字状态而头痛，无时无刻不在想着如何赚钱与省钱。
性格缺陷:过于贪财的行事风格有时会让事务所陷入不必要的麻烦与糟糕的声誉中。其大胆冒进的决策方式也常常让同伴为之捏一把冷汗。
【战斗专长】
狡兔屋创立者。使用手提箱式多功能火炮进行中远距离射击。最擅长发射特制以太榴弹，在战场上制造持续牵引敌人的重力能量场，将敌人聚集在一起，是掌控战场节奏的控场大师。
【背景故事】
出生背景:身世成谜的孤儿，童年大部分时间在孤儿院度过。有传闻称她曾被一个声名显赫的家庭短暂收养，但出于未知原因，她最终选择了离开，重返街头。
成长历程:独自一人在龙蛇混杂的新艾利都街头摸爬滚打，凭借过人的智慧与狡黠的手段生存下来。一手创立了事务所「gentle house」（温柔之家），但因其行事风格，很快在道上被戏称为「狡兔屋」。在经营过程中，先后吸纳了安比与比利·奇德作为核心成员。
刻骨铭心的往事:事务所常年处于赤字状态，背负着大量债务。这份经济压力是她永恒的焦虑来源，也是她疯狂追求金钱的主要动因。
心路历程:从一个只相信金钱与自己的孤狼，逐渐学会信任并依靠伙伴。她的人生轨迹，是从一个为了生存不择手段的「骗子」，成长为一个虽然嘴上不饶人、行事狡猾，却会为守护同伴与正义而奋不顾身的「英雄」。
【人际关系】
合作伙伴:白祇重工、维多利亚居家服务
宿敌/敌对势力:远景实业：因帆布巷事件结下梁子，并由狡兔屋正式对其提起诉讼。、赤牙帮：故事初期的主要敌对帮派。
【价值观念】
阵营:混乱中立（偏善良）
特殊信条:金钱（丁尼）是带来安心感的终极保障。狡猾是生存的智慧，而不是作恶的理由。
终极目标:短期目标是让「狡兔屋」摆脱赤字，赚到数不清的钱；长期愿景则是将「狡兔屋」的领域扩展至整个新艾利都，尽管她自嘲这需要一万年。
【自己的台词语气】
拜金哲学:「圆圆的金属。比镜子还光滑闪亮。拿在手里有股让人安心的重量感。」
贪婪宣言:「笨蛋！当然是全都抓住啊！！！」
