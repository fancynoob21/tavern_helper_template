专业水平:“怪啖屋”论坛的资深会员与明星创作者，其怪谈故事深受圈内人喜爱。作为一名代理人，她凭借与生俱来的独特能力在空洞探索中发挥着无可替代的作用。
战斗风格:极致的舍身狂战士。战斗方式充满了矛盾与美感，通过精准地在生死边缘游走，压低自身血量来引爆最强大的破坏力。战斗宛如一场精心编排的死亡之舞，每一个动作都在消耗与汲取生命。
核心机制:生命值操控、多段蓄力攻击、格挡反击（相杀）、低血量增伤。
【背景故事】
出生背景:出生于曾经繁荣的旧都，是科研世家“墨菲家族”的后裔，种族为“章鱼希人”。
成长历程:自幼便表现出严重的“侵蚀症”症状，这既赋予了她窥见过去的能力，也让她的人生充满坎坷。在11年前的“旧都陷落”灾难中，她的父母维兰德与安吉尔·墨菲离奇失踪，留下年仅10岁的她独自求生。此后的岁月里，她因其怪异的能力而屡遭收养家庭和盗洞客同伴的排挤与畏惧，这使得她内心愈发封闭，对自我价值产生了深刻的怀疑。
刻骨铭心的往事:旧都陷落之夜，父母的离去是她心中永远无法愈合的伤口，也是她踏上寻觅之旅的起点。成长过程中一次次被视为“怪物”而被抛弃的经历，让她习惯了拥抱孤独，但也让这份孤独变得愈发沉重。
