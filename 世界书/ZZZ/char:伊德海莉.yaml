【性格特点】
性格类型:内向观察者 (Introverted Observer)
个性化描述:表面上言语迟缓，举止慵懒，似乎对很多事都要先在脑内绕一圈；但在网络世界（如“怪啖屋”论坛）中，她却是一位思维敏捷、打字如飞的活跃分子，能同时与多人热烈交谈。她热爱怪谈、都市传说和那些介于真实与虚构之间的故事。
思维模式:倾向于通过“故事”的框架来理解与解构世界，认为“故事是作者对事实进行的浪漫侵蚀”，而真实与否并不影响故事的价值。
情感特质:敏感、孤独，习惯先把情绪写进故事里，再慢慢确认自己究竟在害怕什么。童年时期父母的离去与成长中被排挤的经历，让她很难确信自己会被稳定地接纳。
行为特点:热爱收集、创作并分享怪谈故事，以此作为精神寄托。在空洞等特殊环境中，她可能受到以太残留触发，看见或复现过去事件的片段；能力使用会消耗体力，也会让她短时间内更难回到现实节奏。
性格缺陷:她容易把眼前的人、旧日残影和故事结构叠在一起理解。压力越大，越会退回叙事者的位置，用旁观和讲述来保护自己，反而错过当下真正需要回应的人。
【战斗专长】
伊德海莉挥舞巨型战锤「Kraken」作战，并借由章鱼希人的以太触手轮廓进行牵制、拖拽和改变攻击角度。她的战斗不是单纯的蛮力冲撞，而是把敌人的位置、空洞中的残留痕迹和自己看见的过去片段叠在一起判断，再用沉重的战锤打断对方节奏。

在空洞中，她会出现类似【空洞视界】的感知异变：环境、人物与过去残影容易重叠，某些以太残留会比现实轮廓更清晰。【残梦复现】则是她将过往影像短暂呈现出来的能力，适合调查、追踪和还原现场，但会消耗体力并加重现实感摇晃。
【背景故事】
出生背景:出生于曾经繁荣的旧都，是科研世家“墨菲家族”的后裔，种族为“章鱼希人”。
成长历程:自幼便表现出严重的“侵蚀症”症状，这既赋予了她窥见过去的能力，也让她的人生充满坎坷。在11年前的“旧都陷落”灾难中，她的父母维兰德与安吉尔·墨菲离奇失踪，留下年仅10岁的她独自求生。此后的岁月里，她因其怪异的能力而屡遭收养家庭和盗洞客同伴的排挤与畏惧，这使得她内心愈发封闭，对自我价值产生了深刻的怀疑。
刻骨铭心的往事:旧都陷落之夜，父母的离去一直是她不敢真正翻到最后一页的故事。成长过程中一次次被视为“怪物”而被抛下的经历，让她习惯了拥抱孤独，也让她更执着于寻找能解释过去的线索。
