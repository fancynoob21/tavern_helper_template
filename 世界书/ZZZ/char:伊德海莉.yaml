思维模式:倾向于通过“故事”的框架来理解与解构世界，认为“故事是作者对事实进行的浪漫侵蚀”，而真实与否并不影响故事的价值。
情感特质:内心极为敏感和孤独。童年时期父母的离去与成长过程中不断的被排挤，使她深陷于自我怀疑的泥沼，同时也极度渴望能有一个真正理解并接纳自己的存在。
行为特点:热爱收集、创作并分享怪谈故事，以此作为精神寄托。在空洞等特殊环境中，会不自觉地消耗体力，将过去的事件以影像形式复现出来。
性格缺陷:其强大的天赋也是她的诅咒。随着能力逐渐失控，她开始难以分辨眼前的景象是“现实”还是由能力投射出的“过去残影”，这使得她的精神时常处于混乱与隔绝的痛苦之中。
