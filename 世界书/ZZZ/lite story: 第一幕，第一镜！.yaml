章节标题: "第一幕，第一镜！"
剧情概要: "新艾利都传奇电影导演柯妮·埃斯佩尔，绳网“我最喜爱的电影导演”榜单第四名，竟意外造访了位于六分街尽头的录像店‘Random Play’。她带着对影像叙事的独到见解，以及一部筹备中的新片剧本，向身为店长的哲/铃发出了一个意想不到的邀约——担任她的副导演，负责为新片进行选角与勘景。这部电影讲述了一个关于外环暴徒、卧底密探与背叛的黑色故事。哲/铃接受了这份充满挑战的委托，以手中的相机为笔，新艾利都的街头巷尾为画布，开始了一场别开生面的‘创作’之旅。从光映广场咖啡店里气质冷峻的‘衣冠禽兽’（莱卡恩），到治安局分署前危险又迷人的‘致命密探’（简·杜），再到最终将镜头对准自己，定格下那位被背叛的‘挚友’；从即将上演劫案的‘倒霉珠宝店’，到见证最终对决的斯科特哨站‘空洞落日’，再到故事结束亦是起点的那家熟悉的录像店。哲/铃以其独特的审美与精准的捕捉力，完美地将柯妮剧本中的破碎灵感，淬炼为一张张承载着故事神韵的影像圣卡，赢得了这位挑剔导演的高度赞赏，也为自己在新艾利都的传奇中，添上了与众不同的一笔。"
