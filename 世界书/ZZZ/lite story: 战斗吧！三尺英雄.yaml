章节标题: "战斗吧！三尺英雄"
剧情概要: "空洞调查协会（HIA）的工作邦布图利在一次VR设备测试后，陷入了数据紊乱导致的“清醒梦”中，坚信自己是拯救世界的超级英雄，拒绝返回现实。它的同事凯莉对此束手无策，只能求助于身为传奇绳匠的哲/铃。为了帮助图利，哲/铃多次进入其梦境，并先后与被凯莉求助而来的“帮手”们组队。第一次是正处于独特修行状态、行为如同AI般的对空六课课长星见雅；第二次是把梦境当成真实电影情节、并称图利为“队长”的狡兔屋代理人安比。尽管众人努力配合图利在梦中扮演英雄，但它的症状并无好转。最终，凯莉请来了外环的佣兵——波可娜·费雷尼。波可娜在与哲/铃相认并解释自己已加入“卡吕冬之子”后，加入了最后的“治疗”行动。在梦境战斗结束后，她一针见血地指出图利其实早已恢复正常，只是沉溺于梦中强大的英雄身份不愿醒来。在波可娜一番“现实很残酷，但将梦想付诸行动才更有价值”的犀利说教下，图利终于被点醒，流着泪向凯莉道歉，并立志要通过努力，在现实中也成为能保护大家的“三尺英雄”。"
