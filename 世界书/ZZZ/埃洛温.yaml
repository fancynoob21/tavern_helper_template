埃洛温是一名在《絕區零》故事發生兩年前就已去世的被提及的NPC。她是邦布4412號的主人。她是一名有著棕色頭髮和眼睛的女性人類。

個人檔案

埃洛温，代號4412號，是一名隸屬於稱頌會的叛軍間諜，在白星院進行臥底工作。她被描述為一個「極其不起眼的人」，身高普通，考試成績也平平，但她總能完成任務。在研究院執行任務期間，她從未感到快樂，而當她被選入先遣隊時，才流露出一絲解脫。

歷史

在遊戲開始的兩年前，研究院組織了一支斷層勘探先遣隊，前往探索空洞零號內的琶音斷層，並取回保存在第四實驗室的特殊以太物質。已經滲透進研究院的阿洛溫被選中加入該隊伍。叛軍給她的任務是找到實驗室地下保險庫的鑰匙卡，但在她失敗後，他們決定用裝有炸藥的機甲炸開保險庫。

行動當天，埃洛温將4412號留在了空洞外，沒有帶上它，並告訴它：「很抱歉給你取了這個名字。從現在起，請忘了我吧。」她與叛軍會合前往第四實驗室，但他們遭到了一隻巨大的以骸襲擊，其紅色的以太「絲線」能夠腐蝕人們的身體和意識。埃洛温違抗了命令，重新編程了機甲，讓它們在以骸附近自毀，並離開叛軍去拯救她已產生感情的研究院研究員們。隨之而來的爆炸重組了琶音斷層的結構，並創造出了紊流迴廊。   

由於離以骸太近，埃洛温受到了腐蝕，若不完全變成以骸，她便無法離開斷層。她選擇作為一個人類死在空洞裡。她的最後願望是在遺體被進一步腐蝕前火化，她被安葬在紊流迴廊區域的深處。她的墓碑上刻著：「吾友埃洛温安息於此。願火焰賜予她永恆的安寧。」
