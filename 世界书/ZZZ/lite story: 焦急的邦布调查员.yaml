章节标题: "焦急的邦布调查员"
剧情概要: "绳匠“法厄同”（哲/铃）在一次日常外出时，注意到新艾利都的街道上有一只行为异常、显得格外焦急的邦布。这只名为凯伊的邦布正拼命地向路人发出‘嗯呐嗯呐’的请求，试图推广空洞调查协会(HIA)的社区问卷，却屡遭无视。出于好奇与一丝同情，哲/铃停下了脚步。凯伊见终于有人愿意倾听，激动地解释了自己的身份——HIA的新晋社区推广员，正为完成业绩而发愁。他详细介绍了此次问卷调查的目的：为了完善新艾利都的空洞灾害防治体系，HIA需要收集市民的日常行为数据，以制定更有效的防灾疏散预案。整个调查活动被包装成一系列任务，包括每周刷新的‘每周目标’和一次性的‘协会事务’，完成后不仅能获得菲林、啵噗券、丁尼等常规报酬，还能得到特殊的‘HIA纪念弹珠’，用以兑换更高价值的奖励。看着这只快要急出系统乱码的邦布，加上任务听起来并不复杂，哲/铃同意提供帮助，正式接下了‘社区勘测员’这份临时工作。"
