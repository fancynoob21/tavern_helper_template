章节标题: "银心锡兵之歌"
剧情概要: "为了追寻被封印的过往，安比·德玛拉换上了昔日的“白银军”制服，在绳匠哲/铃的协助下，开始了一系列以物易物式的情报交易。她首先为对空六课的副课长月城柳完成了一项紧急战斗委托，作为回报，柳证实了确有人曾违规查阅“白银军”的封存档案，且此人已离奇死亡。这次接触也让柳这位前防卫军军官对安比“兵器”之外的人类特质产生了复杂的探究欲。顺着线索，安比通过为白祇重工的格莉丝收集空洞数据，从其与改装店老板恩佐的口中，得知曾有一位形迹可疑、全身包裹严实的顾客在打探废弃军备，并喃喃自语着“白银复兴”的字眼。最终，线索指向了维多利亚居家服务的艾莲。安比在帮艾莲解决了一桩麻烦的委托后，从这位怕麻烦的鲨鱼少女口中获得了决定性的情报：在绳网上出现了关于“白银复兴”的讨论帖。至此，调查的矛头从现实的街头巷尾，正式转向了匿名的虚拟网络。一场围绕着禁忌兵器与复苏阴谋的风暴，即将在数据的海洋中展开。"
