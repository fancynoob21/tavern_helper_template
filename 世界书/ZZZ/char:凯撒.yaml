刻骨铭心的往事:在「火獄騎行」的終點，面對即將被以太結晶吞噬的燃晶火湖，她沒有絲毫猶豫，駕駛著心愛的摩托載著點火石，抱持著必死的覺悟沖入火湖的中心。那份拯救家園的決心與之後奇蹟生還的經歷，是其人生最深刻的烙印
