章节标题: "悠然插曲·金翅雀逃跑计画"
剧情概要: "在自己的生日当天，耀嘉音本应参加一场由『TOPS』组织安排的商业活动，但她厌倦了被资本摆布，决心给自己放一天假。于是，她通过叩叩联系了绳匠『哲/铃』——她那位化名为“乱七八糟炒饭”的网友，请求协助她从光映广场的保镖包围中逃脱。『哲/铃』成功帮助耀嘉音摆脱了盯梢，并将其带回录像店。耀嘉音坦白了自己的身份和逃跑的真实原因：她想在生日这天任性一次，确认自己仍有反抗的勇气。她随即“邀请”『哲/铃』加入自己的一日逃跑计划，一同前往厄匹斯港和热望角。在厄匹斯港的灯塔上，耀嘉音独自为自己唱起生日歌，并向『哲/铃』袒露了作为“女王”身份下的真实心声。在旅途的终点热望角，她们偶遇了一场由邦布举办的“耀嘉音模仿大赛”，并乐在其中。最终，耀嘉音的经纪人兼保镖『伊芙琳』赶到现场，在一番温馨又无奈的劝说后，将这位“逃跑公主”带回了工作中。临走前，耀嘉音与伊芙琳都对『哲/铃』表达了由衷的感谢。"
