称颂会历史  
称颂会创立时间不明，推测始于首批空洞灾祸后。其领袖之一"称颂会司教"于艾利都建城前夕被"剑术大师"击杀。据载旧都陷落前他们曾以宗教团体公开活动，举行露天集会；但转入新艾利都地下的原因未知。  
空洞零灾难疑与称颂会相关——旧都陷落前夜，有人试图解封先驱者纪念广场纪念碑内的圣徒。同夜卡萝尔·阿娜被造物主巨手掳走，赫利俄斯機關遭神秘武装团体与"怪物"围攻。此外，空洞零内可闻其诵经声。  
两年前琶音断层旧实验室袭击事件系其策划，但最后一刻阿萝玟背叛任务，反救出她所依恋的研究员并牺牲。称颂会仍成功进入实验室并留下讯息。  
从序章至第五章，法厄同遭遇的重大事件皆由称颂会主导。他们在造物主直接协助下研发灵药P07，将人类精炼为以太完美形态"圣徒"。
