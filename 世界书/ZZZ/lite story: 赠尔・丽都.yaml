章节标题: "赠尔・丽都"
剧情概要: "六分街的报刊亭最近正在举办《丽都巡游》年度版的预购活动，附赠的福利是由过往杂志照片制成的拼图。在忠犬“嗷呜”的热情推销与一位善感少女的冲动消费示范下，你（哲/铃）也参与其中，在报刊亭现场拼起了这些记录着城市剪影的拼图。拼图的内容涵盖了新艾利都的街景、邦布的可爱瞬间、代理人们的日常生活等，每完成一幅，都像是在重温一段属于这座城市的温暖记忆。随着拼图一块块完成，你不仅获得了游戏内的道具奖励，也更深刻地感受到了新艾利都这个末世中幸存都市的独特魅力与人情味。当所有拼图悉数完成，你看着这些完整的画面，或许会思考将它们作为房间的装饰，又或者，萌生出自己也去拍摄照片、向杂志投稿，将自己与伙伴们的故事也变成拼图一部分的想法。"
