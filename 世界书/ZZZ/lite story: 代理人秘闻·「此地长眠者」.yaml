章节标题: "代理人秘聞·「此地長眠者」"
剧情概要: "六課執行官淺羽悠真因偶然的情報，決定私下調查一種能短暫提升以太適性的違禁藥物。他委託其信賴的搭檔——繩匠（哲/铃）協助調查。二人在厄匹斯港空洞中與治安局發生摩擦，並目睹了一位少年因藥物副作用與侵蝕併發，異變為以骸「塔納托斯」。事件引出了自稱療養院長的霧島，而他竟是悠真的師兄。悠真向（哲/铃）坦白，他真正追查的目標，是自己那位因進行禁忌人體實驗而被定罪、而後失蹤的師父。隨著調查深入，霧島的偽善面具被層層剝開，他不僅利用身患「以太適性衰竭症候群」的孩童進行殘酷實驗，更將他們作為人質，脅迫知情者。為了拯救孩子，也為了清算師門的罪孽，身患絕症的悠真決定與（哲/铃）一同踏入陷阱，與霧島進行最終的對峙。在空洞深處，悠真發現師父早已異變為以骸，而霧島的野心遠超想像。在擊敗了已非人樣的師父後，悠真用最後的力氣，將師父為他特製的、也是霧島夢寐以求的最終藥劑，盡數注入自己體內，以此終結了這一切。"
