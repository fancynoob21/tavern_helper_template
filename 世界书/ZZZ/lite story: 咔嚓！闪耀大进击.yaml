章节标题: "咔嚓！闪耀大进击"
剧情概要: "新艾利都的《救世之日》杂志举办了一场“空洞怪物摄影大赛”，这点燃了智能摄影机器人“咔嚓先生”的创作激情。然而，它的监护人希拉因没有足够的丁尼，无法委托绳匠带它进入空洞。于是，咔嚓先生直接找到了绳匠哲/铃，提议以一半的赛后奖金作为报酬，换取哲/铃协助它完成拍摄。在接下来的几天里，哲/铃接受了一系列名为“空洞闪耀计划”的委托，带领咔嚓先生前往地铁区域、利曼尼亚空洞、外环乃至白祇重工工地等多个危险地带，拍摄以骸的“英姿”。每一次探索都让咔嚓先生愈发亢奋，但频繁的高强度运作也让它的机体伤痕累累，这让希拉的担忧与日俱增。期间，哲/铃也了解到希拉因父亲常年忙于工作，可能再次错过她的生日而感到失落。在希拉生日当天，也是最后一次拍摄委托，希拉恳求咔嚓先生不要再冒险，咔嚓先生最终答应了她。拍摄任务成功结束后，哲/铃与咔嚓先生前往报社提交作品并获得了丰厚的报酬。出人意料的是，咔嚓先生立刻用自己分得的奖金，在便利店买下了希拉一直很想要却舍不得买的音乐盒，尽管此时它的机体已经因过热而冒烟。当哲/铃帮它处理好故障，一同返回六分街时，正巧遇到刚刚风尘仆仆赶回来的希拉父亲。虽然父亲没能买到礼物，但希拉表示父亲的回归就是最好的礼物。此时，咔嚓先生献上了音乐盒，给了希拉双倍的惊喜。在感动的氛围中，希拉请求哲/铃为她、父亲和咔嚓先生拍下一张珍贵的全家福。照片定格了这温情的一刻，咔嚓先生也将承诺的报酬交给了哲/铃，并期待着下一次的空洞探险。"
