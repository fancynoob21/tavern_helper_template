章节标题: "生意×怪事×正义"
剧情概要: "主角兄妹（哲/铃），表面上是六分街录像店“随机播放”的店主，暗地里则是传奇绳匠“法厄同”。狡兔屋老板妮可为救坠入空洞的队员安比和比利，委托（哲/铃）进行救援。救援途中，兄妹的HDD系统被神秘黑客入侵，通讯中断。狡兔屋在空洞内孤立无援，遭遇了以太侵蚀变异的赤牙帮首领“赤佬”。在绝境中，妮可并未选择出卖（哲/铃）换取生路，而是选择保护失去连接的伊埃斯。（哲/铃）与黑客斗智斗勇，最终夺回系统控制权，并利用从赤牙帮手中夺回的保险箱内的神秘“数据盘”，成功引导狡兔屋脱困。然而，数据盘中的信息激活了一个名为“Fairy”的神秘AI，它侵入了HDD系统，并声称要协助（哲/铃）重建被黑客破坏的绳匠事业。"
