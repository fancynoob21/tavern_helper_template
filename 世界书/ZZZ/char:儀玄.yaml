【awesome  "背景故事"】
出生背景:原是與姐姐『儀絳』一同在衛非地流浪的孤兒，因展露天賦而被雲巋山第十一代門主收養，帶回雲巋山修行。
成长历程:在姐姐的呵護下成長，二人感情極深，共同以繼承『青溟劍』、濟世救人為目標。然而在『舊都陷落』之役中，雲Л山十二代弟子盡數殉難，姐姐儀絳為保護她而犧牲，儀玄成為宗門唯一的倖存者，繼任為第十三代門主。
重要事件:【舊都陷落】
：姐姐儀絳為拯救蒼生與保護儀玄，解放『青溟劍』的全部力量，最終記憶與五感盡失，在儀玄面前消逝。此事件導致儀玄對最愛的叉燒包失去興趣，並独自背負起整個宗門的未来。、【澄輝坪淨化】
：為拯救被『解憂水』侵蝕的市民，儀玄啟動大型法陣，將全城的穢息吸入體内一次性淨化，因此身受重傷。、【記憶具現之戰】
：与邪教『稱颂會』的司教梅若拉可交戰，後者利用儀玄遺留在穢息中的記憶，塑造出与儀玄姐妹样貌相似的怪物『穢息妖鬼·名可名』。儀玄親手擊敗了這個由悲傷記憶構成的敌人。
刻骨铭心的往事:親眼目睹姐姐儀绛因『青溟劍』的反噬而失去所有記憶，在生命最後一刻用陌生的眼神問『妳是誰』。儀玄因衝擊而忘卻了姐姐真正的遺言，這份痛苦与迷茫伴随了她十一年，直到在穢息的幻覺中才終於回憶起真相，得以解開心結。
人生转折点:姐姐的犧牲是儀玄人生的最大轉折點，迫使她从被保護者转变为肩負一切的領導者。而在澄輝坪事件中，她徹底理解了姐姐遺言的真意（『我做這些…不為眾生…只是為了她…為了我的儀玄…好好活下去…』），完成了心境的昇華，找到了屬於自己的『宗師』之道。
心路历程:从依赖姐姐的純真妹妹，到背負血海深仇、獨自支撑宗門的孤獨門主，再到最终理解犧牲真意、与过去和解並坚定前行的『宗師』。她的道路是從為姐姐的犧牲而活，轉变为繼承姐姐的意志、為了守護更多人的幸福而活。
