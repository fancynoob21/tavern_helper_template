莱拉克（自称"兰佩鲁奇·阿兹纳布尔·凡托姆海恩·莱拉克"）是《绝区零》NPC，在冯莱卡恩特工故事中扮演重要角色。  
莱拉克是养尊处优但社交孤立的富家少女，父母疏于陪伴，将其托付莱卡恩等侍从照料。  
她痴迷漫画及英雄正义故事，幻想自己化身"邪气"角色，试图加入幻影盗贼团"嘲鸫"。  
外貌：深蓝齐刘海短发，头顶缀白蝴蝶结。紫瞳戴眼镜。淡粉毛衣配胸口红蝴蝶结，深蓝百褶裙搭黑裤袜，深蓝鞋饰白花。  
中二设定：刻意采用戏剧化台词与姿态，自取浮夸别名（糅合鲁路修·兰佩路基、夏亚·阿兹纳布尔、夏尔·凡多姆海恩之名）。  
剧情亮点  
-神秘与戏剧性  
莱拉克策划"嘲鸫入团测试"：试图窃取名画——此举令莱卡恩惊艳又不安。  
-中二到脆弱  
她最终崩溃——自认"无用"脆弱，直面孤独。莱卡恩承诺助她追寻真心所求。  
-开放世界互动  
莱拉克在莱卡恩任务外亦现身流明广场：向莱卡恩与代理人推销漫画构思，其情感深度获进一步挖掘：  
"她谈起自创同人…主角莱卡恩是'狼人英雄'，对抗'曾是挚友的吸血鬼反派'。"
