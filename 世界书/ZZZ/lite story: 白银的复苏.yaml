章节标题: "白银的复苏"
剧情概要: "锦鲤面馆的老板乔普师傅发现常客11号已许久未至，这引起了绳匠兄妹（哲/铃）的注意。与此同时，奥波勒斯小队的扳机正因无法联系上被频繁调防的队友11号而焦急万分。在一次失败的追寻中，她从掳走11号的神秘防卫军人员口中听到了「白银的复甦」这一词汇。为了查明真相，扳机通过绳网联系上了一位自称前白银军军队长安比的神秘少女。安比，正是传说中代替11号死去的人，她向扳机揭示了自己与11号同为复制人的惊人事实。两人联手深入空洞，在一座秘密实验室内找到了被囚禁的11号。实验室的主人，是另一位幸存的白银军成员——崔姬。崔姬因过去的悲惨遭遇而变得扭曲，她执着于利用复制人技术重建白银军，甚至不惜贩卖“残次品”姐妹的器官来换取研究资金。在激烈的对峙后，安比与扳机成功救出11号，但发现她已因重创而失忆。安比在将11号托付给绳匠兄妹与扳机照料后，决心独自了断与崔姬的恩怨。在进入空洞前，她趁着11号记忆会在午夜清零的间隙，向她坦白了一切真相，却未能得到原谅。最终决战中，服下以太药剂的崔姬与为保护她而自我牺牲的克隆体「少女A」融合成强大的以骸「帕里库斯」。危急时刻，通过藏在玩偶内摄像机得知真相的11号在扳机的护送下赶来支援。姐妹二人联手击败了帕里库斯，崔姬在弥留之际恢复了对队长安比的依恋，随后化作以太粒子消散。事件结束后，11号再次失忆，回到了最初怨恨安比的状态，而安比选择平静地背负这份仇恨，并对白银军技术的未来做出了最终的决断。"
