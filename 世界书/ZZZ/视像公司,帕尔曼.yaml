视像公司是建筑公司。代表查尔斯·帕尔曼先生，矮胖中年侏儒（约1米高），灰发灰须。任CEO时穿西装，逃亡时着飞行员夹克、海魂衫、黑色护目镜与牛仔裤。
第一章：帕尔曼代表视像公司承接旧都地铁翻新合约。期间主导阴谋，意图引爆该区域居民以节省疏散安置成本。阴谋被狡兔屋挫败后，帕尔曼遭公共安全逮捕。
第三章：帕尔曼受审途中飞艇遭不明袭击者劫持。黑客瑞恩协助袭击者试图将飞艇驶入芭蕾双子空洞致全员遇难。虽袭击被法厄同与維多利亞居家服務阻止，帕尔曼仍劫持飞艇逃往外环。
第四章
帕尔曼坠机外环，被卡吕冬之子抓获。后者同意将其移交法厄同，以换取协助赢得地狱巡回赛。
第五章
帕尔曼向法厄同与對空洞事務特別行動對空六課供认，同意提交布林格与莎拉涉事证据。但团队遭布林格雇佣的佣兵伏击。佣兵俘获帕尔曼，将其带至芭蕾双子空洞前哨。
帕尔曼再获救（此次由對空六課所救）——但离开空洞时遭布林格与公共安全警员围堵。课长星见雅将帕尔曼抛回空洞以防其落入布林格之手。后被對空六課回收，终交出布林格恶行证据。
