【性格特点】
性格类型:理性精确的机械宅御姐
个性化描述:醉心于齿轮、金属和电线，是当之无愧的「机械宅」。在面对机械时总是表现出超凡的耐心，但对人类的情感表达则显得笨拙而直接。是唯一敢喊珂蕾妲「小不点」却不会被她锤胫骨的人。
【战斗专长】
使用钉枪进行战斗，音擎嵌入了超算核心，能以顶尖速度编译机械的运行代码，是与她的"孩子们"沟通感情用的小玩具。白衹重工的核心技术人才，将空洞内重工机械技术专利发展完善。
【背景故事】
出生背景:父母均为空洞相关的科研工作人员，在一次危险的空洞考察活动中双双失踪，不久被判定为死亡。
成长历程:独自一人的格莉丝被父母生前的友人霍尔斯（即白祇重工的前任社长、珂蕾妲的父亲）所收养。因此格莉丝与珂蕾妲存在非血缘意义上的「姐妹」关系。
【人际关系】
珂蕾妲:义妹关系，唯一敢喊她「小不点」的人
