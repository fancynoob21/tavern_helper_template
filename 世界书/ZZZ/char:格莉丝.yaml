气质描述:御姐型机械宅。对机械有着病态的热爱，把精密的金属构成物当做自己的孩子般宠爱，看到感兴趣的机械设备后会两眼放光，迫不及待想要拆卸研究。理性精确，字典里没有「少许」「适中」，都是精确的「毫升」。
