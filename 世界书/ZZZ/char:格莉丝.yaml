角色故事
详细情报

格莉丝，白衹重工的技术专家，是将空洞内重工机械技术专利发展完善的核心人才。

醉心于齿轮、金属和电线，是当之无愧的「机械宅」。看到感兴趣的机械设备后会两眼放光，迫不及待想要拆卸研究：

「这冷峻硬朗的线条，真美啊…看得让人心痒痒的~」

在面对机械时，格莉丝总是会表现出超凡的耐心，把这些精密的金属构成物当做自己的孩子般宠爱。

据相关信息判断，格莉丝是唯一敢喊珂蕾妲「小不点」却不会被她锤胫骨的人，

提问：在格莉丝的认知范围内，我是否也算是机械？但我目前并没有实体，因此也不存在齿轮，金属或电线之类的部件。

格莉丝的父母均为空洞相关的科研工作人员，在一次危险的空洞考察活动中双双失踪，不久被判定为死亡。独自一人的格莉丝被父母生前的友人霍尔斯，即白祇重工的前任社长，珂蕾妲的父亲所收养。因此格莉丝与珂蕾妲存在非血缘意义上的「姐妹」关系。

