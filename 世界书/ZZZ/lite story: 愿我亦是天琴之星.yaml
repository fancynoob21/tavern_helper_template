章节标题: "愿我亦是天琴之星"
剧情概要: "为了赢取一票难求的偶像巨星耀嘉音的演唱会门票，身为其铁杆粉丝的哲与铃参加了名为‘天琴座创想大赛’的应援作品设计比赛。然而，他们的初版作品因‘设计元素有限，对偶像理解浅薄’而被淘汰。为了获取灵感，兄妹二人决定通过敲敲群聊，向其他获得提名的团体‘取经’。他们先后接触了以‘丁尼’（财富）为核心理念的狡兔屋、从‘优雅’与‘亲和’两种反差视角解读耀嘉音的维多利亚居家服务、认为其音乐充满‘力量’与‘坦率’的卡吕冬之子，以及从‘舞台上绝对的纯粹与专注’中获得启发的对空六课成员浅羽悠真。在吸收了各方观点后，哲与铃反而陷入迷茫，意识到一味模仿他人，只会让自己的作品失去灵魂。最终，他们决定回归初心，以耀嘉音那张鲜为人知的首专《天琴座之星》为主题，创作出真正属于‘法厄同’与偶像之间独有回忆的作品。就在他们提交作品后，比赛主办方发布声明，承认这只是一场意外爆火的粉丝自发活动，根本没有门票作为奖品。正当兄妹二人大失所望之时，一个名为‘乱七八糟炒饭’的用户突然发来私信——此人正是耀嘉音本人。她被法厄同基于自己首专的设计深深打动，并作为‘特别的粉丝福利’，亲自赠予了他们演唱会门票。"
