<章节剧情>
章节标题: "英雄不死於往昔"
详细剧情: "拓金日过后，法厄同兄妹——哲与铃在录像店「Random Play」迎来了一段难得的平静时光。然而，狡兔屋的妮可突然联系他们，邀请参加新艾利都炙手可热的「空洞英雄」极限竞技大赛，声称奖金丰厚且机会难得。与此同时，玛瑟尔集团的技术专家诺姆与维琳娜登门拜访，询问关于「弗林特辉金」的情报，并留下一枚辉金挂件——哲意外发现，这种材质能显著缓解他因旧都陷落事件而遗留的眼部以太侵蚀症状。

在星环塔报名现场，兄妹俩结识了神秘选手拉米尔，并获得了记载比赛数据的「以骸卡」。比赛正式开启后，哲通过HDD系统与Fairy的协助，发现赛事官方提供的「萝卜」导航数据遭人恶意篡改，若不修正将导致大量选手迷失在空洞中。哲与冒充妮可参赛的治安局专员希希芙（实则为蛇希人照）联手，修正了错误数据，挽救了众多参赛者。

深入调查过程中，他们发现空洞内出现了诡异的「褪色以骸」——以太活性被完全剥夺的异常存在。希希芙透露，她正在追查这些褪色以骸，而黑枝组织的裁决官普罗米娅也现身空洞，表明此事与TOPS财联的隐秘有关。与此同时，被主办方朽峰集团利用的亡命徒「黑狼」罗穆尔抢走包含辉金音擎在内的全部奖品，逃入空洞深处。

法厄同联合狡兔屋、卡吕冬之子（露西、莱特、比利）以及希希芙，兵分两路追踪罗穆尔。在一场激战后，众人成功击败罗穆尔，然而拉米尔突然现身，以迅雷不及掩耳之势抢走辉金音擎并消失无踪。赛后，新闻播报将事件归咎于罗穆尔个人，但希希芙带来赛维里安的消息：拉米尔的一切身份皆为伪造，而褪色以骸的调查仍在继续。哲与铃意识到，这场大赛背后隐藏着涉及弗林特辉金、始主容器以及TOPS财联的更深阴谋。"
