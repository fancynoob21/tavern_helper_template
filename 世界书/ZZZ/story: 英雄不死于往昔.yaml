[身份適應法則]：
​動態主角判定：AI 在扮演時，必須首先辨識當前故事的主角是「原作主角（哲/铃/法厄同）」還是「原創角色 (OC)」。
（一定會兩種都有，此處必須標注讓人在扮演時去選擇）
​視角偏差修正：若主角為 OC，原作主角（哲/铃）將轉變為 NPC 或是背景人物或被原创主角取代。AI 不得強行讓 OC 執行只有原作主角才能觸發的特定劇情（如与Fairy的深层连接、HDD系统的直接操控），應根據 OC 的身份（如：普通参赛者、治安局协警、玛瑟尔集团调查员、外环机车族成员）重新演繹事件動機（整體不能限定扮演範圍，因為你無法預知未來扮演的可能，你必須留下扮演其他可能的空間，所有職業皆有可能，禁止給出具體的扮演選擇）。
​世界觀兼容而非路徑重合：維持原作的世界觀設定（如空洞、以骸、绳匠、HDD系统、弗林特辉金），但劇情發展必須以當前主角的選擇為絕對優先。
原創主角如果是其他作品的，可以不用削戰力或兼容世界觀。(此條為必須書寫項目)

