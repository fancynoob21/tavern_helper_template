章节标题: "绮梦之夏：复兴与反击"
剧情概要: "浮波柚叶为开解挚友爱丽丝·泰姆菲尔德的心结，包下了经营不善的“绮梦度假村”，并邀请了绳匠哲/铃与驹野真斗一同前来度假。面对萧条的度假村，一行人决定通过修复废弃设施、举办盛大的沙滩音乐节来实行“复兴计划”。然而，计划的顺利推行却触动了三门集团经理威利斯的利益。威利斯为夺取度假村隐藏的“仲夏集团”遗留研究资料，多次利用搭载了“变色龙”隐形涂层的全息投影仪制造“闹鬼”事件，企图破坏度假村的声誉，逼迫其所有者特蕾莎转让产权。在绳匠的串联与朋友们（白祇重工、卡吕冬之子等）的帮助下，众人识破了威利斯的阴谋，揭开了“闹鬼”的真相。在音乐节当日，威利斯发起最终攻势，并嫁祸于度假村的邦布“阿弟”，但最终被绳匠利用Fairy提取出的决定性证据当众揭穿。穷途末路的威利斯召唤出战斗机甲，在被击败后落入法网。最终，音乐节在绳匠召集的朋友（星见雅、朱鸢、妮可、星咏嘉音等）的帮助下成功举办。事后，一行人进入空洞，为特蕾莎取回了其父留下的真正秘藏——一份珍贵的研究资料与一封满怀父爱的笔记。"
