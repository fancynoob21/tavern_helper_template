【基本信息】
danbooru tag: fairy (zenless zone zero)
姓名:Fairy
英文名:Fairy
项目代号:「四把钥匙」之一（与 Youkai、Ghost、Jinni 同属赫利俄斯机关秘密项目）
型号:III 型总序式集成泛用人工智能（Type III General-Purpose AI with Total Sequential Integration）
种族:智慧构造体 / 软件型 AI 程式
性别:无生理性别（语音模组设定为成年女声）
所属:原属赫利俄斯机关秘密项目；机关解散后程式封存于「罗塞塔数据」密匙
属性:无（纯软件，无实体）
武器:无（非战斗型，专精数据 / 信息 / 智能环境干涉）
核心能力:与 HDD 系统及邦布伊埃斯神经接口完全兼容的辅助型 AI 程式。设计能力包括：高速扫描空洞 / 以骸 / 蚀域环境并绘制路径、预测敌人行为、定位漏洞与出口；接管一切电子化「智能」环境元素；强力情报检索与新艾利都联网设备的黑客接入；可代替绳匠操纵伊埃斯指引代理人。能力边界:无独立物理实体；脱离宿主硬件无法持续运作；非智能 / 离线物体不在干涉范围。

【初始状态】
程式以休眠形态封装于「罗塞塔数据」密匙存储介质内，介质保管于赤牙帮帮主「白佬」米格尔的保险箱中。
