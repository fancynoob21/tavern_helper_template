章节标题: "悠然插曲・游方闲客"
剧情概要: "在“牲鬼危机”告一段落后，一位自称来自“云巋山”的“玄术师”仪玄，受新艾利都代理市长梅弗劳尔的委托，造访了绳匠（哲/铃）经营的录像店“Random Play”。她此行的目的，是调查并协助（哲/铃）掌控体内因植入体手术而产生的、与云巋山“术法”极为相似的异常以太能量。在达成初步合作意向后，仪玄邀请（哲/铃）一同前往光映广场的古玩店“不掩”取物。途中，他们以奇特的方式解决了想求卦的民众，并帮助了一对陷入困境的邦布“阿环”与“奇奇”，（哲/铃）以技术修复了邦布的硬件故障，而仪玄则以“玄术”之名传授了其安抚心境的“咒语”。最终，仪玄在古玩店通过暗号取走一件神秘物品后与（哲/铃）告别，为未来的正式调查埋下伏笔。"
