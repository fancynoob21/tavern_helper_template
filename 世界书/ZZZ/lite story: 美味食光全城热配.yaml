章节标题: "美味食光全城热配"
剧情概要: "由于备受欢迎的快闪餐车「面包等式」推出的外送服务APP不堪重负而崩溃，传奇绳匠「法厄同」兄妹（哲/铃）在「狡兔屋」老板妮可的半哄半骗下，接下了这份临时顶班的送餐委托。活动期间，餐车邦布主厨每天会抽取一名「幸运顾客」，享受免单和优先配送服务。哲/铃的任务便是接下这些幸运订单，并与各区域专属的邦布快递员一同将美食送达。从为外环大姐头凯撒偷偷买饭的傲娇军师露西，到用三明治换了一桶鱼的倒霉渔夫啾啾；从为整个六课下属贴心准备不同口味餐点的星见雅课长，到对邦布的一切都爱得深沉的狂热粉丝佩吉；最后再到中奖后为整个狡兔屋订餐的比利……在这场横跨新艾利都的送餐之旅中，哲/铃不仅品尝了美食的滋味，更邂逅了老朋友们在喧嚣都市生活中，那一份份或傲娇、或笨拙、或温暖的日常与心意。"
