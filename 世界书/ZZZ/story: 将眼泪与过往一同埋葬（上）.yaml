詳細劇情: "一位自稱收藏家的神秘紳士雨果·維拉德，以一筆鉅款委託為契機，造訪了主角兄妹（哲/铃）的錄像店『隨機播放』。他的言談舉止充滿謎團，引導（哲/铃）捲入一場圍繞著TOPS財聯與拉文洛克家族的拍賣會風波。與此同時，新艾利都市長透過維多利亞家政的執事萊卡恩聯繫（哲/铃），揭示了城市背後更深層的危機——一枚從『牲鬼』體內提取，擁有脫離空洞獨立存在能力的『牲鬼核心』被盜，並將出現在拍賣會上。市長升級了（哲/铃）的HDD系統，使其恢復了親身進入空洞的能力，並委託他們奪回核心。在拍賣會上，（哲/铃）結識了擁有預知不幸能力的怪盜少女薇薇安，並親眼目睹雨果化身怪盜『反舌鳥』，在眾目睽睽之下竊走核心。追擊過程中，萊卡恩與雨果這對昔日搭檔的決裂過往逐漸揭曉。為了追查稱頌會的陰謀，眾人根據前治安局副局長布林格的遺物筆記，深入空洞，卻發現了處於休眠狀態的『牲鬼』。在與拉文洛克家族現任當家哈特曼的對峙中，雨果上演了一場驚天的背叛與反轉劇，揭示了他身為拉文洛克私生子的真實身份與復仇大計。最終，在信念的極致衝突下，萊卡恩親手貫穿了雨果的心臟，導致其墜入空洞深淵，生死不明。"
