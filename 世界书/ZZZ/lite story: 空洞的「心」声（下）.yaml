章节标题: "空洞的「心」声（下）"
剧情概要: "珂蕾妲最终决定委托绳匠“法厄同”（即主角兄妹（哲/铃））寻找失落的原型机，以查明父亲霍尔斯失踪的真相。在格莉丝的分析下，他们确认了原型机位于旧都陷落时未完工的先驱者纪念广场。（哲/铃）通过HDD系统远程操控伊埃斯引导白祇重工众人进入这片危险的废墟。在原型机的驾驶舱内，他们发现了一张带有霍尔斯签名的收款单和多处弹孔，证明霍尔斯当年并非卷款潜逃，而是支付了原型机的款项并可能卷入了一场阴谋。就在众人准备回收原型机时，纪念碑下封印的巨大怪物“未支复合侵蚀体”苏醒，并吞噬了抓抓机“汉斯”和打桩机“星期五”，变化为更庞大的形态。危急关头，珂蕾妲驾驶原型机应战，但力量不支。在回忆起父亲的话语后，她喊出了原型机的真名——“盖罗伊”，成功激活了其全部力量，将怪物击败。任务结束后，珂蕾妲将原型机中加密的外部存储单元交给（哲/铃），委托其破解，以探寻怪物与当年事件的最终真相。"
