章节标题: "代理人秘聞「無人喝彩之冠」"
剧情概要: "受卡呂冬之子新任首領凱撒的邀請，繩匠（哲/铃）（代理人代號：法厄同）前來外環的野火鎮參加年度盛事「清算日」。然而凱撒繁忙，遂委託麾下大將萊特接待。在萊特的介紹下，（哲/铃）了解到清算日是個解決恩怨的比拼節日。一場輕鬆的燃油飲對決後，氣氛卻因一名叫安德斯的壯漢的到來而急轉直下。安德斯在拳擊對決後揭開了萊特不為人知的黑暗過往，並惡言相向。介意此事的萊特在暗中調查時，發現安德斯竟與卡呂冬之子的舊敵有所勾結，一個針對清算日的巨大陰謀正悄然醞釀。（哲/铃）決定協助萊特，二人深入空洞追查，最終揭開了安德斯被仇恨蒙蔽的真相。萊特通過一場賭上信念的決鬥，不僅粉碎了敵人的陰謀，也解開了安德斯的心結。為了不讓慶典蒙上陰影，萊特最終選擇獨自一人，在唯一的見證者——邦布「伊埃斯」的注視下，向所有敵人發起挑戰，贏得了一場無人知曉、亦無人喝彩的偉大勝利。"
