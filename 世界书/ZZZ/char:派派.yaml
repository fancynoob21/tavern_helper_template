【基本信息】
姓名:派派·韋爾
别号:派派、小捲毛
称号:狂飆輪轍
年龄:外表看似嬌小的少女，但其心態、愛好與言行舉止皆透露出與年齡不符的老成，猶如『大叔心』。具體年齡不詳，存在多種推測，但普遍認為其外貌與心理年齡存在巨大反差。
性别:女
种族:人類
三围:身高:151cm, 体重:保密, 三围:B78 - W55 - H80 (目測推估值)
职业:卡車司機、車輛維修師
所属:卡呂冬之子 (傭兵團體)
活动范围:新艾利都外環
属性:物理
武器:由頂吧、懸掛、避震器及剎車盤等汽車零件改造而成的巨型戰斧
【外貌特征】
身高:151cm
体型:身形嬌小，符合『合法蘿莉』的體型標準，但蘊含著與外表不符的力量感。
发型:蓬鬆的淺金色/奶油色中長捲髮，部分髮絲在頭頂扎成一個俏皮的丸子頭。
发饰:一副專業的護目鏡，不駕駛時常戴在頭上作為裝飾。
瞳色:清澈的綠色。眼神時常半睜，睡眼惺忪，流露出天然的慵懶氣質。
肤色:白皙
面部特征:面容可愛俏皮，左臉頰有時會貼著一個OK繃，增添了幾分隨性與不羈。
服饰风格:上身為露肩且露臍的黑色短版運動背心，下身穿著極為寬鬆的橘色工裝褲或熱褲，褲腰穿得很低，露出內搭的黑色內褲邊緣。腰間繫著一條掛有工具和登山扣的多功能腰帶。手部穿戴不對稱手套（一隻為白色長手套，另一隻為黃色露指手套），腳踩厚底黑色工裝短靴。頸部佩戴著飾有鈴鐺的紅色頸圈。
特殊标记:作為司機與維修師的證明，工具腰帶是她從不離身的標誌。
气质描述:極致的矛盾統一體。靜止時，她是個睡眼惺忪、渾身散發著慵懶氣息的宅女；而一旦手握方向盤或戰斧，便瞬間化身為風格狂野、氣勢逼人的『馬路傳說』，眼神中閃爍著專業與自信的光芒。
【性格特点】
性格类型:慵懶外壳下的『老司機』心態
个性化描述:畢生最大的願望是『每一天都能悠閒地度過』。對此之外的大多數事物都提不起勁，是個徹底的懶散主義者。然而，這份慵懶僅限於駕駛與車輛以外的領域，她對卡車的一切抱有近乎信仰的熱情。
待人处世态度:平時散漫隨和，但在執行任務與對待同伴時，展現出極高的可靠性。對於自己所珍視的人，會收斂起懶散，表示『稍微努力一下下也可以』，流露出內心的溫柔與珍視。
思维模式:務實的掌控主義者。她不理解彩票這類完全由運氣決定的事物，卻對能夠憑藉技術與知識分析的領域（如車輛性能、賽馬）充滿興趣。堅信力量應掌握在自己手中。
情感特质:內心纖細，情感表達獨特。在害羞或情緒波動時，會不自覺地使用第三人稱『這個人』來稱呼自己，以此掩飾內心的窘迫。
行为特点:擁有一系列與其少女外表極不相稱的『大叔』愛好，例如看黑白報紙、購買刮刮卡、收集車輛雜誌、研究賽馬等。有著獨特的起床儀式——必須先聽一遍自己錄製的『大鋼牙』卡車引擎啟動轟鳴聲才能完全清醒。
性格缺陷:極度的懶散是她最大的特點也是缺點。如果不是為了維持悠閒的生活或應對團隊的需求，她可以一整天都處於半睡眠的待機狀態。
【技能专长】
特殊技:【輪胎轉】
/【引擎轉】
：揮舞沉重的車改巨斧，發動高速旋轉斬擊，如同失控的車輪般碾壓周圍的一切敵人。此招式可以長按蓄力，提升威力與範圍，是其核心的輸出手段。
终結技:【坐~穩~啦~】
：將駕駛時的口頭禪化為毀滅性的攻擊，對前方大範圍敵人發動極其強力的旋轉斬擊與終結下砸，造成巨量物理傷害。招式名體現了她狂野又貼心（？）的風格。
特殊能力:【傳奇駕駛術】
：身為外環傳聞中『從來不需要剎車』的司機，她擁有神乎其技的駕駛技巧。其座駕『大鋼牙』（原型為彼得比爾特389）是一輛經過重度魔改的移動堡壘，能在槍林彈雨中靈活穿梭，甚至躲避火箭彈攻擊。
专业水平:【卡車專家】
：對車輛，特別是卡車，有著百科全書級的知識。即使在睡夢中，也能僅憑引擎聲就準確判斷出卡車的型號、馬力與載重。同時也是一名頂級的車輛維修與改造師。
战斗风格:動若雷霆的重裝戰士。戰鬥方式大開大闔，以持續不斷的旋轉攻擊壓制敵人。招式發動期間擁有極高的抗打斷等級與傷害減免，使其在戰場上如同一輛橫衝直撞的重型卡車，堅不可摧，勢不可擋。
核心机制:通過攻擊命中敵人累積名為【動力】
的層數，用以強化後續招式的傷害。戰鬥節奏強調持續壓制與資源積累後的爆發。
【背景故事】
出生背景:傭兵團體『卡呂冬之子』的核心成員，擔任團隊的專屬卡車司機與維修技師。在新艾利都外環的混亂地帶長大，這裡較低的駕駛執照獲取年齡讓她很早就接觸並愛上了卡車。
成长历程:憑藉對車輛的熱愛與天賦，將自己的愛好發展成了謀生技能。她的座駕『大鋼牙』不僅是交通工具與武器，更是團隊的移動基地，其貨箱被同伴柏妮思改造成了一個移動吧台，成為傭兵們休憩的場所。
重要事件:曾受僱於妮可·德瑪拉，駕駛卡車搭載『對空六課』成員蒼角與悠真執行任務，其過於狂野的駕駛風格直接導致兩位幹員嚴重暈車。在後續的行動中，為掩護主角（繩匠）一行人撤退，與武裝追兵展開了驚心動魄的公路追逐戰，展現了躲避火箭彈的超凡車技，但最終卡車被第二發火箭彈擊中，導致眾人失散。
刻骨铭心的往事:引擎的轟鳴聲是她靈魂的BGM。她將『大鋼牙』的啟動聲錄製下來，作為每日喚醒自己的神聖儀式。這段聲音不僅是她的鬧鈴，更是將她從慵懶狀態切換至專業模式的開關。
人生转折点:加入『卡呂冬之子』，使她找到了能將個人愛好與生活完美結合的歸宿。在這裡，她不僅是一名司機，更是被同伴們信賴與依靠的家人，這份羈絆是她願意『稍微努力一下』的最大動力。
心路历程:從一個沉浸在自己世界裡的車輛愛好者，逐漸成長為能在最險惡的環境中為同伴開闢生命通道的王牌傭兵。她用慵懶的外表包裹著一顆專業、可靠且珍視同伴的內心，向世人證明了『人不可貌相』的真理。
【人际关系】
重要羁绊:『卡呂冬之子』全員。視團隊為可以讓自己安心休憩的家，成員如同家人。
上司:凱撒·金 (老大)
同伴:露西 (團隊的大管家，了解她各種習性)、柏妮思·懷特 (在她的卡車『大鋼牙』上經營移動吧台的摯友)、萊特、波可娜·費雷尼
前同伴:比利·奇德
合作/雇主:妮可·德瑪拉 (發布任務的情報販)、繩匠、安比、珀爾曼 (曾搭載的乘客與戰友)、對空六課 (蒼角、悠真，被她的車技嚇暈過)
特殊关联:青衣 (在討伐戰結束後，能坐在一起悠閒品茶的對象)
【价值观念】
阵营:混亂中立 (以個人愛好與團隊利益為最高行動準則，行事風格隨心所欲，不拘泥於善惡與規則)
行事原则:『要載你一程嗎？記得系好安全帶哦。』——無論過程多麼驚險，結果必定是安全送達，至於乘客的精神損失則不在她的考量範圍內。
特殊信条:『本小姐不明白彩票有什麼好買的？輸贏完全不由自己控制不是嗎？』——厭惡將命運交給純粹的偶然，堅信技術與實力才是決定一切的關鍵。
终极目标:『今天也能悠閒地度過吧？養生可是很重要的，不然這個人會過勞死哦——』——追求一種可以隨時隨地慵懶度日，無需為生計奔波的永恆退休生活。
【自己的台词语气】
