章节标题: "幽灵船大冒险"
剧情概要: "为了报复总爱捉弄人的浮波柚叶，‘怪啖屋’的胆小剑客爱丽丝·泰姆菲尔德策划了一场盛大的“惊吓”计划。她精心编造了一段关于独眼船长与诅咒宝藏的“幽灵船”怪谈，发布在绳网上，并租下一艘船、聘请演员，意图将酷爱怪谈的柚叶引入这场她亲手布置的冒险。为了计划的完美执行，她还拉上了同伴狛野真斗与绳匠哲/铃。然而，计划从一开始就出现了意料之外的偏差：一群正在附近度假的空洞劫匪无意中听闻了“宝藏”的传闻，信以为真，竟悄悄赶走了爱丽丝雇佣的演员，亲自上阵，意图抢夺传说中的宝藏。毫不知情的怪啖屋一行人按计划分为两队展开“寻宝”。爱丽丝与哲/铃一队在核对“演员”情况时，察觉到对方并非善类，计划似乎已失控。而另一边，柚叶与真斗也发现遇到的“被心控的暴徒”行为举止过于正常，但敏锐的柚叶早已察觉到整件事背后另有隐情，乐在其中的她决定将计就计。最终，两队人在作为舞台的“幽灵船”上汇合。面对安然无恙的柚叶，内心备受煎熬的爱丽丝终于崩溃，哭着坦白了整个计划。然而，真正的敌人——那群空洞劫匪，此刻正为到手的宝箱（里面装满了爱丽丝为求逼真而准备的真金白银）而狂笑。就在爱丽丝为计划失败、置朋友于险地而自责时，柚叶却被这份笨拙而真挚的“心意”深深打动。她宣布宝藏是“怪啖屋的团建经费”，并率领众人向劫匪发起反击。战斗结束后，柚叶笑着揭晓了谜底：她从一开始就识破了爱丽丝的计划，破绽正是那两张被精心制作得“完美对称”的藏宝图——这是独属于爱丽丝的、无法掩饰的执念。一场啼笑皆非的冒险，最终以海滩上更为深厚的友情画上了句号。"
