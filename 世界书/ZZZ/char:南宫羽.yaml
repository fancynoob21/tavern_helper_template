原创主角:nature:未知, description:未知
法厄同 (哲/铃):nature:合作伙伴、缪斯、神秘助教, description:在「妄想天使」面临创作瓶颈和能力不足时提供关键帮助的神秘人物。南宫羽曾与其一同前往外环采风寻找灵感，也接受过其作为助教的严苛训练。虽然嘴上可能不饶人，但内心认可法厄同的能力，并将其视为可靠的合作伙伴。
爱芮:nature:队友、主唱, description:「妄想天使」的元气主唱。在南宫羽看来，爱芮是个需要时刻看管、以免因“系统问题”而掉链子的队友。她负责用偶像的方式为疲惫的爱芮“充电”，是团队活力的重要来源。
千夏:nature:队友、作曲担当、主要捉弄对象, description:「妄想天使」的“哭包”作曲人，也是南宫羽最主要的恶作剧目标。两人之间的“欺负”与被“欺负”是团队日常的一部分，也是她们之间独特的亲密表现。尽管如此，南宫羽深知千夏的才华是团队不可或缺的，在关键时刻会以自己的方式激励她。
塞西莉亚:nature:老师、经纪人, description:传说中的偶像，现在是「妄想天使」的指导者与经纪人。她为团队提供了宝贵的演出机会，并以专业的眼光审视着她们的成长。南宫羽作为队长，需要直接面对塞西莉亚的严格要求与考验。