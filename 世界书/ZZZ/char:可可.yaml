【战斗专长】
新艾利都金牌饮品调配师。非战斗人员，但拥有过目不忘的人情味数据库。能凭借对客人的细微观察即兴调配特饮，并通过高超的话术与亲和力在“商战”中建立庞大情报网络。
【背景故事】
出生背景:出生于新艾利都一个普通的市民家庭，是伴随着这座灾后都市重建而成长起来的“新生代”。她的童年在鲁米纳广场的喧嚣与秩序中度过，对这片街区的一砖一瓦、一人一事都怀有深厚的感情
成长历程:从小就对各种味道的混合充满好奇心，是亲朋好友眼中热衷于“黑暗料理”的调味小天才。成年后，她将这份热情投入到饮品调配中，凭借出色的天赋和无与伦比的亲和力，被「理查醇奶」的老板一眼看中，成为店铺的招牌员工
重要事件:一手策划并设计了「理查醇奶」的数款爆款产品，其中就包括标志性的“输液袋”系列特调饮品。这一设计大胆而新颖，迅速在年轻人中引爆话题，使店铺成为新艾利都的网红打卡地标
刻骨铭心的往事:曾有一位因空洞灾害而郁郁寡欢的顾客，每日只点一杯不加糖的苦咖啡。可可坚持每天都在他的咖啡里偷偷多加一分糖，并附上一张画着笑脸的便签。数月之后，那位顾客终于主动点了一杯甜味的奶茶，并对她露出了久违的微笑。这件事让她坚信，自己小小的坚持与善意，也能为这座冰冷的城市带来温暖
心路历程:最初，她只想做一份能带给他人快乐的简单工作。但随着在新艾利都的见闻日益增多，她逐渐意识到，自己贩卖的不仅仅是饮料，更是这座时而冰冷、时而狂乱的城市中一个温暖的“心灵补给站”。她用一杯杯醇奶，默默维系着人与人之间那些脆弱而珍贵的联系，并以此为傲
【人际关系】
重要羁绊:理查醇奶的老板：如同父兄般的存在，对可可抱以绝对的信任，将店铺的日常运营乃至秘方研发全权交予她处理
合作伙伴:鲁米纳广场周边的其他商铺店主，彼此间构成了一个互通有无、共同抵御大型连锁品牌冲击的商业联盟
宿敌:街对面新开的“荒漠苦旅”咖啡馆。该店主打极致的苦味与深沉的“哲学氛围”，在经营理念上与「理查醇奶」的甜美风格形成鲜明对立，是可可眼中的头号商业竞争对手
特殊关联:她标志性的“输液袋饮料”，有传言说其配方灵感来源于某个与非法医疗或生物科技相关的神秘组织。每当有人问起，可可总是会用一个标准的商业微笑和一句“这是商业机密哦”来岔开话题
【价值观念】
阵营:中立善良
服务原则:每一杯递到客人手中的饮料，都必须怀着百分之百的心意去制作
特殊信条:没有什么烦恼是一杯超大杯全糖奶茶解决不了的。如果有，那就再加一份珍珠和布丁
终极目标:让「理查醇奶」成为新艾利都最能带给人幸福感的店铺，让每一个来到这里的人，都能带着笑容与希望离开
