章节标题: "星芒闪耀之处"
剧情概要: "为了提升对空六课的正面形象并拉近与市民的距离，空洞调查协会（HIA）在鸣响回廊举办了一场名为‘星芒闪耀之处’的联合推广活动。然而，活动初期因奖品（干员同款训练物资）过于‘硬核’而应者寥寥，粉丝们在表达了对周边商品（如等身立牌、战斗影像徽章）的真实渴望后便纷纷离去，现场一度门可罗雀。在录像店店长哲/铃的意外到访与参与后，主办方似乎得到了启发。数日后，活动焕然一新，同样的奖品，仅因更换为印有对空六课成员精美照片的特制收纳箱包装，便引发了空前的狂热。粉丝们为争夺偶像的‘包装盒’而疯狂，甚至当场退还其中的物资。这场啼笑皆非的应援活动最终以一种意想不到的方式大获成功，深刻揭示了新艾利都粉丝文化的狂热与本质。"
