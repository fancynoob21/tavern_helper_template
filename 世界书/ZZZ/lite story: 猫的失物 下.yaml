章节标题: "猫的失物 下"
剧情概要: "在法厄同兄妹的质问下，猫又终于坦白自己有所隐瞒，并恳求他们继续观看邦布的影像以了解全部真相。影像揭示了狡兔屋在死路空洞中并非单纯寻宝，而是被猫又杜撰的“走失小女孩”所引导，出于善意展开了搜救。然而，当他们意外跌出空洞，来到画布街爆破区时，才震惊地发现这里滞留着上百名被远景实业遗弃的无辜居民。远景实业的阴谋昭然若揭——他们计划将这些居民与旧都地铁一同炸毁，以最低成本完成项目。正义感与利益驱使下，狡兔屋决定插手此事，并由猫又返回录像店向法厄同求援。了解一切后，法厄同制定了二次救援计划：潜入空洞，利用远景实业留下的炸药，一举消灭巨型以骸“死路屠夫”，通过剧烈削弱空洞来打通前往新艾利都的陆路，从而救出所有人。一场疯狂的豪赌就此展开。"
