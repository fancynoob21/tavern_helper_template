章节标题: "“「福」至沓来”"
剧情概要: "“拓金日（Gilded Carrot Day）的佳节气氛笼罩着新艾利都。在卫非地的澄辉坪，云岿山随便观的弟子们与他们的新同门（哲/铃），迎来了加入后的第一个新年。饮茶仙的掌柜红豆精心策划了一场惊喜的团圆晚宴，让忙于俗务与修行的师徒们在美食与烟花中共聚一堂，互赠祝福。与此同时，洋流湾（Sailume Bay）的沙滩上，另一场充满温情与传承的聚会也在展开。出身于此的浮波柚叶与狛野真斗，携同‘怪啖屋’的伙伴们，为街坊的孩子们分发岁钱，柚叶那位常年在外奔波的养父李宝荣也意外现身，带来了久违的亲情与认可。佳节亦是归乡时。在六分街，录像店‘随机播放’的经理（哲/铃）与他们的手足（铃/哲）短暂回到熟悉的街区，却发现街坊邻里早已为他们准备了一场满载心意的小小‘欢迎回家’仪式。从澄辉坪到洋流湾，再从洋流湾回到六分街，三场跨越地域的相聚，交织成新艾利都基层民众最朴实、最温暖的年节画卷。烟花绽放又熄灭，但人与人之间的羁绊与祝福，如同岁钱中蕴含的心意，将在新的一年里持续发光发热。”"
