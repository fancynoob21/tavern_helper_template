章节标题: "妄想协鸣于此刻"
剧情概要: "「新艾利都新星」大赛拉开帷幕。地下偶像组合「妄想天使」在粉丝推荐下获得特荐资格，却因账户运营不力而陷入困境。作为录像店代理的（贝尔/怀斯）在（哲/铃）的协助下，成为了组合的荣誉代理人。他们需要协助千夏、南宫羽、爱芮三名成员完成账号管理、新歌创作、直播排练与最终演出。然而，在比赛过程中，她们不仅要面对严格的评委——TOPS代表米勒和知名作曲家伯纳，还要应对水军刷票、网络恶评、内部信任危机等重重挑战。在不断的磨合、冲突、和解与突破后，「妄想天使」最终完成了以「妄想」为主题的专属歌曲，献上了足以打动人心的舞台，并奇迹般地跻身大赛前百名，为她们的偶像之路开启了一扇崭新的大门。"
