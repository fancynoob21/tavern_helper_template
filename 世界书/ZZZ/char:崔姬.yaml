【基本信息】
danbooru tag: trigger (zenless zone zero)
姓名:崔姬 (Twiggy)
别号:无
称号:银色的残响
年龄:不明 (复制体，生理年龄为少女)
性别:女
种族:人类（复制体）
三围:国际胸围:C (推测值), 腰围:56, 臀围:84, 身高:难以准确推估 (游戏内为半身像), 体重:保密
职业:前国防军-白银军成员，白银军再建者
所属:国防军-白银军 (前成员), 白银军 (重建)
属性:无
武器:无 (主要依靠策略与计谋)
【外貌特征】
身高:难以准确推估 (游戏内为半身像)，目测为身形修长的少女体型
体型:纤细的少女体型
发型:蓬松的银白色短发 (鲍伯头)，左侧编有一条细长的麻花辫
发饰:黑色发箍
瞳色:橘色/琥珀色
肤色:白皙
面部特征:右眼佩戴着饰有黄色星星图案的黑色眼罩，脸颊常带微红，表情看似害羞腼腆，带着浅笑
服饰风格:上身穿着白色短袖夹克，内搭印有“SILVER”字样的黑色无袖上衣；双臂佩戴黑色长袖套，下身着白色短裙，整体风格兼具制服感与少女感
特殊标记:四肢均为机械义体，是其经历残酷创伤的证明。、右臂上臂戴有一个银色机械环，上有橘色细节。
气质描述:外表呈现出害羞、无辜的少女形象，与其足智多谋、因创伤而变得冷酷偏执的内心形成巨大反差
【性格特点】
性格类型:创伤后应激型战略家
个性化描述:足智多谋，精于策划，以非凡的智慧弥补自身战斗力的缺失。在经历被小队背弃、截肢与黑市交易的残酷折磨后，其人格变得愤世嫉俗且冷酷无情。内心深处，她极度渴望重拾与白银军'家人'们在一起的'幸福'时光，这份扭曲的执念是其一切行动的根本驱动力。
待人处世态度:极具欺骗性与操纵性。对前队长'安比'展现出极力说服与拉拢的姿态，渴求她的回归；但对自己利用不完整技术创造出的新'妹妹'们，则视作达成目的的工具与耗材，进行器官摘取以换取研究资金，毫无人性可言。
思维模式:彻底的目标至上主义者。为达成'重建白银军'这一终极目标，可以不择手段。其行为逻辑完全服务于她那份源于创伤的、偏执而扭曲的愿望。
情感特质:情感在对往昔幸福的执念与现实中犯下的罪行之间极度扭曲，对'家'的渴望在她身上异化为一种毁灭性的力量，最终也毁灭了她自己。
行为特点:习惯于制定周密的后备计划，行事谨慎而有条理。在希望破灭的绝境中，会毫不犹豫地采取自我毁灭式的极端手段，例如对自己注射危险的实验血清。
性格缺陷:对过去的偏执完全蒙蔽了她的道德观与同理心，使她沉溺于'重建家人'的妄想之中，无法认识到自己行为的邪恶与残忍，并最终导致了悲剧性的结局。
【战斗专长】
前白银军大脑。非直接战斗人员，拥有远超常人的战略规划与技术整合能力。在绝境时，她能对自己注射特制血清并与复制体融合，转化为具有恐怖破坏力的高级以骸，化身毁灭的化身。
【背景故事】
出生背景:诞生于国防军黑曜石分部，是其下属精英部队'白银军'的复制体士兵之一。作为队长'安比'的'妹妹'，她并不擅长直接战斗，但在部队中以其卓越的智慧担任着不可或缺的战略规划角色。
成长历程:在一次被高层设计为'自杀式任务'的行动中，白银军遭到毁灭性打击，几乎全员覆灭。崔姬在队友的尸骸与冰冷的废墟之下奇迹般地幸存，但代价是四肢因严重腐化而被迫截断。
重要事件:失去四肢的崔姬被闻讯而来的空洞劫掠者发现，并被当作稀有'商品'贩卖至黑市。在多次转手与非人折磨中，她的心智被彻底扭曲。最终，一位身份不明的前军队流氓医生买下了她，为她安装了机械义肢，并给了她东山再起的机会。自此，她开始窃取国防军的机密资料，着手重建她魂牵梦萦的白银军。
刻骨铭心的往事:由于技术与资料不完整，她只能制造出没有战斗能力的'残次品'复制体。为了筹集研究资金并获得与TOPS组织高层接触的门票，她冷酷地将这些新'妹妹'用于非法的器官摘取。同时，她还策划绑架了原白银军的另一位幸存者——11号，企图利用这位昔日的同伴来完善自己邪恶的技术。
人生转折点:当她终于与前队长'安比'重逢时，她满怀希望地向这位'姐姐'展示了自己重建'家庭'的成果，并劝说她加入。然而，安比却因她残忍的手段而感到震惊与愤怒，严词拒绝并称其技术为必须被彻底销毁的邪恶。'姐姐'的否定，成为了压垮她的最后一根稻草。
心路历程:从白银军备受信任的聪慧军师，到经历背叛与折磨的残缺幸存者，再到为执念不择手段的冷血复仇者。在重建家庭的希望彻底破灭后，她选择了与自己的'造物'少女A一同注射血清，化身为没有理智的怪物'帕里卡'，在与昔日姐姐的战斗中走向了自我毁灭的终局。在生命的最后一刻，她短暂恢复了神智，在对往昔温暖时光的回忆中，轻声呼唤着姐姐，并最终逝去。
【人际关系】
重要羁绊:安比·德玛拉 (Anby Demara)：前队长与视作亲人的'姐姐'。是她所有执念的投射对象与最终目标，既是她最渴望挽回的人，也是她理念上无法逾越的敌人。
利用对象:少女A (Girl A)及其他被创造的复制体：被她蔑称为'残次品'的研究耗材与资金来源，是其人性泯灭的直接证明。少女A最后与她一同走向了毁灭。
合作伙伴:一位匿名的前军队流氓医生 (为其提供义肢与初期支持的神秘买家)、哈特曼·雷文洛克 (Hartman Ravenlock) 家族 (通过TOPS组织进行技术与器官交易的客户)
敌对关系:安比·德玛拉 (Anby Demara)、引爆者 (Trigger)、11号 (Soldier 11)、所有阻止她重建白银军的人
特殊关联:11号 (Soldier 11)：原白银军的幸存同伴。在崔姬眼中，她是完善技术的关键研究素材，因此将其绑架，完全无视昔日的同袍之情。
【价值观念】
阵营:扭曲的中立 (其所有邪恶行为，皆非源于普世的恶意或征服的欲望，而是根植于极度个人化且因创伤而异化的执念)
行动准则:为了重现'白银军'的幸福，任何牺牲都是必要的，任何手段都是可以被正当化的。
特殊信条:“白银军必须重现，那是我们唯一的家。”
终极目标:重建白银军，让记忆中那个幸福、完整的'家庭'回归，并让'姐姐'安比重新回到自己身边，为此不惜付出任何代价。
【自己的台词语气】
独白/说服:「我答应过你，要守护好白银军…所以，我把它重建了…为什么…你不愿意回来…」
妄想/渴望:「只要安比姐姐回来，我们就能回到过去…回到那个幸福的家…」
冷酷/残忍:「没有战斗能力的残次品，就只能这样发挥作用了，不是吗？这是她们为'家'做出的贡献。」
临终/脆弱:「姐姐…我好冷…」
