章节标题: "朝露・解语之时"
剧情概要: "所有线索在此汇集。狡兔屋的妮可也接到了寻找“粉色稀有花卉”的生意，试图用普通花卉“取巧”过关。就在众人一筹莫展之际，灰市的中间人雨果却主动登门，以一个廉价委托为幌子，将真正的“尼尼微”作为“礼物”送给了（哲/铃）。手握关键道具的（哲/铃）联系了莱卡恩，并按要求将“尼尼微”布置后送往星环塔的宴会。最终，真相揭晓：非法矿场老板（即维多利亚家政的客户）企图用“尼尼微”贿赂丁香的父亲，以求重启矿场。但他不知道，“尼尼微”是丁香父亲纪念在空洞灾害中牺牲的挚友之花，象征着与灾害抗争的决心。用此花行贿，无异于自寻死路。事后，这盆被嫌弃的“尼尼微”辗转回到了（哲/铃）手中。"
