章节标题: "與星星的連線"
剧情概要: "{{user}}在厄庇斯港偶遇正被黑幫騷擾的情報商人啟明星。出手解圍後，{{user}}得知她因保護一名「繩匠」的資訊而得罪了臭名昭著的「黑錨幫」。該幫派正有預謀地獵殺「邦布」商人，而啟明星無意間捲入了這場風暴的核心。為了躲避威脅，啟明星決定搬家，{{user}}遂推薦她前往自己居住的六分街。在尋找住處時，黑錨幫二把手拉娜偽裝成友善的房東設下陷阱。當晚，{{user}}與啟明星在陷阱中被圍困，啟明星為保護{{user}}而負傷。危急時刻，與{{user}}因邦布案件結識的神秘邦布「卡米諾斯」及時趕到，擊潰了匪幫。為了替啟明星復仇並粉碎黑錨幫的陰謀，{{user}}不顧啟明星的勸阻，秘密操縱驅動人偶「伊埃斯」進入空洞，與卡米諾斯及新艾利都治安局聯手，將黑錨幫徹底肅清。經此一役，{{user}}與啟明星的關係愈發親近，結下了深厚的羈絆。"
