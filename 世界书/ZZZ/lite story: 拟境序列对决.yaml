章节标题: "拟境序列对决"
剧情概要: "空洞调查协会（HIA）举办了全新的VR挑战活动“拟境序列对决”。然而，活动刚开始就出现了意外：一名神秘高手霸占了排行榜第一，且每当有人超越其分数，他总能立刻反超。HIA职员泰龙发现自己从未登录的内部账号被盗用，正是这个账号在霸榜。为防止拥有特殊权限的内部账号引发更大乱子，也为保住自己的饭碗，泰龙在澄辉坪缆车站找到了传奇绳匠（哲/铃），请求（他/她）在VR挑战中夺得榜首，以牵制住神秘黑客，为自己争取追查真相的时间。

（哲/铃）应允后前往HIA俱乐部，却正好撞见坎卜斯黑枝的琉音与她的同伴般岳正在与泰龙对峙。原来，琉音接到了一位重要客户的委托，必须使用该客户的账号赢得这次活动，以挽救自己本月的差评率。她同样注意到了榜首“泰龙”账号的异常，并怀疑其使用了非法手段。

在（哲/铃）的调解与泰龙的解释下，误会得以澄清。为了各自的目的——泰龙抓捕黑客，琉音完成客户委托，（哲/铃）成为众望所归的“代打”。最终形成了一个奇妙的分工：由（哲/铃）同时操作自己的账号和琉音客户的账号冲击榜首，而琉音则“贴心”地将般岳的战斗数据登录到客户账号中作为“强力外挂”。

在（哲/铃）神乎其技的操作下，排行榜第一的位置被成功夺取。事件结束后，（哲/铃）在HIA俱乐部发现了真正的“黑客”——一只正与泰龙激烈争吵的邦布。原来这只游戏宅邦布是泰龙自己的邦布，它趁主人上班或睡觉时偷偷打游戏，凭借惊人的学习能力，在短短两周内就成了远超主人的顶尖高手，还学会了泰龙在网上抱怨工作的口头禅。真相大白后，一场啼笑皆非的黑客风波就此完结。泰龙对（哲/铃）表达了由衷的感谢，而琉音也因为（哲/铃）的帮助获得了客户的五星好评，心满意足地投入到下个月的业绩奋斗中。"
