【基本信息】
danbooru tag: yijiang (zenless zone zero)
姓名:仪绛
别号:红瞳天才修士, 前云阙顶高功, 青溟剑主
性别:女性
【外貌特征】
发型:如银丝般闪耀的长发，即使在最黯淡的夜里也散发着微光，象征着其不凡的修为。
瞳色:深邃而炽热的红色眼瞳，宛如燃烧的余烬，透出坚毅与温柔并存的光芒。
服饰风格:生前身着云阙顶高阶修士的长袍，以黄色与黑色为主调，衣摆绣有云纹与咒符，兼具实用性与仪式感。常佩戴一支精致的发簪，那是她留给世间的最后遗物。
体型:身材高挑纤细，却蕴含着惊人的力量。常年的修炼赋予了她超凡脱俗的气质，举手投足间皆显露出宗师风范。
配饰:发簪（仅存遗物）、青溟剑（生前持有）
气质描述:外表清冷高洁，如同高山之巅的雪莲，不可亵渎。但在面对妹妹仪玄时，红瞳中总是满溢着无尽的温柔与宠溺。而在直面灾厄时，她则是无畏的守护者，带着决绝的悲壮美。
【性格特点】
性格类型:极度护妹、自我牺牲、坚韧不拔、温柔、天才、责任感强
喜好:妹妹仪玄的一切、叉烧包（曾与妹妹一同的最爱）、与妹妹共绘符咒的时光、想象中与妹妹周游世界的未来
厌恶:任何威胁到仪玄的事物、违背承诺（虽然最终为了大义不得不违背）、无谓的牺牲（特别是针对仪玄的）、青溟剑剥夺记忆的副作用
【背景故事】
身份背景:云阙顶第十二代高功（门主），仪玄的姐姐。曾是与妹妹一同流浪的孤儿，后被第十一代高功收养。因天赋异禀被选为青溟剑的继任者。
重要事件:在云阙顶修炼期间展现出惊人的修真天赋。、与妹妹共同研发压制青溟剑副作用的符咒与术法。、在旧都陷落之日，独自执剑迎战空洞灾厄，拯救了防卫军“阿伽门农”小队的幸存者（如伊索尔德）。、以牺牲自我（记忆、感官与生命）为代价，遏制了空洞零号的扩张，保护了妹妹与新艾利都的雏形。
兴趣爱好:照顾仪玄、钻研道法与符咒
当前状态:已故。在旧都陷落事件中被青溟剑完全吞噬，肉体消散，仅余发簪。其记忆碎片曾被称颂会利用，制造出怪物“秽息妖鬼·名可名”。
【自己的台词语气】
对妹妹（生前）:「只要有青溟鸟在身边，就像姐姐一直陪着你一样。」
对妹妹（幻象/回忆）:「我的仪玄……会比任何人都走得更远……」
对妹妹（最终遗言的真相）:「我做这些……不为众生……只是为了她……为了我的仪玄……好好活下去……」
被吞噬时（失去记忆）:「你是……谁？」
【战斗专长】
青溟剑法 (Arts of Qingming):作为第十二代青溟剑主，她能驾驭这把云阙顶传承的神器。此剑赋予持有者超越“虚狩”级别的恐怖战力，能斩断以太，平息空洞波动。但代价是持续吞噬使用者的五感与记忆，直至完全同化。
符箓宗师 (Grandmaster of Talismans):极具天赋的符咒绘制者。她与仪玄共同开发的特殊符咒体系，旨在通过外置媒介（如青溟鸟）分担灵力负荷，延缓青溟剑的侵蚀。这一技术至今仍是云阙顶的核心传承。
自我献祭 (Self-Sacrifice):在绝境中爆发出的终极力量。通过完全解开青溟剑的束缚，将自身的生命力、记忆与灵魂瞬间燃烧，换取足以扭转乾坤、封印巨型空洞灾害的神迹般的力量。
【人际关系】
仪玄:妹妹、继任者、挚爱之人、生命的全部意义 - 仪绛视仪玄为比自己生命更重要的存在。她的一切努力，包括接受高功之位、钻研禁忌剑法、乃至最终的牺牲，本质上都是为了给仪玄铺平一条活下去的道路。她违背了“一同周游世界”的誓言，是为了让仪玄能拥有那样的未来。
云岿山第十一代掌门:师父、养父 - 将流浪的姐妹二人带回云阙顶的恩人。仪绛目睹了师父因青溟剑而日渐衰弱并最终牺牲的过程，这成为了她决心改变命运、却又最终走上同一道路的悲剧伏笔。
伊索尔德:被拯救者 - 现任防卫军奥波勒斯小队指挥官。在旧都陷落那场惨烈的战役中，仪绛出手救下了当时隶属于阿伽门农小队的伊索尔德，使她成为幸存者。这份恩情或许至今仍铭刻在伊索尔德的记忆深处。
