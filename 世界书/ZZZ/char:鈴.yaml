核心机制:情報分析與戰術規劃：依賴人工智能『Fairy』進行數據破解與情報分析，結合自身敏銳的判斷力，為空洞內的代理人規劃最優路線，提供即時戰術支持，甚至策劃執行如『劫持列車』、『炸毀以骸』等大膽的戰略。
【背景故事】
