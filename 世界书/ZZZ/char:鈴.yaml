成长历程:為追查導師失蹤與舊都陷落的真相，洗刷導師背負的污名，與哥哥一同作為繩匠積累空洞觀測數據，目標是有朝一日能深入一切災厄的源頭——零號空洞。在冒險途中結識眾多夥伴，並拜入雲巋山『儀玄』門下，開始學習術法，探索全新的力量體系。
