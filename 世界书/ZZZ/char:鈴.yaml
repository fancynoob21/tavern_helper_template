刻骨铭心的往事:舊都陷落之夜，親眼目睹自己視為母親的導師卡洛絲·阿爾娜，被一隻巨大的、與『牲鬼』極為相似的白色大手擄走。這一幕成為其內心最深的創傷，也是驅使其不斷探求真相的根本動力。
