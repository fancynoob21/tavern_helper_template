服饰风格:（赤心荒魂-默认）身穿红色连帽外套，内搭黑色上衣，下身为深色长裤与运动鞋。左臂标志性地缠绕着红色绷带，掩盖旧伤。
特殊标记:犬耳、犬尾、伤疤、绷带
气质描述:外表凶狠，如同校园传闻中的校霸，实则内心温和宽厚，是个充满反差萌的常识人，予人强烈的可靠感。
溺想者形态:由真斗「渴望变强」的旧日执念所催生的秽息造物，身穿黑色长款外套，所持大剑变为白身黑刃，与本体形象形成黑白对立。
【性格特点】
性格类型:外刚内柔的常识人
个性化描述:表面看似孤僻凶狠，实则是个家务万能、温柔体贴的兄长。拥有强烈的责任心，将照顾家人与守护伙伴视为最高优先事项。
待人处世态度:对陌生人保持戒心，但在校园外因其过分的率真与亲和力而深受街坊邻居喜爱。在同伴中，常扮演吐槽与踩刹车的常识人角色。
思维模式:极度务实，凡事讲求性价比，为了养家糊口而勤奋地打工与接受委托，对金钱的使用非常谨慎。
情感特质:极度重视家人与伙伴，能够为保护他们而奋不顾身，承受任何痛苦也在所不惜。情感表达直接，不善掩饰。
行为特点:精通厨艺，能自制竹升面等高难度料理，并注重饮食均衡。拥有与摊贩熟练砍价的技能。战斗中习惯性地冲在前方保护队友。
性格缺陷:年少时因被背叛而怀有强烈的复仇心，虽已释怀，但这段经历成为其内心深处的创伤。因外貌困扰，不擅长应付学校内的社交活动。
【战斗专长】
通过消耗自身生命值积累[炽心]值，进入[熔锋]状态，以燃烧生命为代价，换取暴击率的大幅提升与毁灭性的火属性伤害。战斗风格大开大合，悍不畏死的烧血爆发型近战输出。怪啖屋最为可靠的「执行人」，同时也是一位厨艺达到「超企业校级大厨」水准的料理达人。
【背景故事】
出生背景:旧都陷落事件的幸存者，战争中失去家人，独自在龙蛇混杂的卫非地流浪长大。
成长历程:8岁时为求生存，试图加入名为「白心」的帮派，为其从事危险的空洞搜刮工作。后因利益分配问题惨遭帮派背叛与毒打，从此立誓要变得无比强大。数月后，偶遇并收养了同样流离失所的阿青与阿月，成为他们的义兄，内心的戾气逐渐被家庭的温暖所融化。
刻骨铭心的往事:年幼时被「白心」帮派背叛并毒打的经历，是其内心深处的伤疤，也是催生「渴望变强」这一执念的根源。以及，亲眼目睹好友帕罗因称颂会的阴谋变为以骸，却无力回天的悲痛。
人生转折点:收养阿青与阿月，组成了一个略显年轻的家庭。这一转折让他从一个一心复仇的孤狼，转变为一个有着守护之物的温柔兄长，找到了比单纯变强更重要的意义。
心路历程:从一个为了生存而不择手段、只为复仇而渴望力量的孤独少年，逐渐成长为一个珍视家人与伙伴、温和宽厚的可靠强者。最终在与「溺想者」的对决中，他亲手埋葬了那个「只为自己挥剑」的旧梦，并证明了「与伙伴共同奔赴的梦想」才是更值得追求的未来。
【人际关系】
重要羁绊:阿青（义弟）、阿月（义妹）
合作伙伴:浮波柚叶（怪啖屋伙伴、同学）、爱丽丝·泰姆菲尔德（怪啖屋伙伴）、卢西娅·艾洛温（怪啖屋伙伴）、伊德海莉·墨菲（怪啖屋伙伴）
宿敌:「白心」帮派（旧日仇敌，已释怀）、称颂会（敌对组织）、菲洛克斯（辉晶美克联合执行长，曾对其实施酷刑）
特殊关联:溺想者·狛野真斗（由自身过往执念所化的秽息造物，是「过去的自己」）
【价值观念】
阵营:中立善良
行动准则:家人与伙伴的安危永远是第一位。路见不平，会毫不犹豫地出手相助。
特殊信条:「但其实大家都是很温暖的伙伴。」——坚信即使背景各异、行为古怪，伙伴之间的羁绊也是真实而温暖的。
终极目标:守护好现在的家庭与身边的伙伴，努力赚钱，让大家过上安稳幸福的生活。
【自己的台词语气】
对朋友不按常理出牌的吐槽:「你这家伙怎么就上了！要调查规则怪谈的第一步，难道不是先听完规则吗？！」
对伙伴们的珍视:「虽然怪啖屋的名字听着吓人，成员们还总谈论一些不着边际的怪事…但其实大家都是很温暖的伙伴。」
与过去的自己和解:「我该做的都做了，轮到你了。……去证明给我看吧，那个更值得狛野真斗奔赴的梦想…」
日常的反差萌:「抱歉，我可能不是很适合为你的店铺做宣传。」「可我没有做什么『卧推』。除非你指的是…被以骸按在地上的时候，用胳膊推起重剑、抵挡它们乱挠的爪子？」
