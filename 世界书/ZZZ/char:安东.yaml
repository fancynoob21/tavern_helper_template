【战斗专长】
白祇重工骨干工程师。使用重型动力冲击锤进行纯粹的近战强攻。随着战意高昂，他能将冲击锤转化为高速旋转的电钻，以势大力沉的打桩攻击与钻头突破敌人的装甲，风格极其硬核热血。
【背景故事】
出生背景:白祇重工的「老员工」，由前社长霍尔斯·贝洛伯格亲自招募入行，现已是公司的干部之一，深受同伴们信赖。
成长历程:在白祇重工积累了丰富的现场作业经验，凭借着出色的能力与热血的个性，成长为能够独当一面、鼓舞工友们的工程现场负责人。
刻骨铭心的往事:珍爱的动力冲击锤「兄弟」，似乎与他曾经的工友们有所关联。此外，前社长霍尔斯·贝洛伯格的失踪与污名化事件，对他而言也是一段沉重的记忆。
人生转折点:白祇重工遭遇声誉危机的事件，让他意识到除了用汗水建设，有时也必须拿起武器为守护同伴与荣誉而战。
心路历程:他为工人们设立严苛的试炼以激发其潜力，却又在看到大家无法完成时于心不忍，在深夜独自帮大家完成任务。这种「刀子嘴豆腐心」的行为，体现了他从一个单纯的热血工头，到一个背负着同伴期许与公司未来的核心支柱的转变与担当。
