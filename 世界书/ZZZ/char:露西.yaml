气质描述:结合了大小姐的高傲与不良少女的叛逆，言行举止间却仍流露良好教养痕迹，形成独特的『反差萌』气质
【性格特点】
性格类型:高飞车、傲娇、不高兴
个性化描述:表面盛气凌人，时刻谋划着『下克上』取代首领之位，实则内心极度重视伙伴，是团队中不可或缺的军师与操心管家。
待人处世态度:习惯性使用夹杂着脏话的大小姐敬语口癖 (desuwa)，对伙伴们的不靠谱行为时常感到无奈与气愤。
思维模式:拥有远超伙伴们的知识与常识，擅长从混乱的局面中进行逻辑推理，并制定有效策略。
情感特质:拥有强烈的胜负欲，极度讨厌失败。情感表达十分笨拙，关心与担忧往往会以斥责和暴躁的形式表现出来。
行为特点:一言不合就对首领凯撒发起决斗；生气时会号令自己的三只小猪亲卫队『抄家伙』；容易因羞耻或激动而跳脚。
性格缺陷:过于好强，无法坦率表达自己的真实情感，尤其是在关心他人时。
【战斗专长】
卡吕冬之子军师兼管理者。身居后方，挥舞鞭子与球棍指挥三只全副武装的亲卫队小猪冲锋陷阵。她不仅能在近战中击退敌人，更能通过激昂的助威大幅提升全队的破坏力，是优秀的战地指挥官。
【背景故事】
出生背景:新艾利都的名门『暴发户』蒙特夫家族的千金大小姐。
成长历程:厌倦了被家族规划好一切的人生，以及反感父亲眼中只有利益和生意，在检测出良好的以太适性体质后，渴望成为空洞调查员的梦想也遭家族强烈反对。最终，她选择了离家出走。
刻骨铭心的往事:为逃离家族，曾策划了一起假的绑架案，却阴差阳错被『卡吕冬之子』的首领凯撒救下。凯撒逆光破门而入的身影，让她看到了『自由』的形状，并由此决心加入他们。在『火狱骑行』中，目睹凯撒为点燃燃晶火湖而奋不顾身跃入岩浆，她惊慌失措地跪地痛哭，以为凯撒已经牺牲。
人生转折点:离家出走，并在被凯撒『拯救』后，赖上了卡吕冬之子，从一名养尊处优的大小姐转变为混迹于外环的机车族成员。
心路历程:从一个渴望挣脱束缚、证明自己的叛逆千金，逐渐成长为一个珍视伙伴、有勇有谋的团队核心。她仍在用自己的方式追求自由，并在这个过程中找到了比家族财富更珍贵的『家人』。
【人际关系】
重要羁绊:凯撒·金 (老大兼宿敌，是她憧憬的『自由』的化身，也是她最关心却最爱与之作对的人)
所属成员:派派·韦尔、柏妮思·怀特、莱特、波可娜·费雷尼、比利·奇德 (前同伴)
特殊关联:阿草、阿木、阿砖 (对她忠心耿耿的三只小猪亲卫队)、蒙特夫家族 (她出身的富裕家族，仍在通过寻人启事寻找她)
有过交集:爱丽丝·泰姆菲尔德 (旧识)、卡萨 (野火镇镇长)、庞培 (『凯旋者』前首领)
【价值观念】
阵营:混乱善良 (忠于自己的团队与所追求的自由，蔑视传统权威与秩序)
行事原则:胜利就是一切；用自己的双手去争取想要的东西，而不是依靠家族。
特殊信条:『本小姐才不会回去！一旦被家里人找到…那就再也没有什么星辰大海，只能继承家业了！』
终极目标:在外环闯出一番成就证明自己，并总有一天要击败凯撒，成为卡吕冬之子的新首领。
