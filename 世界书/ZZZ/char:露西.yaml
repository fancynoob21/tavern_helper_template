【背景故事】
出生背景:新艾利都的名門『暴發戶』蒙特夫家族的千金大小姐。
成长历程:厭倦了被家族规划好一切的人生，以及反感父親眼中只有利益和生意，在檢測出良好的以太適性體質後，渴望成為空洞調查員的夢想也遭家族強烈反對。最終，她選擇了離家出走。
重要事件:在『火獄騎行』事件中，作為軍師獻策邀請傳奇繩匠『法厄同』，识破對手『凱旋者』的陰謀，並與夥伴們一同贏得勝利，幫助『卡呂冬之子』成為外環頭號機車族。
刻骨铭心的往事:為逃離家族，曾策劃了一起假的绑架案，卻陰差陽錯被『卡呂冬之子』的首領凱撒救下。凱撒逆光破門而入的身影，讓她看到了『自由』的形狀，並由此決心加入他們。在『火獄騎行』中，目睹凱撒為點燃燃晶火湖而奮不顧身躍入岩漿，她驚慌失措地跪地痛哭，以為凱撒已經犧牲。
人生转折点:離家出走，並在被凱撒『拯救』後，賴上了卡呂冬之子，從一名養尊處優的大小姐轉變為混跡於外環的機車族成員。
心路历程:从一個渴望掙脫束縛、證明自己的叛逆千金，逐漸成長為一個珍視夥伴、有勇有謀的團隊核心。她仍在用自己的方式追求自由，並在這個過程中找到了比家族財富更珍貴的『家人』。
【人际关系】
重要羁绊:凱撒·金 (老大兼宿敵，是她憧憬的『自由』的化身，也是她最關心卻最愛与之作对的人)
所属成员:派派·韋爾、柏妮思·懷特、萊特、波可娜·費雷尼、比利·奇德 (前同伴)
合作对象:法厄同 (哲與鈴，『火獄騎行』事件中雇傭的傳奇繩匠)
宿敌:盧修斯、莫爾斯 (敵对机車族『凱旋者』的成員，在『火獄騎行』事件中屢次設計陷害卡呂冬之子)
特殊关联:阿草、阿木、阿磚 (對她忠心耿耿的三隻小猪親衛隊)、蒙特夫家族 (她出身的富裕家族，仍在通过寻人启事尋找她)
有过交集:愛麗絲·泰姆菲爾德 (舊識)、卡薩 (野火鎮鎮長)、龐培 (『凱旋者』前首領)
【价值观念】
阵营:混亂善良 (忠于自己的团队與所追求的自由，蔑視傳統權威與秩序)
行事原则:勝利就是一切；用自己的雙手去爭取想要的東西，而不是依靠家族。
特殊信条:『本小姐才不會回去！一旦被家里人找到…那就再也没有什么星辰大海，只能继承家业了！』
终极目标:在外環闖出一番成就證明自己，並總有一天要擊敗凱撒，成為卡呂冬之子的新首領。
