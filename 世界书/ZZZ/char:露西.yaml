待人处世态度:習慣性使用夾雜著髒話的大小姐敬語口癖 (desuwa)，對夥伴們的不靠譜行為時常感到無奈與氣憤。
思维模式:擁有遠超夥伴們的知識與常識，擅長從混亂的局面中進行邏輯推理，並制定有效策略。
情感特质:擁有強烈的勝負欲，極度討厭失敗。情感表達十分笨拙，關心與擔憂往往會以斥責和暴躁的形式表現出來。
行为特点:一言不合就對首領凱撒發起決鬥；生氣時會號令自己的三隻小豬親衛隊『抄傢伙』；容易因羞恥或激動而跳腳。
性格缺陷:過於好強，無法坦率表達自己的真實情感，尤其是在關心他人時。
