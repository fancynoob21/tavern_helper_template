【基本信息】
danbooru tag: banyue (zenless zone zero)
姓名:般岳
别号:肃灭单元·零型、大师风范的般岳师父、大狮子、佛珠战神、禅雅塔、拉玛刹
性别:男性
【外貌特征】
发型:银白色长发，呈蓬松的狮子鬃毛状。
瞳色:白瞳，机械眼在运作时会发出锐利的黄色或金色光芒。
服饰风格:全身覆盖着充满力量感的白、深灰、金三色相间的精密机械盔甲，腰间系着一件与云岿山制服相似的橙色外套作为腰布。
体型:身高200cm，体型为强壮健硕的肌肉型机械身躯，双脚为巨大的机械兽爪结构。
配饰:背后恒常漂浮着六枚外形类似佛珠的金色圆球法器。、拥有一条带有白色末端毛发的灰色机械尾巴。
气质描述:宛如不动明王，庄严肃穆，不怒自威。外表是冰冷无机的战斗兵器，内心却燃烧着守护苍生的炽热之火，沉默寡言但充满压迫感的武道宗师。
【性格特点】
性格类型:守序善良的老实人、充满正义感、彬彬有礼，对任何人皆使用敬语、常用「勿」、「然」等半文言文词汇、行动派，对民众危难反应迅速、恪守誓言，绝不为无意义的战斗出手
喜好:守护百姓安危、教授武术、匡扶正义
厌恶:邪祟与秽息、恶徒行凶、无意义的战斗
【战斗专长】
命破·火:作为火属性代理人，拥有破除敌人霸体与防御的「命破」特性，能对敌人造成毁灭性打击。
悬浮法器操控:精妙地操控六枚金色球体法器，可进行远程打击与防御，结合刚猛的拳法，形成全方位的压制性战斗风格。
武道宗师:拥有顶尖的武术造诣，能一眼看穿对手乃至路人的发力方式与破绽。
救世之誓:恪守「只为救济世人而战」的誓言。若对方并非出于恶意或威胁他人，他会选择承受攻击而不还手，这既是其性格缺陷，也是其核心信念的体现。
【背景故事】
身份背景:原TOPS制造的战斗兵器「肃灭单元·零型」，现为澄辉坪的武馆馆主，坎卜斯黑枝成员。
兴趣爱好:指点路人武学（「咔嚓一下，很快啊」） / 关心民生（如甜品店是否踩雷）
当前状态:已与弟子宁谦冰释前嫌，正式加入坎卜斯黑枝。在澄辉坪经营武馆的同时，作为新艾利都的守护者继续活动，履行着对逝者的托付。
【人际关系】
琉音:同事、裁决者、寻找者 - 坎卜斯黑枝的同事。她长期追寻般岳的过去身份「肃灭单元·零型」，最终在矿区事件中对般岳做出了「最终裁决」，助其彻底摆脱过去的束缚，是引导般岳完成自我救赎的关键人物。
宁谦:弟子、复仇者、家人 - 般岳十年前所救矿工宁舒的弟弟。最初为报姐仇而拜入般岳门下，在经历古阵事件、听闻姐姐遗言后，与般岳冰释前嫌，成为般岳愿意用生命守护的弟子与家人。
叶瞬光 & 叶释渊:被救者、故人之子 - 十年前被般岳从矿区灾难中救出的兄妹，般岳履行了他们父母的临终托付。般岳将他们送往云岿山，并始终关心着他们的成长，特别是身负青溟剑的叶瞬光。
【自己的台词语气】
对邪恶:「我所护佑之地，岂容尔等邪祟踏足！」
对民众:「什么？有百姓在澄辉坪新开的甜品店大…踩雷？！…可有人员伤亡？请带我速速前往！！」
对不法之徒:「光天化日之下，怎可容恶徒如此猖狂！」
内在独白:「…未来你的选择，可以是你存在于世，拥有一颗『心』的最好宣言。」
对弟子:「宁谦，汝之生命，不应在此地终结。汝应于汝姐未能看尽之人世间，安然存续。」
