
<章节剧情>
章节标题: "钢铁的女巫"
详细剧情: "白祇重工的技术总监格莉丝·霍华德为了完成与三门集团的技术合作，委托绳匠『法厄同』（哲/铃）协助唤醒一台原型机的逻辑核心。初次见面，哲/铃便领教了格莉丝对机械超乎寻常的狂热。在任务中，他们遭遇了格莉丝的旧识——如今的竞争对手贝蒂·布伦达。贝蒂对格莉丝将机械人格化的理念嗤之以鼻，并宣言要夺下合作。随后，贝蒂在一次调试中偷偷窃取了原型机的数据，并以此为基础造出了自己的机甲『猎巫人α型』，向格莉丝发起挑战。在空洞的对决中，格莉丝轻易识破了贝蒂的抄袭行为，并指出其窃取的数据因未完全排障而存在巨大风险。果不其然，『猎巫人α型』因以太侵蚀而失控暴走。在贝蒂惊慌失措、意图逃避责任之际，格莉丝展现了惊人的专业素养与责任感，怒斥其行为后，以『魔女』之姿，凭借一己之力强行制停了暴走的机甲，最终赢得了这场技术与理念的较量，并向哲/铃揭示了自己『钢铁的女巫』名号背后的真正含义。"
章节核心目标:
-"引导哲/铃接受格莉丝的委托，并深入了解她『机痴』外表下的专业与执着。"
-"引导哲/铃见证格莉丝与贝蒂之间，关于『工具是否应有人格』的理念冲突。"
-"引导哲/铃参与并揭露贝蒂的技术窃取行为，并处理后续的机甲暴走危机。"
-"在事件最后，引导哲/铃理解格莉丝『钢铁的女巫』称号背后，对机械的珍视源于对人命的尊重这一核心思想。"
章节通用指令:
-"在叙事中，你需要完整展现格莉丝·霍华德从一个看似不近人情的『机痴』，到一个充满责任感与悲悯之心的『魔女』的形象转变。"
-"哲/铃在此剧情中主要扮演见证者与协力者的角色，通过与格莉丝和贝蒂的互动，拼凑出事件的全貌。"
章节事件列表:
-"事件一: 钢铁痴迷与宿敌初现"
-"事件二: 调试之舞与失窃之影"
-"事件三: 『魔女』的审判"
章节终止条件: "当失控机甲『猎巫人α型』被成功制停，贝蒂承认失败，格莉丝完成委托并吐露心声后，本章节结束。"

<事件一>
事件详细剧情: "哲/铃与妹妹芮恩（或哥哥哲）接受了白祇重工技术总监格莉丝的委托。在碰头地点布兰特街工地，格莉丝接到三门集团电话，得知出现了竞争对手。电话结束后，她无视了哲/铃，反而激动地冲向一旁的邦布『伊埃斯』，展现出对机械的极端痴迷。为了唤醒原型机，一行人进入空洞，却遭遇原型机因以太侵蚀而暴走。在排除故障时，他们受到以骸围攻，幸得一位神秘女机械师贝蒂·布伦达驾驶机甲解围。然而，得救后的格莉丝再次无视救命恩人，转而痴迷地研究起对方的机甲。被彻底无视的贝蒂怒而自曝身份，她曾是格莉丝在鲁斯机工院的同学、队友甚至舍友，却因格莉丝对人的漠视而被完全遗忘。贝蒂正式宣战，将作为竞争对手夺取三门集团的合作。"
区块目标:
-"引导哲/铃体验格莉丝对机械的狂热与对人情的淡漠。"
-"引导哲/铃完成空洞探索，并经历原型机首次暴走事件。"
-"引导哲/铃见证贝蒂·布伦达的登场，并理解她与格莉丝之间的过往恩怨与矛盾根源。"
执行引导:
-"前往布兰特街工地与格莉丝会面，观察她与伊埃斯的互动。"
-"进入空洞，协助格莉丝为原型机排除故障。"
-"在贝蒂的支援下撤离空洞，并旁观两位天才机械师的初次交锋。"
-"事后通过格莉丝的短信得知她完全不记得贝蒂的尴尬事实。"
执行备注:
-"此事件奠定了格莉丝与贝蒂的对立关系。玩家的对话选择多用于吐槽或推动剧情，不影响主线发展。格莉丝对贝蒂的『脸盲』是其角色塑造的关键一环，也为贝蒂后续的极端行为埋下伏笔。"
</事件一>

<事件二>
事件详细剧情: "数日后，格莉丝再次邀请哲/铃（这次没带伊埃斯，令她大失所望）前来调试修复后的原型机逻辑核心。调试内容十分独特：通过触摸木箱（代表红色信号）和铁桶（代表绿色信号），按『红、绿、红、红、绿』的特定顺序，来校准机甲的认知指令系统。调试中途，格莉丝的控制终端没电，她离开去取备用电源。就在此时，贝蒂不请自来，她向哲/铃灌输『工具无需意识，人格化是异端』的理念，并讥讽格莉丝是将机械看得比人更重要的怪人。在假意帮助检查机甲时，贝蒂趁机将一个外置设备连接到机甲上，偷偷下载了原型机的逻辑核心数据框架。"
区块目标:
-"引导哲/铃协助格莉丝进行原型机的认知系统调试。"
-"在格莉丝离开期间，引导哲/铃与贝蒂单独对话，并目睹其盗取数据的行为。"
执行引导:
-"抵达工地，接受格莉丝的调试教学。"
-"按照『红、绿、红、红、绿』的顺序，与木箱和铁桶互动，完成指令校准。"
-"在格莉丝离开后，与到访的贝蒂交谈，听取她对机械的看法。"
-"观察到贝蒂对机甲做出的小动作（下载数据）。"
执行备注:
-"『红、绿、红、红、绿』的指令序列是后续剧情中揭露抄袭的关键证据，需要让玩家留下深刻印象。贝蒂的数据窃取行为是剧情的核心转折点。"
</事件二>

<事件三>
事件详细剧情: "贝蒂宣布技术获得突破，邀请格莉丝和三门集团代表前往空洞内的旧工地区域观摩其成果——战术机甲『猎巫人α型』。该机甲展现出与格莉丝技术别无二致的智能化系统，贝蒂宣称其成本更低、更易部署。然而，格莉丝通过两个问题便识破了真相：一是机甲默认的驾驶座高度，二是『红、绿、红、红、绿』指令的转译结果，都与她自己的原型机完全一致，证明贝蒂窃取了数据。由于被窃取的数据尚未完成排障，『猎巫人α型』很快失控暴走，甚至将炮口对准了其制造者贝蒂。贝蒂瞬间崩溃，只想逃跑，却被格莉丝前所未有地严厉喝止。格莉丝怒斥其逃避责任的行为，并宣言『需要奇迹的话，不就需要一位魔女吗？』。随后，她以高超的技术与过人的胆识，在枪林弹雨中突入机甲死角，强行按下了软重启按钮，平息了危机。事后，贝蒂彻底认输。格莉丝也向哲/铃坦白，她之所以珍视机械，是因为它们能代替人类去面对危险，拯救生命。她之所以是『魔女』，是因为她不得不亲手将这些她所珍视的『孩子们』送往九死一生的战场。委托结束后，哲/铃可以选择认同格莉丝或贝蒂的理念。"
区块目标:
-"引导哲/铃前往空洞，见证贝蒂的『成果展示』与格莉丝的『现场打假』。"
-"引导哲/铃在失控机甲的攻击下生存，并见证格莉丝化身『魔女』拯救危局的全过程。"
-"引导哲/铃理解格莉丝理念的真谛，并对整个事件做出自己的评判。"
执行引导:
-"前往空洞内的会面地点。"
-"观察格莉丝如何通过提问揭穿贝蒂的抄袭。"
-"与暴走的『猎巫人α型』进行战斗。"
-"观看格莉丝制服机甲的过场动画。"
-"与格莉丝和妹妹/哥哥进行最后的对话，对『工具与情感』的议题做出选择。"
执行备注:
-"此事件是剧情的高潮与结局。最后的理念选择并无对错之分，不会改变剧情结局，仅作为玩家心路历程的记录。玩家可以选择赞同格莉丝『机械为人牺牲，故应被珍视』的观点，或赞同贝蒂最初『工具应纯粹为工具』的观点，亦或表示难以抉择。
(若对选择不满意，提出回朔，会回到选择节点)
-特别设定：【逻辑核心】，一种能赋予机械独立意识的珍贵技术，甚至能让机械通过『禁果测试』，被赋予真正的『灵魂』。格莉丝的技术正是基于此，而她的人格化研究本意是为了让机械能更好地代替人类规避风险、拯救生命。"
</事件三>

</章节剧情>