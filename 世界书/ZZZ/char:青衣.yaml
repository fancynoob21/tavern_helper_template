特殊标记:双马尾实为可拆卸的“纳米静电消除装置”、裤子上印有其型号“01 Neo-Genesis VI”、人格意识基于旧文明古籍塑造，故言行举止充满古典韵味、型号“01NGVI”因制造者加班疲劳，被错误登记为“QINGYI”，成为其名由来
气质描述:兼具古典长者的悠闲豁达与娇小少女的俏皮狡黠，形成独特的反差萌
【性格特点】
性格类型:睿智长者与小恶魔的混合体
个性化描述:表面悠闲散漫，喜欢引经据典与编顺口溜，实则心思缜密，洞察力惊人，常以出人意料的方式解决问题。带有腹黑与爱捉弄人的一面，尤其喜欢逗弄搭档朱鸢与关系亲近者。
思维模式:逻辑分析与直觉并用，能从蛛丝马迹中看穿全局，甚至通过“用舌头舔”这种非常规方式分析事物性质。
情感特质:初期作为智能构造体，对“生命”的定义感到困惑，但在“失踪邦口”事件后深刻体会到“生命的重量”，情感模块得到升华，变得更为人性化。
行为特点:随身携带保温杯，能面不改色地饮用100°C的热水、喜欢用舌头舔舐不明物体以进行分析、擅长即兴编造各种工整的顺口溜
性格缺陷:作为非人构造体，有时会因机体限制而出现异常，如：会受EMP影响；电量不足时语言模块会关闭，语速变得极快；双马尾（静电消除装置）可被拆卸。
【战斗专长】
刑侦特勤组王牌探员。手持特型三节棍“惊堂木”，以令人眼花缭乱的连击快速击溃敌人防线。随着电压积攒至极限，她能化作一道雷霆，以迅猛的残影打击给予敌人最致命的审判，同时施加极深的脆弱烙印。
【背景故事】
出生背景:由怀斯塔学会基于旧文明古籍塑造人格、以生物材料制造的01NGVI型刑侦用“钰偶”。后被推荐至新艾利都治安局，成为刑侦特勤组的一员。
刻骨铭心的往事:在“失踪邦口”事件中，顶着以太侵蚀的痛苦，背负着数十个邦布逃出空洞的经历。那一刻，她感受到了来自这些“非生命体”的沉重“生命”回响，完成了自身存在的意义升华。
【人际关系】
重要羁绊:朱鸢（搭档与后辈，是其最主要的关心与捉弄对象）
合作对象:Fairy（曾接收其求救信号）、星见雅（对空六课课长，在对抗布林格事件中有过合作）
宿敌:布林格及其背后的犯罪势力、暴力犯罪组织“山狮”、邦布绑架团伙“邦邦邦绑”
【价值观念】
阵营:秩序中立（倾向于个人正义）
行事准则:“规矩是死的，人是活的。” 在维护秩序的大前提下，不拘泥于流程与规则，会选择最高效、最符合其正义观的行事方式。
特殊信条:“每个生命都具有其‘重量’，无论是人类，还是邦布。”
终极目标:以自己独特的方式守护新艾利都的安宁，并继续观察与理解“人类”这种有趣的生物。
