「上班摸鱼？不太明白…年轻人的用语我还有很多要学。」, 「下次试试让人发痒的穴位吧，找谁来试验呢？店长？还是朱鸢？」, 「如此看来，阁下真是，既知公理，也识时务。」, 「邂逅相遇，适我愿兮。」, 「好了，既无他务，我先告辞。」
