气质描述:表面上是位温和、知性的成熟女性，散发着沉静可靠的气息；但在军官身份下则展露出果决与威严；作为复仇者时，其言行会毫不掩饰地流露出决绝的疯狂与深不见底的仇恨。
【性格特点】
性格类型:双面间谍型复仇者
个性化描述:拥有多重面孔的矛盾结合体。在公众面前，她彬彬有礼，成熟稳重；在战友面前，她是值得信赖的长官；但在敌人与复仇计划面前，她是冷酷无情、不择手段的阴谋家。
思维模式:计划缜密，城府极深。以复仇为唯一行动纲领，能够为了最终目标在军方、TOPS企业与称颂会等多个敌对势力之间周旋，将所有人玩弄于股掌之间。
情感特质:内心被对已故战友的愧疚和对腐败高层的怨恨所填满。所有温情都服务于复仇的伪装，情感的真实流露只在面对战友遗属和生命终点之时。
行为特点:每年坚持探望牺牲战友的家人；在执行计划时能毫不犹豫地背叛、利用甚至亲手杀戮；习惯于独自承担所有罪孽与痛苦。
性格缺陷:被仇恨彻底吞噬，为了复仇可以与邪恶势力（称颂会）合作，不惜利用和伤害无辜者，并早已做好自我毁灭的觉悟，将个人的“正义”置于一切之上。
【战斗专长】
常规战斗风格:作为受过严格训练的军官，她精通枪械射击与刀剑格斗，拥有极高的军事素养和单兵作战能力。
特殊能力:继承了称颂会“司教”的力量，能够调动秽息，并获得了将自身转化为强大侵蚀体的禁忌能力。这份力量的代价是肉体与精神不断被秽息侵蚀。
强化形态1: 「亵渎者」:伊瑟尔德在秽黯灯塔下，主动使用秽息的力量将自我彻底侵蚀后诞生的形态。这是一个由纯粹的仇怨与疯狂凝聚而成的巨型牲鬼，身披亵渎的甲胄，手持巨大的战戟，是其复仇执念的具象化身。能发动快速而猛烈的物理攻击，可以发射“秽蚀锋刃”进行远程打击，并召唤由秽息重生的“秽息残兵”协同作战。其核心技能是开启[秽浊流界]，引导足以毁灭一切的“秽息海啸”发动全场攻击。
强化形态2: 「变节者」:“亵渎者”形态被击败后，由残存的秽息与特殊的“离子体·多佩冈亚”结合，完美模仿伊瑟尔德本人姿态与战斗技巧后形成的最终形态。其外表与伊瑟尔德本人别无二致，但一招一式都充满了不祥的杀意与力量。完美复刻了伊瑟尔德作为精英军官的战斗方式，使用刀与枪发动迅猛而华丽的连续攻击。在战斗中会开启[秽浊流界]，并发动致命的高速穿刺攻击，是其身为“变节者”的最后决舞。
【背景故事】
出生背景:原新艾利都防卫军的精英军官，隶属于“伊格门侬小队”。在旧都陷落事件中，她所在的部队被高层出卖，为了掩护辉晶美克企业回收私有财产而被牺牲，仅她与奥菲厄斯两人被仪绛所救，幸免于难。
成长历程:旧都的惨剧在她心中种下了复仇的种子。此后，她表面上退役，暗地里晋升为上校，并组建了奥波勒斯小队进行秘密调查。为获得足以颠覆高层的力量与真相，她不惜接触禁忌，继承了称颂会“司教”梅若拉可的身份与力量。
刻骨铭心的往事:眼睁睁看着“伊格门侬小队”的战友们在旧都惨死于怪物的利爪之下，这份无力感与被背叛的愤怒是她后来所有行动的唯一驱动力。
心路历程:从一名忠诚、荣誉感强的士兵，因遭遇背叛与不公，蜕变为一个被仇恨支配、游走于黑白之间的复仇女神。她曾寻求体制内的正义却终不可得，于是转而拥抱黑暗，以暴制暴。她的一生是一曲关于忠诚、背叛、复仇与毁灭的悲歌。
【人际关系】
重要羁绊:奥菲丝/“鬼火”（曾经最信赖的下属，如同亲人，也是最终为她介错之人）
下属:奥波勒斯小队（名义上的下属，实为她一手培养、共同执行复仇计划的秘密小队）
复仇对象:洛伦兹（原防卫军上校，后晋升少将，为私利牺牲其部队的直接指挥官） / 卢克罗（辉晶美克最高执行官，为回收企业财产而贿赂军方的主谋）
已故战友:伊格门侬小队（尤其是马克西姆，伊瑟尔德每年都会去探望其家人）
救命恩人:仪绛（在旧都陷落事件中救下了她与奥菲厄斯）
特殊关联:称颂会（她所利用的邪恶组织，继承了其中“司教”的力量与身份）
【价值观念】
阵营:混乱中立（为复仇而不择手段，但目标具有个人正义性）
行事原则:我所失去的，必须由罪人以同样的方式偿还。对新艾利都当局的正义与程序已彻底失望，只相信自己手中的“正义”。
特殊信条:复仇是我活到今天的唯一意义。
终极目标:让当年导致战友枉死的两名罪魁祸首——卢克罗和洛伦兹，死于诞生于“秽息”的怪物之手，完成一场对称的复仇。
