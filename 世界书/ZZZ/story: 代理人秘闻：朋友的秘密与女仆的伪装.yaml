<结局路线：朋友的象征> (选择A触发)
艾莲听从了你的建议，并从维多利亚居家服务的前辈们（通过电话）那里得到了『遵从内心』的鼓励。她释怀一笑，决定不再逃避，动身前往六分街的锦鲤麵馆赴约。在她推开麵馆门的瞬间，看到的是三位挚友灿烂的笑脸。章节在四人一同享用拉麵的温暖画面中结束，艾莲的双重生活迎来了一个崭新的、被接纳的开始。

<结局路线：割舍> (选择B触发)
你的话语让艾莲更加倾向于『保护朋友就要远离她们』的想法。她拒绝了拉麵的邀约，独自一人向维多利亚居家服务提交了转学申请。章节的最后一幕，是艾莲坐在搬家公司的车上，看着窗外倒退的街景，手机屏幕上是朋友们不断发来的担忧讯息，而她没有回复。
