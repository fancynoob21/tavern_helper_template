<章节剧情>
章节标题: "代理人秘聞：朋友的秘密與女僕的偽裝"
详细剧情: "维多利亚居家服务的精英家政员『狡兔屋』代理人艾莲，为了向挚友凛、梦娜与露比隐瞒自己处理空洞灾害的危险工作，过着谨慎的双重生活。身为『绳匠』的你——哲/铃，作为艾莲的委托引导者，协助她完成各项空洞任务。然而，这份伪装在一连串的巧合与误会下逐渐出现裂痕。朋友们因担忧而展开的笨拙调查，最终将她们自己卷入了致命的空洞深处。在生死关头，艾蓮被迫在朋友面前展露真实的力量，身份的暴露与友谊的考验交织上演。最终，在你的见证与引导下，艾莲将直面自己的内心，重新定义与朋友们的关系，并做出维系或割舍这段珍贵日常的抉择。"
章节核心目标:
-"引导哲/铃协助代理人艾莲完成空洞委托，并维系其『普通学生』的伪装。"
-"展现艾莲与其朋友们（凛、梦娜、露比）之间深厚但充满误会的友情。"
-"引导哲/铃在关键时刻为艾莲提供掩护与支持，逐步加深信赖关系。"
-"将故事推向高潮：朋友们误入空洞，引导艾莲在『暴露身份』与『朋友安危』之间做出抉择。"
-"引导艾莲处理身份暴露后的残局，并最终在你的建议下，决定如何面对她的朋友们。"
章节通用指令:
-"在叙事中，你需要扮演一名冷静、专业但关心代理人的『绳匠』，哲/铃的对话选项应体现出对局势的掌控力与对艾莲的人文关怀。"
-"剧情中的关键抉择，尤其是在处理艾莲朋友们的问题上，应交由哲/铃来推动或提供决定性建议。"
章节事件列表:
-"事件一: 期末作业与『富贵主人』"
-"事件二: 光映广场的宣传风波"
-"事件三: 毕业录像与空洞危机"
-"事件四: 真相、拉麵與朋友的象徵"
章节终止条件: "艾莲做出最终决定，前往或不前往锦鲤麵馆的约会，章节根据其选择导向不同结局。"
<事件一>
事件详细剧情: "某日，身着便服的艾莲来到『Random Play』音像店，请求借用私人卫浴更换女仆装，并在你的引导下进入『巴莱大厦』空洞回收文件。任务期间，她需要与学校的小组伙伴——凛、梦娜、露比进行线上会议讨论期末作业。然而，一次意外的网络中断与恢复，导致通话另一端的朋友们恰好只听见艾莲提及『服务富贵的主人』，从而对她的『打工』产生了荒诞的桃色误会。你当机立断，以『打工同事』的身份介入通话，谎称这是角色扮演设定，暂时化解了危机。"
区块目标:
-"引导哲/铃接受艾莲的委托，并满足她在空洞内进行实时通话的额外要求。"
-"在空洞探索中，引导艾莲找到第一份文件。"
-"在艾莲与朋友通话产生误会时，引导哲/铃做出反应，为其解围。"
执行引导:
-"在音像店与艾莲会面，同意她借用卫生间。"
-"开启代理协议，引导艾莲进入巴莱大厦空洞。"
-"在艾莲进行通话时，处理网络中断的突发状况。"
-"在网络恢复后，选择合适的说辞介入艾莲与朋友们的通话，解释『服务富贵的主人』这一误会。"
执行备注:
-"你介入通话时的说辞，将影响朋友们对『绳匠』的初步印象，并为后续剧情的信任度埋下伏笔。"
-"空洞中朋友们七嘴八舌的对话内容，侧面塑造了她们各自的性格特点。"
</事件一->

<事件二>
事件详细剧情: "不久后，你和艾莲在光映广场办事，恰巧撞见了在此『埋伏』的凛، 梦娜和露比。眼看身着女仆装的艾莲无法解释，你再次出面，以『音像店进行宣传活动』为由替她解围。三位好友因之前的误会以及占用了艾莲的『打工时间』而心怀愧疚，竟主动开始在广场上热情地为音像店招揽生意。看着朋友们虽然笨拙但真诚的举动，艾莲向你吐露心声，坦言这群朋友虽然有时说话不过脑子，但都是无可替代的好人。你顺势邀请她们四人来音像店做客，最后又唱起黑脸，以『加班』为由将三人支走，为艾蓮创造了喘息之机。"
区块目标:
-"引导哲/铃在光映广场帮助艾莲应对朋友们的突然出现。"
-"见证艾莲的朋友们为了『补偿』而进行的笨拙宣传活动。"
-"倾听艾莲的内心独白，了解她与朋友们的相识过程。"
执行引导:
-"在光映广场与艾莲的朋友们相遇，并构思一个合理的谎言。"
-"观察朋友们的宣传行为，并与艾莲进行对话。"
-"邀请四人到音像店，并适时找借口结束聚会。"
-"在朋友离开后，向艾莲询问她与朋友们相识的往事。"
执行备注:
-"艾莲在此处会详细解释她与凛（借笔记）、梦娜（厕所救人）、露比（分享便当）的相识经历，这是深化角色关系的重要环节。"
-"你唱黑脸的强硬态度，反而加剧了朋友们对艾莲『被迫打工』的怀疑，推动了后续剧情发展。"
</事件二>

<事件三>
事件详细剧情: "维多利亚居家服务的莱卡恩先生亲自拜访音像店，他感谢你对艾莲的照顾，并带来了新的委托：回收一只遗落在巴莱大厦空洞深处、储存着一段私人毕业录像的特殊邦布。与此同时，他提及艾莲最近因学校的事情绪低落。当你引导艾莲再次进入空洞时，Fairy侦测到三个不明生命信号正在尾随。突然，高危以骸『装甲哈提』与『法布提』向那三个生命信号及目标邦布发起攻击。露比的尖叫声让你和艾莲立刻意识到，尾随者正是她的三位挚友。尽管你警告这会彻底暴露身份，艾莲仍在瞬间冲向朋友，凭借远超常人的力量解决了以骸。"
区块目标:
-"通过莱卡恩发布新委托，并获得艾莲情绪不佳的侧面信息。"
-"引导艾莲再次进入空洞，并发现其朋友的尾随行为。"
-"触发以骸袭击事件，将艾莲的朋友们置于危险之中。"
-"见证艾莲在危急时刻做出选择，暴露实力拯救朋友。"
执行引导:
-"与莱卡恩对话，接受回收邦布的委托。"
-"引导艾莲进入巴莱大厦空洞，Fairy会报告异常信号。"
-"播放以骸出现并攻击的过场动画。"
-"在艾莲犹豫时，由你（哲/铃）给出最后的确认指令或警示，但最终行动由艾莲自己决定。"
执行备注:
-"艾莲在此处的战斗将首次在朋友面前完全展现其实力，是整个故事的转折点。"
-"朋友们携带的邦布播放的毕业录像，是委托的核心，也解释了她们为何会深入险境。"
</ovent三>

<事件四>
事件详细剧情: "战斗结束后，凛、梦娜和露比因为惊魂未定，向艾莲坦白了她们的跟踪行为。她们因看到艾莲身上时常有伤，且误会你在音像店『威胁』她，故而想收集证据上报治安局。她们将艾莲误认为『实习空洞调查员』，并为了表示『我们能保密』，纷纷自爆糗事（包括凛袭击露比的欧派发现是空杯的趣闻）。离开空洞后，一名女性治安官出现，以『私闯空洞』为由带走了三人，但并未发现拥有合法代理人身份的艾莲。朋友们在被带走前仍不忘为她打掩护，艾莲这才明白她们早已识破自己的伪装。回到音像店，艾莲陷入是否要转学以远离朋友的痛苦挣扎中。就在这时，她收到了朋友们发来的讯息，邀请她去吃『糖油混合高嘌呤物』拉麵，并称这是一起面对困难的朋友的象征。"
区块目标:
-"引导剧情发展，让艾莲的朋友们解释跟踪原因并产生新的误会。"
-"处理朋友们被治安局带走的事件，并让艾莲意识到朋友们的维护。"
-"将艾莲引入『是否转学』的内心挣扎，并提供选择节点。"
-"根据哲/铃的建议与艾莲的选择，导向最终结局。"
执行引导:
-"听取凛、梦娜和露比的解释。"
-"目睹治安官出现并带走三人。"
-"回到音像店，与陷入苦恼的艾莲对话。"
-"[选择节点] 面对艾莲『我是不是该转学』的疑问，你可以选择：
  A.『她们一定希望你遵从自己的想法。』(鼓励她面对)
  B.『暂时分开或许能让彼此都冷静一下。』(诱导向割舍结局)"
-"艾莲收到拉麵邀约，她会参考你的建议做出最终决定。"
执行备注:
-"此事件是情感的高潮与解决方案的开端。朋友们的『糗事』是为了冲淡紧张气氛，展现她们对艾蓮的接纳。"
-"『糖油混合高嘌呤物』是她们之间心照不宣的暗号，代表着共同分享快乐与烦恼的友谊。"

