未知复合侵蚀体是法厄同故事第二章末尾遭遇的首领敌人。第三章末揭示此以骸名为"牲鬼"。
别洛伯格创始人霍爾斯·貝洛伯格曾言，工程机械是力量与美的结合，每处细节遵循经典机械设计原则。
然未知复合侵蚀体的出现挑战了所有既定经典设计。
在高度凝聚的以太核心驱动下，各类强悍工程部件被野蛮组装，形成突破物理界限的夸张结构。
融合切割、锤击、钻孔、粉碎技术...转化为粗粝难测的战斗动作。
此外，危急状态下，其以太核心提供无穷的易爆能量。使其能以高压电流覆盖甲壳，释放撕裂地面粉碎附近敌人的毁灭性冲击。
据HIA推测，未知复合侵蚀体能吞噬同化多种重型机械，包括军用机甲、激光武器，甚至卫戍部队短程导弹...
遭遇的每件精密机械物皆被吞噬、拆解，最终同化为其结构。
其设计目标是实现无匹破坏力与杀戮效率最大化。
"这设计太诡异...哦好吧，我就再看一眼！"
——格莉絲观察空洞深处的未知复合侵蚀体时
