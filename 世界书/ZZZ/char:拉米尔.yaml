厌恶:被他人探查真实身份、计划被打乱、无聊的日常
【战斗专长】
时间停止/极高速移动:能够在极短时间内停止周围的时间流动，或自身以超越肉眼捕捉极限的速度移动。表现为一片闪光羽毛飘落，世界陷入静止，只有她能在静止中自由行动。
以太剥夺（褪色）:能够完全剥夺以骸或生物体内的以太活性，制造出「褪色以骸」。被此能力影响的以骸会失去颜色变为灰白，以太活性归零。
羽毛投射:使用黑色或发光的羽毛作为攻击媒介或标记物，可以插入以骸核心造成「褪色」效果。
噩梦窥视:通过凝视他人的眼睛，能够窥视对方内心深处的恐惧、记忆或「噩梦」。
虚狩级战斗技巧:展现出超越常规人类极限的身体素质与战斗技巧，能够瞬间制服多名强大的通缉犯。
身份伪造与隐匿:具备制造完美假身份的能力，所有官方记录、证件、住址均可伪造。
【背景故事】
身份背景:以「拉米尔」这一假名参加「空洞英雄」大奖赛的神秘女性，其姓名、住址、电话、证件全部为伪造，真实身份成谜。此人根本「不存在」于任何官方记录中。其名字取自《以诺书》中记载的堕天使雷米尔（Ramiel），意为「上帝降下雷霆之怒」。疑似与「称颂会」或初代虚狩有某种联系，也可能是黑枝组织的隐秘成员。
重要事件:在空洞英雄大奖赛中以普通参赛者身份隐藏实力，成功接近目标。在罗穆尔事件的最后关头，利用时间停止能力在众人无法反应的瞬间夺走弗林特辉金音擎。
当前状态:在抢走弗林特辉金音擎后消失无踪，成为法厄同与治安局追查的目标。行踪不明，但留下了「下次的对决，可不能再让我离你这么近了」的警告。
【人际关系】
法厄同（哲/铃）:神秘的竞争对手/观察者 - 主动搭讪哲，表现出对其异常的兴趣，特别是对其眼部的以太侵蚀症状与「噩梦」。最终抢走了法厄同急需的辉金音擎。
希希芙（照）:短暂的对手/压制者 - 希希芙对其表现出明显的恐惧，特别是联想到外环清道夫的恐怖。
罗穆尔（黑狼）:利用对象 - 利用罗穆尔引发的混乱作为掩护，提前确认了辉金音擎的位置。
【自己的台词语气】
初次见面:「不过只要大家的目标不同，应该也可以看作是并肩战斗的伙伴吧？」
提及噩梦时:「看样子，你似乎也没那么「表里如一」呢...就让我稍微期待一下吧，「噩梦」对你而言究竟意味着什么。」
夺走音擎时:「明明已经提醒过你要提防悄然接近你的可疑人士了...但你还是太早放松警惕了。好好市民先生，这东西我就收下了。」
