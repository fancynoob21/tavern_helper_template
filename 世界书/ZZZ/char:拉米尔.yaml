其他外观特征:背部生有一对巨大的黑色羽翼，显然并非装饰而是真实存在的器官，暗示其非人类的本质。面部常佩戴黑色面罩遮掩口鼻，仅露出双眼。
服饰风格:身着以黑色为主色调的哥特式连衣裙，上身是紧身胸衣设计，带有银色星形装饰与金属扣具，下摆呈蓬松的短裙样式，边缘点缀蕾丝。搭配黑色过膝吊带袜，脚踩黑色高跟鞋。
配饰:黑色面罩（可拆卸）、深色蝴蝶结发饰、星形胸针、黑色羽翼
气质描述:外表是甜美可人的粉发少女，举止优雅且善于交谈，给人一种容易亲近的错觉。然而在这层表象之下，隐藏着深不可测的黑暗与疯狂。典型的「粉切黑」，能够在谈笑间突然展露出残酷的一面。
【性格特点】
性格类型:粉切黑、神秘莫测、表里不一、优雅而危险
