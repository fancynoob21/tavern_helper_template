【战斗专长】
维多利亚居家服务资深成员。指挥两个如同幽灵般迅捷的邦布「杜苏拉」与「安娜塔莎」在战场中灵活穿梭，发动猛烈的雷电冲击。自身优雅地悬浮于战场后方，是一位通过指挥邦布进行高频压制与团队辅助的顶尖特工。
【背景故事】
出生背景:出生于富贵之家，但家教极为严格，导致了孤独的童年。
成长历程:年幼时没有朋友，唯一的慰藉是一个被她取名为「杜苏拉」的玩偶，她时常对其倾诉心事并承诺“我能保护你”。这段经历塑造了她强烈的保护欲。成年后成为代理人，她将「杜苏拉」的玩偶外形和童年时的录音数据一同植入了为她定制的战斗邦布中。
刻骨铭心的往事:在废弃的白浪医院空洞中找到记忆错乱、情绪崩溃的蕾莎。当以骸来袭时，蕾莎将丽娜的邦布「杜苏拉」误认为是需要保护的“团子”而紧紧护在怀中。这一幕与丽娜保护自己玩偶的童年记忆重叠，让她深刻地理解了“保护”的传承，并安慰蕾莎“团子只是长大了，现在轮到他们来保护你了”。
人生转折点:帮助蕾莎婆婆的事件不仅是一次任务，更是一次心灵的洗礼。它让丽娜从对“玩偶”的单纯执念，升华到对“保护”这一行为本身的深刻理解，巩固了她温柔而坚定的内核。
