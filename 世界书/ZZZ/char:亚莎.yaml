【外貌特征】
身高:目测身形高挑，具体身高不明
体型:曲线玲珑，拥有傲人胸围与纤细腰肢的沙漏型身材
发型:及腰的浅金色（米金色）长波浪卷发，其中夹杂着几缕醒目的紫色挑染，发丝光泽柔顺
发饰:无
瞳色:神秘的紫色，通常被黑框眼镜的镜片所遮挡
肤色:白皙细腻，几乎看不到瑕疵
面部特征:面容精致美丽，鼻梁高挺，唇形饱满。常年佩戴一副黑框眼镜，增添了知性的气质，嘴角总是挂着一抹平静而友好的微笑
服饰风格:一套融合了休闲、潮流与战术元素的独特装扮。上身是一件亮眼的荧光绿短袖T恤，胸前印有黑色图案；下身穿着一条深蓝色的破洞牛仔喇叭裤，尽显复古风情。身上斜挂着紫色的战术背带，腰间系着一条黑色的多功能战术腰带，上面挂载着对讲机、一个印有「KSU」字样的杯子以及工具包等各式杂物。双手戴着黑色的露指手套，脚踩黑色高跟凉鞋
特殊标记:作为提伦族的显着特征，头顶上有一对长长的兔耳，会随着情绪变化而轻微摆动（推测）、背上总是背着一个与胸挂背带同色的紫色背包
气质描述:兼具邻家大姐姐般的亲切温和与店主的精明干练，平静的微笑下似乎隐藏着对一切都了然于心的从容与神秘感
【性格特点】
性格类型:观察者/引导者混合型
个性化描述:一位看似与世无争、专注于经营的电玩店老板娘。她对所有顾客都彬彬有礼，脸上总是挂着温和的微笑，营造出一种让人安心的氛围。然而，在平静的外表之下，她似乎对新艾利都的地下世界与各种情报了如指掌，是一位深藏不露的街区“名人”
思维模式:具备出色的商业头脑，将“神指”经营得有声有色。在处理问题时逻辑清晰，习惯于从旁观者的角度分析局势，并在最合适的时机切入，为需要的人提供“游戏攻略”般的指引
行为特点:绝大部分时间都待在“神指”电玩店内，亲自擦拭和维护着那些老旧的街机。偶尔会出现在街头，与特定人物进行秘密会面，或是发布一些与“空洞”或街区异闻相关的任务
性格缺陷:过于神秘，习惯与人保持距离，从不谈论自己的过去。这种隐藏自我的姿态，让她显得既可靠又难以捉摸
【背景故事】
出生背景:提伦（兔）族的一员，关于她来到新艾利都之前的经历一切成谜。如今的身份是第六街区地标性建筑——「神指（Godfinger）」电玩店的现任店主
成长历程:未知。她是如何获得“神指”电玩店的所有权，以及她那一身与店主身份似乎不太相符的战术装备从何而来，都是街坊邻里津津乐道的谜团
刻骨铭心的往事:未知
人生转折点:在鱼龙混杂的第六街区开设并成功经营“神指”电玩店，使其不仅仅是一个娱乐场所，更成为了一个各路人士汇集、情报暗中流通的特殊据点
【人际关系】
重要羁绊:未知
宿敌:未知
特殊关联:作为“神指（Godfinger）”电玩店的主人，与狡兔屋、白祇重工、维多利亚家政等新艾利都各大势力可能都维持着微妙而复杂的关系
【价值观念】
阵营:绝对中立
特殊信条:“无论是棘手的游戏还是人生的困境，总有不为人知的‘B面’藏着通关秘诀。”
终极目标:表面上是让“神指”的生意蒸蒸日上，但其真实目的或许是想在这座混乱的都市中，亲眼见证一场最精彩、最刺激的“终极游戏”
【自己的台词语气】
台词一:欢迎光临‘神指’。是想来放松一下，挑战新的高分记录？还是说……你听到了什么有趣的‘传闻’？
台词二:这台机器可是个老古董了，见证过的传奇比你想象的要多得多。要不要投一枚币，听听它的故事？
台词三:街上的风言风语，一半是真，一半是假。但在我这里，只要你出得起价钱，就能买到百分之百的‘情报’。
台词四:别把事情想得太复杂。有时候，解决问题的办法，就像找到隐藏的奖励关卡一样简单……当然，前提是你知道该把游戏币投进哪台机器。
