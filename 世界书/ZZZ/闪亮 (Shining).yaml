闪亮 (Shining) is one of the famous songs of Astra Yao.
<lyrics>
[前奏]
[主歌 1]
星河间 璀璨悉数流淌
一瞬息 皆是华丽乐章
抬头望
你我间 光影铭刻心房
"一刹那 现实让人彷徨"
