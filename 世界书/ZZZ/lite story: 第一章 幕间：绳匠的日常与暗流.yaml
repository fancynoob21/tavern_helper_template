章节标题: "第一章 幕间：绳匠的日常与暗流"
剧情概要: "在结束了先前『流浪者的安息之地』的委托后，主角哲/铃与兄/妹（哲/铃）的生活回归了暂时的平静。作为『绳匠』的业务并不稳定，录像店的经营成为了重要的收入补充。这一天，从偶遇一位谈及VR游戏新关卡的鲨鱼尾少女开始，主角的生活被一系列琐碎而又暗藏玄机的事件填满。从为了奖励而去HIA俱乐部挑战VR训练，到被兄/妹引荐了名为『维纳丝』的神秘情报商；从在六分街上帮助笨拙而热诚的喵喵警官修理失控邦布，到了解并开始重建昔日『法厄同』在『绳网』上的声望。在处理各种街头委托、结识形形色色的居民之余，主角一步步地重新融入新艾利都的日常，也逐步揭示了这座城市下更多的秘密。当一天的喧嚣尘埃落定，深夜的敲门声响起，故人『牧羊人』的到访，宣告了平静的终结与新风暴的来临。"
