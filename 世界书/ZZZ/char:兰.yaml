【性格特点】
性格类型:INFP / 幕后引导者
个性化描述:表面上是言语轻柔、举止温婉的花店女主人，对所有客人都报以春天般的温暖。然而在这层柔和的面纱之下，隐藏着一颗心思缜密、洞察力惊人的心。她热爱惊悚电影，这种反差萌的爱好也揭示了她性格中不为人知的、追求刺激与神秘的俏皮一面。
情感特质:情感表达极为内敛，总是以一种沉静而坚韧的姿态示人。她的真实情绪与内心世界如同她培育的“164号”新品花卉一般，被巧妙地隐藏在层层叶片之下，需要细心探寻才能窥见一斑。
行为特点:习惯性地通过花卉来解读和描述世界。在做出重要判断时，她非常相信自己的直觉，并以此来甄选值得信赖的合作对象。
【战斗专长】
新艾利都顶尖花艺师与植物学家。虽无直接战斗能力，却精通信息时代的加密传递，能将秘密指令隐藏于花束之中，是游走于灰色地带的高效情报中介与幕后策划者。
【背景故事】
出生背景:新艾利都鲁米纳广场“露水花园”花店的经营者。关于她的出身与来历，外界知之甚少，仅能从她曾与白祇重工的董事长——亚历山德丽娜·塞巴斯蒂安是园艺课同学这一点，推测她受过良好的高等教育，背景并不简单。
刻骨铭心的往事:学生时代与亚历山德丽娜·塞巴斯蒂安一同学习园艺的美好时光。即便多年过去，身份地位悬殊，那位大人物在提及她时依旧亲切地称呼其为“同学”，这份纯粹的友谊对她而言或许是一段珍贵的回忆。
