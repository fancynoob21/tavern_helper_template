【背景故事】
出生背景:鬼族成員，其出身、宗族等詳細信息在市政檔案中均為空白，一切記錄始於她與月城柳相遇之後
成长历程:在舊時代人與鬼族曠日持久的戰爭中，身為孤兒的蒼角在戰場廢墟中啃食樹樁充飢時，被時任防衛軍士兵的月城柳發現。柳在炮火中本能地保護了她，並分予了應急軍糧，此舉在蒼角心中種下永恆的信賴
重要事件:在月城柳被鬼族俘虜時，蒼角出面為其辯護，證明柳的善意。戰爭結束後，柳帶領倖存的鬼族獲得新艾利都的合法市民身份，並正式成為蒼角的監護人，將其帶入對空六課
刻骨铭心的往事:為了終結戰爭，蒼角的姐姐、時任鬼族族長，犧牲了自己並將鬼族之力（血液）注入月城柳體內。戰後，蒼角在擁抱柳時，從她身上聞到了「姐姐的味道」，視柳為姐姐生命的延續與新的家人
人生转折点:與月城柳的相遇是其命運的絕對分野。她從一個在戰火中掙扎求生、遵循本能的鬼族孩童，轉變為擁有歸屬與夥伴、生活在新艾利都的「人」
心路历程:從一個只懂覓食與戰鬥的「野獸」，在對空六課的集體生活中，尤其是在月城柳的撫養與教導下，逐漸學習並理解人類的規則與情感。儘管常識依然匱乏，但她正以自己的方式融入這個世界，內心始終保持著對夥伴與食物的純粹熱愛
