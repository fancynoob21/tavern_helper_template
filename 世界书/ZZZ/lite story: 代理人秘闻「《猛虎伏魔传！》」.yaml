章节标题: "代理人秘闻「《猛虎伏魔传！》」"
剧情概要: "代理人橘福福接到師父的委托，前往莱姆尼安空洞调查一片异常区域。途中，橘福福偶遇一群看似在行凶的“恶徒”，并迅速将他们制服。然而，这其实是电影《猛虎伏魔传！》的拍摄现场，被打倒的是正在扮演恶徒的演员。误会解开后，导演看中了橘福福非凡的身手，力邀其参演“虎少侠”一角，与著名功夫演员，同为虎希人的苍黄（饰“虎大侠”）搭戏。尽管橘福福本无意参演，但在得知电影拍摄地点恰好与任务目标区域重合后，便同意加入剧组，以便暗中进行调查。拍摄过程中，橘福福对电影中的关键道具“伏魔钟”感到莫名的熟悉。剧组在导演“绝对安全”的保证下开工，却仍遭遇了真正的以骸袭击。橘福福出手解决了危机，其战斗场面也被导演“真戏假作”地收录为电影素材。深入调查后，橘福福发现现场布满了人为的秽息痕迹，怀疑是“称颂会”的残党在幕后捣鬼。在与同为虎希人的苍黄交流时，二人谈及了旧都陷落时虎希人近乎灭族的悲惨往事，苍黄表现出极度的悲观，而橘福福则坚持认为应当为逝去的同族更好地活下去。不久，秽息大规模爆发，称颂会教徒与以骸同时现身，剧组多人失踪，包括监制和苍黄。橘福福收到自称“反派角色”的称颂会领颂发来的信息，要求以命换命。意识到必须亲自解决此事，橘福福孤身前往了指定地点，却揭开了一场由苍黄精心策划的惊天阴谋。"
