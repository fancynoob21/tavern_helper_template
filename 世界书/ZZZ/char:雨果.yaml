思维模式:極端的謀略家，習慣佈下精密、複雜且橫跨多方的長遠計畫，通過誤導和利用所有棋子來達成最終目的。
情感特质:內心深處充滿創傷（PTSD）與強烈的自我厭惡，對唯一的妹妹之死懷有愧疚。情感表達壓抑，將溫柔隱藏於譏諷與惡意之下。
行为特点:因患有低血糖而需隨身攜帶甜品，卻因童年創傷而厭惡甜食，將進食甜點作為一種克服痛苦的儀式性行為。
性格缺陷:具有自我毀滅傾向，會為達成目的不惜對自己下狠手（如主動攝入精神藥物）。過度沉浸於復仇計畫，難以對人敞開心扉。
