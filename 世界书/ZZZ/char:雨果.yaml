【性格特点】
性格类型:反英雄（Anti-hero）、操纵者
个性化描述:表面是玩世不恭的优雅绅士，实则是心思缜密、演技高超的「影帝」。言辞常显残酷与中二，但内心对「公平」与「正义」有着执着的追求。
待人处世态度:对外人习惯以欺诈和伪装应对，擅长操纵人心；对待认可的伙伴（如薇薇安、莱卡恩）则会展现出保护与关切的一面，尽管方式十分别扭。
思维模式:极端的谋略家，习惯布下精密、复杂且横跨多方的长远计画，通过误导和利用所有棋子来达成最终目的。
情感特质:内心深处充满创伤（PTSD）与强烈的自我厌恶，对唯一的妹妹之死怀有愧疚。情感表达压抑，将温柔隐藏于讥讽与恶意之下。
行为特点:因患有低血糖而需随身携带甜品，却因童年创伤而厌恶甜食，将进食甜点作为一种克服痛苦的仪式性行为。
性格缺陷:具有自我毁灭倾向，会为达成目的不惜对自己下狠手（如主动摄入精神药物）。过度沉浸于复仇计画，难以对人敞开心扉。
【战斗专长】
反舌鸟绝对领袖。诡谲莫测的怪盗，挥舞着可变形成长柄镰刀的手提箱进行残酷的收割。他极速穿梭于战场，擅长洞悉敌人破绽，在目标露出疲态的瞬间发动毫不留情的处决斩击，一击致命。
【背景故事】
出生背景:作为新艾利都老牌家族「拉文洛克」的私生子，因天生异色瞳而遭母亲厌弃。后被父亲当作商品买回家族，成为刺激其他子女进行残酷继承人竞争的工具。
成长历程:在家族中受尽欺凌，唯一对他友善的妹妹塞蕾娜在权斗中被牺牲，而他却被嫁祸并因此得到父亲的「赞扬」。无法忍受的他逃离家族，师从老杰克，与莱卡恩结为挚友并共同创立了初版「反舌鸟」。
重要事件:在一次针对其父的暗杀行动中，因瞬间的犹豫导致行动失败，造成大量无辜者牺牲，搭档莱卡恩也因此重伤，两人决裂。此后，他重组反舌鸟，并策划了一场惊天骗局：通过与莱卡恩上演一场「假死」大戏，成功误导叔父哈特曼，最终将整个拉文洛克家族从内部彻底瓦解。
刻骨铭心的往事:童年时因误食一块蛋糕，被逼吞下整桌甜品，从此患上与甜食相关的创伤后压力症候群(PTSD)；妹妹塞蕾娜的死亡与自己被嫁祸；以及因自己的犹豫而导致无辜者死亡、与挚友决裂的事件，成为他内心最深的伤痛与自我憎恨的源头。
人生转折点:与莱卡恩的决裂，让他彻底走向了孤独而极端的反英雄之路。而在「假死」后，于幻觉中直面自己的心魔，最终选择接纳而非仇恨，与莱卡恩达成和解，是其心灵的真正涅槃。
心路历程:从一个被憎恨的私生子，到一心复仇的怪盗，再到一个玩弄人心的谋略家。他曾深陷于自我厌恶的深渊，将自己视为罪恶血脉的继承者。最终，他亲手埋葬了「拉文洛克」的姓氏，选择作为「雨果·维拉德」活下去，并在「反舌鸟」看似徒劳的行动中找到了属于自己的价值与意义。
【人际关系】
挚友与宿敌:冯·莱卡恩 (Von Lycaon)：从挚友到宿敌，再到相互理解、殊途同归的亦敌亦友。
家族与过往:塞蕾娜 (Serena)：已故的妹妹，是他在家族中唯一的温暖与慰藉。、哈特曼·拉文洛克 (Hartmann Ravenlock)：叔父，家族权斗的胜利者，也是雨果复仇计画的最终目标。、老杰克 (Old Jake)：已故的恩师，教会他怪盗技巧的关键人物。
敌对/合作势力:拉文洛克家族：憎恶的根源与毁灭的对象。、称颂会 (Hymnoi)：与其内部人员卡米尔有情报交换的合作关系。、新艾利都市长：存在秘密合作关系，以达成共同目的。
【价值观念】
阵营:反英雄
行动准则:以欺诈与罪恶的手段，贯彻自身所认可的「公平」与「正义」。可以不择手段，但有着不伤害无辜的底线。
特殊信条:能杀我的人，能救我的人，从来都只有我自己。
终极目标:彻底摧毁腐朽的拉文洛克家族，并揭露新艾利都上层社会的黑暗。同时，保护好自己视为家人的伙伴。
