章节标题: "代理人秘闻「洞中谍」"
剧情概要: "为了追查潜伏在防卫军内部、代号“鼹鼠先生”的叛军间谍，代理人“11号”决定伪装成叛变者与其接触。然而，多疑的鼹鼠先生始终对她存有戒心。11号得知鼹鼠先生极度崇拜传说中的绳匠“法厄同”，于是计划利用这一点来获取其信任。通过情报商“牧羊人”的引荐，11号找到了 （哲/铃）兄妹，请求他们扮演法厄同，协助自己完成这场“无间道”。殊不知，这对看似平凡的音像店主，正是法厄同本人。一场“扮演自己”的奇异委托就此展开。经过多次交涉与考验，就在11号即将接触到叛军核心并收网之际，她与（哲/铃）却坠入了鼹鼠先生早已布下的天罗地网。原来，鼹鼠先生早已识破了他们的伪装。在绝境中，（哲/铃）凭借其作为真正法厄同的实力，联系上11号的队友并扭转战局，最终将叛军一网打尽。直到最后，11号依然不相信与自己并肩作战的绳匠就是她所崇拜的传奇本身。"
