章节标题: "漫行于以太虚境"
剧情概要: "狡兔屋的老大妮可兴奋地带来一件从零号空洞深处“淘”来的“惊喜”——一台拥有十余年历史、来自旧都时代的加密笔记本电脑。她以部分债务抵消为条件，委托身为传奇绳匠“法厄同”的哲/铃兄妹破解其中可能隐藏的巨大价值。哲/铃利用空洞深潜系统（HDD）深入电脑的数字空间，却发现其内部早已化作一个被病毒盘踞、数据严重损坏的“以太虚境”。他们不得不启动捕获程序，通过清除和修复不同区域的“病毒”，逐步还原这个虚拟空洞的本来面目。随着数据修复的推进，电脑主人的身份与故事被层层揭开：他是一位名叫“空崎”的防卫军钻石分部年轻士兵，在旧都陷落的最终时刻，与战友们一同被困于基地，战斗至牺牲。电脑中留下了他最后的日志、对家人的无尽思念，以及一张写有电话号码的字条。哲/铃拿着这串跨越十年的号码，拨通了电话，将空崎作为英雄战斗至最后一刻的英勇事迹与他对母亲的思念，告知了至今仍在等待儿子归家的母亲。这次特殊的“委托”没有带来任何金钱收益，却让哲/铃再次深刻地感受到旧都陷Luo背后无数无名英雄的悲壮与牺牲，也更加坚定了他们追寻灾难真相的决心。"
