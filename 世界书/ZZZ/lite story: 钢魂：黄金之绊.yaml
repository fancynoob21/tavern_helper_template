章节标题: "钢魂：黄金之绊"
剧情概要: "白祇重工在工地旧址挖出一台来历不明的暴走机甲，并意外启动了其自毁程序。为阻止危机，白祇重工的技术专家格莉丝紧急委托传奇绳匠哲/铃与他们的邦布伊埃斯，通过外部驾驶舱与内部驾驶舱联动的方式，对机甲进行同步率训练，以期获得完全控制权。训练期间，一个名为赫拉克勒斯的神秘金色邦布出现，宣称这台机甲是其失落的‘黄金机甲01号’，并视主角为窃贼。他驾驶备用机甲，向主角发起了屡败屡战的挑战。随着战斗的深入，赫拉克勒斯对机甲改造的执念与对一部老旧科幻漫画的狂热逐渐暴露，其傲娇又中二的‘反派’形象也日益丰满。在谈判因比利无心之言而破裂后，决战不可避免。主角通过比利对那部漫画的痴迷，最终破解了机甲内置的终极验证问题——‘宇宙的终极秘密’，其答案‘42’正是赫拉克勒斯由其创造者参孙·胡赋予的生日（4月2日）。在赫拉克勒斯袭击工地，与安东、比利等人交战的危急时刻，主角驾驶完全觉醒的黄金机甲赶赴战场，将其击败。战后，主角揭示了其创造者深藏在机甲程序中的温情与期盼。最终，赫拉克勒斯被格莉丝的真诚善意所打动，暂时放弃了与众人为敌的立场，留下机甲后，驾驶备用机独自离去，一场围绕着巨大机器人与小小邦布的钢铁风波就此落下帷幕。"
