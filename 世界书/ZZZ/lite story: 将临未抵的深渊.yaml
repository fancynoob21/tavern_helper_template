章节标题: "将临未抵的深渊"
剧情概要: "云巋山弟子叶瞬光为暂离山门，以‘代理观主’的身份现身澄辉坪，并寄宿于师弟妹哲和铃的‘随便观’。恰逢矿区旧址突发紧急委托，众人为解救般岳的徒弟宁谦与受困矿工而深入空洞。行动中，他们与坎卜斯黑枝的裁决官琉音及前战斗兵器般岳汇合，并从称颂会余孽口中得知，其头目莎拉正与失踪的叶释渊一同寻找一处‘古阵’。随着调查深入，十年前矿区灾难的残酷真相被层层揭开：般岳的过去身份——‘肃灭单元·零型’，及其在算法指令下‘见死不救’导致宁谦之姐与叶瞬光父母死亡的往事，令众人陷入信任与仇恨的漩涡。宁谦在复仇心的驱使下，与莎拉合作将般岳诱入古阵陷阱，意图同归于尽。然而，古阵的真实作用并非镇压，而是为邪神‘始主’降临汇聚秽息能量的通道。在般岳以身赎罪、死战不退的危急时刻，琉音对其下达了‘最终裁决’——她利用倾听亡语的能力，揭示了当年逝者（宁谦之姐与叶家父母）非但没有怨恨，反而在临终前将生还的希望托付于般岳的真相。仇恨与误解就此冰释，但真正的危机随之而来。莎拉为迎接始主降临，不惜与始主融合，并夺舍了试图从背后偷袭的叶释渊。为拯救被操控的兄长，叶瞬光在绝境中解放了‘青溟剑’的全部力量，化为白发独角形态，以雷霆之势将始主从兄长体内驱逐。然而，清醒后的叶释淵察觉到更深层的秘密，再次孤身离去，而叶瞬光则因解放神剑之力，开始承受记忆被悄然侵蚀的代价，在无人知晓的深夜，独自与遗忘抗争。"
