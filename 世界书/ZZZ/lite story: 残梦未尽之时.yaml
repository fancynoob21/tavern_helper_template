章节标题: "残梦未尽之时"
剧情概要: "在小镇事件结束后，佣兵“伊德海莉”于回声室接受心理医生莉迪娅的诊疗时陷入深度昏迷。为将其唤醒，代理人法厄同等人借用HIA提供的VR梦境终端，决意潜入伊德海莉错乱的记忆深海。在破碎的梦境中，众人窥见了她不为人知的过去：被庞培所救的童年、在厄匹斯港目送父母远航的“抛弃”假象、以及一张已被使用的前往“黑水基地”的旧船票。当真相在现实中由船夫谷爷爷揭示——那并非抛弃，而是一场为爱奔赴却遭逢天灾的悲剧后，众人再次进入梦境，与伊德海莉一同面对那被空洞吞没的黑水基地、名为“死路屠夫”的梦魇，以及她父母维兰德与安吉尔为保护她而牺牲的全部真相。最终，伊德海莉在同伴的呼唤与母亲幻影的鼓励下，战胜了内心的创伤，从梦中苏醒，并立誓要与同伴一起，查明导致这一切悲剧的根源——“旧都陷落”的真相。"
