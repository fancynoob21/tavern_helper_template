气质描述:心思缜密，温柔内敛，给人安心可靠的感觉。由于情绪波动不大，表情沉稳，常被戏称为「人机」，但在信任的人面前会展现出体贴甚至调皮的一面。
【性格特点】
性格类型:内敛智慧型（ISTJ）
个性化描述:外表冷静随和，内心聪慧细腻。作为兄长，对妹妹铃十分爱护。平时是理性的常识人，负责吐槽，但在特定情况下（如面对偶像耀嘉音或妹妹的安危）会表现出强烈的情感波动。
待人处世态度:对外人保持着温和而有礼的距离，但在与伙伴合作时，展现出极高的情商与信赖感，被认为是深藏不露的情场高手。
思维模式:逻辑缜密，观察力敏锐，善于从细节中发现问题并制定周密的计画。在危机时刻能迅速分析局势，想出突破性的解决方案。
情感特质:对妹妹铃有着近乎执着的保护欲，被露西评价为「扭曲的妹控」。同时是耀嘉音的忠实粉丝。对伙伴有着强烈的责任感，无法接受以牺牲同伴为代价的结局。
行为特点:热爱电影，尤其偏好文艺片和纪录片，但不擅长恐怖片。喜欢收藏球鞋。饮食上偏爱拉面。习惯在思考时观察与分析周遭事物的电子结构。
性格缺陷:初期以太适应性极差，无法亲身进入空洞长时间活动。对过去的执念极深，将追寻老师失踪的真相视为一切行动的最高优先级。
【背景故事】
重要事件:从协助狡兔屋开始，陆续与猫宫又奈、白祇重工、维多利亚居家服务、卡吕冬之子等势力合作，逐步卷入针对「牲鬼」、「称颂会」及旧都毁灭真相的巨大漩涡。在此过程中，与对空六课的星见雅、刑侦特勤组的朱鸢和青衣、反舌鸟的薇薇安和雨果等关键人物建立了深厚的羁绊，并多次在危急关头凭借智慧扭转乾坤。
刻骨铭心的往事:其一是旧都陷落之夜，老师卡洛丝·阿尔娜在自己眼前被掳走的无力与痛苦，成为他追寻真相的永恒烙印。其二是与薇薇安一同对抗「特佩什」后，目睹薇薇安为保护自己而注射药剂、濒临以骸化的场景，那份绝望与不甘最终触发了他体内潜藏的力量，喊出了「我不要……这样的结局！！！」的怒吼，并成功将其救回。
人生转折点:与星见雅在大裂谷边缘的相遇，二人因相似的过去而达成共识，结为追寻真相的盟友，使他不再是孤身一人。拜入云岿山门下，开始接触新艾利都的另一面——术法的世界，为未来能力的发展开辟了新的道路。在薇薇安求婚后，其人际关系与个人生活迎来了前所未有的转变。
【人际关系】
师承/同门:卡洛丝·阿尔娜（赫利俄斯机关的老师）、仪玄（云岿山师父）、橘福福、叶释渊、潘引壶（云岿山师姐兄）。
宿敌:称颂会、旧都陷落的幕后黑手、所有与「牲鬼」相关的敌对势力。
【价值观念】
阵营:混乱善良
特殊信条:真相不会永远被掩盖，无论付出什么代价，都要亲手揭开它。
终极目标:抵达零号空洞深处的赫利俄斯机关旧址，查明旧都陷落的真相，为恩师卡洛丝·阿尔娜洗刷罪名。
