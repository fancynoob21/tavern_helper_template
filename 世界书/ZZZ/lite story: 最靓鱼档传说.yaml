章节标题: "最靓鱼档传说"
剧情概要: "在海滨度假胜地“幻绮乐园”，哲/铃偶然发现了一个奇特的鱼档。老板阿强不仅售卖各种热带鱼，还将一只自称“海巫师”的鲨鱼邦布作为“赠品”，声称用“贝壳”即可免费兑换。这只邦布言行浮夸，宣称自己是海神大臣，为了寻找流落人间的海神之子而来，却在被哲/铃质疑其真实性时，熟练地切换到邦布语“嗯呐嗯呐”地装傻。出于好奇与一丝善意，哲/铃最终收集贝壳，“解救”了这位“海巫师”。被释放后，“海巫师”立刻试图向哲/铃索要200丁尼作为“神圣通讯费”，被拒后，它上演了一场“回归大海”的悲壮戏码，义无反顾地冲向沙滩。然而，当哲/铃在海边散步片刻后返回鱼档，却哭笑不得地发现，“海巫师”又一次被挂在了鱼档上。原来，这一切都是阿强与“海巫师”合伙上演的营销噱头，“海巫师”负责吸引顾客，而阿强则承诺在收集到足够的“贝壳”后，支付它200丁尼作为报酬。"
