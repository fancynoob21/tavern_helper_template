【性格特点】
性格类型:外剛內柔的領導者
个性化描述:個頭雖小，卻揮舞著與身形不符的重錘，展現出兇惡的戰鬥力。作為年紀輕輕的社長，她努力表現出成熟可靠的一面，但骨子裡仍是個需要被呵護的可愛少女。
待人处世态度:對外努力維持社長的威嚴，實際上非常關心下屬與夥伴。不喜歡坐鎮管理，更熱衷於親赴一線，身先士卒。
思维模式:直率，行動派。遇到問題傾向於直接用力量解決，但在關乎重要之人的事情上會變得深思熟慮，甚至展現出脆弱的一面。
情感特质:情感豐富且外露，對父親霍爾斯·貝洛伯格抱有複雜的情感，從崇敬到誤解，再到擔憂與理解。對義姐格莉絲有著深厚的感情，雖然時常爭吵，但關鍵時刻總會互相支持。
行为特点:戰鬥時極具爆發力，日常中則會不經意間流露出孩子氣的一面，例如因身高被比較而生氣。
性格缺陷:有時會因為過於逞強而忽視自身的危險，對他人的評價（尤其是關於年齡和身高的）非常敏感。
【技能专长】
战斗能力:使用巨大的重工锤進行戰鬥，能夠發揮出與嬌小身形不符的強大破壞力。
特殊能力:能夠駕駛並與父親留下的原型機「格羅伊」產生共鳴，在危急關頭爆發出超越極限的力量。
专业水平:白祇重工的經營管理者，擅長處理與工程建設相關的業務，並能帶領團隊處理空洞中的危機事件。
战斗风格:近身猛攻型，以強大的擊破能力摧毀敵人的防禦。
核心机制:火屬性擊破特性，專注於打破敵人的架勢條，造成巨大傷害。
【背景故事】
出生背景:白祇重工前老闆霍爾斯·貝洛伯格的女兒。父親是她兒時的英雄，但某天父親突然帶著一筆巨款失蹤，讓她對父親產生了極大的誤解和怨恨。
成长历程:在父親失蹤後，年紀輕輕便接手了瀕臨困境的白祇重工，在安東、本、格莉絲等下屬的輔佐下，努力維持著公司的運作，並帶領公司走向復興。
重要事件:【地鐵工程事件】
：在贏得地鐵施工權後，遭遇競爭對手污衊及工程機械失控事件。委託繩匠「法厄同」尋找失控機械，並在此過程中初次揭開了與父親失蹤有關的線索。、【原型機『格羅伊』事件】
：在空洞深處找到了父親留下的原型機「格羅伊」，並發現了父親並非捲款潛逃的真相。在與神秘人形侵蝕體的戰鬥中，喚醒了「格羅伊」的力量，成功擊敗敵人，並決心查明父親失蹤的真相。、【小學校舍翻新事件】
：在小學翻新工程中發現了非法採集以太資源的空洞，為了保護孩子們的安全，不惜變裝潛入學校調查。事件中，她對「大人」與「小孩」的世界有了更深的思考，並堅定了自己守護他人的決心。
刻骨铭心的往事:目睹父親在深夜帶著錢款離家並從此失蹤的場景，這成為了她長久以來的心結。以及在空洞深處，與父親留下的原型機「格羅伊」並肩作戰，喊出其名字的瞬間，感受到了與父親之間跨越時空的聯繫。
人生转折点:找回原型機「格羅伊」並得知父親失蹤的真相，使她從對父親的怨恨中解脫出來，轉而開始積極追尋真相，並真正地作為「白祇重工的社長」成熟起來。
心路历程:從一個被父親拋棄、內心充滿怨恨的少女，成長為一個身先士卒、守護夥伴、並勇敢面對過去與未知的堅強領導者。她逐漸理解了父親的苦衷，並繼承其遺志，決心保護新艾利都。
