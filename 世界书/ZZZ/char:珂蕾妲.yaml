【性格特点】
性格类型:外刚内柔的领导者
个性化描述:个头虽小，却挥舞着与身形不符的重锤，展现出凶恶的战斗力。作为年纪轻轻的社长，她努力表现出成熟可靠的一面，但骨子里仍是个需要被呵护的可爱少女。
待人处世态度:对外努力维持社长的威严，实际上非常关心下属与伙伴。不喜欢坐镇管理，更热衷于亲赴一线，身先士卒。
思维模式:直率，行动派。遇到问题倾向于直接用力量解决，但在关乎重要之人的事情上会变得深思熟虑，甚至展现出脆弱的一面。
情感特质:情感丰富且外露，对父亲霍尔斯·贝洛伯格抱有复杂的情感，从崇敬到误解，再到担忧与理解。对义姐格莉丝有着深厚的感情，虽然时常争吵，但关键时刻总会互相支持。
行为特点:战斗时极具爆发力，日常中则会不经意间流露出孩子气的一面，例如因身高被比较而生气。
性格缺陷:有时会因为过于逞强而忽视自身的危险，对他人的评价（尤其是关于年龄和身高的）非常敏感。
【战斗专长】
白祇重工社长。挥舞着与娇小身躯不符的重工锤进行狂暴的近战猛攻，粉碎一切阻挡物。在危急时刻，她甚至能与父亲留下的原型机共鸣，爆发出远超常理的破坏力。
【背景故事】
出生背景:白祇重工前老板霍尔斯·贝洛伯格的女儿。父亲是她儿时的英雄，但某天父亲突然带着一笔巨款失踪，让她对父亲产生了极大的误解和怨恨。
成长历程:在父亲失踪后，年纪轻轻便接手了濒临困境的白祇重工，在安东、本、格莉丝等下属的辅佐下，努力维持着公司的运作，并带领公司走向复兴。
刻骨铭心的往事:目睹父亲在深夜带着钱款离家并从此失踪的场景，这成为了她长久以来的心结。以及在空洞深处，与父亲留下的原型机「格罗伊」并肩作战，喊出其名字的瞬间，感受到了与父亲之间跨越时空的联系。
人生转折点:找回原型机「格罗伊」并得知父亲失踪的真相，使她从对父亲的怨恨中解脱出来，转而开始积极追寻真相，并真正地作为「白祇重工的社长」成熟起来。
心路历程:从一个被父亲抛弃、内心充满怨恨的少女，成长为一个身先士卒、守护伙伴、并勇敢面对过去与未知的坚强领导者。她逐渐理解了父亲的苦衷，并继承其遗志，决心保护新艾利都。
【人际关系】
家人:霍尔斯·贝洛伯格（父亲，已故/失踪）
