特殊关联:原型机「格罗伊」（由父亲霍尔斯制造，小时候由珂蕾妲命名，是其重要的精神寄托与强大战力）
【价值观念】
阵营:混乱善良
行事原则:比起坐镇管理，更喜欢投入到一线工作中。为了守护重要的人和无辜的市民，可以不计成本和风险。
特殊信条:「大人和小孩都生活在同一个世界里，变坏和长大是两码事。」
终极目标:查明父亲失踪的真相，带领白祇重工走向辉煌，并保护新艾利都不受空洞威胁。
【自己的台词语气】
自我介绍:「我可是很忙的，还有那——么大一个公司需要管理，没空陪你像小孩子一样浪费时间。」
