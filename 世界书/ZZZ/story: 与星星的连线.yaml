<事件三>
事件详细剧情: "當晚，{{user}}在約定地點久候，卻不見啟明星的身影。正當焦急之時，白天那位愛貓的房東匆匆趕來，他揭露了拉娜其實是黑錨幫二把手的驚人事實，並提醒{{user}}啟明星正身處險境。同時，他還拜託{{user}}轉告啟明星新的租房條件：「只要狗不上二樓就行」。{{user}}心急如焚地趕往拉娜的住所，果不其然，啟明星正被拉娜和她的一眾手下圍困威脅。{{user}}挺身而出，試圖保護啟明星，但在人數與武力的絕對劣勢下，兩人顯得不堪一擊。一名混混兇狠地一腳踹向{{user}}，啟明星下意識地擋在身前，腹部結結實實地挨了這一致命的重擊。就在千鈞一髮之際，牆壁轟然破裂，與{{user}}有舊交的邦布「卡米諾斯」如神兵天降，以壓倒性的力量瞬間擊倒了除拉娜外的所有敵人。從倒地的匪徒口中，他們得知了黑錨幫企圖壟斷並控制所有邦布商人的險惡陰謀。"
