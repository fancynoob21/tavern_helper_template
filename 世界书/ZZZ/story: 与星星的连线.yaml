<事件一>
事件详细剧情: "在龍蛇混雜的厄庇斯港，{{user}}撞見了幾名黑錨幫的混混正在威脅情報商啟明星。{{user}}毫不猶豫地上前，三言兩語便替她趕走了麻煩。心懷感激的啟明星向{{user}}道出了事情的原委：她曾為一名「繩匠」承接委託，尋找邦布商人，卻未料到委託人竟是藉此對邦布商人施暴的黑錨幫。正直的繩匠當即終止合作並銷毀了數據，黑錨幫因此遷怒於作為中間人的啟明星，逼迫她交出繩匠的下落。為了保護繩匠，啟明星陷入了危險。考慮到當前的處境，她表示需要暫時離開厄庇斯港避風頭，{{user}}立刻提議，邀請她來自己所居住的、相對安全的六分街。"
