服饰风格:以黑黄为主色调的机能战术风格。上身为短款黑色宽袖夹克，内搭黄色运动内衣与黄色战术胸挂，露出紧致的腹部；下身为带有灰色迷彩与黄色菱形图案的黑色紧身战术裤，搭配带有黄色细节的黑色短靴。双手佩戴露指手套，右膝佩戴护膝。
特殊标记:失明但拥有超凡感官：双眼无法视物，但其余五感被磨练至极致，尤其在空洞内能清晰感知以太波动，实现超越常人的空间辨识能力。、“无眼”：根据非官方的模型数据，其眼罩之下并无眼球结构。
气质描述:战斗时是冷静、精准且致命的幽魂；日常中则沉默寡言，气质温柔无害，带着一丝难以接近的疏离感与深藏的哀伤。
【性格特点】
性格类型:忠诚守护型 / 坚毅复仇者
个性化描述:表面是服从命令的专业军人，内心却极度重情重义，对认定的同伴抱有赴汤蹈火的觉悟与近乎偏执的保护欲。不善言辞，习惯用行动表达关心。
待人处世态度:对同伴温柔体贴，会像影子一样默默守护。不轻易提及过去，与不熟之人保持着礼貌而疏远的距离（使用敬语）。
思维模式:高度依赖听觉、触觉等非视觉感官进行分析与决策，形成了极其敏锐的洞察力与环境感知能力。思考方式直接而专注，一旦锁定目标便不再动摇。
行为特点:吹奏口琴：时常吹奏前队长留下的《归乡》以缅怀故人。、隐秘观察：习惯悄无声息地出现在同伴身边，甚至会为了确认其安全而进行“跟踪”。、钟爱红豆包：将红豆包视作快捷管饱的军粮，会成箱购买。
性格缺陷:PTSD导致的心理脆弱；对同伴的过度关心与保护欲，使其行为带有强烈的“沉重”感与跟踪属性；复仇的执念是其前进的动力，也可能成为束缚自身的枷锁。
【战斗专长】
防卫军顶级狙击手。拥有看破以太流动的“以太视域”，精通可拆卸电磁狙击步枪的枪斗术。擅长在队友攻击时进行无缝衔接的协同狙杀，在远处给予敌人致命的追击与火力压制。
【背景故事】
出生背景:出身不明的孤儿，后加入新艾利都防卫军，成为猫眼石营·里拉小队的一员，初始代号为「皮里佛勒戈同」。
成长历程:在里拉小队中，被队长「卡戎」视如己出，从队长处学会了口琴曲《归乡》，并获得了新代号「扳机」。
重要事件:【旧都陷落】
：作为先遣部队的里拉小队被派往零号空洞，因高层取消增援而孤立无援。小队除扳机外全员牺牲，扳机本人被以骸的以太射线击中双眼致盲，后被同为幸存者的佐伊救出。
刻骨铭心的往事:目睹战友全灭，并在幸存后的质询中因精神崩溃而产生“队友都还活着”的幻觉。逝去队友的身影化作眼前的残影，成为其无法摆脱的PTSD症状与追寻真相的最初动力。
【ESOME_BREAK"人际关系"】
重要羁绊:法厄同 (哲 & 铃):绝对的守护与效忠对象，是将她从过往泥潭中拉出的光，对其抱持着极度深厚且沉重的特殊感情，达到了“Player Love”的程度。, 里拉小队 (已故):如同家人般的前战友，包括队长「卡戎」、队员「阿刻戎」、「里忒」、「斯缇克斯」、「科基托斯」。他们的死是扳机一切行动的根源与永恒的伤痛。
合作伙伴:奥波勒斯小队:现在的战友。包括队长「鬼火」、队友「11号」、「席德」、「奥菲丝」。与他们一同追查旧都陷落的真相。, 安比:多次并肩作战的可靠伙伴，在营救「11号」等事件中结下深厚友谊。
宿敌:尸鹫 (佐伊):镜像般的存在，同为旧都陷落的幸存者，却选择了截然不同的道路。是敌人，也是被扳机所理解和拯救的悲剧人物。, 旧都陷落的幕后黑手:扳机终其一生所要寻找并使其付出代价的终极目标。
特殊关联:内森:前队友「里忒」的弟弟，委托扳机并间接促成了“目不可及”事件的关键人物，为扳机送达了里拉小队的最后录音。, 11号:同队队友，扳机十分关心她，曾与安比一同将其从危机中救出。
【价值观念】
阵营:秩序善良
