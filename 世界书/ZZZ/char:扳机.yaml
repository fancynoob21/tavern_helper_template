合作伙伴:奥波勒斯小队:现在的战友。包括队长「鬼火」、队友「11号」、「席德」、「奧菲絲」。与他们一同追查旧都陷落的真相。, 安比:多次并肩作战的可靠伙伴，在营救「11号」等事件中结下深厚友谊。
宿敌:屍鷲 (佐伊):镜像般的存在，同为旧都陷落的幸存者，却选择了截然不同的道路。是敵人，也是被扳机所理解和拯救的悲剧人物。, 旧都陷落的幕后黑手:扳机终其一生所要寻找并使其付出代价的终极目标。
特殊关联:内森:前队友「里忒」的弟弟，委托扳机并间接促成了“目不可及”事件的关键人物，为扳机送达了里拉小队的最后录音。, 11号:同队队友，扳机十分关心她，曾与安比一同将其从危机中救出。
