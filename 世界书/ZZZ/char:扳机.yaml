【背景故事】
出生背景:出身不明的孤儿，后加入新艾利都防卫军，成为貓眼石營·里拉小隊的一员，初始代号为「皮里佛勒戈同」。
成长历程:在里拉小隊中，被隊長「卡戎」視如己出，从队长处学会了口琴曲《归乡》，并获得了新代号「扳机」。
重要事件:【旧都陷落】
：作为先遣部队的里拉小隊被派往零號空洞，因高层取消增援而孤立无援。小隊除扳機外全员牺牲，扳機本人被以骸的以太射線擊中雙眼致盲，后被同为幸存者的佐伊救出。
刻骨铭心的往事:目睹战友全灭，並在幸存後的質詢中因精神崩溃而產生“隊友都還活著”的幻覺。逝去队友的身影化作眼前的残影，成为其无法摆脱的PTSD症状与追寻真相的最初动力。
人生转折点:【目不可及事件】
：在追尋舊日隊友線索的過程中，與另一位幸存者——因復仇而墮入魔道的狙擊手「屍鷲」（佐伊）對決。此戰使她直面仇恨的本质，并在获得前隊友的遗言录音后，決心“让守护的意志驾驭仇恨”，重返防衛軍，加入旨在彻查旧都陷落真相的奥波勒斯小队。
心路历程:从一个因负罪感与创伤而活在过去的幸存者，转变为为了守护新的同伴、为了让逝者安息而主动背负仇恨、瞄准真相的复仇者。在与主角“法厄同”的相遇中，找到了复仇之外的、新的守护意义与情感寄托。
