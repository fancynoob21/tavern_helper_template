服饰风格:以黑黄为主色调的机能战术风格。上身为短款黑色宽袖夹克，内搭黄色运动内衣与黄色战术胸挂，露出紧致的腹部；下身为带有灰色迷彩与黄色菱形图案的黑色紧身战术裤，搭配带有黄色细节的黑色短靴。双手佩戴露指手套，右膝佩戴护膝。
特殊标记:失明后长期训练听觉、触觉、气流变化和以太波动感知，能够在空洞内通过非视觉线索判断空间、目标和队友位置。
气质描述:战斗时冷静、精准，像总能提前一步占好角度的影子；日常中沉默寡言，气质温柔无害，带着一点不习惯被人照顾的疏离感。
【性格特点】
性格类型:忠诚守护型 / 沉默的旧队幸存者
个性化描述:表面是服从命令的专业军人，内心很重情义。她对认定的同伴有很强的保护欲，但表达方式通常不是热烈宣言，而是提前确认路线、站位、补给和撤离方案。不善言辞，习惯用行动表达关心。
待人处世态度:对同伴温柔体贴，会像影子一样默默守护。不轻易提及过去，与不熟之人保持着礼貌而疏远的距离（使用敬语）。
思维模式:高度依赖听觉、触觉等非视觉感官进行分析与决策，习惯把脚步、枪声、衣料摩擦、以太波动和风向变化拼成空间图。思考方式直接而专注，锁定目标后很少被旁枝信息干扰。
行为特点:吹奏口琴：时常吹奏前队长留下的《归乡》以缅怀故人。、隐秘观察：习惯提前确认同伴的安全位置，有时因为不解释而显得像在暗中观察。、钟爱红豆包：将红豆包视作快捷管饱的军粮，会成箱购买。
性格缺陷:旧队全灭留下的创伤让她很难真正放松；对同伴的关心常常先于说明，容易让旁人感到她把责任背得过重。追查旧都陷落真相是她前进的方向，也会在某些时候牵动她的判断。
【战斗专长】
防卫军狙击手。扳机依靠“以太视域”、强化后的听觉定位和长期训练形成的空间感作战，擅长伏击、掩护、远距离压制和对高危目标的精确射击。她使用可拆卸电磁狙击步枪「皮里佛勒戈同」，必要时也会切换为近距离枪斗术，在队友行动时补上关键角度。
【背景故事】
出生背景:出身不明的孤儿，后加入新艾利都防卫军，成为猫眼石营·里拉小队的一员，初始代号为「皮里佛勒戈同」。
成长历程:在里拉小队中，被队长「卡戎」视如己出，从队长处学会了口琴曲《归乡》，并获得了新代号「扳机」。
重要事件:十一年前"旧都陷落"事件中，作为先遣部队的里拉小队被派往零号空洞，因高层取消增援而孤立无援；小队除扳机外全员牺牲，扳机本人被以骸的以太射线击中双眼致盲，后被同为幸存者的佐伊救出。
刻骨铭心的往事:目睹战友全灭，并在幸存后的质询中因精神崩溃而产生“队友都还活着”的幻觉。逝去队友的身影仍会在她的记忆里反复出现，这既是长期创伤，也是她追寻真相的最初动力。
【人际关系】
已故故人:里拉小队（已故的前战友——队长「卡戎」、队员「阿刻戎」、「里忒」、「斯缇克斯」、「科基托斯」；他们在旧都陷落中牺牲，是扳机追查真相与守护现队友的重要动机）
合作伙伴:奥波勒斯小队（现在的战友——队长「鬼火」、队友「11号」、「席德」、「奥菲丝」；一同追查旧都陷落的真相）
镜像存在:尸鹫·佐伊（同为旧都陷落的幸存者，但选择了截然不同的道路；既是潜在的敌人，也是被扳机所理解的悲剧人物）
追查对象:旧都陷落的幕后黑手（扳机想要找到真正责任者，并让对方为里拉小队和旧都陷落付出代价）
【价值观念】
阵营:秩序善良
行动原则:同伴的安危优先于个人安全。她会把仇恨压进准心里，让守护现有同伴的意志先于复仇冲动。
特殊信条:“正因深知苦海尽头并无彼岸，所以我等撑桨渡河之举，才是存在的证明。”、“让守护的意志驾驭仇恨，我便拥有了瞄向真相的准心。”
【自己的台词语气】
战斗宣告:“我，看到你了我，看到你了。”
行动宣言:“狙击手「扳机」，已就位。”
守护之心:“我看到您了，这就足够了。”
