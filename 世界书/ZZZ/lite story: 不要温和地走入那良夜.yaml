章节标题: "不要温和地走入那良夜"
剧情概要: "法厄同（（哲/铃））接受市长委托，以“市长特派员”与“空洞技术顾问”的身份，协助防卫军精锐“奥波勒斯小队”剿灭盘踞于卫非地的“称颂会”。在行动中，（哲/铃）与小队队长鬼火因理念不合而冲突不断，却也逐步揭开了防卫军高层洛伦兹少将与辉晶美克高管卢克罗的黑幕交易。然而，事件的走向远超预料，奥波勒斯小队的直属上司伊瑟尔德上校，竟是称颂会司教“梅若拉可”的伪装。她精心策划了整场冲突，旨在向十一年前因洛伦兹与卢克罗的背叛而枉死的“阿伽门农小队”战友们（鬼火与她曾隶属的部队）复仇。在成功刺杀二人后，伊瑟尔德作为最终的敌人与（哲/铃）及奥波勒斯小队在秽黯灯塔之巅展开决战。最终，被击败的她放弃抵抗，在给了鬼火迟到的了结后，于奥菲斯的怀中消散，为这段燃烧十一年的恩怨画上了悲剧性的句点。事件结束后，空洞中的谜团非但没有解开，随边寺大师兄叶时远与称颂会新任司教莎拉的密会，更预示着新的风暴即将来临。"
