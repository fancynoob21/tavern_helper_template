章节标题: "星流霆击"
剧情概要: "法厄同收到狡兔屋老板妮可的消息，前往外环野火镇会见证人珀尔曼。珀尔曼指控视像公司案的幕后黑手是其秘书莎拉和即将晋升的治安局副司令贾斯汀·布林格。为了对抗这股强大的势力，妮可利用人脉请来了对空洞事务特别行动部第六课（简称“对空六课”）。然而，在六课准备带走珀尔曼和绳匠（哲/铃）进行调查时，一股不明身份的武装佣兵突然发动袭击。在卡吕冬之子的派派帮助下，狡兔屋和（哲/铃）等人乘坐卡车“大钢牙”惊险逃脱，但途中卡车被击翻，导致（哲/铃）和前来追击的六课课长星见雅一同坠入空洞。在空洞内，两人被迫暂时联手。期间，星见雅的诅咒佩刀“噬尾蛇”突然失控，散发出强大的狐火能量。（哲/铃）冒险协助雅将妖刀重新入鞘，并利用自己的专业知识对刀鞘的电子锁系统进行了临时修复。然而，由于空洞内高浓度以太的侵蚀，身体本就不适应的（哲/铃）陷入昏迷，最终被雅带出空洞。与此同时，珀尔曼在混乱中被佣兵掳走。回到录像店后，Fairy的系统又遭到了针对性的物理攻击而宕机，同时布林格的手下前来搜查，幸得刑侦特勤组的朱鸢与青衣及时赶到解围。在与各方势力汇合后，众人发现布林格的真正目标并非珀尔曼，而是星见雅和她手中的妖刀。布林格的同伙莎拉在押送雅的途中，利用“千面”获取的数据，强行解开了刀鞘的部分封印，诱使雅接触妖刀本体，导致雅陷入幻境并暴走。朱鸢和（哲/铃）果断将暴走的雅撞入附近的死路空洞，避免了对平民的伤害。在幻境中，雅凭借自身意志与刀中恶灵抗争并达成协议，最终脱离幻境。清醒后，众人兵分两路，朱鸢护送虚弱的雅就医，而（哲/铃）则与六课其余成员前往厄匹斯港空洞追击布林格。在港口，布林格注射了秘药P07，变身为强大的“牲鬼”，妄图消灭众人。在这危急关头，狡兔屋、维多利亚家政、白祇重工和卡吕冬之子等（哲/铃）结识的各大势力纷纷赶到支援。最终，赶回战场的星见雅，以一记斩破天际的刀光，彻底击败了牲鬼化的布林格。事件结束后，（哲/铃）向雅坦白了自己是“赫利俄斯机关”事件罪人卡萝尔·阿纳之学生的身份，雅非但没有追究，反而赠予发簪作为信物，承诺庇护并与他们共同追寻旧都陷落的真相。"
