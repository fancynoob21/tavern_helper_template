梅若拉可（Mevorakh）是稱頌會（Exaltists）現任的司教（Overseer）。她顯然擁有在被擊敗後從瘴氣（Miasma）中重塑自身的能力，並且能夠利用瘴氣吸收的記憶，創造出現有角色的靈體複製（Ethereal copies），並保留其戰鬥技巧和大致特徵。

第二季第一章

梅若拉可策劃了一項計畫：先在利曼尼亞空洞（Lemnian Hollow）引發瘴氣異常，隨後腐化菲露姆高地（Failume Heights）的居民，目的是為了讓雲魁峰（Yunkui Summit）回到衛非地半島（Waifei Peninsula），並與儀玄（Yixuan）直接對決。透過這種方式，他們成功地在瘴氣中獲取了她對仪绛（yijiang）——儀玄的姊妹及前任高階祭司（High Preceptor）——的記憶，並利用這些記憶創造出她的靈體複製。
