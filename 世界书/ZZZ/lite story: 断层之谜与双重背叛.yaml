章节标题: "断层之谜与双重背叛"
剧情概要: "独立绳匠（哲/铃）接受斯科特哨站的委托，协助防卫军黑曜石营的11号调查琵音大断层内运输机器人遇袭事件。调查初期，他们发现袭击者是失控的叛军机甲，并注意到队伍中一只名为'4412'的邦布举止异常。通过黑客芮恩的协助与深入调查，（哲/铃）一行人逐渐揭开了一桩尘封两年的真相：邦布4412的前主人，怀斯塔学会研究员埃洛温·米斯提克，实际上是叛军安插的间谍，代号亦为'4412'，任务是夺取第四研究所的机密。然而，在两年前的行动中，当一支强大的以骸共生体威胁到同行的学会研究员时，埃洛温选择了双重背叛——她违抗叛军命令，牺牲自己，利用叛军的爆破机甲与以骸同归于尽，拯救了所有人。真相大白的同时，新的危机也浮出水面：幸存的叛军机甲因长期侵蚀即将异化，并根据被篡改的最后指令引发波及整个断层的连锁大爆炸。为阻止灾难，（哲/铃）与11号率队深入断层，清除了所有失控机甲。最终，（哲/铃）在乱流回廊为埃洛温寻获了安息之地，并将她的遗物交予邦布4412，为其悲壮的故事画上句号。然而，第四研究所的宝库早已被身份不明的第三方势力搬空，只留下一张关于'始主'的神秘纸条，为这片混沌之地埋下了新的谜团。"
