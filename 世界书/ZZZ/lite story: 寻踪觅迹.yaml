章节标题: "寻踪觅迹"
剧情概要: "白星研究所的天才研究员蕾警员在深入零号空洞的危险区域“迷失之地”进行独立调查时突然失联。绳匠（哲/铃）作为蕾指定的唯一紧急联络人，被其同事查理紧急召至斯科特哨站。在与防卫军队长罗兰交谈后，（哲/铃）得知“迷失之地”周边的以骸正表现出前所未有的智慧与组织性，不仅伏击了防卫军的搜救队，甚至似乎懂得设下陷阱。由于防卫军主力被牵制，搜救蕾的重任便落到了（哲/铃）肩上。（哲/铃）深入空洞，在危机四伏的废墟中找到了被以骸用作诱饵的幸存士兵，并发现了一份蕾留下的加密影像。影像显示，蕾曾与空洞猎人星见雅一同调查过“迷失之地”，而星见雅在感知到类似“黑障”的波动后中止了任务。循着Fairy解析出的线索，（哲/铃）最终找到了蕾，并协助她挫败了一只名为“吉佩托”的强大“失控体”企图“降临”的阴谋。虽然成功阻止了危机，但“吉佩托”展现出的操控以骸的能力，以及蕾从白星研究所数据库中窃取到的零星情报，都预示着背后隐藏着更深的秘密。"
