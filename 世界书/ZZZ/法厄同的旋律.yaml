法厄同的旋律：法厄同狂热追随者创作的奇特驱动盘。古怪歌手以奇异声线重复诡异旋律，竭力传播"法厄同大人"传奇事迹。
暗示由薇薇安创作，歌词描述法厄同的邦布欧斯。
歌词：[
第一部分
"法厄同啊法厄同，
降临空洞。
法厄同啊法厄同，
空洞劫掠者的向导。
法厄同啊法厄同，
绳匠的传说！绳网的传说！新艾利都的传说！"

第二部分
"绿眼射出激光束，
呼一声整栋楼冒蒸汽。
黑白耳朵摇又摆，
听见空洞老鼠在移动。"

第三部分
"不服管的名以骸，
抬腿踢飞瓜脑壳。
泪眼女孩想回家，
她挥挥手，空洞门显现。"

第四部分
"抡起千斤重锤，
砸扁恶棍盔甲变煎饼，真壮观。
扛起导弹发射器，
送混混飞出空洞——不告别，请！"

第五部分
"法厄同大人！法厄同大人！
红围巾风中飘，传说再续！
谁敢违抗？谁敢违抗？
哪个以骸还不投降？"

第六部分
"法厄同啊法厄同，
新艾利都的统治者。
法厄同啊法厄同，
空洞劫掠者的救星。
法厄同啊法厄同，
忠诚绳匠，吾等听令！"
]
