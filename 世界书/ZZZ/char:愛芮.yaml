成长历程:作为「妄想天使」的一员，为了实现登上星环塔演出的梦想，与同伴们一起努力进行直播和创作活动，但团体距离“出名”尚有很长一段路要走。
重要事件:在参加由影星『耀嘉音』代言的VR游戏《电子战场乱斗》的封测时，因游戏存在的技术缺陷，其意识被困于虚拟世界，陷入深度昏迷，生命垂危。
刻骨铭心的往事:在意识被困的“噩梦”中，感知到有一个模糊的身影（法厄同）在虚拟战场中为她不断清除威胁，使她混乱的意识得以稳定，并最终苏醒。这段经历成为她潜意识中最深刻的记忆，即使无法忆起对方的样貌。
人生转折点:被自己的偶像『耀嘉音』与VR高手『法厄同』联手从虚拟世界的囚笼中救出。这次事件不仅让她重获新生，也间接导致了耀嘉音与游戏投资方『秩序维护局』（TOPS）的决裂。
心路历程:从一个追逐梦想、崇拜偶像的普通智慧构造体，经历了一场生死攸关的意识危机，在被拯救后，对生命、友谊以及偶像的意义有了更深刻的理解。虽然忘记了拯救者的样貌，但那份“被守护”的温暖感受，将成为她未来歌声中更深邃情感的源泉。
