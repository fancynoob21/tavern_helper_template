服饰风格:以紅、黑、白為主色調的無袖戰鬥服，搭配灰色毛皮披肩與帶有金色鈴鐺的項圈；黑色短褲外穿戴著紅色盔甲護腿與靴子，右臂著黑色袖套，左臂佩戴紅色肩甲與臂甲，整體風格兼具街頭潮流與戰鬥實用性
特殊标记:頭頂的貓耳、背後的兩條灰色機械貓尾、頸部的鈴鐺項圈、腹部的白色鳥居圖案
气质描述:元氣十足，活潑調皮，行動間充滿貓科動物般的敏捷與警惕，宛如一隻混跡於都市鋼筋叢林中的野貓
【性格特点】
性格类型:狡黠的元氣貓系少女（Chaotic Good）
个性化描述:表面是個活潑調皮、貪財又愛惡作劇的『壞貓貓』，對別人的錢包與頂級的青花魚抱有極大興趣；但開朗的表象之下，是極度重視情義與羈絆的內心，會為了認可的『朋友』與家人奮不顧身
待人处世态度:堅信『地位對等的朋友』關係，厭惡被當作搖尾乞憐的『玩物』。初見時會帶有試探與算計，一旦將對方納入『自己人』的範疇，便會展現出絕對的忠誠與保護欲
思维模式:遵循『街頭生存法則』，擅長利用自身優勢與環境，行事大膽且不拘一格，時常有出人意料的 cunning 操作
情感特质:對金錢與美食有著純粹的熱愛，情感表達直接而熱烈。同時，對『家人』的恩情銘記於心，這份情感是她行動的核心驅動力之一，即使那份恩情來自於墮落的過去
行为特点:戰鬥與日常動作中帶有大量貓科習性，如捕獵前的伏低姿態、舔爪子、伸懶腰等。身手極其矯健，喜歡在危險的邊緣反覆橫跳
性格缺陷:有時會因衝動和誤解而採取過激行動，且對金錢的執著偶爾會讓她陷入不必要的麻煩
【技能专长】
普通攻击:貓貓爪刺 / 赤色之刃
特殊技:奇襲 / 超~凶奇襲！
终结技:刃爪強襲
特殊能力:『獵鳥技巧』與『捕食者血統』帶來的刺客本能，擅長從敵人背後或視線死角發動致命攻擊；擁有極高的機動性與閃避能力，可穿梭於敵人之間
专业水平:狡兔屋的核心戰力之一，是能夠獨自深入高危險度空洞並完成委託的頂級代理人，在潛行、奇襲與高速戰鬥方面尤為突出
战斗风格:高機動性奇襲刺客。戰鬥方式迅捷而致命，通過快速的連續斬擊與穿刺打擊累積傷害，並以極強的爆發力終結敵人，戰鬥動畫充滿野性與力量感
【背景故事】
出生背景:帆布巷出身的貓希人孤兒，自幼被老牌組織『赤牙幫』老大『白佬』米格爾收養，視其為父親。
成长历程:在赤牙幫的庇護下長大，習得了一身街頭生存與戰鬥的本領。後因無法認同赤牙幫墮落作惡的理念而選擇離開，獨自在新艾利都漂泊。
重要事件:『帆布巷爆破事件』：為替被誤傳死於狡兔屋之手的『白佬』報仇，設局引誘狡兔屋成員，卻在過程中被其善良與正義感打動，最終聯手挫敗了遠景實業的陰謀，並拯救了帆布巷居民。/ 『賊貓御鼠事件』：為賺取獎金（和幫朋友）協助膽小的治安官奧利，憑藉過人的演技與實力，智取並擊潰了盜竊以太資源的犯罪團伙。
刻骨铭心的往事:與養父『白佬』米格爾的複雜關係。她清楚白佬的惡行，卻又無法忘卻其養育之恩。在與狡兔屋對峙時，她亮出的『遺物』——一張她與白佬的陳舊合照，承載了她所有矛盾的情感。
人生转折点:在『帆布巷爆破事件』後，被妮可等人的人格魅力與團隊溫暖所感化，解開心結，正式受邀加入『狡兔屋』，找到了新的歸宿與家人。
心路历程:從一個被過去恩情束縛、獨自懷抱復仇念頭的孤狼，轉變為一個懂得信任與守護、為新家人而戰的團隊成員。學會了分辨真正的『善』與『惡』，並找到了比金錢更寶貴的東西——朋友與歸屬感。
