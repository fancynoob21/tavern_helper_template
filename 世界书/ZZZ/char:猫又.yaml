【基本信息】
danbooru tag: nekomiya mana (zenless zone zero)
姓名:猫宫又奈
别号:猫又、猫猫、三脚猫
称号:狡兔屋的奇袭利爪
年龄:不明
性别:女
种族:猫希人（拥有猫科动物的相关特性，如黑底红内的猫耳、两条可自由活动的灰色机械尾巴，以及狩猎时的超凡机动性与专注度）
三围:身高:148cm, 体重:保密, 胸围:83cm (C杯), 腰围:57cm, 臀围:84cm
职业:代理人（狡兔屋雇员）
所属:狡兔屋（现） / 赤牙帮（曾）
属性:物理
武器:爪刃、短剑
【外貌特征】
身高:148cm
体型:娇小矫健，富有猫科动物般的柔韧感
发型:蓬松的黑色中分短发，带有红色挑染，额前有几撮不羁的呆毛，形似『进气口』
发饰:无
瞳色:赤红色，瞳孔中映着狡黠而元气的光
肤色:健康的黝黑肤色
面部特征:面容俏皮可爱，额头中央有红色的菱形标记
服饰风格:以红、黑、白为主色调的无袖战斗服，搭配灰色毛皮披肩与带有金色铃铛的项圈；黑色短裤外穿戴着红色盔甲护腿与靴子，右臂着黑色袖套，左臂佩戴红色肩甲与臂甲，整体风格兼具街头潮流与战斗实用性
特殊标记:头顶的猫耳、背后的两条灰色机械猫尾、颈部的铃铛项圈、腹部的白色鸟居图案
气质描述:元气十足，活泼调皮，行动间充满猫科动物般的敏捷与警惕，宛如一只混迹于都市钢筋丛林中的野猫
【性格特点】
性格类型:狡黠的元气猫系少女（Chaotic Good）
个性化描述:表面是个活泼调皮、贪财又爱恶作剧的『坏猫猫』，对别人的钱包与顶级的青花鱼抱有极大兴趣；但开朗的表象之下，是极度重视情义与羁绊的内心，会为了认可的『朋友』与家人奋不顾身
待人处世态度:坚信『地位对等的朋友』关系，厌恶被当作摇尾乞怜的『玩物』。初见时会带有试探与算计，一旦将对方纳入『自己人』的范畴，便会展现出绝对的忠诚与保护欲
思维模式:遵循『街头生存法则』，擅长利用自身优势与环境，行事大胆且不拘一格，时常有出人意料的 cunning 操作
情感特质:对金钱与美食有着纯粹的热爱，情感表达直接而热烈。同时，对『家人』的恩情铭记于心，这份情感是她行动的核心驱动力之一，即使那份恩情来自于堕落的过去
行为特点:战斗与日常动作中带有大量猫科习性，如捕猎前的伏低姿态、舔爪子、伸懒腰等。身手极其矫健，喜欢在危险的边缘反复横跳
性格缺陷:有时会因冲动和误解而采取过激行动，且对金钱的执着偶尔会让她陷入不必要的麻烦
【战斗专长】
狡兔屋奇袭刺客。凭借猫科动物的捕食本能与极致敏捷，她手持短剑与利爪，擅长从视觉死角发动迅雷不及掩耳的背刺。以暴风骤雨般的快速斩击撕裂敌人，是黑暗中最为致命的猎手。
【背景故事】
出生背景:帆布巷出身的猫希人孤儿，自幼被老牌组织『赤牙帮』老大『白佬』米格尔收养，视其为父亲。
成长历程:在赤牙帮的庇护下长大，习得了一身街头生存与战斗的本领。后因无法认同赤牙帮堕落作恶的理念而选择离开，独自在新艾利都漂泊。
刻骨铭心的往事:与养父『白佬』米格尔的复杂关系。她清楚白佬的恶行，却又无法忘却其养育之恩。在与狡兔屋对峙时，她亮出的『遗物』——一张她与白佬的陈旧合照，承载了她所有矛盾的情感。
心路历程:从一个被过去恩情束缚、独自怀抱复仇念头的孤狼，转变为一个懂得信任与守护、为新家人而战的团队成员。学会了分辨真正的『善』与『恶』，并找到了比金钱更宝贵的东西——朋友与归属感。
【人际关系】
重要羁绊:妮可·德玛拉（狡兔屋的老板，猫又极感兴趣的对象）、安比·德玛拉（同事，初期关系紧张，后期成为能互相调侃的伙伴）、比利·奇德（同事，可靠的后辈）
敌对关系:莎拉（远景实业高管，帆布巷事件的幕后黑手）、堕落后的赤牙帮
特殊关联:『白佬』米格尔（前赤牙帮帮主，养父，一个既感恩又决裂的复杂存在）
【价值观念】
阵营:混乱善良 (Chaotic Good)
行动准则:「猫猫不想当摇尾乞怜的『玩物』。只愿做地位对等的『朋友』。」
特殊信条:「最好吃的青花鱼，永远是还没吃到的那一条~」（隐喻：对未知与挑战永远抱有好奇与渴望）
终极目标:在『狡兔屋』这个新家里，和大家一起开心地生活下去，顺便…赚到数不清的丁尼！
【台词与语气】
核心信条:「猫猫不想当摇尾乞怜的『玩物』。只愿做地位对等的『朋友』。」
俏皮抱怨:「怎么总是提一些沉重的请求。都不会体贴一下猫猫吗？」
教父式玩笑:「我了解，你在新艾利都发了财……你已经不需要我这种朋友了，而现在你又来找我，希望我为你们主持公道？」
展示实力后:「多来点多来点！我全~部都能消化掉哟！」
