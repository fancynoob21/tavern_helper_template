章节标题: "闪耀的此刻"
剧情概要: "新艾利都的超级巨星『耀嘉音』宣布将举办名为“闪耀的此刻”的新年演唱会。主角『哲/铃』作为其忠实粉丝，在抢票失败后，意外接下一份来自耀嘉音本人的绳网委托，协助她在空洞中寻找已故传奇歌手『攸兰·缔文特』的终幕绝版唱片。在此过程中，他们结识了耀嘉音的经纪人兼保镖『伊芙琳』。随着调查深入，伊芙琳发现自己和耀嘉音被一家名为『赋格』的敌对公司跟踪，并在旧识黑客『芮恩』的帮助下，得知赋格不仅派人袭击，其所属公司『帝高』内部更潜藏着另一名内线。演唱会当日，危机四伏，攸兰的遗孀『泰莎·缔文特』作为特邀嘉宾现身，其态度冰冷诡谲。伊芙琳，代号『舍勒之青』，作为赋格安插的双面间谍，在对耀嘉音日久生情后，决心阻止阴谋，却被双方势力视为叛徒。最终，真正的幕后黑手泰莎夫人浮出水面，她因对亡夫之死的怨恨，策划了针对帝高、赋格和所有观众的无差别复仇，引爆了飞行中的『星环塔』。在星环坠落的绝境下，哲/铃在主控室稳定系统，伊芙琳在舞台下重启能源核心，而耀嘉音则用歌声的力量引发『共鸣』，连接了在场所有人的心灵，最终创造奇迹，使星环塔安全着陆，化解了这场巨大的危机。"
