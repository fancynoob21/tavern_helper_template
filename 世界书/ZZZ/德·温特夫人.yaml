泰莎·德·温特是音乐家约兰·德·温特的遗孀，其作品启发了流行偶像雅·星。约兰自杀后，悲痛的泰莎将死因归咎于争夺作品版权的欧迪姆与赋格工作室。盛怒之下，她不惜代价誓向"谋杀者"复仇。  
泰莎选择在星环塔破坏雅·星的"天文级瞬间"演唱会以报复两家公司。她深知雅是欧迪姆的重要资产，而赋格正试图挖角，遂利用公司矛盾诱使双方团队在演唱会当夜齐聚星环塔。趁欧迪姆与赋格互斗时，泰莎破坏了飞行中的星环塔推进器，意图制造坠毁事故杀死雅、两家公司员工及观众——她怨恨后者如此迅速地遗忘了约兰。  
泰莎的计划险遭成功，却被赋格特工伊芙琳·谢瓦利埃挫败。伊芙琳伪装成雅的经纪人兼保镖，察觉异样后突破双方警卫救出雅。二人于舞台重聚时，泰莎操控强力机器人现身袭击。击败机器人后，雅与法厄同协力校准推进器，阻止星环塔撞向新艾利都。  
星环塔安全着陆后，泰莎被新艾利都公共安全部逮捕。
