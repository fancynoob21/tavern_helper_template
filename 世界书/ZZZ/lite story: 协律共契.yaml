章节标题: "协律共契"
剧情概要: "为了寻找能与自己歌声完美共鸣的‘声敏以太物质’，以最大化‘协律核心’的效能，新艾利都的巨星耀嘉音委托绳匠‘法厄同’，并拉上经纪人伊芙琳一同进入空洞。当然，这其中也掺杂着她想翘掉公司乏味应酬、与伊芙琳独处的私心。在空洞深处，嘉音不仅将此地当成绝佳的练歌房，更惊人地发现，她的歌声似乎能与以骸产生某种神秘的共鸣，吸引它们聚集而来。在一次战斗后，她以一曲悲伤的安魂曲为引，成功捕获了最完美的声敏以太物质——那些被击溃的以骸所散逸的以太粒子，竟前所未有地闪烁着奇异的光芒。这次经历让嘉音产生了一个大胆的猜想：在那些骇人的躯壳之下，或许仍存留着能与生命共鸣的残响。当她向这片寂静的空洞与特殊的‘听众’致以最后的感谢时，沉默的以太仿佛也泛起了温柔的涟漪，作为无声的回应。"
