章节标题: "三契密约"
剧情概要: "随着卫非地骚乱的平息，旧都陷落的阴影似乎并未散去，反而催生了更为可怖的存在——『虚狩』。在深不可测的资本帝国TOPS内部，最高权力的象征『三契』——『铅杖』、『锡冠』与『铜戒』，于深夜紧急召开了一场决定新艾利都未来的秘密会议。面对『始主』从阴影中苏醒的预兆，以及零号空洞表面特异活性反应的警告，『三契』各怀鬼胎，提出了截然不同的应对策略。是追逐『新生』的残酷进化，还是打造『虚狩』偶像以操纵民意？亦或是将贪婪的目光投向那片远离纷争的理想之岛——罗斯凯利法？在AI系统『轮询』的冷酷裁决下，一场波及整个新艾利都，甚至牵扯到初代虚狩『挽昼』与『始主』的惊天阴谋，正悄然拉开帷幕。"
