【relationships】
般岳:nature:追尋的目標、裁決對象、同事, description:琉音長期追尋的代號『肅滅單元·零型』。她揭示了般岳被算法掩蓋的過去，對其下達了『活下去贖罪』的最終裁決，是改變般岳命運、助其尋回『心』的關鍵人物，並最終將其引薦為同事。
照:nature:同事、情報提供者、監工, description:坎卜斯黑枝的同事。為琉音提供了關於般岳下落的關鍵線索，並在多次行動中進行情報交換與互相『監工』，是琉音信賴的伙伴。
法厄同 (哲/铃):nature:臨時盟友、好奇的觀察對象, description:在多次事件中並肩作戰的可靠繩匠。琉音欣賞其能力，同時也樂於用她獨特的毒舌風格進行調侃。法厄同是極少數窺見過她『詛咒』能力背後掙扎的人，這讓他們之間的關係不止於單純的合作。
寧謙:nature:裁決的見證者、被拯救者, description:般岳的弟子。琉音的『最終裁決』不僅拯救了般岳，也讓寧謙聽聞了姐姐的遺言，從復仇的執念中解脫。琉音的行動是他們師徒二人能冰釋前嫌的直接原因。
阿芳姨:nature:養母、背叛者, description:收養了年幼琉音的老婦人。然而在面臨災難時，正是她最先提議將被視為『不詳』的琉音獻祭給空洞。這份來自最信任之人的背叛，是琉音童年最深刻的創傷。