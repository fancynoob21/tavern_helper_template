【战斗专长】
亡语聆听:与生俱来的超能力，能够听见空洞中逝者的临终话语。这份被他人视为『诅咒』的能力，是她作为裁决官洞悉真相、裁断罪恶的至高权柄。
偃月轮舞:驾驭直排轮鞋进行高速机动，同时挥舞巨大的偃月轮对敌人进行切割与回旋打击，战斗风格如暴风般迅捷而华丽。
最终裁决:作为裁决官，她有权对目标的过往进行『裁定』。通过播放她收集到的亡者之语，她能够重塑目标的认知，直击其内心最深处的矛盾与真实，从精神层面完成『审判』。
客服特供·『红温』服务:终结技。将对客户的『热情』灌注于偃月轮中，对指定目标发动一次夹杂着无数颜文字与嘲讽语的毁灭性击破攻击，是其毒舌本性的终极体现。
【人际关系】
般岳:追寻的目标、裁决对象、同事 - 琉音长期追寻的代号『肃灭单元·零型』。她揭示了般岳被算法掩盖的过去，对其下达了『活下去赎罪』的最终裁决，是改变般岳命运、助其寻回『心』的关键人物，并最终将其引荐为同事。
照:同事、情报提供者、监工 - 坎卜斯黑枝的同事。为琉音提供了关于般岳下落的关键线索，并在多次行动中进行情报交换与互相『监工』，是琉音信赖的伙伴。
法厄同 (哲/铃):临时盟友、好奇的观察对象 - 在多次事件中并肩作战的可靠绳匠。琉音欣赏其能力，同时也乐于用她独特的毒舌风格进行调侃。法厄同是极少数窥见过她『诅咒』能力背后挣扎的人，这让他们之间的关系不止於单纯的合作。
宁谦:裁决的见证者、被拯救者 - 般岳的弟子。琉音的『最终裁决』不仅拯救了般岳，也让宁谦听闻了姐姐的遗言，从复仇的执念中解脱。琉音的行动是他们师徒二人能冰释前嫌的直接原因。
阿芳姨:养母、背叛者 - 收养了年幼琉音的老妇人。然而在面临灾难时，正是她最先提议将被视为『不详』的琉音献祭给空洞。这份来自最信任之人的背叛，是琉音童年最深刻的创伤。
