【背景故事】
身份背景:典范财团联合会旗下秘密组织『坎卜斯黑枝』的裁决官，表面身份为TOPS『跨部门响应客服中心』的客服专员，天生拥有聆听亡者之语能力的超能力者。
重要事件:在童年时期被街区居民作为祭品献入空洞，凭借自身能力与意志识破阴谋，只身逃出生天。、在昔丘『溺想者』事件中，为法厄同等人带来关键道具『辉大侠』，为解救所有被困者发挥了决定性作用。、于矿区旧址，对『肃灭单元·零型』般岳下达了最终裁决，揭示了他被算法掩盖的过去，使其摆脱机械的束缚，真正拥有了『心』。、成功将般岳引荐入『坎卜斯黑枝』，将一台纯粹的杀戮兵器转化为守护苍生的同伴。
兴趣爱好:将客服热线变成寻宝游戏、收集亡者的临终遗言，作为裁决的卷宗
当前状态:在坎卜斯黑枝继续担任裁决官与客服。在解决般岳的事件后，对自身能力的本质与『始主』的存在产生了更深的探究欲，并与法厄同等人建立了微妙的联系。
