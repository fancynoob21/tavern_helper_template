专业水平:新艾利都顶尖的犯罪行为学专家与潜入、伪装大师。
战斗风格:高速游击型刺客。战斗方式如同一场危险的冰上舞蹈，利用极其灵巧的身法与融合了花样滑冰技巧的腿技、爪刀进行快速而致命的攻击，擅长闪避反击与快速叠加异常状态。
核心机制:围绕'狂热心流'的积累与消耗进行战斗。通过灵活操作在普通状态下积攒心流，进入'狂热'状态后进行爆发性输出，随后在心流耗尽前最大化伤害。
【背景故事】
出生背景:鼠希人，真实姓名与过去皆被隐藏，『简·杜』是其在治安局行动时使用的通用代号。作为直属治安局高层的王牌卧底，以犯罪行为学专家的身份协助刑侦特勤组。
成长历程:个人履历成谜，但从其能无缝融入任何环境并对三教九流了若指掌的技能来看，推测其有着极其丰富且复杂的过往经历，在阴影与谎言中磨砺出了如今的生存之道。
重要事件:【卧底蓝调】
: 成功卧底暴力团伙『山狮』，期间与不知情的刑侦特勤组同事赛斯·洛威尔发生了一系列复杂的互动。最终引导事态发展，并与赛斯联手击败首领瑞扎，从内部瓦解了整个组织。【星流霆击】
: 作为关键线人，设计引诱腐败的前总管治安官布林格进入陷阱，协助刑侦特勤组将其逮捕。
刻骨铭心的往事:在『山狮』任务中，面对将自己视为罪犯并拼命试图“劝善”的赛斯，她不得不在维持卧底身份与保护这位愣头青同事之间周旋。这段被迫“绑架”与“合作”的经历，是其充满伪装的人生中一次罕见的、啼笑皆非的真实互动。
人生转折点:成为治安局刑侦特勤组的“影子成员”，接受了游走于光明与黑暗之间的特殊身份，这彻底定义了她作为“无名氏”的存在方式。
心路历程:从一个身份不明的独行者，到成为秩序之下最锋利的暗刃。她曾视谎言与任务为全部，但在与刑侦特勤组的合作中，内心似乎也开始思考伪装之外的意义。她依然是那个致命的欺诈师，但不再是孤身一人。
