时序原野家族以兔族泰伦为主，多为以太科技领域的著名学者，相关教育自幼开始。该家族亦以刚正不阿闻名。
历史：
前任家主莱昂内尔·时序原野在莱姆尼安空洞参观瓷珀工厂时，为女儿爱丽丝寻找发夹期间，意外发现对方正对活体少女（ES-07）进行非法实验以提取腐蚀抗体血液。他救出少女却遭瓷珀灭口，伪造车祸现场并焚毁遗体，使爱丽丝长期深陷自责。莱昂内尔去世后，爱丽丝母亲相继离世，使其成为孤儿。祖父重掌家族权柄，因认为她缺乏独立性而拒绝授予专利，后病倒。
经升华派事件后，瓷珀代表达米安·布莱克伍德以"提供劣质抗腐蚀药物"为要挟，强迫爱丽丝借助家族声誉加入视察团队。在与升华派及瓷珀打手对峙时，柚叶带领爱丽丝从密道撤离，但ES-07选择留下并以自身交换瓷珀停止追捕爱丽丝，揭示其真实身份。爱丽丝返回绯珑高地寻求主角（法厄同）帮助。法厄同借助达米安启动前往莱姆尼安空洞的缆车；爱丽丝以免费转让抗腐蚀专利为条件与瓷珀谈判。
在全城揭露瓷珀CEO费罗克斯与升华派的勾结后，爱丽丝作为家族继承人公开发布专利（使瓷珀同样受益，间接履行对达米安的承诺）。祖父随后赞扬其成长，认可她已具备独立决策能力。
