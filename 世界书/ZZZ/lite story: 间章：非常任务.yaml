章节标题: "间章：非常任务"
剧情概要: "白祇重工与传奇绳匠“法厄同”在一次空洞探索中遭遇了未知的复合侵蚀体。事后，治安局刑侦特勤组的朱鸢与青衣奉命回收该侵蚀体的残骸。与此同时，主角（哲/铃）因驾驶执照到期，于光映广场险些被失控车辆撞击，幸得朱鸢和青衣及时相救。为了报答，（哲/铃）决定协助她们在六分街推广安全知识讲座。推广过程并不顺利，但突发的一系列由EMP引发的车辆骚乱事件，让朱鸢与青衣在“法厄同”的暗中协助下抓获了罪犯，赢得了街坊的尊敬。讲座当天，二人从罪犯口中得知其背后组织将袭击证物运输车。面对危机，朱鸢放弃个人前途，毅然与青衣一同追击。目睹一切的（哲/铃），在二人陷入重围的危急关头，不惜暴露“法厄同”的身份介入，与她们组成临时同盟，最终成功追回证物，并揭开了侵蚀体背后牵涉人体实验的巨大阴谋的一角。"
