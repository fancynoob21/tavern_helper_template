【背景故事】
出生背景:本名芙罗拉。十一年前“旧都陷落”之际，在零号空洞的废墟中被军用智慧构造体「席德」发现。因其在空洞中生存半月却未受侵蚀，被系统判定为“高危目标”，真实身份成谜。
成长历程:被构造体「席德」（后更名为‘老席德’）违抗命令收养，并由他亲自教导何为“生命”。在‘老席德’逻辑核心受损陷入沉睡后，芙罗拉继承了「席德」的代号，驾驶着他的躯体，为履行“帮助他人”的约定加入了防卫军奥波勒斯小队。
重要事件:在代理人秘闻“花之谷的芙罗拉”中，因目睹死者复生而执着于复活‘老席德’。在军医维勒妮卡的引导与刺激下，得知了‘老席德’为保护自己而牺牲的真相，情绪崩溃暴走，最终被法厄同唤醒。此事件是她情感觉醒的催化剂。
刻骨铭心的往事:在与‘老席德’初遇时，‘老席德’的系统进入歼灭模式欲将其抹杀。为了拯救她，‘老席德’遵从了自我“意志”，强行拔出自身的自警系统，此举虽挽救了芙罗拉，却也对其逻辑核心造成不可逆的损伤，成为其最终“死亡”的根源。
人生转折点:在‘老席德’遗言指引的“约定之地”，一片由他亲手撒种而成的花田中，芙罗拉聆听了其最后的留言，真正理解了“生命是一个圆”的理论，接受了挚爱的离去。在泪水中，她收获了一颗新生的“心”，完成了从“怪物”到“人”的蜕变。
心路历程:从一个对生命与情感毫无概念、依赖着“父亲”外壳的空洞人偶，在经历了追寻、失去、崩溃与释然后，成长为能够独立面对世界，理解爱与悲伤，并决心继承逝者意志、守护同伴的真正战士。她的旅程，是一场在废墟中种下种子，并最终让心中之花绽放的史诗。
【人际关系】
重要羁绊:「老席德」：养父、监护人、导师、座驾以及世界的全部。他是芙罗拉的拯救者与启蒙者，其存在本身和留下的“约定”，是芙罗拉一切行动的基石与最终归宿。
奥波勒斯小队战友:队长「鬼火」：对席德的奇特行为头痛不已，但仍对其高度信任的可靠领导。、「11号」：外冷内热的队友，曾模仿「老席德」的语气发短信安抚她，默默守护着她。、「扳机」：最让其头疼的队友，但会在席德失眠时为其吹奏《归乡》助其入眠。、奥菲丝：一同并肩作战的战友。
特殊关联:法厄同/绳匠：被席德认为是“同类”的特殊存在，是她少数愿意主动交流并展现依赖的“陌生人”，在其暴走时成功将其唤醒。、维勒妮卡：当年的军医。见证了席德与‘老席德’的过往，从最初的失望与不解，到最终认可并交付‘老席德’遗物的关键人物，是推动席德成长的“恶人”与引路者。
战斗中的宿敌:伊瑟尔德（梅若拉可）：在澄辉坪事件中对峙的称颂会司教，其复活死者的能力直接刺激了席德复活‘老席德’的执念。
