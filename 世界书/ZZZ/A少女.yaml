A少女是《士兵0号——安比特工故事：银之回响》中小枝制造的克隆体。她与其他银牙单位外貌相同，但佩戴黑色面具。  
【档案】  
虽被小枝视为不会说话的蠢笨缺陷品，A少女实为聪慧仁爱的存在。她感激小枝的创造之恩，并竭力保护其他克隆体。  
【历史】  
A少女是小枝重建银牙小队时制造的克隆体，其命名暗示她可能是首个成功克隆体。她协助小枝执行计划：为小枝处理伤口，在安比潜入实验室时发出警告。她试图劝阻小枝绕过中间人直接联系客户，但未能成功。  
当安比拒绝协助重建银牙小队时，小枝开始注射客户血清。A少女夺过注射器将另一半血清注入自身，以绝望之举保护小枝与其他克隆体。小枝斥责其鲁莽行为时，A少女首次开口：她表达了对创造者的感激，以及永不令其孤独的愿望。血清作用下，二人化为虚影帕里库斯，最终被0号士兵安比与11号士兵击败。
