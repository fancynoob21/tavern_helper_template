章节标题: "连携调查：神之迷宫"
剧情概要: "一封来自怀斯塔学会的紧急联合调查委托，将（法厄同）与新艾利都的各路精英汇集于HAND总部。目标是被称为“神之迷宫”的帕佩戈空洞，以及一位携带着关于“始主”的机密资料、失踪于其中的研究员——佩妮。调查伊始，迷宫便展现出其诡异的本质：它能提取进入者的记忆，创造出截然不同的幻象世界。月城柳的雷暴港口、卡吕冬之子成员柏妮思的烈焰外环、坎卜斯裁决官照的秽晶领域……一个又一个看似毫无关联的幻象空间接连出现，令调查一度陷入僵局，所有人都被困在了由他人记忆编织的牢笼之中。

在调查陷入绝境之时，（法厄同）从照无心的一句“水往低处流”中获得灵感，提出了一个大胆的假设：无论幻象如何变化，被迷宫吸收的以太能量终将汇于一处。通过追踪能量流向，众人终于锁定了迷宫的核心——一个将精神力量转化为致幻以太的“处理工厂”。在工厂深处，他们不仅找到了事件的始作俑者佩妮，更与其最深的执念——巨大的操偶师以骸“杰佩托”展开决战。

战斗结束后，被捕的佩妮坦白了令人震惊的真相：她并非主谋，而仅仅是一个“诱饵”，其任务就是利用“始主”的资料，将强大的代理人们引入这个巨大的能量榨取工厂，为某个更庞大的计划“献祭”。就在众人以为事件告一段落时，从现场回收的一枚神秘黑色石块中，（法厄同）竟看到了一个既熟悉又陌生的身影——新艾利都传说中的初代绳匠，“乔伊”。他留下的讯息，宣告着这场神之迷宫的调查，仅仅是一个更大阴谋的开始。"
