【背景故事】
出生背景:从小拥有极强的以太适性体质，常被称为「天才」，在学校毕业后以格外优秀的成绩进入对空部。原本隶属于对空部某王牌部门，后因各种原因，加入了雅的团队。
刻骨铭心的往事:患有一种罕见疾病「以太适性衰竭综合征」。该疾病会导致患者身体某些部位产生病变，体质变差，但也能让他们拥有比常人更强大的以太适性。在病症到达晚期后，患者的身体会迅速衰竭，在剧烈的疼痛下失去一切以太适性和感官能力，最终死亡。若患者晚期发病时身处空洞内，则会迅速被侵蚀变为以骸。以太适性衰竭综合征的患者通常寿命较短，现有案例中寿命最长的患者在26岁那年去世。目前尚未存在完全治愈该疾病的方法。
心路历程:经常以身体不适为理由申请病假，没有人知道他用这些假期到底做了什么，但多半不是在休息。
