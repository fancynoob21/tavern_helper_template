章节标题: "「嗯呢」大寻宝"
剧情概要: "为了帮助一只在搬家途中与主人失散、记忆受损的邦布“半年漂”，绳匠哲/铃与维多利亚家政的艾莲·乔一同踏上了一场横跨新艾利都的“秘宝”收集之旅。根据一张颇具噱头的广告，只要集齐九个传说中的“秘宝”，就能在光映广场的“三街工作室”实现一个愿望。这场寻宝过程充满了意想不到的波折与笑料：他们时而要与把秘宝当作玩具的小猫小狗斗智斗勇，时而要和扮演“魔王守卫”的小孩子们玩猜拳游戏，甚至还遇到了一只渴望“黄金电池”的邦布竞争者。在集齐所有蔬菜造型的秘宝邦布后，众人满怀期待地找到工作室店长壹许愿，却被告知因信息不足，寻人委托失败。就在半年漂陷入绝望之际，艾莲在朋友露比的启发下，想到了利用之前在绳网上意外走红的半年漂照片来扩大寻人范围。新的帖子和合影迅速发酵，奇迹般地联系上了半年漂那位冒失又真诚的主人——迈德休。在经历了又一番啼笑皆非的波折后，半年漂终于与主人重逢。事件的最后，一个一直暗中观察的神秘小女孩现身，承认是她为了测试半年漂寻主的决心并出于喜爱，才布置了这一系列的“寻宝线索”与“试炼”。"
