【性格特点】
性格类型:偽裝型享樂主義者 (Cynical Hedonist)
个性化描述:表面玩世不恭，將「高效摸魚」奉為圭臬，實則心思縝密，是個洞察力敏銳的天才。以輕浮的言行作為保護色，掩蓋身患絕症的痛苦與對生存的極度渴望
待人处世态度:對同事插科打諢，對上司（月城柳）憊懶狡猾，熱衷於裝病請假。但在關鍵時刻極為可靠，對認可之人（如賽斯）會不經意地流露關懷與肯定
思维模式:極端務實，信奉以最小成本達成目的。習慣通過不斷調侃自身的病情與悲慘經歷來進行自我脫敏，以此維持精神的穩定
情感特质:情感極為內斂，將真實的脆弱與痛苦深埋心底。對師父的感情是極其複雜的愛恨交織，既感激其養育與教導，又憎恨其冷酷的利用
行为特点:頻繁請病假、總是在喝成分不明的苦味液體、喜歡貓卻因身上的藥味而不受貓親近
性格缺陷:迴避型人格，拒絕向他人展露真實的內心與脆弱，傾向於獨自承擔所有重負，直至身體或精神的極限
【技能专长】
核心机制:「標記-觸發」式高機動戰鬥。通過遠程射擊在敵人身上施加[電囚]效果並生成[十文字]標記，隨後進入[醒覺]狀態，解鎖高速突進斬擊能力，在遠程牽制與近戰爆發間靈活切換
特殊技:天羅：向前方射出蘊含電能的箭矢，進行遠程打擊
强化特殊技:地網：射出飛刃與強化箭矢，造成大範圍電屬性傷害，並快速生成[電壺]
终结技:殘心：凝聚全部力量，發動毀滅性的強力穿透攻擊，對直線上的敵人造成巨量電屬性傷害
特殊能力:甲乙矢：通過[落羽]命中敵人時，激活場上的[電壺]發射自動追蹤的電屬性箭矢、飛弦·斬：在[醒覺]狀態下，能夠瞬移至帶有[十文字]標記的敵人身前，發動迅如雷光的連續斬擊
专业水平:前對空部王牌部門成員，現對空六課核心執行官，擁有超凡的戰鬥直覺與極高的以太適性，被公認為「天才」級代理人
战斗风格:遠近結合的混合型強攻手。既能作為弓手在遠距離進行精準打擊與疊加標記，也能在觸發[醒覺]狀態後化身為刺客，發動致命的近身奇襲
【背景故事】
出生背景:天生患有罕見絕症「以太適性衰竭症候群」。幼年時被父母送往醫院後遭遺棄，被一位神秘的科學家兼武術家（師父）收養
成长历程:在師父的撫養下長大，被傳授了精湛的弓術與刀法。然而，師父也將他當作活體實驗材料，定期抽取其脊髓液，用於研究增強以太適性的藥物。這段經歷讓他的童年充滿了關懷與痛苦的矛盾
重要事件:合併進入六課：在阿苟思空洞事件中，與星見雅、月城柳共同作戰後，受邀加入新成立的對空六課、虛擬殺機事件：在VR測試中被困，數據被收集後一度被變為『悠真邦布』形態，留下了心理陰影、此地長眠者事件：為追查師父的下落與藥物的真相，與師兄霧島對峙，最終發現師父已異化為以骸「色雷斯人」並親手了結。在絕境中將師父留下的、可能是特效藥的藥劑注入自己體內，奇蹟般地從病危中甦醒
刻骨铭心的往事:被師父利用作人體實驗的全部經歷。師父最後的訣別，將黃色髮帶交給他，以及發現師父後期研究方向已從強化藥轉向治療他疾病的特效藥，這份遲來的溫情讓他徹底陷入愛與恨的漩渦
人生转折点:親手了結已化為以骸的師父，並將其遺留的未知藥劑注入體內。這次九死一生的經歷讓他直面了過去所有的痛苦，並最終選擇接受這份複雜的羈絆，決心要「活下去」
心路历程:從一個被動承受命運的病弱實驗體，到用「摸魚」哲學消極對抗世界的叛逆少年，再到主動追尋真相、直面宿命的戰士。最終，他選擇接納所有的苦難與溫暖，背負著複雜的過去，堅定地走向未知的未來
【人际关系】
核心羈絆:師父:（姓名不詳）收養者、武藝導師，同時也是將其用作實驗的加害者。是悠真愛恨交織的根源，對他影響最深的人
所屬團體：對空六課:星見雅:課長，對悠真的能力高度信任，也對其摸魚行為頗為縱容, 月城柳:副課長、同期。經常為悠真的請假與憊懶而頭痛，但實則非常關心他的身體狀況，是可靠的夥伴, 蒼角:同事。性格單純，經常被悠真捉弄，但兩人關係良好
師門相關:霧島:名義上的師兄，實為師父的科研助理。為了奪取研究成果不擇手段，是悠真個人線中的主要反派
其他重要人物:賽斯·洛威爾:同校的後輩，非常尊敬悠真，稱其為「淺羽前輩」。悠真對其正直的品格表示讚賞, 繩匠（玩家）:少數能讓悠真吐露心聲的傾訴對象，也是他追查真相過程中的重要協助者, 萊特:曾受悠真委託調查其師父下落的代理人
【价值观念】
阵营:混亂善良 (Chaotic Good)
行動原則:「以最小的成本達到任務及格標準。」在不違反底線的前提下，永遠選擇最省力、最高效的解決方案
特殊信条:「既然苦難和幸福可以共存，那愛與恨也一樣吧？」他選擇接受命運施加的所有好與壞，並將其化為活下去的動力
终极目标:「活著。」——這是他一切行動的根本驅動力。同時，追查並肅清當年將他與師父捲入非人道實驗的幕後黑手
【自己的台词语气】
日常摸魚:「很高興認識你，除非你是來叫我加班的。」「咳咳，感覺我的病情加劇了…副課長，真的不給我張病假條嗎？」
戲謔自嘲:「放心，暫時死不了。我可是要遺臭…啊不，遺千年的。」
關鍵時刻的獨白:「陰謀與利用是真的，但那些關懷與照顧同樣是真的，既然苦難和幸福可以共存，那愛與恨也一樣吧？」
卸下偽裝的真心:「我想要假期，要自由，要每天都開開心心——」「……騙你的。我想活著。」
面對宿命的決意:「師父曾教過我很多事。如何拉弓，如何用刀，如何…在這個世界裡倖存下來……後來啊…他也離開我了。」