章节标题: "小小骑士大冲锋"
剧情概要: "某日，录像店店长哲/铃在自家店门口发现了一只沉浸在骑士小说幻想中的邦布「奇桀」。为了阻止它“攻打邪恶巫师的城堡”（即录像店），哲/铃被迫扮演起它的“侍从”，陪同它完成所谓的“十大试炼”，以赢取与虚构的“艾莲娜公主”成婚的资格。这场荒诞的冒险就此展开，奇桀将新艾利都的日常景象一一解读为骑士小说中的经典桥段：它把地铁视为吞噬村民的巨龙“卡斯托拉”，将光映广场的雕像当成伺机掳走公主的巨人，把充电站的邦布们认作被无情领主送上“刑场”的农民，甚至在厄庇斯港的码头上，为了从“海神”手中“夺回祭品”（一只在水里打瞌睡的邦布）而奋不顾身……哲/铃一路跟随，扮演着吐槽与善后的角色，通过拍照、修理电路、甚至陪它一起假扮海鸥等方式，啼笑皆非地协助奇桀完成了所有“试炼”。最终，在“十大试炼”完成，等待公主降临的约定之桥上，奇桀真正的“主人”——小女孩蕾切尔终于找到了它。原来，正是蕾切尔将这些骑士小说灌输给了奇桀。在一番吵闹后，蕾切尔与奇桀决定重新开始他们的冒险，而哲/铃则被这位小骑士册封为“见习骑士”，结束了这场奇妙又头疼的旅程。"
