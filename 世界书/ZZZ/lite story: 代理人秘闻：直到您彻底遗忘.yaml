章节标题: "代理人秘闻：直到您彻底遗忘"
剧情概要: "维多利亚居家服务的王牌员工丽娜，为了参加新艾利都家政协会的年度最佳服务考核，接下了一项特殊的任务——为一位名叫蕾莎·克里斯蒂的老婆婆服务。蕾莎婆婆的愿望是寻找一个『咧嘴傻笑的团子』。丽娜带着她在六分街四处寻访无果，最终只能向经营影像店『Random Play』的法厄同兄妹求助。然而，蕾莎的要求却接连变成了『吵闹的团子』和『流口水的团子』。在众人被这看似无理取闹的要求弄得筋疲力尽时，蕾莎又说出了『浪花团子』。Fairy通过网络检索发现，蕾莎正是41年前『最美都市小姐』选美大赛的选手，却在决赛前夕神秘弃赛，将冠军奖杯『浪花之环』拱手让人。当丽娜拿到纪念品奖杯，准备解开谜团时，却发现蕾莎的记忆出现了断层，并因电影中的空洞画面而情绪失控，最终失踪。通过调查，丽娜发现蕾莎患有『侵蚀认知后遗症』，记忆回退到了41年前白浪医院遭遇空洞灾害的那一天。她口中的『团子』，正是当年被她从灾难中救出的新生婴儿们。最终，丽娜和法厄同在空洞中找到了陷入崩溃的蕾莎。在以骸来袭的危急关头，丽娜向蕾莎揭示了真相——她守护的团子们早已长大成人。蕾莎在心愿了结后平静下来，但也彻底遗忘了关于『团子』和丽娜的一切。事后，丽娜联系了那些被救的孩子，为蕾莎安排了妥善的照顾，而那场错误的考核也成为了拯救一位英雄的契机。"
