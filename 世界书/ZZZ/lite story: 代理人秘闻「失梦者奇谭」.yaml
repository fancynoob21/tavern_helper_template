章节标题: "代理人秘闻「失梦者奇谭」"
剧情概要: "代理人卢西娅邀请（哲/铃）一同前往空洞，以照顾她新结识的“小狗”——一只名为“刺梨”的幼年哈提。在空洞中，他们遭遇了一系列围绕“守夜人”部族的诡异事件：部族族长离奇梦游、部族成员奇兰遇险、以骸的异常亢奋。随着调查深入，矛头指向一名行为可疑的调查员。然而，当他们最终在空洞深处找到真相时，却发现真正的幕后黑手竟是看似无辜的族人奇兰。他不满于“守夜人”备受歧视的处境，与神秘组织勾结，试图利用卢西娅的手杖和“刺梨”来研究控制以骸的方法。在最终对决中，卢西娅的意志与空洞产生共鸣，奇迹般地召唤出真正的以骸击败了敌人。但为了保护“刺梨”不被觊觎，卢西娅被迫与它忍痛告别，让它回归空洞的最深处。"
