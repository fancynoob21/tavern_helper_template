服饰风格:融合道士、武术家与现代工装的混搭风格。身穿一件印有云纹的黄色紧身背心，搭配宽松的黑色工装裤。腰间系着一条挂有随身听和工具包的多功能腰带，胸前斜挂一条黑色背带。
