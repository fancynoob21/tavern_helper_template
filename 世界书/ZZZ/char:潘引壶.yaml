【背景故事】
出生背景:作為新艾利都數量稀少的熊貓希人，自幼無親無故，孤身一人在都市中流浪。
成长历程:為了生存，他做過各種零工，過著食不果腹的日子，這段經歷讓他深刻體會到食物的珍貴。後來，憑藉不錯的以太適性成為了一名「盜洞客」，在空洞中搜刮財物維生，也因此養成了好勇鬥狠的暴戾性子。
重要事件:在一次空洞探索中，他誤將前來問路的雲巋山之主「儀玄」當作搶奪寶物的敵人並發起攻擊，結果被對方輕鬆制服。儀玄點出他因長期接觸以太而心魔漸生，並教給他修心養性的法門。
刻骨铭心的往事:在與儀玄的戰鬥中因體力透支而餓暈過去。醒來後，他已被儀玄帶出空洞。這次慘敗讓他認識到力量與心性的差距，成為其人生的重要警示。
人生转折点:當聽說拜入雲巋山門下「管三餐」後，為了不再挨餓而毫不猶豫地選擇了拜師。然而上山後才發現所謂的「管三餐」僅是有餐補，且山上無人擅長廚藝，這迫使他從零開始苦修廚藝，最終意外地成為了一代料理達人。
心路历程:從一個性情暴戾、為求溫飽不擇手段的街頭盜洞客，轉變為一位修心養性、廚武合一、視守護同門為己任的雲巋山中流砥柱。
