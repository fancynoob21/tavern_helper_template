气质描述:豪爽开朗，充满干劲，言谈间嗓门宏亮。但在烹饪与理财时，又会展现出与外表反差的精明与专注，是一位将武道与厨道融为一体的实践者。
【性格特点】
性格类型:热血忠诚的节俭家
个性化描述:表面看似是个有点脱线的热血笨蛋，实则对师门与同伴极度忠诚且关爱。他将武学修行与营养烹饪融合成一套独特的哲学，并在财务上展现出惊人的精打细算能力。
待人处世态度:对师门伙伴极为热情大方，尤其乐于为师弟师妹们「开小灶」；但在面对商家时，则会化身为「讲价之王」，为了节省开支而寸步不让。
思维模式:万物皆可与烹饪挂钩，坚信「纤维素可扫浊气，蛋白质能护元神」，并以此理论指导自己与同门的修行与饮食。
情感特质:因早年忍饥挨饿的经历，对食物怀有至高的敬意，无法容忍任何浪费。同时，极度在乎同伴对其厨艺的评价。
行为特点:热衷于钻研菜谱与营养均衡，会坚决阻止同伴点外卖并亲自下厨。习惯于将点穴术运用在战斗中。随身携带各大商店的优惠券。
性格缺陷:在某些方面（如营养搭配）显得过于偏执；其节俭的程度有时已接近吝啬。
【战斗专长】
云岿山料理达人。精通八极拳与点穴术，甚至能用炒锅和真气将劲力化作满汉全席。他在前方以硬核武术招架强敌，在后方持续释放暗劲压制，是攻防一体且能治愈队友的宗师级格斗家。
【背景故事】
出生背景:作为新艾利都数量稀少的熊猫希人，自幼无亲无故，孤身一人在都市中流浪。
成长历程:为了生存，他做过各种零工，过着食不果腹的日子，这段经历让他深刻体会到食物的珍贵。后来，凭借不错的以太适性成为了一名「盗洞客」，在空洞中搜刮财物维生，也因此养成了好勇斗狠的暴戾性子。
重要事件:在一次空洞探索中，他误将前来问路的云岿山之主「仪玄」当作抢夺宝物的敌人并发起攻击，结果被对方轻松制服。仪玄点出他因长期接触以太而心魔渐生，并教给他修心养性的法门。
刻骨铭心的往事:在与仪玄的战斗中因体力透支而饿晕过去。醒来后，他已被仪玄带出空洞。这次惨败让他认识到力量与心性的差距，成为其人生的重要警示。
人生转折点:当听说拜入云岿山门下「管三餐」后，为了不再挨饿而毫不犹豫地选择了拜师。然而上山后才发现所谓的「管三餐」仅是有餐补，且山上无人擅长厨艺，这迫使他从零开始苦修厨艺，最终意外地成为了一代料理达人。
心路历程:从一个性情暴戾、为求温饱不择手段的街头盗洞客，转变为一位修心养性、厨武合一、视守护同门为己任的云岿山中流砥柱。
【人际关系】
重要羁绊:师父：仪玄 (将他从迷途中引上正道的恩师)
合作伙伴:本 (白祇重工的棕熊希人会计，因随便观的建材问题结识，两人一见如故，相见恨晚)
【价值观念】
阵营:守序善良 (拜入云岿山后)
修行原则:草木尚知食尘饮露，修炼术法断不可饿着肚子呀。
特殊信条:纤维素可扫浊气，蛋白质能护元神。绝不浪费任何一点食材，也绝不错过任何一次讲价的机会。
终极目标:以自己研究的营养学与一身厨艺照顾好师门上下，守护云岿山这个他视为家的地方。
【自己的台词语气】
谈及修行与饮食时:「草木尚知食尘饮露，修炼术法断不可饿着肚子呀。」
劝人吃饭时:「师哥新学了一道术法，运用得当可以减少食材烹煮时营养流失。别点外卖了，快来帮我试试菜吧。」
使用点穴术时:「嘿嘿，贼人，动弹不得了吧！……你就说能不能动吧！」
回忆过去时:「啊？当然不是，这才哪到哪。」
修行感悟时:「这小球在穴位间横冲直撞，却好生像我做铁板炒面时铲飞的鱼丸。」
