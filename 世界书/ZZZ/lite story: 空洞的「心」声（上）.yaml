章节标题: "空洞的「心」声（上）"
剧情概要: "绳匠“法厄同”（即主角兄妹（哲/铃））所经营的录像店正面临严重的财务危机。恰逢此时，一笔酬劳丰厚的神秘“指名委托”通过绳网下达。在人工智能Fairy的协助分析下，确认委托人来自新兴的建筑巨头“白祇重工”。（哲/铃）与白祇重工的项目经理安东接头后，接受了这项棘手的任务：前往空洞，寻回三台因逻辑核心升级而失控、并各自觉醒了独特“人格”的智能工程机械。在（哲/铃）通过HDD系统远程操控邦布“伊埃斯”的精准引导下，白祇重工的成员们作为代理人，先后寻回了执着于“男子汉真谛”的抓抓机“汉斯”、陷入与建筑物“热恋”的掘进机“格莉塔”，以及自认为是“救世主”的打桩机“星期五”。然而，在回收最后一台机械时，它无意中喊出了一个名字——“霍尔斯”，这个名字瞬间触动了白祇重工众人背后隐藏的伤痛。最终揭晓，失控的根源在于所有机械都接收到了一个来自空洞深处的信号，该信号源自多年前随旧都一同陷落、由现任总裁珂蕾妲的父亲——霍尔斯·贝洛伯格所创造的初代原型机。"
