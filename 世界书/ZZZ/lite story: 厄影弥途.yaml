章节标题: "厄影弥途"
剧情概要: "来自云归山的仪玄主动联系绳匠，事关一桩发生在「零号空洞-迷失之地」的‘秽息’（Miasma）污染事件。防卫部队在当地救回了数名受秽息污染的‘调查员’，情况紧急。由于仪玄分身乏术，她委托身为其记名弟子的绳匠，通过HDD（空洞深潜系统）以VR形式回顾她之前的调查录像，以此来了解情况。在仪玄的调查记录中，她发现这些所谓的‘调查员’实际上是被神秘雇主雇佣来非法开采一种特殊以太结晶的矿工。他们追寻着一个代号为‘霍波’（Hoba）的巨大以太生物，这种生物身上会携带或在其巢穴附近生成珍贵的、可移动的以太结晶。而‘秽息’的出现似乎与‘霍波’的活动有关，但又并非直接由其产生。受污染的矿工会陷入美好的梦境，回味并弥补自己人生中的遗憾。调查最终将线索指向了‘锈崖矿业’，但秽息的真正来源依然是谜。调查结束后，现实中的罗兰和蕾带来了新情报，确认了‘霍波’与锈崖矿业的利益关系，但秽息的谜团仍未解开。仪玄正式将后续调查任务交给了绳匠。"
