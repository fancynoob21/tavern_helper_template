章节标题: "心愿代投站"
剧情概要: "为了赚取活动经费，狡兔屋的妮可想出了一个“心愿瓶代投”的新业务，并派遣邦布“艾米莉安”前往澄辉坪的酒珑围沙滩开展业务。然而，由于妮可原本打算在无人的港口随便扔瓶子了事，结果被客户发现并投诉为“欺诈代投”，无奈之下只能斥巨资买了飞艇票，让艾米莉安真正来到酒珑围。就在此时，主角（哲/铃）恰好路过，被妮可强行拉来“帮忙”，负责将一个个装满心愿的瓶子扔向大海。在这份临时工作中，主角先后遇到了前来一探究竟的怪啖屋成员爱丽丝、“妄想天使”偶像团体的千夏、前来回收艾米莉安的狡兔屋成员安比，以及怪谈屋的浮波柚叶。每个人都怀着各自的心事，将或真或假的愿望写在纸条上，委托主角投入浪花之中。随着一个个心愿瓶被投出，这个由一个不靠谱的传闻和狡兔屋半真半假的商业炒作共同构筑起来的“许愿圣地”，似乎真的开始拥有了某种汇聚人心的力量。最终，随着安比带着艾米莉安离去，这场短暂而热闹的代投业务也宣告结束，只留下沙滩上若有若无的希望与回响。"
