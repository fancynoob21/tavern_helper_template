章节标题: "扳机代理人秘闻「目不可及」"
剧情概要: "故事发生在法厄同兄妹（哲/铃）刚成为「绳匠」不久后。旧都陷落，赫利俄斯机关遇袭，兄妹二人在六分街安顿下来，开启录像店生意。为拓展业务，他们与情报贩子「牧羊人」合作。一日，牧羊人带来一桩寻人委托：寻找照片上蒙着眼的金发女子「卡戎」。兄妹对委托性质感到困惑，但牧羊人称这是对绳匠综合能力的考验，并留下口琴、乐谱与照片。在厄匹斯港遍寻无果后，兄妹在夕阳下吹响口琴，神秘的「卡戎」随之现身。然而，这桩看似简单的寻人委托，却将他们卷入了一场由旧都陷落的往事、退役军人的怨恨与复仇交织而成的致命狙杀之中。他们将面对代号「屍鷲」的神秘狙击手，揭开里拉小队覆灭的真相，并见证两位背负着同样沉重过去的女性，如何走向截然不同的命运终点。"
