章节标题: "代理人秘闻「幸運當頭」"
剧情概要: "由于资金不足，绳匠的代理人兄妹——哲与铃四处奔波，向各位代理人宣传“任何小委托都接”的业务新标准。当他们来到野火镇拜访“狡兔屋”的柏妮思与派派时，恰好柏妮思有一个小委托需要帮忙。在一次空洞探索中，柏妮思、派派与绳匠（哲/铃）从以骸群中救下了一位神秘的苏奶奶，并获赠一张据称能中两百万大奖的彩票。尽管派派对此持科学怀疑态度，柏妮思却已沉浸在中奖的美梦中。开奖之夜，奇迹发生，彩票真的中了三百万丁尼的头奖。然而，就在兑奖前夕，派派却带着彩票失踪了。经过一番波折，众人发现这是一场因“燃料疯子要买地皮”的谣言引发的抢劫误会。最终，柏妮思用自己分得的奖金举办了一场盛大的燃油狂欢节。好景不长，派派和（哲/铃）都因各种原因迅速花光了奖金，正当他们愁眉苦脸时，又在空洞中救下了一位盖爷爷，再次获得一张据称能中三千万的彩票。当他们满怀希望地去兑奖时，却发现彩票早已过期。"
