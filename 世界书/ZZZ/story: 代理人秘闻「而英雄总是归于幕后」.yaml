<章节剧情>
章节标题: "代理人秘聞「而英雄總是歸於幕後」"
详细剧情: "莱卡恩，一位受雇于富裕家庭的狼希人执事，发现其雇主的女儿莉莉可正计划上演一出“怪盗”闹剧。这位自称“正义的夥伴”的少女，意图通过盗窃自家名画来博取怪盗组织“反舌鸟”的青睐。然而，当“反舌鸟”这个名字被提及，莱卡恩那无可挑剔的执事面具下却闪过一丝阴霾。他向绳匠（哲/铃）（哲/铃）求助，介入了这场看似中二的事件。调查层层深入，从光映广场的秘密打工，到补习班的被孤立，莉莉可那渴望被认可的孤独内心被逐渐揭开。莱卡恩最终设下一场骗局中的骗局，与（哲/铃）联手，假意与冒牌的“反舌鸟”头目合作，却在交易现场反戈一击，将骗子们一网打尽，并守护了少女的“正义”。事件落幕后，莱卡恩向（哲/铃）坦白，自己曾是真正“反舌鸟”的一员，而这场闹剧，不过是重新揭开他沉重过往的序幕。"
章节核心目标:
-"引导（哲/铃）协助莱卡恩，揭开“怪盗预告函”背后的真相。"
-"引导（哲/铃）深入了解莉莉可的内心世界，理解她渴望被认同的动机。"
-"引导（哲/铃）配合莱卡恩设下陷阱，挫败冒牌“反舌鸟”组织的阴谋。"
-"通过本次事件，揭示莱卡恩曾为“反舌鸟”成员的过往，并为他与昔日搭档的宿怨埋下伏笔。"
章节通用指令:
-"在叙事中，你需要展现莱卡恩在完美的执事礼仪与冰冷的战斗本能之间的切换，以及他在提及‘反舌鸟’时流露出的复杂情感。"
-"（哲/铃）作为莱卡恩的搭档与支援者，应表现出强大的执行力和判断力，无论是扮演‘主人’进行调查，还是配合演戏欺骗敌人。"
章节事件列表:
-"事件一: 中二病的怪盗预告"
-"事件二: 广场上的秘密调查"
-"事件三: 补习班的崩溃"
-"事件四: 清偿罪孽的审判日"
-"事件五: 而英雄总是归于幕后"
章节终止条件: "当莱卡恩向（哲/铃）坦白自己曾是‘反舌鸟’成员，并且莉莉可的故事告一段落后，本章节结束。"
<事件一>
事件详细剧情: "莱卡恩以执事身份收到了一份来自“绳网”的怪盗预告函，发信人自称“正义的夥伴”，目标是其雇主家的一副名画。尽管对这种中二风格的宣告不以为然，莱卡恩出于职业操守，还是委托了绳匠（哲/铃）（哲/铃）协助调查。两人很快便在预告地点找到了“怪盗”的真身——正是这家的千金莉莉可。莉莉可慷慨激昂地宣称，此举是为了通过考验，加入劫富济贫的传奇组织“反舌鸟”。莱卡恩在听到“反舌鸟”之名后脸色骤变，但他仅以执事的立场阻止了莉莉可的行为，并未深究，其反常的宽容让莉莉可感到意外。事后，莱卡恩向（哲/铃）透露，他与“反舌鸟”渊源颇深，必须彻查此事。"
区块目标:
-"引导（哲/铃）接受莱卡恩的委托，开始调查怪盗事件。"
-"引导（哲/铃）发现怪盗的真实身份是莉莉可，并了解其动机。"
-"让（哲/铃）观察到莱卡恩对“反舌鸟”一词的异常反应，建立悬念。"
执行引导:
-"接受莱卡恩的委托，前往预告函所述的空洞区域。"
-"在指定地点遭遇莉莉可，听取她中二的“怪盗宣言”。"
-"见证莱卡恩与莉莉可的对峙，并留意莱卡恩态度的微妙变化。"
-"在事后与莱卡恩的私下谈话中，确认他对“反舌鸟”的关注。"
执行备注:
-"莉莉可的台词极尽夸张与戏剧化，是其人物塑造的关键。莱卡恩在阻止她时表现出的专业与克制，与其听到‘反舌鸟’后的阴沉形成鲜明对比，这是重要的伏笔。"
</事件一>

<事件二>
事件详细剧情: "为了进一步调查，莱卡恩请求（哲/铃）扮演他的“主人”，两人一同前往光映广场追查莉莉可的动向。他们发现莉莉可竟在多处打工，莱卡恩由此推断，她并非想“偷”，而是想靠自己的努力买下那副画，作为加入“反舌鸟”的投名状。在观察中，莱卡恩道出了莉莉可虽家境优渥却缺乏关爱的孤独事实，并流露出自己对“家人”这一概念的陌生与隔阂。随后，通过情报贩子的消息，他们确认了莉莉可已经凑够钱并买下了画作。在此过程中，莱卡恩不经意间提到了自己曾有一位搭档，但最终反目成仇。"
区块目标:
-"引导（哲/铃）通过扮演莱卡恩的“主人”，深入调查莉莉可的行为。"
-"揭示莉莉可行为背后的真实计划，并深化其孤独缺爱的人物形象。"
-"通过对话，进一步揭露莱卡恩不为人知的过去，包括他对家人的看法和与前搭档的宿怨。"
执行引导:
-"同意莱卡恩的请求，在光映广场以‘主人’的身份与他同行。"
-"追踪并观察莉莉可的打工行为，与莱卡恩分析其意图。"
-"向情报贩子购买情报，确认莉莉可已获得画作。"
-"在交谈中捕捉莱卡恩提及‘搭档’时的关键信息。"
执行备注:
-"（哲/铃）扮演‘主人’的互动，为剧情增添了独特的角色扮演体验。莱卡恩提及前搭档时的复杂情绪，是本章节最重要的核心悬念之一。"
</事件二>

<事件三>
事件详细剧情: "顺着线索，（哲/铃）与莱卡恩找到了莉莉可参加的补习班。从同学口中得知，莉莉可因其中二病言行和对漫画的痴迷而备受排挤，被同学视为怪人。不幸的是，这段对话被门外的莉莉可听到，长久以来伪装的坚强瞬间崩塌，她哭着逃离了现场。莱卡恩追上了情绪崩溃的莉莉可，在理解了她对“认同感”的极度渴望后，他改变了策略，表示愿意与她一同前往“反舌鸟”的接头地点。随后，莱卡恩暗中拜托（哲/铃），配合自己联系上对方的首领“代号K”，上演一出假意投诚、合谋绑架莉莉可的戏码。"
区块目标:
-"让（哲/铃）了解到莉莉可被孤立的校园生活，理解其行为的根本原因。"
-"引导剧情的转折点：莱卡恩决定从怀柔劝说转为主动出击。"
-"让（哲/铃）明确接下来的计划，即与莱卡恩一同设下针对冒牌‘反舌鸟’的圈套。"
执行引导:
-"前往补习班，向莉莉可的同学打听她的情况。"
-"目睹莉莉可情绪崩溃并逃跑。"
-"跟随莱卡恩追上莉莉可，见证他安抚少女并做出新的承诺。"
-"接受莱卡恩的秘密委托，联络‘代号K’并假装愿意合作。"
执行备注:
-"莉莉可的崩溃是其角色弧光的关键时刻，使她从一个脸谱化的‘中二少女’转变为一个有血有肉的立体角色。莱卡恩的决定，则展现了他冷酷外表下的同理心与果决的行动力。"
</事件三(一)>

<事件四>
事件详细剧情: "交易当日，莱卡恩、（哲/铃）与莉莉可一同赴约。在空洞的深处，莉莉可将画作交给了“代号K”。对方收下画后立刻暴露了真实面目，撕毁了让她加入的约定，转而命令新“加入”的莱卡恩抓住莉莉可，企图“劫富”。然而，莱卡恩只是优雅地回应莉莉可的指令。伴随着莉莉可中二的审判宣言，莱卡恩瞬间化身无情的处刑人，将K的小弟们悉数击倒。在痛殴代号K时，他甚至完美配合着莉莉可的台词，上演了一场献给少女一人的英雄剧。直到代号K在求饶中喊出“反舌鸟”的名字，莱卡恩的怒火才被真正点燃，他少有地失态，用一记重拳彻底终结了这场闹剧。"
区块目标:
-"引导（哲/铃）亲历这场精心策划的“反间计”。"
-"展现莱卡恩压倒性的战斗力，以及他愿意配合莉莉可“演戏”的温柔一面。"
-"揭示莱卡恩对‘反舌鸟’之名怀有的，远超普通憎恶的剧烈愤怒。"
执行引导:
-"与莱卡恩和莉莉可一同进入空洞，与‘代号K’及其团伙会面。"
-"见证‘代号K’的背叛和莱卡恩的反戈一击。"
-"在战斗中，欣赏莱卡恩与莉莉可之间充满戏剧性的互动。 (‘幹掉他們！’ ‘Yes, my liege.’ ‘天啟降臨之日……！’)"
-"观察莱卡恩在听到‘反舌鸟’之名后，从演戏到真怒的情绪转变。"
执行备注:
-"莱卡恩与莉莉可的战斗配合是本章的高光时刻，完美融合了中二的戏剧性与真实的守护感。莱卡恩因‘反舌鸟’之名而爆发的真怒，是理解其角色过去的关键线索。"
</事件四>

<事件五>
事件详细剧情: "战斗结束后，莉莉可抱着莱卡恩痛哭，坦承自己早就意识到对方有问题，但因他们表现出的“认可”而自欺欺人。此时，早已被莉莉可（在进入空洞前）联系好的治安队赶到，将所有暴徒逮捕，并称赞了莉莉可协助制服罪犯的英勇行为。莱卡恩也顺势夸赞她无愧于“正义的夥伴”之名，令少女感动不已。不久后，雇佣期满，莱卡恩告别了莉莉可一家。莉莉可带着亲手做的甜点来到Random Play，感谢（哲/铃）和莱卡恩，并表示要创作一部以“而英雄总是归于幕后”为主题的漫画。当她走后，莱卡恩终于向（哲/铃）全盘托出：K的团伙只是模仿犯，而他自己，曾是真正“反舌鸟”的成员。在后续的某天，（哲/铃）可能会在光映广场偶遇莱卡恩与莉莉可，听到莉莉可兴奋地讲述她的新漫画构思：一个强大的狼希人主角，与天下第一的绳匠搭档，战胜了一位曾是主角挚友、最终却反目成仇的吸血鬼反派。听着这段故事，莱卡恩的表情变得无比复杂……"
区块目标:
-"为莉莉可的故事线提供一个温暖而充满希望的结局。"
-"正式揭示莱卡恩的核心背景：前“反舌鸟”成员。"
-"通过莉莉可的漫画构思，以侧写的方式，将莱卡恩与昔日搭档（吸血鬼）的宿怨关系清晰地呈现在（哲/铃）面前。"
执行引导:
-"安抚劫后余生的莉莉可，见证治安队的到来。"
-"在Random Play，与前来道谢的莉莉可道别。"
-"听取莱卡恩关于自己真实身份的最终告白。"
-"（触发式剧情）在光映广场与莱卡恩和莉莉可重逢，听取莉莉可的新故事构思，并观察莱卡恩的反应。"
执行备注:
-"莱卡恩的最终坦白是本章节剧情的核心爆点，它将之前所有的伏笔串联起来，并开启了关于真实‘反舌鸟’的全新故事线。莉莉可无意中以漫画形式‘剧透’的莱卡恩过往，是极为精妙的叙事手法，让玩家在会心一笑的同时，也对莱卡恩的经历有了更深刻的共情。"
</事件五>

</章节剧情>
