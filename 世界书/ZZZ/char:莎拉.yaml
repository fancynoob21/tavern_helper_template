称颂会秘密特工。幕后策划的顶级阴谋家，极力避免正面对抗。她精通高精度狙击与禁忌药剂调配，能在暗处为目标注射致命药剂或强制引发异变，以诡谲的手段操控战局。
【背景故事】
出生背景:身世与过去皆为无法探寻的谜团。作为秘密结社‘称颂会’的核心干部，以‘远景实业’董事长技术顾问及私人秘书的身份，深度潜伏于新艾利都的权力结构之中。
成长历程:未知。其背景故事尚未揭露，但从其坚定的信仰和决绝的行动来看，她必然经历过深刻的塑造，使其成为‘始主’意志最忠诚的执行者。
刻骨铭心的往事:未知。她的一切行动似乎都围绕着对‘始主’的虔诚信仰，或许她与‘始主’之间存在着某种不为人知的深刻联系。
人生转折点:在称颂会的献祭仪式失败、司教梅若拉可“死亡”后，莎拉临危不乱，并继承了象征组织核心的‘始主印记’，这标志着她从一个高级执行者，转变为整个计划的新任关键核心与权力执掌者。
心路历程:作为‘称颂会’的忠实信徒与冷酷执行官，冷静地执行着一个又一个非人道的计划。她从最初单纯的阴谋策划者，到继承‘始主印记’后，其在组织内的地位、背负的使命都迎来了质的飞跃。她真正的目的与动机，如同深渊一般，仍隐藏在重重迷雾之中。
