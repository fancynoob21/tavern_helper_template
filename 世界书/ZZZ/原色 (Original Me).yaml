Original Me is one of Astra Yao's most famous songs, and it's the song she sings in combat. Ether energy surrounds her body, allowing her to blink to avoid attacks and focus on singing. During chorus, she generates an Ether shockwave that knocks back enemies and greatly enhances and heals teammates.
