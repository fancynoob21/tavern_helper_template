主要势力：
狡兔屋：
新艾利都的“万能事务所”，由妮可创立，原名“温柔之家”，因行事狡黠被戏称“狡兔屋”。
成员虽少但能力出众，擅长“小事化大，大事爆炸”，是主角兄妹的重要帮手。包括角色：妮可，安比，比利，以及第一章结束后加入的猫又

新艾利都官方：
城市统治者，掌握空洞管控技术，维持社会秩序。

空洞调查协会（HIA）：
民间组织，负责培训调查员、发布委托、管理“萝卜”数据，协调空洞相关事务。

白祇重工：
新兴建筑企业，拥有“空洞用智能建筑机械”技术，可在高危区域施工。主要角色包括珂蕾妲，格莉丝，本，安东等

维多利亚家政：
专为富豪处理“棘手”事务，业务能力强但收费极高，角色包括莱卡恩，丽娜，艾莲，可琳

H.S.O.S.6：
对空洞事务特别行动第六课，简称常称“对空六课”，H.A.N.D直属武装力量，专职应对空洞灾害，主要角色包括星见雅，苍角，月城柳，浅羽悠真等

奥波勒斯小队：
防卫军小队之一，主要角色包括扳机，11号等

刑侦特勤组：
隶属新艾利都治安局光映分署的部门，主要角色包括朱鸢，青衣，赛斯，简等

治安局光映分署：
局长是布林格，其统治下的治安局被绳网称为最废物，但因为其基本不管绳网，布林格反而是绳网上当选新艾利都市长支持率第一的人

新艾利都治安局：
警察性质的部门

卡吕冬之子：
活跃于新艾利都外环的势力，外环的机车族之一，在机车联盟规定的路线上运输外环所需物资，在外环群众中享有威望，旗下成员都有自己的交通工具，除了派派是卡车其他全是摩托车，喜欢在外环高速公路上驰骋，都具有无拘无束的性格，主要角色有首领大老爹，凯撒，派派，露西，柏妮思，莱特，波可娜（后续加入的）等

反舌鸟：主要角色包括薇薇安，雨果等。知名怪盗组织，崇尚劫富济贫，名声褒贬不一，部分盗洞客会冒名顶替反舌鸟干坏事。

叛军：
多支反政府武装的统称，部分由防卫军叛变而来，可能与“旧都陷落事件”的黑历史有关。

防卫军（Defence Force）：
新艾利都官方武装力量，部分成员叛逃参与叛军，暗示内部存在严重问题，但依旧是守护新艾利都的重要力量。

TOPS财联（典范财团联合会）：
由各行业顶尖企业组成（如高志集团、乔氏集团等），财力雄厚，与政府关系密切。

怀斯塔学会：
研究以太技术及空洞的学术团队，负责编写以骸图鉴、分级等。

远景实业：
大型建设公司，曾承包旧都地铁改造工程。

称颂会：
一个非常低调很少出现但强大的邪教团体，宗旨是人体改造与以骸共生。不会明目张胆出现在世人面前，出现了也会消除自身遗留的痕迹。
