章节标题: "零号空洞的资格认证"
剧情概要: "深夜，情报贩子“牧羊人”带来一则爆炸性消息：空洞调查协会重启了对“零号空洞”的常规调查。他为绳匠（哲/铃）所属的“法厄同”留了一个“后门”，只需完成一个测试委托，即可获得合法的零号空洞调查执照。为了探寻被掩埋在旧都（现零号空洞内部）的过去，（哲/铃）决定接受挑战。他们前往斯科特前哨，从白祇重工的研究员“雷”手中接下测试任务。然而，在进入空洞执行任务时，一场突如其来的巨型以骸“尼尼微”的暴动打断了测试。混乱中，他们遭遇了正在追击巨兽的“对空洞特别行动部六课”（奥波勒斯小队）。六课成员误将（哲/铃）远程操控的邦布“厄俄斯”当作白祇重工的特制导航邦布并紧急征用。（哲/铃）将错就错，以“导航邦布”的身份引导六课行动，并见证了其课长，“斩骸剑”星见雅的强大战力。任务结束后，因协助六课的卓越表现，（哲/铃）的资格评估被特例通过，成功获得了宝贵的零号空洞调查执照，开启了深入这片禁区的新篇章。"
