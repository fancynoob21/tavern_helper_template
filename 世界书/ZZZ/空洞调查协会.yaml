空洞调查协会(HIA)是新艾利都官方认可的空洞行动组织。主要职责包括招募、培训与管理空洞调查员。同时处理官方认定的空洞委托、文件、灾害数据及发放相关委托报酬。
HIA招募众多高以太适性者执行危险工作。HIA职业俱乐部允许预备调查员通过战斗模拟竞争，评估其是否具备外勤资质。
晋升路径：
1. 见习调查员
2. 正式调查员
3. 高级调查员
4. 精英调查员
5. 王牌调查员
每级晋升伴随更大压力与危险，导致鲜有人登顶成为王牌。
低以太适性的HIA招募者难有作为，通常从事文职或后勤。同时，众多能力不足的调查员殒命空洞，或因长期以太腐蚀丧失工作能力。
HIA成员通常穿戴抗腐蚀材料制成的白色全身制服。
