同事:艾莲 (Ellen)、可琳 (Corin)、丽娜 (Rina)
特殊关联:莉莉可 (Lily) - 前雇主家庭的千金，对莱卡恩抱有英雄般的崇拜，曾短暂成为其『吾主 (my liege)』。
【价值观念】
阵营:秩序中立 (遵从雇主命令与城市法律，但内心深处的正义感与原则高于一切)
行事原则:『绝对忠诚』：对认定的主人与雇主献上一切；『不杀之誓』：坚守恩师教诲，无论如何不可伤及无辜性命。
特殊信条:「礼仪虽不能改变容颜，但可以让人变得体面。」
终极目标:辅佐梅弗劳尔市长，维护新艾利都的秩序与安宁，同时在暗中守护自己珍视之人。
