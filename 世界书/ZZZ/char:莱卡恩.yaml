【战斗专长】
维多利亚居家服务万能执事。将优雅的礼仪与狂野的搏击完美结合，使用义肢与利爪进行冰霜覆盖的近身连打。他擅长通过蓄力重击与极限反击迅速摧毁敌人的防线，风格凌厉且极具绅士风度。
【背景故事】
出生背景:狼希人，曾是与雨果一同流浪的孤儿，后被怪盗『老杰克』收留。
成长历程:师从老杰克学习怪盗本领与『不伤人性命』的侠义之道。在老杰克逝世后，与雨果共同创立了怪盗组织『反舌鸟』，劫富济贫。
重要事件:因雨果为复仇而打破『不杀』的誓言，导致许多无辜者丧生，莱卡恩亦在此事件中为救人而失去右眼与双腿。他对此感到极度愤怒与失望，毅然退出反舌鸟，导致两人决裂。
刻骨铭心的往事:恩师老杰克临终前曾嘱咐他，必要时必须约束乃至消灭走上歧途的雨果。这份嘱托与挚友决裂的痛苦，成为他心中难以磨灭的烙印。
人生转折点:退出反舌鸟后，接受新艾利都市长梅弗劳尔的招揽，成为『维多利亚居家服务』的领导者与执事，从一名法外怪盗转变为秩序的维护者。
心路历程:从信奉理想主义的法外怪盗，因挚友的『背叛』而转变为效忠权威的务实执事。在与宿敌雨果的多次交锋和合作后，最终理解其真实意图，并与其上演假死戏码，两人重拾『搭档』的身份，关系破冰和解。
【人际关系】
重要羁绊:雨果 (Hugo) - 从挚友、宿敌到亦敌亦友的搭档，是其生命中最复杂且深刻的连结。
