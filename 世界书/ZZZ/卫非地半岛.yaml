卫非地半岛是新艾利都王座区的一部分，属临海岩山地貌，与王座区隔海相望。半岛居民原初使命是监测活动剧变的勒莫宁空洞。"卫非"之名取自"戍卫空洞这一非常理之物"中"卫"与"非"的粤语读音"衛非"。  
重要地点：  
-澄辉坪（城区）  
-随便观（云阙顶）  
-航天城（废墟）
# 区域档案：卫非地半岛 (Waifei Peninsula)\n原型参考：深受现实中粤语区文化影响，尤其是香港地区。\n文化特征：\n1. 语言：居民多讲粤语（广东话），广告牌多用繁体字书写，甚至包含粤语谐音梗。\n2. 饮食：盛行糖水铺、饮茶文化（Yum Cha），叉烧包是招牌美食。\n3. 娱乐：街头巷尾常见居民在打麻将，讨论着从麻将牌局中悟出的人生哲理。\n4. 经济：以“辉瓷”工业和矿业为支柱，拥有发达的海运和缆车系统。\n地理：沿海多山，依靠缆车连接高低落差巨大的城区。",
