【战斗专长】
邦布情感核心编程:突破了邦布作为单纯工具的限制，为伊埃斯等邦布注入了情感模拟回路，使其拥有近似人类的情感反应与忠诚度。这项技术后来成为邦布产业的标准，但无一能达到伊埃斯的情感复杂度。
以太适应性改良:通过长期的生物工程研究，掌握了增强人体以太适应性的方法。哲与铃之所以能在空洞中长时间活动而不受严重侵蚀，正是得益于她早年进行的体质改良与晶状体技术。
终域之门研究:在被称颂会掳走后，被迫参与了关于「终域之门」——即零号空洞核心区域的研究。虽然被迫合作，但她暗中留下了加密的数据线索，暗示了始主与空洞真相的关联。
科研级战术分析:虽然不擅长直接战斗，但拥有在极端环境下快速分析以太流动、预测以骸行为模式的能力。在必要时可以利用环境布置简易的以太干扰陷阱或逃生路线。
