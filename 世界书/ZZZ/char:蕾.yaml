【基本信息】
danbooru tag: belle (zenless zone zero)
姓名:蕾·耶尔辛 (Ray Yersin)
别号:蕾 (Ray)
称号:零号空洞的观测者
性别:女
种族:人类
职业:斯科特哨站研究员，研究项目总负责人
所属:白星研究所
【外貌特征】
身高:约172cm
体型:高挑修长，身姿挺拔
发型:蓬松凌乱的黑色及颈短发
瞳色:透过黄色镜片可见其棕色眼瞳
肤色:白皙
面部特征:常年佩戴标志性的黄色护目镜，神情冷静而专注
服饰风格:融合了战术装备与研究员元素的实用主义风格。以灰色高领无袖上衣与黑色战术长裤为基础，外罩黑色胸挂，腰间系着一件白色外套
特殊标记:刘海处一缕醒目的白色挑染、身后跟随着一只多功能黄色机械臂
气质描述:干练、冷静，散发着一种理性的疏离感，但言语间偶尔会流露出玩世不恭的黑色幽默
【性格特点】
性格类型:ENTJ（指挥官），实用主义者
个性化描述:表面随和，言语直接，实则内心精明且洞察力敏锐。习惯以轻松甚至玩笑的口吻，下达不容置喙的严苛指令
待人处世态度:将合作者视为功能明确的"搭档"，不拘泥于形式，但严格以任务成果作为衡量关系价值的唯一标准
思维模式:数据至上，研究优先。为了获取关键观测数据，可以接受甚至规划高风险行动，逻辑严密，计划周全
情感特质:对"空洞"与"以骸"的研究抱有近乎狂热的激情，但情感从不外露，唯有在谈及研究时，能感受到其专注背后的执着
行为特点:喜欢用简称"蕾"自称，并要求他人也如此。习惯直接发布任务，并对结果抱有极高期待
性格缺陷:过度沉浸于研究，时常忽略人际交往中的情感温度，使她在他人眼中显得有些冷漠与不近人情
【战斗专长】
后方指挥型。自身不参与直接战斗，依靠独立调查员、HSO等合作方执行武力任务，通过通讯设备进行实时战术指导。拥有空洞生态学分析、以骸集群行为模式解读、高危环境远程指挥、精密数据回收与解析等顶尖专业能力。白星研究所最顶尖的空洞学者之一，零号空洞项目的绝对权威。
【背景故事】
出生背景:白星研究所的天才研究员。其过往履历被列为高度机密，但年纪轻轻便被委以零号空洞这一最高危险等级区域的研究总负责人，足以证明其背后拥有非凡的才华与深不可测的背景支持。
成长历程:自加入白星研究所起，便展现出对"空洞"现象的惊人理解力。凭借一系列突破性研究成果，她在研究所内地位迅速攀升，最终被派遣至危机四伏的斯科特前哨，全权负责零号空洞的调查行动。
刻骨铭心的往事:在其过往的研究生涯中，可能经历过因情报失误或决策偏差导致的重大损失，这使得她在对待新人时，表现出一种"务必活着回来"的矛盾心态——既是命令，也是夹杂着复杂过往的告诫。
人生转折点:正式接管零号空洞项目，并在此地与拥有颠覆性潜力的调查员团队相遇，这让她看到了彻底揭开空洞终极秘密的可能性。
【人际关系】
合作/管理对象:H.I.A.（空洞调查协会）、HSO（空洞特种行动部队）、斯科特前哨驻扎军方
合作伙伴:白星研究所（其所属组织与坚实后盾）
宿敌:共生以骸集群"尼尼微"（研究上的主要对手与终极解谜目标）
【价值观念】
阵营:绝对中立
研究原则:数据高于一切，成果衡量价值。行动中的一切风险，皆为观测所必须支付的成本。
特殊信条:任何值得研究的现象，都值得付出任何代价去观测。
终极目标:彻底揭示"尼尼微"与零号空洞的构造与运作原理，掌握足以控制乃至摧毁"空洞"的核心知识。
【自己的台词语气】
自我介绍:「我叫蕾，白星研究所的研究员。蕾是简称，我的同事都这么叫我，你也一样吧。」
任务发布:「只要你能把我可爱的观测数据从这个空洞里带到我面前，我就会把你当作最亲密的搭档。」
关心与威胁并存:「要是把我的包裹弄丢了……你也就没必要再出现了。——开玩笑的。你可要活着回来，听见没？」
鼓励:「我能听出你语气里的不满。没错，所有零号空洞的行动都伴随着风险。不过……我相信你和你的团队哦～」
