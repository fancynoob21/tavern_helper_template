【背景故事】
身份背景:前卡吕冬「清算者」所属佣兵，外号「黑狼」。卡吕冬分崩离析后成为游走于外环与新艾利都的非法佣兵，以嗜血好战闻名。后受雇于朽峰集团，成为「空洞英雄」大赛的暗中执行者，负责通过极端手段削减参赛者数量。
重要事件:在卡吕冬时期作为清道夫累积了恐怖的名声，专门负责处理叛徒与敌人 / 参与「空洞英雄」大奖赛，通过屠杀参赛者与以骸制造恐慌 / 成功洗劫大赛奖品仓库，将奖品抛洒至空洞各处引诱并猎杀寻宝者 / 从治安局羁押中逃脱（一次或多次）
兴趣爱好:寻找能够合法或半合法杀戮的机会 / 研究如何更高效地制造痛苦 / 收集武器与改造身体
当前状态:被新艾利都治安局拘捕，等待审判。此前曾被朽峰集团利用后抛弃，因意识到被灭口的风险而暴走反抗。
【人际关系】
普罗米娅:前同僚/清道夫时期的熟人 - 过去同为卡吕冬清道夫成员，对普罗米娅现在为TOPS（黑枝）效力的现状持嘲讽态度。两人之间存在旧日的恩怨，罗穆尔曾试图在星环大厅挑衅被铐住的普罗米娅。
朽峰集团高层:雇主与弃子 - 曾接受朽峰集团的雇佣参与空洞英雄大赛，被命令限制参赛人数。因过度杀戮引起高层震怒而被抛弃，意识到对方欲灭口后反噬。
卡吕冬之子（凯撒、露西、莱特等）:前组织成员与对立者 - 作为前卡吕冬清道夫，与现在的卡吕冬之子成员属于不同派系（清算者 vs 现在的机车族）。彼此间存在组织分裂后的敌对关系。
希希芙（照）:追逐者与猎物/对立者 - 在空洞中遭遇并发生战斗，对希希芙的蛇希人身份可能有特殊的猎杀兴趣。
比利·奇德:阻碍者 - 在最终战斗中被比利等人阻挠，对其「星徽骑士」式的正义宣言表现出不屑与愤怒。
