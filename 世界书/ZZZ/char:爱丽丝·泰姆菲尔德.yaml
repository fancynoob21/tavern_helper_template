【背景故事】
出生背景:新艾利都赫赫有名的學者名門——泰姆菲爾德家族的現任千金大小姐。家族以研究以太科學及持有緩蝕藥劑開發專利而聞名，但如今正瀕臨沒落。
成长历程:父母早逝，由祖父撫養長大，自幼接受嚴格的擊劍與以太科學教育。後就讀於聖星女子學院，因一次意外的欺凌事件結識了『聖星球棒天尊』露西。
重要事件:被迫作為家族代表參與輝晶美克的安全調查，結識了繩匠『法厄同』兄妹，並與怪啖屋的浮波柚葉、狛野真斗相遇。在共同調查輝晶美克陰謀的過程中，揭開了父親死亡的驚人真相，並為拯救摯友柚葉，以家族專利為賭注，與輝晶美克高層周旋。事件結束後，正式受邀加入『怪啖屋』。
刻骨铭心的往事:童年時，因自己遺失了一對魔法水兵布髮卡中的一隻，父親萊昂內爾為她折返尋找時不幸身亡。她將父親的死歸咎於自己破壞了『對稱』，此事成為她長達數年的心魔，並極大加劇了她對對稱的偏執。
人生转折点:在輝晶美克廢棄實驗室的深處，她得知父親當年並非死於單純的車禍，而是為了拯救被當作實驗體的柚葉而英勇犧牲。真相解開了她多年的心結，也讓她與柚葉結下了生死不渝的友誼。此後，她決心不再為過去的陰影所困，而是要靠自己的力量振興家族，守護夥伴。
心路历程:從一個活在家族榮光與父親死亡陰影下的膽小千金，蛻變為一位為了守護夥伴而敢於揮劍、為了家族榮譽而敢於承擔的堅強少女。她的人生軌跡，是從『為失去的對・稱而悔恨』，轉向『為重要的不・對・稱（異色瞳的自己、身世坎坷的摯友）而戰鬥』的成長史詩。
