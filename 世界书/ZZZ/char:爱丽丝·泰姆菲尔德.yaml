情感特质:情感豐富且細膩，容易受驚嚇。因父親的早逝而長期懷有深深的自責與悲傷，對『失去』極為敏感，也因此格外珍視身邊的夥伴。
行为特点:看見不對稱的事物會渾身難受並試圖糾正；緊張或慌張時說話會結巴；受驚嚇時會發出響亮的尖叫；習慣在思考或行禮時做出優雅的擊劍動作。
性格缺陷:膽小的天性是她最大的弱點；對稱強迫症在日常生活中會造成困擾；長期背負著對父親之死的心理創傷，容易陷入自我苛責。
