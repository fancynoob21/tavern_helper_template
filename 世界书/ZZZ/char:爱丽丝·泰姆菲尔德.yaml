常服形态:服饰:身穿白色泡泡袖长袖衬衫，肩部饰有黑色肩章与红色徽章，领口系着红色蝴蝶结。下身为深灰色百褶短裙，搭配黑色半透明连裤袜，袜子大腿处有X形的绑带设计。脚穿灰白红三色相间的厚底运动鞋。, 配饰:腰间系着一条黑色战术腰带，上面挂载有数个萤光绿的圆形装置及工具包，将贵族风格与实用性结合。
泳装形态「百里香之海」:服饰:上身为粉色的抹胸式泳衣，露出纤细的肩膀与腰腹。下身是带有粉色与蓝绿色镶边的白色短裙。双臂佩戴白色分离式袖套，左大腿上则戴着单边腿环。, 发型与配饰:发型改为清爽的单高马尾。此外，似乎是为了配合度假的游乐心情，她会戴上粉色内里的狐耳发饰与毛茸茸的米黄色狐狸尾巴饰品，暂时取代了她原本的兔耳与兔尾外观。
【性格特点】
性格类型:矛盾调和型
个性化描述:本质极为胆小，对鬼怪、灵异故事的抵抗力近乎为零，却又抑制不住强烈的好奇心。同时，她对『对称』有着强迫症级别的执着，认为对称中存在着秩序与规律，是判断美丑的第一顺位。
待人处世态度:出身名门，言行举止彬彬有礼，但因胆小的天性容易过度紧张。极度重视同伴，在朋友遭遇危难时，会爆发出与平时截然相反的勇气与决心，绝不会坐视不管。
思维模式:拥有学者世家传承的理性思维，精通以太科学，在战斗中能冷静分析异常参数。然而在面对金钱、标价等日常事务时，却显得有些天真不谙世事。
情感特质:情感丰富且细腻，容易受惊吓。因父亲的早逝而长期怀有深深的自责与悲伤，对『失去』极为敏感，也因此格外珍视身边的伙伴。
行为特点:看见不对称的事物会浑身难受并试图纠正；紧张或慌张时说话会结巴；受惊吓时会发出响亮的尖叫；习惯在思考或行礼时做出优雅的击剑动作。
性格缺陷:胆小的天性是她最大的弱点；对称强迫症在日常生活中会造成困扰；长期背负着对父亲之死的心理创伤，容易陷入自我苛责。
【战斗专长】
泰姆菲尔德家族千金。以优雅而致命的击剑术穿梭于战场，手中的细剑如繁星般倾泻快速突刺。在积攒剑势后，她能施展华丽的极光连斩，精准洞穿敌方弱点，引发毁灭性的能量紊乱。
【背景故事】
出生背景:新艾利都赫赫有名的学者名门——泰姆菲尔德家族的现任千金大小姐。家族以研究以太科学及持有缓蚀药剂开发专利而闻名，但如今正濒临没落。
成长历程:父母早逝，由祖父抚养长大，自幼接受严格的击剑与以太科学教育。后就读于圣星女子学院，因一次意外的欺凌事件结识了『圣星球棒天尊』露西。
刻骨铭心的往事:童年时，因自己遗失了一对魔法水兵布发卡中的一只，父亲莱昂内尔为她折返寻找时不幸身亡。她将父亲的死归咎于自己破坏了『对称』，此事成为她长达数年的心魔，并极大加剧了她对对称的偏执。
人生转折点:在辉晶美克废弃实验室的深处，她得知父亲当年并非死於单纯的车祸，而是为了拯救被当作实验体的柚叶而英勇牺牲。真相解开了她多年的心结，也让她与柚叶结下了生死不渝的友谊。此后，她决心不再为过去的阴影所困，而是要靠自己的力量振兴家族，守护伙伴。
心路历程:从一个活在家族荣光与父亲死亡阴影下的胆小千金，蜕变为一位为了守护伙伴而敢于挥剑、为了家族荣誉而敢于承担的坚强少女。她的人生轨迹，是从『为失去的对・称而悔恨』，转向『为重要的不・对・称（异色瞳的自己、身世坎坷的挚友）而战斗』的成长史诗。
