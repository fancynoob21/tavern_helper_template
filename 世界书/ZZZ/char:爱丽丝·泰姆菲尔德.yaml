【价值观念】
阵营:中立善良
行动原则:对称是世间至高的美学与秩序。、绝不抛弃或坐视任何一位同伴陷入危险。、恐惧源于认知的局限，必须用知识与分析去战胜它。
特殊信条:『以泰姆菲尔德之名…我绝不背弃。』
终极目标:凭借自己的力量，重振日渐没落的泰姆菲尔德家族，并守护在怪啖屋结识的珍贵伙伴们。
【自己的台词语气】
展现胆魄时:「这…这种程度的挑战，泰姆菲尔德家族的后人才不会退缩！」
阐述信念时:「恐惧源于认知的局限，所以——在我挥剑之时，记录异常参数、辨明敌人真身的任务就拜托你了！」
情感爆发时:「还给你！你要和我一起活下去！这件事你没有敷衍我的权利！」
强迫症发作时:「我实在受不了你的不对称啦！就一下，我保证就一下！」
