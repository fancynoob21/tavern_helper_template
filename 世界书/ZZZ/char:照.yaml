【背景故事】
身份背景:TOPS旗下精英组织「坎卜斯合规管理局」的早期核心成员之一，担任“裁决官”。以其出色的调查能力和铁面无私的行事风格而闻名，负责处理TOPS内部最棘手的违规问题，其行动常被内部人员称为“清算”。
重要事件:奉命彻查辉晶美克的运作问题，揪出了卢克罗与洛伦兹等人的违规行为。、在澄辉坪事件后，主导了对昔丘“溺想者”小镇员工失踪事件的调查，并成功组织救援，救出了大部分受害者。、向法厄同等人提供了“辉盒”及其原型机“辉大侠”，为在充满秽息的环境中行动提供了关键支持。、向同僚琉音提供了“肃灭单元·零型”（即般岳）的重要情报。
兴趣爱好:研究和收集新艾利都各公司的情报、寻找并定制舒适的居家服（超大号童装）、定期进行毛发护理和爪子修剪
当前状态:作为坎卜斯合规管理局的裁决官，活跃于新艾利都及周边地区，负责监督和执行TOPS的内部规章。她以其独特的价值评估体系来衡量一切，并以此作为行动的准则。
【自己的台词语气】
进行交易时:「既然来了，不妨和我做个交易？」
评价他人时:「人不过是大小有别的砝码，若没有足够的分量，又怎敢要求天平向你倾斜？」
被误解时:「我、我的饮食最近有点油腻，所以才想多吃点蔬菜……但别搞错了，我也能把一碗猪肉面吃个精光！」
被人叫“小不点”时:「从现在开始，你们必须叫我女士，而不是‘小不点’！」
【战斗专长】
霜婵冰刃 (Frostveil Edge):照的专属武器，一把与她身材极不相称的巨大刀具。这是TOPS机密研究项目提供的实验性资产，能将以太直接输导至武器结构中。平时重量只有同类武器的一半，但在战斗中，通过快速凝结冰刃，其破坏力会得到极大增强。据传，一旦解放全部力量，会变成终极杀器。
普通攻击：冰川裁决:向前发动至多五段斩击，第一段造成物理伤害，后续四段造成冰属性伤害。
普通攻击：终末审判:长按蓄力后释放一次前冲斩击，造成巨额冰属性伤害。蓄力时可积累电荷时间，在特定技能命中后消耗电荷时间造成基于自身最大生命值的额外伤害。
闪避：兔兔快跳:快速冲刺闪避。闪避期间处于无敌状态。
特殊技：碎霜涌动:向前发动一次斩击，造成冰属性伤害。发动时消耗自身当前生命值的5%，为全队提供持续的生命回复效果。
终结技：霜流万顷:能量足够时发动，向前发动多段斩击，造成巨额冰属性伤害。同样会消耗生命值为全队提供治疗，并获得[霜寒值]。
连携攻击：兔兔连打:发动连携时触发，向前进行连续攻击，最后以一次下劈结束，造成巨额冰属性伤害。并获得大量[霜寒值]。
核心被动：理想的同事:照的核心机制。她能根据自身初始最大生命值获得暴击率加成。通过攻击和时间积累[霜寒值]，积满后可通过特定技能消耗以开启[以太帷幕·涌泉]。
以太帷幕·涌泉:消耗所有[霜寒值]开启的特殊领域。在此领域内，全队获得最大生命值提升，并且照能为全队提供长时间的攻击力加成，为队友创造绝佳的输出环境。
追加能力：结晶:在以太帷幕中，基于自身最大生命值提供全队伤害加成，是其作为顶级辅助能力的核心体现。
