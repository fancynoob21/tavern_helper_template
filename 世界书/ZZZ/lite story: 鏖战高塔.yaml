章节标题: "鏖战高塔"
剧情概要: "空洞调查协会（HIA）推出了全新的大型VR挑战——“模拟战斗试炼”，又名“鏖战高塔”，旨在复现传说中的“虚狩七人”领袖“悦者”独自闯荡“神授迷宫”的伟绩，并借此测试新一代代理人的极限。然而，由于其极高的难度，自发布以来竟无人能够通关。HIA的凯莉为了收集开发下一代VR系统所需的数据，紧急委托传闻中的王牌玩家，也就是身为绳匠“法厄同”的哲和铃，希望他们能成为首个登顶者。兄妹二人接受挑战，轻松突破了最初的25层。然而，在HIA修复了系统中的一处隐藏漏洞后，此举竟激怒了一位利用该漏洞创造了超高难度隐藏关卡的神秘黑客。黑客随即全面入侵了试炼系统，将其改造为“荣耀试炼”，并向全城发出挑战：若有人能通关他设定的关卡，他将交还系统控制权。哲与铃再次受凯莉所托，迎战这位神秘黑客的战书，在攻克第50层后，黑客信守承诺，在抹除自己所有痕迹后消失，而HIA则决定保留这一极具价值的高难度挑战。最终，哲/铃作为唯一的挑战者，抵达了前人未至的第100层。他们的意识被瞬间传送到一个隐藏的虚拟光映广场，在那里，他们见到了自称“开拓者”的失踪开发者。开发者坦言，他创造无尽高塔是为了追寻偶像“悦者”的足迹，而他本人已深入现实中真正的“神授迷宫”——巴巴哥空洞，生死未卜。在将希望寄托于新一代最强的绳匠后，他将兄妹二人的意识送回了现实。"
