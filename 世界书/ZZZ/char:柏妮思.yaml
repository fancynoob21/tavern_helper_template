【背景故事】
出生背景:新艾利都外环「野火镇」帮派『卡呂冬之子』的核心成员，是帮派所有机械设备的燃油专家和成员们的专属调饮师。
成长历程:作为「卡呂冬之子」的一员，与老大凯撒·金、派派·韦尔、露西、莱特等人一同在外环过着自由而喧嚣的生活。她的热情与活力是维系团队氛围的重要黏合剂。
重要事件:在『火狱骑行』事件中，与伙伴们救下被追缉的绳匠「法厄同」，并在一系列冲突后，击败了「凯旋者」的阴谋，助力凯撒·金成为旧油井区域的新任霸主。此后又意外中了三百万丁尼的彩票大奖，并将其全部用于举办『第一届柏妮思杯七天七夜无限畅饮狂欢嘉年华』，极大地提升了帮派的声望。
刻骨铭心的往事:赢得彩票大奖后，毫不犹豫地决定将奖金与派派和绳匠平分，并在自己那一半奖金的使用上，选择举办一场邀请所有人（包括曾经的敌人）免费畅饮的盛大派对。这起事件完美体现了她慷慨、活在当下的价值观。
人生转折点:成功将曾是敌人的猫希人佣兵「波可娜·费雷尼」说服并邀请加入『卡呂冬之子』，壮大了帮派的实力，也证明了她那足以融化一切的独特魅力。
心路历程:从一个单纯的燃油与派对爱好者，成长为「卡吕冬之子」不可或缺的核心支柱。她始终如一，从未改变，而是用自身的热情与乐天精神感染并团结着身边的每一个人，将帮派带向更强盛的未来。她的人生信条简单而纯粹：和最棒的朋友们一起，做最开心的事情。
