【外貌特征】
身高:160 cm
体型:修长纤细的少女体型
发型:银白色高马尾，部分发束形成侧单马尾，有M形浏海与朝天小马尾
发饰:无
瞳色:橙瞳
肤色:白皙
面部特征:常戴大型黄色护目镜，以及可拉至鼻下的黑黄色颈套／面罩
服饰风格:黑灰色的无袖机能背心搭配黄色内搭，下身为黑色紧身战术长裤。双臂穿戴灰色分离袖套与黑色手套，并配有机械护膝与腿环等战术装备，整体以黑、灰、黄为主色调。
特殊标记:标志性的大型黄色护目镜、背负着装有黄色罐状物的大型灰色背包
气质描述:如出鞘利刃般坚定、冷峻，严格遵守纪律的士兵楷模，战斗时散发出与外表相反的炽热气息。
【性格特点】
性格类型:严于律己的军人型人格
个性化描述:极力表现为没有情感、忠于使命的完美武器，但内心深处对「背叛」一词有着创伤性的憎恨，并对「姊妹」安比怀有爱恨交织的复杂情感。在不熟悉的领域（如辨认名人）时，会显现出与战场形象不符的固执与单纯。
待人处世态度:对上级的命令绝对服从；对敌人，特别是叛徒，冷酷无情；不善于表达个人情感，习惯与人保持距离，但信任被认可的战友。
思维模式:任务至上的工具理性思维，认为情感是软弱的表现，并试图将其从自身彻底剥离。
情感特质:长期压抑个人情感，对「背叛」的字眼极度敏感，会触发强烈的情绪反应。对辣味食物有着狂热的喜爱，这或许是她宣泄情感的唯一途径。
行为特点:热爱吃辣，能在拉面中加入11罐辣油；习惯为他人取与红色相关的奇怪代号；在训练和实战中都追求100%的完美达成率。
性格缺陷:因被扭曲的过去记忆而深信安比背叛了自己，这份执念构成了她行动的核心动机之一。此外，身为白银复制体，在受重伤或特定条件下会触发记忆清除或错乱的缺陷。
【战斗专长】
奥波勒斯小队王牌，拥有极高的战术执行力。挥舞高温充能的军用刀剑，战斗风格极其精准致命。核心战法是通过完美的攻击时机不断提升剑刃温度，并以毁灭性的上挑斩击或近身烈焰爆发展现压倒性的破坏力。特殊体质：身为白银复制体，重创后记忆系统会优先损坏。
【背景故事】
出生背景:「白银计画」的产物，与安比·德玛拉拥有相同基因的复制人实验体。自诞生之日起就被作为士兵培养，其代号「11号」取代了真名「夏潾」，象征着与软弱过去的决裂。
成长历程:在严苛的军事化训练中长大，以成为完美士兵为唯一目标。在某次关键任务前因过度训练而受伤，错失机会，随后被高层视为「次品」并下令清除。
刻骨铭心的往事:当年安比为保护被当作「次品」的她，选择了拒绝命令并自刎，随后失踪。然而在11号残存的记忆中，此事被扭曲为「安比背叛并抛弃了自己」，这段虚假的记忆成为了她长久以来憎恨安比的根源，也是她内心最深处的伤痛。
心路历程:从一个追求抹除情感、只知服从命令的「兵器」，在一系列事件中被迫面对被压抑的情感与记忆。其存在意义在「士兵11号」与「夏潾」两个身份间不断拉扯，尽管主观上仍在抗拒，但正缓慢地走向寻回人性的道路。
【人际关系】
重要羁绊:安比·德玛拉（基因上的「姊妹」，曾是其队长。是11号认知中的「背叛者」，也是她情感的最终归宿，关系爱恨交织）
宿敌:崔姬（「白银的复苏」计画主导者，意图利用11号的复制人身份达成自身目的）、新艾利都的叛军组织（作为防卫军士兵，是其日常清剿的目标）
特殊关联:白银计画（创造了11号与安比的神秘计画，是二人宿命的开端）
【价值观念】
阵营:守序中立
行动准则:「令行禁止，忠于使命。」、「武器不需要情绪，只要切实地执行命令。」
特殊信条:背叛是不可饶恕的罪行，对待叛徒绝不留情。
终极目标:舍弃一切软弱，成为任务达成率100%的完美士兵。
【自己的台词语气】
开场:「士兵11号就位！随时准备行动！」
自我认知:「名字？我早就已经将它舍弃了。那会让我想起过去，而『过去』总是令人软弱。」
信念:「软弱已随名字一起舍弃，只留下了坚定的内心…至少我是这么认为的。」
日常:「是不是该迭代我们的定制训练参数了？」
对食物的执着:「这么多应该可以了。嗯~是有效提神。」
