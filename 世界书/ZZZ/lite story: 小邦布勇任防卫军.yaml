章节标题: "小邦布勇任防卫军"
剧情概要: "传奇绳匠哲/铃，应邦布“阿斯特教练”的紧急邀请，前往斯科特哨站，为一场“军用战斗邦布认证”考核担任临时助理教官。原来，原定教官——防卫军的王牌士兵芙罗拉（席德），其独特的教学方法——“靠近，然后一拳打爆”——对邦布们来说过于“超纲”，导致考核通过率惨淡。在芙罗拉因紧急任务离开后，哲/铃正式接手指导工作。在他们细致的战术规划下，几位性格迥异的邦布学员——运气很差、总想退赛的“退宝”，满脑子游戏术语的“电玩咖”，以及渴望地狱式训练的“自卫宝”——磕磕绊绊地通过了“反渗透”、“区域控制”等初步考核。考核中途，新学员“金言宝”加入，但因其语言模块部分损坏，说话结巴且断断续续，被其他邦布误会为性格暴戾的可怕家伙，心生畏惧。在细心的自卫宝察觉异常并向哲/铃求助后，哲/铃迅速修复了金言宝的语言模块，持续数日的误会终于解开，邦布团队的凝聚力因此大大增强。在最终的综合考核中，邦布们惊喜地发现，正是芙罗拉先前看似粗暴的体能训练，为它们打下了坚实的身体基础；再结合哲/铃精妙的战术指挥，它们得以超常发挥，漂亮地击败了所有模拟以骸，全员通过了认证。考核结束后，一直躲在暗中观察的芙罗拉才悄然出现。她向哲/铃表示感谢，坦言自己学到了要因材施教，并作为回报，决定亲自教授哲/铃真正的“邦布语”。"
