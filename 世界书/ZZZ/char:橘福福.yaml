【性格特点】
性格类型:元氣、天然萌、吃貨
个性化描述:表面上是個自信滿滿、自稱「絕世豪虎」的大師姐，內心卻對自己評價不高，認為自己時常出錯。她充滿正義感，嚮往成為行俠仗義的大俠，但關鍵時刻更在意保護師門與同伴
待人处世态度:對師父儀玄尊敬又無奈，時常因其神出鬼沒而操心。對師弟師妹們則盡心盡力，展現出極具責任感與耐心的大師姐風範。對待惡人則會毫不猶豫地出手
思维模式:思考方式直接而單純，相信「做正確的選擇」，道德觀念黑白分明，不善應對複雜的陰謀詭計
情感特质:情緒外露，開心、害羞或生氣都寫在臉上。雖然因種族滅絕的往事而背負沉重過去，但選擇積極樂觀地活在當下
行为特点:嗓門很大，戰鬥或平時都充滿氣勢地大喊。待機時會在武器「虎威」上瘋狂磨爪子。非常喜歡吃東西
性格缺陷:自信心不足，對自身的評價過低。有時會因過於單純而誤解狀況，例如將正在拍戲的演員當成真正的惡徒
【技能专长】
普通攻击:惡虎七式·燎身爪（利用雙爪進行至多四段的物理與火屬性斬擊）
