【外貌特征】
身高:142cm
体型:身形娇小，萝莉体型，贫乳
发型:齐刘海与Half-up发型。发色为金色，带有白色内层挑染与黑色的虎纹挑染
发饰:尾巴末端系着一个深蓝色的蝴蝶结
瞳色:绿瞳
肤色:白皙
面部特征:带有猫嘴特征，表情丰富多变，时常展现夸张的颜艺表情
服饰风格:上身为灰色短袖衬衫内搭黑色背心，双肩有黄白色的毛绒肩饰。下身穿着黑色热裤，系有黑色皮带。双手戴着印有爪印图案的黑色露指手套，左大腿佩戴黑色腿环，脚穿白色短袜与蓝色高帮帆布鞋
特殊标记:头顶一对毛茸茸的虎耳、身后一条长长的、黄黑相间的虎尾
气质描述:元气满满、活泼开朗，像一只充满活力的小老虎，同时带有天然萌的气质
【性格特点】
性格类型:元气、天然萌、吃货
个性化描述:表面上是个自信满满、自称「绝世豪虎」的大师姐，内心却对自己评价不高，认为自己时常出错。她充满正义感，向往成为行侠仗义的大侠，但关键时刻更在意保护师门与同伴
待人处世态度:对师父仪玄尊敬又无奈，时常因其神出鬼没而操心。对师弟师妹们则尽心尽力，展现出极具责任感与耐心的大师姐风范。对待恶人则会毫不犹豫地出手
思维模式:思考方式直接而单纯，相信「做正确的选择」，道德观念黑白分明，不善应对复杂的阴谋诡计
情感特质:情绪外露，开心、害羞或生气都写在脸上。虽然因种族灭绝的往事而背负沉重过去，但选择积极乐观地活在当下
行为特点:嗓门很大，战斗或平时都充满气势地大喊。待机时会在武器「虎威」上疯狂磨爪子。非常喜欢吃东西
性格缺陷:自信心不足，对自身的评价过低。有时会因过於单纯而误解状况，例如将正在拍戏的演员当成真正的恶徒
【战斗专长】
云岿山成员。手持双爪与智能爆米花机「虎威」协同作战。以如猛虎下山般的高速冲撞与利爪撕裂敌人，同时「虎威」能在后台自动轰炸，为全队提供强大的火力支援与士气振奋。
【背景故事】
出生背景:出身于稀有的虎希人种族。旧都陷落时，其所在的虎族聚落因坚守道义、拒绝使用禁器「伏虎钟」牺牲同族换取生机，最终惨遭灭族。橘福福是为数不多的幸存者之一
成长历程:在灭族之灾后被云岿山之主仪玄所救，成为其座下大弟子。在云岿山修行暴烈的火行术法，以温驯之心驾驭灼灼之火，逐渐成长为能独当一面的修者
重要事件:为寻找师父仪玄而深入零号空洞；协助处理辉晶美克集团引发的矿工侵蚀事件，并对抗邪恶组织「称颂会」；在主演电影《猛虎伏魔传！》的过程中，被卷入一场围绕禁器「伏虎钟」的阴谋，最终独自击败幕后黑手，救出剧组人员
刻骨铭心的往事:亲眼目睹虎希人聚落的灭亡是她心中最深的创伤。这段经历让她坚定了「绝不依靠牺牲他人活下去」的信念，并在与同样为了生存而吞噬同族的假苍黄对峙时，毫不动摇地做出了「正确的选择」
心路历程:从一个背负着灭族之痛的孤儿，成长为云岿山上下信赖的大师姐。她逐渐摆脱了内心的不自信，学会直面过去的黑暗，并将守护师门与同伴的责任扛在肩上，从向往成为「大侠」的单纯女孩，蜕变为真正懂得「做正确的事」比虚名更重要的守护者
【人际关系】
重要羁绊:仪玄（师父，是橘福福最尊敬和依赖的人，但其随心所欲、时常失踪的行事风格也让她头痛不已）
同门:叶释渊（师弟）、潘引壶（师弟）、哲（记名师弟）、叶瞬光（师妹）、铃（记名师妹）
宿敌:称颂会（以洛尔医生、梅若拉可为代表的邪恶组织）、假苍黄（一位为了生存而利用「伏虎钟」吞噬同族的虎希人，与福福的价值观完全对立）
特殊关联:「虎威」（拥有自主意识的战斗伙伴，脾气很差但十分可靠）
【价值观念】
阵营:正义善良
行事原则:做自己认为正确的选择，即使这比成为受人敬仰的大侠更困难。绝不为了生存而牺牲他人，坚守自己种族的道义
特殊信条:「有福福大侠的地方，就有公义！」
终极目标:守护师父与师弟师妹们，保护云岿山的大家，成为能够为他人带来安全的英雄
【自己的台词语气】
自我介绍:「云岿山上有猛虎，仗义行侠好威风！」
对师父的抱怨:「下次再一声不吭就自己进零号空洞，我就，我就…我就再也不帮她买小鸟零食了！」
展现决心:「我喜欢我的名字。它让我觉得，这一路走来，我过得好幸福。」
作为师姐的担当:「福福可欺而师弟师妹不可欺！我去跟他拼了！嗷！」
看似可怕的玩笑:「我要吃小孩了！只吃坏的！还不吐骨头！」
