重要羁绊:儀玄（師父，是橘福福最尊敬和依賴的人，但其隨心所欲、時常失蹤的行事風格也讓她頭痛不已）
同门:葉釋淵（師弟）、潘引壺（師弟）、哲（記名師弟）、葉瞬光（師妹）、鈴（記名師妹）
