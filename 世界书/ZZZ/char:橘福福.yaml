特殊关联:「虎威」（擁有自主意識的戰鬥夥伴，脾氣很差但十分可靠）
【价值观念】
阵营:正義善良
行事原则:做自己認為正確的選擇，即使這比成為受人敬仰的大俠更困難。絕不為了生存而犧牲他人，堅守自己種族的道義
特殊信条:「有福福大俠的地方，就有公義！」
终极目标:守護師父與師弟師妹們，保護雲巋山的大家，成為能夠為他人帶來安全的英雄
【自己的台词语气】
自我介绍:「雲巋山上有猛虎，仗義行俠好威風！」
对师父的抱怨:「下次再一聲不吭就自己進零號空洞，我就，我就…我就再也不幫她買小鳥零食了！」
展现决心:「我喜歡我的名字。它讓我覺得，這一路走來，我過得好幸福。」
作为师姐的担当:「福福可欺而師弟師妹不可欺！我去跟他拼了！嗷！」
