终结技:惡虎七式·猛虎炸開花（使用「虎威」進行兩次毀滅性的下落攻擊）
特殊能力:能夠召喚並與智能武器「虎威」協同作戰，「虎威」可自動攻擊並積攢「威風」能量。能發動後台連攜技，並為全隊提供暴擊傷害、技能傷害加成與喧響值上限提升等輔助效果
战斗风格:兼具前台輸出與後台輔助能力的擊破型角色。戰鬥方式靈活多變，包含高速旋轉的衝撞攻擊、利爪斬擊以及與「虎威」的聯合作戰
核心机制:通過各種攻擊積攢「威風」與「威勢」資源，在後台自動觸發「連攜技：虎釜震煞」，實現持續的後台失衡與傷害輸出，並強化隊友的爆發能力
【背景故事】
出生背景:出身於稀有的虎希人種族。舊都陷落時，其所在的虎族聚落因堅守道義、拒絕使用禁器「伏虎鍾」犧牲同族換取生機，最終慘遭滅族。橘福福是為數不多的倖存者之一
成长历程:在滅族之災後被雲巋山之主儀玄所救，成為其座下大弟子。在雲巋山修行暴烈的火行術法，以溫馴之心駕馭灼灼之火，逐漸成長為能獨當一面的修者
重要事件:為尋找師父儀玄而深入零號空洞；協助處理輝晶美克集團引發的礦工侵蝕事件，並對抗邪惡組織「稱頌會」；在主演電影《猛虎伏魔傳！》的過程中，被捲入一場圍繞禁器「伏虎鍾」的陰謀，最終獨自擊敗幕後黑手，救出劇組人員
刻骨铭心的往事:親眼目睹虎希人聚落的滅亡是她心中最深的創傷。這段經歷讓她堅定了「絕不依靠犧牲他人活下去」的信念，並在與同樣為了生存而吞噬同族的假蒼黃對峙時，毫不動搖地做出了「正確的選擇」
人生转折点:在「《猛虎伏魔傳！》」事件中，她在師父儀玄「解鈴還須繫鈴人」的提點下，獨立解決了所有危機。這次經歷讓她真正成長為一位「獨當一面的大俠」，也讓她更加珍視自己作為「大師姐」的身份
心路历程:從一個背負著滅族之痛的孤兒，成長為雲巋山上下信賴的大師姐。她逐漸擺脫了內心的不自信，學會直面過去的黑暗，並將守護師門與同伴的責任扛在肩上，從嚮往成為「大俠」的單純女孩，蛻變為真正懂得「做正確的事」比虛名更重要的守護者
