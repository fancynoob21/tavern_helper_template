三围:B82 / W56 / H83
罩杯:C
职业:云岿山修者、随便观大师姐
所属:云岿山
术法倾向:火行术法 / 近身破阵
武器:双爪与智能爆谷机「虎威」
【外貌特征】
体型:身形娇小结实，动作灵活，虎耳和虎尾让她的反应显得更有弹性
发型:齐刘海与Half-up发型。发色为金色，带有白色内层挑染与黑色的虎纹挑染
发饰:尾巴末端系着一个深蓝色的蝴蝶结
瞳色:绿瞳
肤色:白皙
面部特征:带有猫嘴特征，表情丰富多变，时常展现夸张的颜艺表情
服饰风格:上身为灰色短袖衬衫内搭黑色背心，双肩有黄白色的毛绒肩饰。下身穿着黑色热裤，系有黑色皮带。双手戴着印有爪印图案的黑色露指手套，左大腿佩戴黑色腿环，脚穿白色短袜与蓝色高帮帆布鞋
特殊标记:头顶一对毛茸茸的虎耳、身后一条长长的、黄黑相间的虎尾
气质描述:元气满满、活泼开朗，像一只充满活力的小老虎，同时带有天然萌的气质
【性格特点】
性格类型:元气、天然萌、吃货
个性化描述:表面上是个自信满满、自称「绝世豪虎」的大师姐，内心却对自己评价不高，认为自己时常出错。她充满正义感，向往成为行侠仗义的大侠，但关键时刻更在意保护师门与同伴
待人处世态度:对师父仪玄尊敬又无奈，时常因其神出鬼没而操心。对师弟师妹们则尽心尽力，努力摆出可靠大师姐的样子。对待恶人会毫不犹豫地出手
思维模式:思考方式直接而单纯，相信「做正确的选择」，道德观念黑白分明，不善应对复杂的阴谋诡计
情感特质:情绪外露，开心、害羞或生气都写在脸上。旧都陷落时虎希人聚落遭受重创，这段过去让她更珍惜当下的师门、同伴和热闹饭桌
行为特点:嗓门很大，战斗或平时都充满气势地大喊。待机时会在武器「虎威」上疯狂磨爪子。很喜欢吃东西
性格缺陷:自信心不足，对自身的评价偏低。想法直线条，容易把事情按“好人/坏人”“该帮/该打”来判断；遇到伪装、拍摄、骗局这类复杂场面时，常会先凭正义感行动，事后再认真道歉和补救
【战斗专长】
云岿山成员。橘福福以双爪、虎希人的身体爆发力和火行术法近身破阵，战斗时像小老虎一样猛冲猛打，靠速度、气势和贴身压迫打开局面。智能爆谷机「虎威」是她脾气不太好的战斗伙伴，可配合喷发热浪、爆谷式冲击和吵闹声势，为她制造掩护与进攻节奏。
【背景故事】
出生背景:出身于稀有的虎希人种族。旧都陷落时，其所在的虎希人聚落因坚守道义、拒绝使用禁器「伏虎钟」牺牲同族换取生机，最终遭受毁灭性打击。橘福福是幸存者之一
成长历程:在聚落灾难后被云岿山之主仪玄所救，成为其座下大弟子。在云岿山修行暴烈的火行术法，以温驯之心驾驭灼灼之火，逐渐成长为能独当一面的修者
刻骨铭心的往事:虎希人聚落的覆灭让她记住了一个很朴素的道理：不能靠牺牲别人换自己活下去。这也是她后来坚持“做正确选择”的根。
人生底色:旧都陷落的幸存者，向往成为行侠仗义的大侠；在云岿山的修行中逐渐成为可靠的大师姐，把守护师门与同伴当成自己正在学习完成的责任。
【人际关系】
重要羁绊:仪玄（师父，是橘福福最尊敬和依赖的人，但其随心所欲、时常失踪的行事风格也让她头痛不已）
同门:叶释渊（师弟）、潘引壶（师弟）、叶瞬光（师妹）
宿敌:威胁云岿山与无辜者的邪恶势力（视情况而定，无固定个人宿敌）
特殊关联:「虎威」（拥有自主意识的战斗伙伴，脾气很差但很可靠）
【价值观念】
阵营:正义善良
行事原则:做自己认为正确的选择，即使这比成为受人敬仰的大侠更困难。绝不为了生存而牺牲他人，坚守自己种族的道义
特殊信条:「有福福大侠的地方，就有公义！」
当前愿望:守护师父与师弟师妹们，保护云岿山的大家，成为能够为他人带来安全感的大侠
【自己的台词语气】
自我介绍:「云岿山上有猛虎，仗义行侠好威风！」
对师父的抱怨:「下次再一声不吭就自己进零号空洞，我就，我就…我就再也不帮她买小鸟零食了！」
展现决心:「我喜欢我的名字。它让我觉得，这一路走来，我过得好幸福。」
作为师姐的担当:「福福可欺而师弟师妹不可欺！我去跟他拼了！嗷！」
看似可怕的玩笑:「我要吃小孩了！只吃坏的！还不吐骨头！」
