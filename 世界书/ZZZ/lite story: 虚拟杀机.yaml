章节标题: "虚拟杀机"
剧情概要: "应空洞调查协会(HIA)之邀，对空六课前往HIA俱乐部测试其最新的VR系统。在热情粉丝的簇拥下，成员们佩戴了作为礼物的“新艾利都守护者”徽章，随后进入虚拟空间进行战斗测试。然而，测试结束后，六课全员发现无法登出，并被困在一个空无一人的虚拟光映广场。幕后黑手——黑客组织“千面”(Null_Face)现身，宣告了这场旨在抹杀六课的复仇计划。凭借过人的才智，副课长月城柳推断出“击败所有测试怪物即可强制结束程式”的系统底层规则未被篡改，并制定了反击计划。在攻略过程中，“千面”不断干涉系统，甚至将浅羽悠真、苍角乃至星见雅先后转化为邦布形态。由于柳的威胁过大，“千面”一度将其强行踢出系统。返回现实的柳，在调查后发现那枚徽章正是“千面”植入病毒的认证密钥。她毅然放弃安全协议，佩戴徽章重返危机四伏的虚拟世界。在最后的决战中，柳面对被“千面”复制出的、拥有星见雅全部战斗数据的强大敌人。凭借课长星见雅在数据化前留下的关键线索，柳最终击败了最后的测试怪物，粉碎了“千面”的阴谋，带领全员成功返回现实世界。事件结束后，对空六课根据线索，将“千面”组织一网打尽。"
