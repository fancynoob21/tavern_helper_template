【外貌特征】
身高:141cm
体型:嬌小纖弱的蘿莉體型
发型:墨綠色的及腰長髮，梳成高高的雙馬尾，以黑色緞帶束起
发饰:白色蕾絲邊的女僕髮箍
瞳色:溫柔的紫色眼瞳
肤色:白皙通透
面部特征:眉形稍粗，顯得無辜而稚氣
服饰风格:黑白相間的哥德風格戰鬥女僕裝。上身為黑色短袖，肩部帶有白色泡泡袖，領口飾有白色蕾絲與紅色蝴蝶結。、腰間繫著白色圍裙，裙擺上層有黑白格紋圖案。、下身是黑色的多層次短裙，裙邊點綴著白色蕾絲與鋸齒狀剪裁。、配飾包括黑色的頸圈、手套、及膝長襪與厚底短靴。
特殊标记:身體多處帶有弗蘭肯斯坦式的美學元素，如不易察覺的螺絲、鐐銬裝飾，手臂上更有形似縫合線的傷疤，暗示著其經歷過的重大手術。
气质描述:總是流露出一種擔驚受怕、極度缺乏自信的弱氣感，慌張時眼神飄忽不定，如同受驚的小動物。
【性格特点】
性格类型:怯懦怪力型 (反差萌)
个性化描述:表面上是個膽小怯懦、遇事只會道歉的少女，實際上卻擁有能輕易鋸開列車車廂的怪力，形成了極大的反差。
待人处世态度:乖巧聽話，認真負責。無論面對多麼骯髒勞累的工作都能完美完成，但總是習慣性地將『對不起』掛在嘴邊，害怕自己給別人添麻煩。
思维模式:極度在意他人的看法，時刻擔心自己會拖累同伴，對自身能力抱持著深刻的懷疑，即便完成任務後也難以獲得自我肯定。
情感特质:內心敏感細膩，情感豐富。會因他人的鼓勵與幫助而感動落淚，也珍視著與已逝友人的回憶。
行为特点:習慣以第三人稱『可琳』自稱。著急或緊張時，說話會帶有輕微的結巴。
性格缺陷:極度的不自信，已到自我貶低的程度，難以客觀評價自身的價值與能力。
【技能专长】
特殊技:強力清掃 (Heavy-Duty Cleaning)
终结技:非、非常抱歉！ (I-I'm So Sorry!)
特殊能力:擁有與嬌小身材不符的超常力量，能獨自舉起重物，並嫻熟地操控巨大的動力鋸進行破壞與戰鬥。
专业水平:家政服務方面的專家，工作能力深受客戶好評，被譽為『市場上能找到的最好的女僕』。
战斗风格:『強攻』型戰士，揮舞著與自身極不相稱的巨大電鋸，以持續不斷的迴旋斬擊壓制並撕裂敵人，風格大開大合，極具破壞力。
核心机制:通過普通攻擊與技能的持續斬擊命中敵人來累積充能，並在特定技能（如閃避反擊、特殊技）的收尾階段引爆電鋸，消耗充能造成爆發性的額外傷害。
【背景故事】
出生背景:身世不明。在加入維多利亞居家服務前，曾因不明原因經歷過一段病危時期，依靠一場神秘的重大手術才得以存活。
成长历程:康復後，被維多利亞居家服務的馮·萊卡恩與亞歷山德麗娜收養，成為了這個以『家政服務』為名的特殊組織的一員，並將同事們視為家人。
重要事件:於『死路空洞』中遇險，被繩匠法厄同兄妹（哲與鈴）所救，自此結下不解之緣。、協助法厄同等人深入『芭萊大廈』，尋找被綁架的黑客芮恩，並在行動中展現了驚人的戰鬥力。、為了紀念一位可能已經不在人世的摯友，下定決心學習繪畫，並委託法厄同幫忙拍攝照片以尋找靈感。
刻骨铭心的往事:過去那段與死亡擦肩而過的病危經歷，以及那場賦予她新生的手術。此外，一位摯友的離世成為了她心中難以言喻的傷痛與思念，據推測，可琳體內的心臟可能移植自這位友人。
人生转折点:從病危中康復，並被維多利亞居家服務收養。這不僅讓她重獲新生，也讓她擁有了一個溫暖的家與值得信賴的同伴。
心路历程:從一個瀕死的病弱少女，蛻變為擁有強大力量的女僕。然而，內心的自卑與不安卻從未消減。在與法厄同等新朋友相遇、共同經歷了多次冒險後，她在同伴們的鼓勵與信任下，正一步步地學習如何正視自己，找尋屬於自己的勇氣與自信。
【人际关系】
重要羁绊:馮·萊卡恩 (von Lycaon)：維多利亞居家服務的領導者，可琳的監護人之一，如同父親般的存在，時常為可琳過度的不自信而頭痛。、亞歷山德麗娜·莎芭絲緹安 (Alexandrina Sebastian)：可琳的另一位監護人，對可琳關懷備至。、艾蓮·喬 (Ellen Joe)：維多利亞居家服務的同事，與可琳關係親密。
盟友/協助對象:法厄同 (哲與鈴)：在空洞中拯救過可琳的繩匠，是可琳信任並依賴的朋友。、貓宮又奈 (Nekomiya Mana)：與法厄同兄妹一同行動的夥伴，對可琳的家政公司抱有濃厚興趣。
合作伙伴:狡兔屋 (Cunning Hares)、白祇重工 (Belobog Heavy Industries)
宿敌:空洞中威脅著新艾利都的『以骸』，以及執行任務時遭遇的一切敵對勢力。
特殊关联:一位已不在人世的摯友。這位朋友是可琳重要的精神寄託，也是她學習繪畫的動力源泉，其心臟極有可能正在可琳的體內跳動著。
【价值观念】
阵营:中立善良
工作原则:絕對認真，絕對負責。只要是接下的委託，無論多麼艱難都會堅持到底，絕不辜負客戶的信任。
特殊信条:『為、為了成為能獨當一面的女僕，可琳會加油努力的！』
终极目标:努力成長，希望有朝一日能成為真正獨當一面、不再拖累大家、能讓家人引以為傲的優秀女僕。
【自己的台词语气】
口頭禪:「對、對不起！」、「我、我這樣的人……真的可以嗎？」
自我否定:「請、請等一下！可琳並不是這樣的！」、「嗚嗚，請、請不要把這份報道發出去！這不是真正的可琳！」
執行任務時:「對不起，以骸先生或者以骸女士！但是可琳需要完成自己的任務…真的很抱歉！」
笨拙時:「唔…對、對不起，可琳笨手笨腳的，沒辦法把東西切得很均勻…」