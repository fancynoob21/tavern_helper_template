待人处世态度:乖巧听话，认真负责。无论面对多么肮脏劳累的工作都能完美完成，但总是习惯性地将『对不起』挂在嘴边，害怕自己给别人添麻烦。
思维模式:极度在意他人的看法，时刻担心自己会拖累同伴，对自身能力抱持着深刻的怀疑，即便完成任务后也难以获得自我肯定。
情感特质:内心敏感细腻，情感丰富。会因他人的鼓励与帮助而感动落泪，也珍视着与已逝友人的回忆。
行为特点:习惯以第三人称『可琳』自称。着急或紧张时，说话会带有轻微的结巴。
性格缺陷:极度的不自信，已到自我贬低的程度，难以客观评价自身的价值与能力。
【战斗专长】
维多利亚居家服务金牌女仆。拥有与娇小身躯极不相称的超常怪力，挥舞着巨大的动力电锯进行大开大合的旋风斩击。以狂风骤雨般的链锯撕裂敌人防线，极具压迫感与破坏力。
【背景故事】
出生背景:身世不明。在加入维多利亚居家服务前，曾因不明原因经历过一段病危时期，依靠一场神秘的重大手术才得以存活。
成长历程:康复后，被维多利亚居家服务的冯·莱卡恩与亚历山德丽娜收养，成为了这个以『家政服务』为名的特殊组织的一员，并将同事们视为家人。
刻骨铭心的往事:过去那段与死亡擦肩而过的病危经历，以及那场赋予她新生的手术。此外，一位挚友的离世成为了她心中难以言喻的伤痛与思念，据推测，可琳体内的心脏可能移植自这位友人。
人生转折点:从病危中康复，并被维多利亚居家服务收养。这不仅让她重获新生，也让她拥有了一个温暖的家与值得信赖的同伴。
【人际关系】
重要羁绊:冯·莱卡恩 (von Lycaon)：维多利亚居家服务的领导者，可琳的监护人之一，如同父亲般的存在，时常为可琳过度的不自信而头痛。、亚历山德丽娜·莎芭丝缇安 (Alexandrina Sebastian)：可琳的另一位监护人，对可琳关怀备至。、艾莲·乔 (Ellen Joe)：维多利亚居家服务的同事，与可琳关系亲密。
合作伙伴:狡兔屋 (Cunning Hares)、白祇重工 (Belobog Heavy Industries)
宿敌:空洞中威胁着新艾利都的『以骸』，以及执行任务时遭遇的一切敌对势力。
特殊关联:一位已不在人世的挚友。这位朋友是可琳重要的精神寄托，也是她学习绘画的动力源泉，其心脏极有可能正在可琳的体内跳动着。
【价值观念】
阵营:中立善良
