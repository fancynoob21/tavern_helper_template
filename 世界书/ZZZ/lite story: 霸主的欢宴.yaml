章节标题: "霸主的歡宴"
剧情概要: "在「業火巡遊」的塵埃落定後，卡呂冬之子（Sons of Calydon）的領袖凱撒（Caesar）榮登新一任霸主之位。為了慶祝並團結外環（Outer Ring）的各方勢力，凱撒決定在野火鎮（Blazewood）一家名為「芝托邦（Cheesetopia）」的廢棄餐廳舉辦一場盛大的宴會。為此，她邀請了身為繩匠，同時也是傳奇代理人的（哲/铃）(法厄同)作為餐廳的代理店長，全權負責餐廳的重建與經營。在重建過程中，（哲/铃）將與凱撒的得力部下們——萊特（Lighter）、柏妮思（Burnice）、露西（Lucy）與派派（Piper）逐一合作，完成一系列深入空洞（Hollow）的任務，為餐廳添磚加瓦。然而，前任霸主幫派「凱旋者（The Vanquishers）」中的部分成員因對其前首領龐培（Pompey）之死心懷怨恨，不相信其死於陰謀，因而在此期間不斷製造麻煩，意圖破壞宴會。最終，在宴會前夕，這批凱旋者成員設下陷阱，以求救信號引誘凱撒深入險境。凱撒明知有詐，但出於霸主的責任感，仍與（哲/铃）一同前往。在徹底粉碎了這場陰謀後，慶功宴順利舉行。凱旋者的現任幹部也出席了宴會，與過去的恩怨正式和解，外環的秩序在杯觥交錯中迎來了新的篇章。"
