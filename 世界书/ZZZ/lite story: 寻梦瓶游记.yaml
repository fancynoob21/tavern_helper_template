章节标题: "寻梦瓶游记"
剧情概要: "传说在海边，可以调到海神专属的许愿频道……为了响应这个号召，主角（哲/铃）来到了新艾利都的『幻想乐园』沙滩。在这里，他们遇到了一只自称是『海神之子』的邦布『古力』。古力正在发表激昂的演讲，声称自己被奸诈的兄弟陷害，流落至此，并认定主角就是预言中将帮助他回归故土的『信使』。他的任务，就是让主角帮忙将装满愿望的『许愿瓶』投入大海，只要投满十四个，他就能获得指引，荣归故里。在这场看似荒诞的仪式中，主角还遇到了另一位举止优雅的邦布『艾丝梅小姐』，以及一位喜欢给邦布讲空洞恐怖故事的神秘蓝发少女。随着最后一个许愿瓶被投下，众人期待的『神迹』并未发生，取而代之的是一只脖子上挂满漂流瓶的鲨鱼邦布——『海巫师』被海浪冲到了岸边。原来，『海神之子』与『海巫师』是旧识，两只邦布都有着『逻辑核心异常』，这场声势浩大的『迎神仪式』不过是他们之间一场旷日持久的『角色扮演』。真相大白后，『海巫师』将他收集到的几份『回信』作为谢礼交给了主角，信中揭示了其他邦布的可爱心事与烦恼，为这场夏日闹剧画上了温馨的句号。"
