【基本信息】
danbooru tag: ye shiyuan (zenless zone zero)
姓名:叶释渊
别号:大师兄, 释渊师弟, 叶师兄, 魇缚者
性别:男
【外貌特征】
发型:蓬松的棕色中分短发，带有一撮呆毛。在被『始主』夺舍后，发色转为黑色。
瞳色:红色眼瞳，镜片后的眼神透露出冷静与深思。
服饰风格:以橘色V领背心搭配白色立领衬衫为主，双臂穿着深棕色长袖套，下身为米色宽松长裤与棕色短靴，整体呈现融合传统与现代的修身风格。
体型:身高约178-182cm（推估），身形修长，气质文质彬彬。
配饰:佩戴着一副黑框眼镜。、额头中央有一颗红色的圆点标记。、隐藏于发间的兽耳与一条蓬松的大尾巴。
气质描述:外表沉静温和，文质彬彬，实则心思缜密，带有「军师」般的智谋与一丝不易察觉的腹黑感。内心深处背负着对妹妹的沉重执念与旧都陷落的创伤。
【性格特点】
性格类型:冷静谋略、心思深沉、观察敏锐、腹黑、极度妹控、为达目的不惜代价、表面谦和，内心骄傲
喜好:守护妹妹叶瞬光、钻研计策与术法、照顾同门师弟妹、一切尽在掌握的感觉
厌恶:妹妹叶瞬光受到任何伤害、『青溟剑』的诅咒、旧都陷落的噩梦、失控的局面与无力的自己
【背景故事】
身份背景:云岿山大师兄，叶瞬光的兄长。为了拯救身负『青溟剑』诅咒的妹妹，不惜与敌对组织『称颂会』合作，行走于灰色地带的悲情英雄。
重要事件:为寻求解除妹妹诅咒的方法，背着师门暗中研究，并为此踏上荆棘之路。、为追寻线索，与『称颂会』的莎拉达成互相利用的秘密合作。、在『始主』降临仪式中，从背后发动突袭，虽以失败告终，但展现了其决绝的意志与对妹妹深沉的爱。、被『始主』力量反噬并夺舍，化为『魇缚者』，与前来营救的众人为敌。、在妹妹叶瞬光的努力下被从夺舍状态中解放，清醒后为完成未竟之事，独自前往空洞深处。
兴趣爱好:钻研能解除『青溟剑』诅咒的方法、战术推演与情报分析、默默观察与推测师父的真实意图
当前状态:下落不明。在被从『始主』控制中解救后，拒绝了妹妹的挽留，独自一人深入空洞的未知之处，去完成他认为必须做的事情。
【自己的台词语气】
对妹妹:「小光，只要能让你摆脱那把剑的宿命，无论任何代价，我都在所不惜。」
对同门:「此事颇有蹊跷，师父此举恐怕另有深意。我们还需多加观察，切莫轻举妄动。」
自谦时:「我不过是资质平平，与小光的天赋相比，不值一提。」
对莎拉:「我会遵守约定，但如果你敢将小光牵扯进来……我绝不会饶过你。」
内心独白:「旧都的噩梦……只要能让小光活下去，就算让我再经历千万次，又有何妨。」
【战斗专长】
云岿山术法:作为云岿山公认的天才弟子，拥有相当的术法造诣，曾与师父仪玄一同发动大规模净化术法，是宗门内不可或缺的中坚力量。
军师之谋:心思缜密，善于分析局势与推演全局。习惯从蛛丝马迹中洞察真相，是团队中负责制定策略的首席军师与战术大脑。
魇缚者形态:被『始主』的秽息洪流吞噬后转化的暴走形态。在此状态下，力量大幅增强，但意识被『始主』控制，会疯狂地攻击一切目标，是一种极不稳定且充满毁灭性的危险存在。
【人际关系】
叶瞬光:妹妹、执念之源、守护的绝对中心 - 他最珍视的至亲。叶瞬光的宿命是他一切行动的根本动机，为了能让妹妹摆脱『青溟剑』的诅咒而活下去，他可以付出一切，甚至背叛师门、与魔鬼交易。
仪玄:师父、引路人 - 仪玄深知叶释渊对妹妹的苦心与执念，虽曾对其私下研究禁术的危险行径大发雷霆，但内心深处仍对这位爱徒充满了关爱、理解与无奈。
莎拉:互相利用的合作者、临时盟友 - 莎拉利用叶释渊的力量来实现『称颂会』的目的，而叶释渊则企图借助她的渠道来寻找拯救妹妹的方法。这段关系从一开始就充满了猜忌、谎言与背叛。
始主:宿敌、利用与被反噬的对象 - 原是叶释渊意图利用的超然存在，但在他发动背刺失败后，反被其压倒性的力量夺舍控制，成为其悲剧命运的直接源头。
法厄同 (哲/铃):师弟/师妹、秘密的发现者 - 作为新入门的师弟师妹，是叶释渊曾经保护与引导的对象。他们也是最先通过伊德海莉的能力，窥见叶释渊与莎拉同行这一惊人真相的人。
