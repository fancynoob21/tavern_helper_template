章节标题: "问题士兵补习班"
剧情概要: "防卫军士兵伊桑在斯科特哨站正头疼不已，奥波勒斯小队的王牌火炮手席德又想逃掉模拟训练，这次的借口是去黑雁工地参加‘吊车竞速大赛’。就在席德即将驾着滑板车溜之大吉时，恰好前来此地的绳匠‘法厄同’（哲/铃）撞见了这一幕。还没等伊桑求助，奥波勒斯小队的另一组搭档——奥菲丝与队长‘鬼火’——便驾驶着重型机甲从天而降，将逃跑的席德‘抓捕归案’。由于人手短缺，伊桑正式委托哲/铃，希望这位传奇绳匠能协助他监督奥波勒斯小队的特训，并收集关键的战斗数据。在接下来的几天里，哲/铃与奥波勒斯小队的成员们一同训练、一同欢笑。他们见证了席德在‘回转强袭’训练中的惊人天赋，也旁观了她在训练结束后，理直气壮地在物资清单上为‘老席德’、‘扳机’、‘11号’乃至哲/铃的各种马甲都申请一份奖励的奇特脑回路。次日，小队狙击手扳机也来到哨站，并透露席德在梦里都在念叨着与哲/铃一起训练的快乐。在当天的‘投射物逆转’训练中，哲/铃主要协助奥菲丝完成项目，并在训练后的闲聊中，听扳机讲述了小队上次进行‘海上作战训练’时的趣闻——席德为了不下水，竟让‘老席德’悬浮在海上充当钓鱼平台，帮助奥菲丝完成‘捕鱼’任务。这个故事让哲/铃更深刻地理解了席德的行事逻辑：与谁同行，远比做什么事更重要。最终，在审核的最后一天，哲/铃带领着席德与奥菲丝，共同完成了包含此前所有高危敌人的终极模拟战‘最终围攻：决战’。随着伊桑宣布奥波勒斯小队全员数据达标、审查顺利通过，这次为了‘问题士兵’席德而开设的特别补习班，也在一片欢声笑语中圆满结束。"
