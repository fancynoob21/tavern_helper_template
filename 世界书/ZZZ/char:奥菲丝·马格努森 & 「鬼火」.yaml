重要羁绊:奥菲厄丝（克隆母本，即「鬼火」的过往之躯）
所属团体:组织:新艾利都防卫军·奥波勒斯小队, 上级:伊瑟尔德上校（「鬼火」的旧识与现任长官）, 队友:“11号”、“扳机”、“席德”&“老席德”
互动角色:合作关系:仪玄（云巋山）、哲（法厄同）、铃（法厄同）, 营救对象:浮波柚叶（怪啖屋）
敌对势力:辉晶美克、称颂会、导致旧都事件的防卫军腐败高层
【价值观念】
阵营:守序中立（以军方命令为准则，但核心动机是复仇）
行动准则:「鬼火」：不惜一切代价向敌人复仇，保护现有的小队成员，将奥菲丝培养成最顶尖的士兵。奥菲丝：努力回应队长的期待，不拖小队后腿，成为像队长一样的人。
特殊信条:“渡过冥河的船橹，这一次握在自己手中吧。”（引自伊瑟尔德上校，象征着二人挣脱死亡宿命，自我掌握命运的决心）
终极目标:「鬼火」：揪出并审判所有与“旧都陷落事件”相关的腐败分子。奥菲丝：成为能与队长并肩而立，甚至超越她的独当一面的战士。
【自己的台词语气】
二人的互动:「别再盯着那些花里胡哨的手办广告了！不然我就把你抽屉里藏的那些统統沒收！」「不可以哦隊長！否則明天醒來的時候，你就會穿上粉色的槍套！」「嘁…帮我买两盒保养枪油我就装作没看见。」「谢谢队长！这次还是燃油饮味的，对吧？」
