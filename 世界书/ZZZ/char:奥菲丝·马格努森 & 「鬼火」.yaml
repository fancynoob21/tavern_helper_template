【性格特点】
奥菲丝:性格类型:弱气成长型, 个性化描述:性格温和甚至有些怯懦，时常显得迷糊、冒失，是个不折不扣的“笨蛋”和“吃货”，对甜点和可爱的小动物毫无抵抗力。虽然总被队长严厉管教，但内心纯真，并以自己的方式默默努力，渴望得到认可。, 行为特点:在紧张或思考时会支支吾吾，面对「鬼火」的训斥会下意识服从，但也会在关键时刻用一些天真的方法“威胁”对方，例如“粉红色的枪套”。
「鬼火」:性格类型:傲娇暴躁型（Tsundere）, 个性化描述:作为奥波勒斯小队的队长，脾气火爆，言语粗鲁，行事果决甚至有些冲动。她以“完美士兵”的标准严苛地要求奥菲丝，嘴上从不饶人，但实际上极其护短，用一种近乎“老妈子”的方式关心着奥菲丝的成长，私下甚至会偷偷观看网络上的育儿视频来学习如何培养她。, 情感特质:内心深处背负着对旧日战友的愧疚与复仇的怒火，情感强烈而直接，是一位典型的“暴娇”与“傲娇”。
【技能专长】
角色定位:火属性强攻型副C/辅助
特殊技:「蚀光一闪」、「灼红旋涡」、「蓄热充能」、「燥焰迸射」：一系列枪械与龙尾炮口的组合攻击，能够进行快速的火力倾泻。
终结技:「与火共舞」：解放「鬼火」的全部力量，发动毁灭性的激光扫射，对范围内敌人造成巨额火属性伤害。
特殊能力:协同追加攻击：作为后台角色时，能在前台队友攻击时协同发动火属性追加攻击；「准星聚焦」：部分招式命中后，能为全队提供攻击力加成，并使全队造成的追加攻击伤害无视敌人一定比例的防御力。
战斗风格:人枪合一，远近结合。奥菲丝负责近身的体术与匕首格斗，「鬼火」则提供中远距离的强大火力压制与支援。战斗中，二人是密不可分的整体。
核心机制:通过高频率的协同攻击与后台支援，为队伍提供稳定的火属性伤害补充和强大的攻击增益，其核心在于将自身的能量回复效率转化为对全队的攻击力拐力。
【背景故事】
出生背景:奥菲丝是“旧都陷落事件”中的传奇士兵「奥菲厄丝」的克隆体。而「鬼火」，正是奥菲厄丝本人——在当年那场惨烈的战斗中，她身负濒死重伤，军方通过一项研究计划将其意识备份并转移到一具枪械形态的智能构造体中，使她以新的生命形式得以存续。
成长历程:为了向导致旧日悲剧的腐败高层复仇，也为了继续战斗，「鬼火」与她的克隆体“载体”奥菲丝，一同加入了由昔日战友伊瑟尔德上校组建的“奥波勒斯小队”。从此，这对独特的“母女”与“战友”便形影不离，在枪林弹雨中维系着奇妙的共生关系。
重要事件:旧都陷落事件：十一年前，「鬼火」（时为奥菲厄丝）所在的伊格门侬小队因腐败高官的命令而陷入死地，除她与伊瑟尔德外全员阵亡。此事成为「鬼火」心中永远的痛与复仇的源动力。 | “厄影弥途”事件：与队友“扳机”、云巋山代理人仪玄一同深入零号空洞，调查秽息污染。 | “迟吟的浪涌”行动：随伊瑟尔德上校前往澄辉坪，与“法厄同”合作，阻止辉晶美克销毁其与“称颂会”勾结的罪证。
刻骨铭心的往事:「鬼火」始终为旧都陷落时未能救下所有队友而自责与愤怒，并将部分怒火迁怒于当时前来支援却未能阻止惨剧发生的云巋山时任门主仪絳。这份迁怒也延续到了对仪絳的后辈仪玄的恶劣态度上。
心路历程:「鬼火」的意识从一个充满复仇火焰的孤魂，转变为一个对克隆体“女儿”奥菲丝进行严厉而笨拙培养的监护人。奥菲丝则在队长的严苛教导与私下纵容的矛盾环境中，努力从一个胆怯天真的少女，向着成为一名能独当一面的优秀军人目标不断迈进。
