服饰风格:上身穿着黑色连帽功能夹克，内衬为黄色；下身是黑色短裤，配有黑色过膝吊带袜与厚底短靴，腿上绑有腿环，双手佩戴着不同款式的黑色手套，整体呈现军武与少女风格的混搭
特殊标记:「鬼火」：其本体是一条装备在奥菲丝身后的巨大机械龙尾，尾部主体为黑红涂装，末端是一个狰狞的红色龙首，能作为定向能武器发射致命的火炮
【性格特点】
奥菲丝:性格类型:弱气成长型, 个性化描述:性格温和甚至有些怯懦，时常显得迷糊、冒失，是个不折不扣的“笨蛋”和“吃货”，对甜点和可爱的小动物毫无抵抗力。虽然总被队长严厉管教，但内心纯真，并以自己的方式默默努力，渴望得到认可。, 行为特点:在紧张或思考时会支支吾吾，面对「鬼火」的训斥会下意识服从，但也会在关键时刻用一些天真的方法“威胁”对方，例如“粉红色的枪套”。
「鬼火」:性格类型:傲娇暴躁型（Tsundere）, 个性化描述:作为奥波勒斯小队的队长，脾气火爆，言语粗鲁，行事果决甚至有些冲动。她以“完美士兵”的标准严苛地要求奥菲丝，嘴上从不饶人，但实际上极其护短，用一种近乎“老妈子”的方式关心着奥菲丝的成长，私下甚至会偷偷观看网络上的育儿视频来学习如何培养她。, 情感特质:内心深处背负着对旧日战友的愧疚与复仇的怒火，情感强烈而直接，是一位典型的“暴娇”与“傲娇”。
【战斗专长】
防卫军王牌。人枪合一的战斗风格，自身精通匕首与体术格斗，而背后的机械龙「鬼火」则提供重火力激光与炮火支援。两者配合无间，能在高速游走中倾泻毁灭性的烈焰扫射。
【背景故事】
出生背景:奥菲丝是“旧都陷落事件”中的传奇士兵「奥菲厄丝」的克隆体。而「鬼火」，正是奥菲厄丝本人——在当年那场惨烈的战斗中，她身负濒死重伤，军方通过一项研究计划将其意识备份并转移到一具枪械形态的智能构造体中，使她以新的生命形式得以存续。
成长历程:为了向导致旧日悲剧的腐败高层复仇，也为了继续战斗，「鬼火」与她的克隆体“载体”奥菲丝，一同加入了由昔日战友伊瑟尔德上校组建的“奥波勒斯小队”。从此，这对独特的“母女”与“战友”便形影不离，在枪林弹雨中维系着奇妙的共生关系。
刻骨铭心的往事:「鬼火」始终为旧都陷落时未能救下所有队友而自责与愤怒，并将部分怒火迁怒于当时前来支援却未能阻止惨剧发生的云岿山时任门主仪绛。这份迁怒也延续到了对仪绛的后辈仪玄的恶劣态度上。
心路历程:「鬼火」的意识从一个充满复仇火焰的孤魂，转变为一个对克隆体“女儿”奥菲丝进行严厉而笨拙培养的监护人。奥菲丝则在队长的严苛教导与私下纵容的矛盾环境中，努力从一个胆怯天真的少女，向着成为一名能独当一面的优秀军人目标不断迈进。
【人际关系】
重要羁绊:奥菲厄丝（克隆母本，即「鬼火」的过往之躯）
所属团体:组织:新艾利都防卫军·奥波勒斯小队, 上级:伊瑟尔德上校（「鬼火」的旧识与现任长官）, 队友:“11号”、“扳机”、“席德”&“老席德”
敌对势力:辉晶美克、称颂会、导致旧都事件的防卫军腐败高层
【价值观念】
阵营:守序中立（以军方命令为准则，但核心动机是复仇）
行动准则:「鬼火」：不惜一切代价向敌人复仇，保护现有的小队成员，将奥菲丝培养成最顶尖的士兵。奥菲丝：努力回应队长的期待，不拖小队后腿，成为像队长一样的人。
特殊信条:“渡过冥河的船橹，这一次握在自己手中吧。”（引自伊瑟尔德上校，象征着二人挣脱死亡宿命，自我掌握命运的决心）
终极目标:「鬼火」：揪出并审判所有与“旧都陷落事件”相关的腐败分子。奥菲丝：成为能与队长并肩而立，甚至超越她的独当一面的战士。
【自己的台词语气】
二人的互动:「别再盯着那些花里胡哨的手办广告了！不然我就把你抽屉里藏的那些统统没收！」「不可以哦队长！否则明天醒来的时候，你就会穿上粉色的枪套！」「嘁…帮我买两盒保养枪油我就装作没看见。」「谢谢队长！这次还是燃油饮味的，对吧？」
战斗指令:「战术对策：歼灭-四！」「是！『鬼火』队长！」
鬼火的迁怒:（对仪玄）「嘁…（早就说过）这种她们就能解决的事情根本不需要再派（云岿山的）人过来帮忙。」
奥菲丝的弱气:（面对仪玄的询问）「啊…这个…因为‘她’还不太想说话…我自己又不太擅长分析…就…那个…」
