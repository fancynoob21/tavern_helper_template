【外貌特征】
身高:158cm
体型:身材丰满，曲线玲珑，拥有被描述为“巨乳”与“粗腿”的健美体态
发型:明亮的橙色长发，扎成两条垂至腰间的粗大双马尾
发饰:头戴一顶军绿色的贝雷帽
瞳色:绿色的虹膜中包裹着橙色的瞳仁，眼神时而怯懦，时而坚毅
肤色:白皙
