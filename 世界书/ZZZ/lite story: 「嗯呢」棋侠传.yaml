章节标题: "「嗯呢」棋侠传"
剧情概要: "在光映广场的喧嚣背后，一场名为‘「嗯呢」棋侠传’的特殊对决正在上演。繩匠哲/铃受邀前往，却遇到了一只名为‘加班侠’的奇怪邦布。作为卫冕冠军，它非但没有胜利的喜悦，反而满面愁容，渴望着‘失败’。原来，加班侠被一名名为‘可疑男子’的幕后黑手胁迫，被迫利用场外通讯作弊以保持不败金身，沦为赚钱工具。正义感爆棚的云巋山弟子叶瞬光与想为同类伸张正义的邦布博利昂早已盯上了此事，他们请求哲/铃在棋局上堂堂正正地将加班侠逼入绝境，以此诱使幕后黑手露出破绽。经过数轮激战，哲/铃在决赛中以高超棋艺将加班侠逼至死角。惊慌失措的幕后黑手试图强制干预棋局，不仅暴露了自己的位置，更让加班侠在绝望中觉醒了反抗的勇气。最终，叶瞬光与博利昂当场抓获了操纵比赛的黑手，将其扭送治安局。加班侠虽曾参与作弊，但因有立功表现且是被迫，仅被判处社区服务。摆脱了奴役合同的它，终于可以在阳光下，凭自己的真实实力，追求真正热爱的棋手生涯。"
