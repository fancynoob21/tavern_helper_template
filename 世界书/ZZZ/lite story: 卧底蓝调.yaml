章节标题: "卧底蓝调"
剧情概要: "治安局犯罪行为学专家简，作为卧底深入暴力团伙“山狮”，旨在查明其神秘总部“狮巢”并将其一网打尽。在一次看似天衣无缝的治安局突袭行动中，本是为了帮助简博取“山狮”首领瑞扎信任的“演戏”，却因刑侦特勤组的热血新人赛斯的意外介入而横生枝节。赛斯为解救人质，自愿被俘，成为简卧底生涯中最大的“变数”。简被迫带着这位满脑子正义、完全不知内情的“猪队友”一同撤退至山狮的中转站。在周旋于帮派成员与瑞扎的猜忌，以及安抚、控制状况外的赛斯之间，简凭借其卓越的智慧与演技，一步步深入敌营，最终成功定位到藏匿于“零号空洞”内的“狮巢”，并与恢复力量的赛斯联手，在刑侦特勤组的配合下，彻底摧毁了山狮团伙。"
