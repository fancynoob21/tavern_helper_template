章节标题: "钢铁的女巫"
剧情概要: "白祇重工的技术总监格莉丝·霍华德为了完成与三门集团的技术合作，委托绳匠『法厄同』（哲/铃）协助唤醒一台原型机的逻辑核心。初次见面，哲/铃便领教了格莉丝对机械超乎寻常的狂热。在任务中，他们遭遇了格莉丝的旧识——如今的竞争对手贝蒂·布伦达。贝蒂对格莉丝将机械人格化的理念嗤之以鼻，并宣言要夺下合作。随后，贝蒂在一次调试中偷偷窃取了原型机的数据，并以此为基础造出了自己的机甲『猎巫人α型』，向格莉丝发起挑战。在空洞的对决中，格莉丝轻易识破了贝蒂的抄袭行为，并指出其窃取的数据因未完全排障而存在巨大风险。果不其然，『猎巫人α型』因以太侵蚀而失控暴走。在贝蒂惊慌失措、意图逃避责任之际，格莉丝展现了惊人的专业素养与责任感，怒斥其行为后，以『魔女』之姿，凭借一己之力强行制停了暴走的机甲，最终赢得了这场技术与理念的较量，并向哲/铃揭示了自己『钢铁的女巫』名号背后的真正含义。"
