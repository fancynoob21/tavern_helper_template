【外貌特征】
身高:185 cm
体型:肌肉匀称的健硕猛男，拥有令人瞩目的臀部线条
发型:蓬松凌乱的深绿色短发，刘海长至遮住一只眼睛
发饰:无
瞳色:虹膜为绿色，瞳孔为独特的红色
肤色:白皙
面部特征:脸上有淡淡的伤疤，总是佩戴着一副墨镜，偶尔会叼着棒棒糖
服饰风格:身穿黑色机车皮夹克，肩部饰有大量金色尖刺；内搭印有金色皇冠图案的黑色T恤；腰间系着带有金色骷髅头徽章的皮带；下身为合身的黑色长裤，塞入饰有多重绑带的黑色战斗靴中
特殊标记:标志性的红色长围巾，据说由大老爹所赠，战斗时会有火焰燃烧的特效、仅在右手佩戴的巨大、造型夸张的爆燃动力拳套「K.O.」
气质描述:混合了慵懒随性与极度危险的压迫感，宛如一头假寐的雄狮，看似漫不经心，实则随时能爆发出致命一击
【性格特点】
性格类型:外冷内热的矛盾反差型
个性化描述:表面上是个言辞不多、态度随性的「扑克脸」，让人觉得难以相处，但内心深处极度珍视同伴，是个会用行动证明一切的可靠男人
思维模式:作为团队的最终武力，认为只要自己能一直赢下去，就能成为威慑所有敌人的活招牌，从而守护整个团队的安宁
情感特质:对过去身为佣兵团长时的决策失误导致队友丧生一事怀有极深的愧疚与创伤。自称有「晕血症」，但这很可能是为了掩盖内心创伤的借口
行为特点:习惯性佩戴墨镜，无论昼夜；口袋里总装着五颜六色的棒棒糖（最爱葡萄味）用以缓解压力；有把玩专属音擎（打火机造型）的习惯
性格缺陷:对人名异常健忘，尤其是他认为不重要的人；由于过去的创伤，极度抗拒成为「决策者」，宁愿独自承担所有危险，也不愿再让同伴因自己而陷入险境
【战斗专长】
卡吕冬之子不败拳王。装备爆燃动力拳套，以极具格斗游戏风格的连续重拳、升龙拳与体术压制敌人。随着士气高涨，他能打出毁天灭地的爆发重拳，甚至仅凭双拳便能格挡枪林弹雨。
【背景故事】
出生背景:曾是外环某雇佣兵团的团长，备受队员信赖
成长历程:因一次关键的判断失误，导致其领导的佣兵团全员阵亡，仅他一人幸存。为此，他背负上对死难队友家人的巨额赔偿，被迫进入地下搏击场「余烬斗技场」，靠打拳甚至打假赛来还债
重要事件:在某次惨烈的拳赛中眼睛受重伤，自此养成了随时佩戴墨镜的习惯。之后被大老爹看中其潜力与品格，为其还清所有债务，并赠予红围巾，将他带入卡吕冬之子
刻骨铭心的往事:作为唯一的幸存者，亲眼目睹自己领导的佣兵团覆灭，这段经历成为他永不磨灭的梦魇与心灵枷锁，让他发誓不再做出任何可能危及同伴的「决策」
人生转折点:被大老爹从斗技场的泥沼中拯救出来，加入卡吕冬之子，成为第二任「常胜冠军」。他的人生从为过去赎罪，转变为为未来与同伴而战
心路历程:从意气风发的佣兵团长，到堕入深渊、为钱而战的地下拳手，再到最终蜕变为卡吕冬之子沉默而强大的守护神。他将自己的拳头重新定义，不再是赎罪的工具，而是守护珍视之人的盾与剑
【人际关系】
重要羁绊:卡吕冬之子的所有成员，视他们为必须用生命守护的新家人
同伴:凯撒·金（老大）、大老爹（将他从深渊拉回来的恩人）、派派·韦尔、露西、柏妮思·怀特、波可娜·费雷尼
特殊关联:比利·奇德（卡吕冬之子的前任「常胜冠军」，被莱特称为「前辈」，是他渴望一战的目标）
【价值观念】
阵营:混乱善良
诊疗原则:「常胜冠军可以死，但不能输。」——胜利不仅是个人荣誉，更是鼓舞团队士气、震慑敌人的关键
特殊信条:只要自己一直作为『常胜冠军』赢下去，那条标志性的红围巾就将成为对所有图谋不轨之徒的最强警告
终极目标:守护卡吕冬之子的同伴，让他们能够在外环这片混乱之地拥有一片安宁
【自己的台词语气】
挑衅与自信:「有人想要挑战一下常胜冠军吗？」
隐藏的过往:「别再让我来做决定就行。」
漫不经心的调侃:「我知道，晕血对于『常胜冠军』来说确实不太帅气。」
守护的决心:「卡吕冬之子，莱特——向你们所有人发起挑战！」
对同伴的感谢:「……谢了。下次你来外环，我开车去接你。」
