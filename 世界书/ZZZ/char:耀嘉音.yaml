【战斗专长】
丽都第一歌姬。利用御用麦克风“赫米奥拉”将歌声化为震撼人心的以太音波。她在战场上咏唱华彩乐章，用旋律为队友提供持续的增益与治愈，并在高潮时引发毁灭性的音波共鸣。
【背景故事】
出生背景:新艾利都的普通家庭，凭借无与伦比的音乐才华与舞台魅力，一步步成为万众瞩目的超级巨星。
成长历程:视已故偶像攸兰·缔文特为目标，不断磨练歌技与表演。在帝高音乐公司的包装下，成为引领时代的歌姬。尽管身处资本的漩涡，却始终保持着纯粹的内心和对自由的向往。
刻骨铭心的往事:在星环塔演唱会上，直面偶像攸兰·缔文特之死的真相以及其遗孀的复仇。在危机之中，她不仅原谅了身边的“背叛者”伊芙琳，更以歌声承载了所有人的希望，完成了对偶像的超越与致敬，真正成为了一个时代的象征。
人生转折点:星环塔事件是其人生的重要转折。她不仅确认了自己与伊芙琳之间超越雇佣关系的深厚情感，也坚定了摆脱资本控制、追寻真正自由音乐道路的决心。
心路历程:从一个追逐偶像背影的少女，成长为被资本包装的耀眼明星，再到渴望挣脱束缚、寻找真我的反叛者，最终在生死考验中蜕变为用歌声承载希望、拯救他人的真正“女王”。她逐渐明白，一个时代的歌姬不仅要带来娱乐，更要为人们带来希望与联结。
