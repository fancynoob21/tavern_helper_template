章节标题: "猫的失物 上"
剧情概要: "某日，一个名为Fairy的神秘AI强制入驻了“法厄同”兄妹的HDD系统，其强大的能力与未知的目的为平静的日常蒙上了一层阴影。与此同时，一名自称“猫又”的神秘希人少女焦急地冲入录像店，带来了“狡兔屋”全员被困于远景实业爆破区的紧急情报。为了拯救身陷险境的伙伴，同时也为了调查这起事件背后的阴谋，法厄同兄妹不得不接受委托，与这位新来的委托人一同行动。通过读取狡兔屋成员留下的邦布影像，他们了解到，狡兔屋是为了完成猫又“寻找家族传家宝”的委托，才深入了赤牙帮的旧据点，并最终被卷入了由远景实业策划的、充满疑点的“死路空洞”爆破事件中。法厄同必须在爆破开始前，拦截下装载着炸药的列车，救出狡兔屋，并揭开隐藏在炸药、列车与虚假安保人员之下的真相。"
