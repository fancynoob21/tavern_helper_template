章节标题: "旧梦的安可曲"
剧情概要: "随着新艾利都的『拓金日』庆典临近，身为『绳匠』的兄妹——哲与铃，在协助其智能管家Fairy进行空洞深潜系统（HDD）的维护时，意外发现数据异常。与此同时，一桩由治安局高层通过常客『简』转达的神秘委托打破了节前的宁静：市内接连发生『构造体』市民失控伤人事件，矛头直指一个非法的神秘智能体。兄妹二人的调查，将他们引向了于『六分街』角落默默经营的『404』音乐现场，以及在此追逐梦想的偶像组合——『妄想天使』。随着与组合成员爱芮、千夏、南宫羽的深入接触，一连串尘封的秘密被逐一揭开：爱芮作为『A-HOLO』型战术构造体的过往、她与隐退歌后『瑟汐』（现任导师塞西莉亚）的隐秘关联、Fairy曾化身为『许愿精灵』对爱芮的默默守护。然而，真正的幕后黑手，代号为『Youkai』的恶意智能体，早已布下天罗地网。它不仅是构筑体失控的元凶，更企图利用庆典的『点灯仪式』制造更大的混乱。Youkai利用爱芮的自我怀疑，一度将其操控，引发了激烈的冲突。在经历了空洞的险境、后台的暗流、舞台的失控与友情的考验后，众人终于识破了Youkai的连环计。最终，在拓金日当晚，兄妹二人兵分两路：哲与Fairy在录像店后台与Youkai进行惊心动魄的数据攻防战，成功阻止其劫持庆典转播的阴谋；而铃则赶往『404』，与众梦想家一同见证了『妄想天使』克服万难后，光芒四射的初次公演。旧日的梦魇终成回响的安可曲，而新的威胁，则在鎏金的夜色中悄然蛰伏。"
