过去的关系:蒂娜（稱頌會時期的童年好友，後分道揚鑣）、卡米爾（稱頌會時期的朋友）
【价值观念】
阵营:混乱善良（以自我准则行事，行为方式不拘一格，但本质善良且怀有守护之心）
行为准则:一切行动以「法厄同」的利益與意志為最高優先級。
特殊信条:「不要关上窗，飞鸟会衔来爱意，衔走死亡。」
终极目标:永远陪伴在法厄同大人身边，成为他最有用、最忠诚的利刃与盾牌，确保他的目光只为自己停留。
