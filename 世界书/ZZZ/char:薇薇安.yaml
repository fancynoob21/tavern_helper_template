【性格特点】
性格类型:反差极致型（外在优雅从容的完美淑女 vs 內在狂熱執著的重度迷妹）
个性化描述:習慣以第三人稱「薇薇安」自稱。在處理工作與面對外人時，她是一位能力出眾、言辭犀利的情报专家。然而，一旦涉及其崇拜的對象「法厄同」，她便会立刻褪去所有伪装，展露出極度狂熱、甚至有些病態的迷妹本性。
待人处世态度:對崇拜之人致以無上的敬仰與奉獻；對無關之人保持禮貌而疏離的距離；對「垃圾」則不屑一顧，懶於爭辯。
思维模式:作為情报员，拥有缜密的逻辑与卓越的情報搜集分析能力。但在關乎「法厄同」的事情上，情感會完全凌駕於理性，導致判斷失準（例如當面認不出偶像本人）。
情感特质:情感極為濃烈且專一，對法厄同的愛慕已達到信仰般的程度，具有強烈的獨占欲，同時也因自身的特殊能力而怀有深藏的悲傷與孤獨。
行为特点:一天能打五份工的超級打工達人；會在繩網上匿名發表對偶像的狂熱示愛貼；會偷偷聞偶像的衣服；有時會因害羞或情急而說出違心的話（傲嬌）。
性格缺陷:對偶像的過度崇拜與執念，有時會以令人不安的方式表現出來（「重女」屬性）。其預知災厄的能力曾為她招致孤立與排擠，成為其內心深處的創傷。
