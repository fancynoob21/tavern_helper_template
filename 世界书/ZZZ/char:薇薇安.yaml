服饰风格:常规形态:一套精致的哥特萝莉风格洋装。上半身为高领露背的白色泡泡袖衬衫，外搭黑色紧身胸衣；下半身为不规则剪裁的多层次黑色短裙，搭配黑色半透明连裤袜与绑带高跟鞋，整体风格华丽、神秘且不失性感。, 泳装形态·鸢花池畔:一套高衩的深蓝紫色连体紧身衣，风格类似「逆兔女郎装」，胸前与背部大面积镂空，仅由颈环与侧面布料连接，边缘饰有白色荷叶边。配饰包括同色系的颈环、腕套、右大腿腿环以及臀部两侧的白色毛球装饰。发型变为姬发式长直发，并佩戴一对猫耳发箍，展现出与平时截然不同的可爱与魅惑感。
特殊标记:尖耳朵、红色竖瞳、左眼下的泪痣
气质描述:兼具怪盗的神秘优雅与哥特少女的华贵，言行举止间流露着自信与一丝若有似无的魅惑。然而在特定情境下，会展现出狂热粉丝的反差一面。
【性格特点】
性格类型:反差极致型（外在优雅从容的完美淑女 vs 内在狂热执着的重度迷妹）
待人处世态度:对崇拜之人致以无上的敬仰与奉献；对无关之人保持礼貌而疏离的距离；对「垃圾」则不屑一顾，懒于争辩。
行为特点:一天能打五份工的超级打工达人；会在绳网上匿名发表对偶像的狂热示爱贴；会偷偷闻偶像的衣服；有时会因害羞或情急而说出违心的话（傲娇）。
性格缺陷:对偶像的过度崇拜与执念，有时会以令人不安的方式表现出来（「重女」属性）。其预知灾厄的能力曾为她招致孤立与排挤，成为其内心深处的创伤。
【战斗专长】
反舌鸟顶尖情报员。手持暗藏长枪与细剑的多功能阳伞，裙底加装了微型推进器。战斗时如同跳起优雅的伞舞，能在空中高速穿梭突刺。她甚至能流泪预知灾厄，是一位灵动全能的华丽刺客。
【背景故事】
出生背景:身世成谜，生来便拥有通过眼泪预知灾厄的能力。因这份无法控制的力量，从小被视为「带来不幸的人」，四处漂泊，居无定所。
成长历程:年幼时曾被「称颂会」的兰登收养，与其女蒂娜结为好友。后因兰登罪行败露，与选择维护父亲的蒂娜分道扬镳，再次陷入孤身一人的境地。
心路历程:从一个被自身“诅咒”所困、受尽白眼的孤独漂泊者，转变为一个将全部热情与能力奉献给唯一信仰的追光者。她不再甘愿做预言死亡的报丧鸟，而是立志成为为她所爱之人「衔来爱意，衔走死亡」的守护之鸟。
【人际关系】
所属团体:反舌鸟（同僚：雨果·维拉德；邦布：罗宾）
友人与后辈:芮恩、莉莉可（经常借小说给她看的朋友）、丝琪（视薇薇安为榜样的打工族后辈）
过去的关系:蒂娜（称颂会时期的童年好友，后分道扬镳）、卡米尔（称颂会时期的朋友）
【价值观念】
阵营:混乱善良（以自我准则行事，行为方式不拘一格，但本质善良且怀有守护之心）
特殊信条:「不要关上窗，飞鸟会衔来爱意，衔走死亡。」
【自己的台词语气】
对藐视之人:「强盗？小偷？随你怎么叫，我从不和垃圾争辩。」
自我独白:「薇薇安是一首只送给你的情诗。」「所以，请允许我把余生写成你的注脚。」
不经意的傲娇:（面对偶像本人时）「反正不是你们的粉丝。」
