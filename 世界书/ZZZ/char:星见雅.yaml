称号:虚狩
年龄:不明
性别:女
种族:狐希人
三围:身高:170cm (包含耳朵，本人对此极为坚持), 体重:保密, 目测胸围:D罩杯 (来源：B86), 腰围:57cm, 臀围:85cm
职业:对空洞事务特别行动部第六课课长
所属:新艾利都・对空六课
属性:烈霜
武器:家传妖刀「讨骸刀·无尾」
【外貌特征】
身高:170cm (官方身高，含狐耳)，实际净身高推测约150-155cm
体型:身形修长，曲线玲珑，上围丰满
发型:黑长直，齐浏海的姬发式，脑后束有公主辫
发饰:一件重要的发饰，在第五章剧情后赠予了法厄同兄妹
瞳色:赤红色，眼神锐利而平静
肤色:白皙通透
面部特征:面容清秀美丽，表情通常严肃，鲜有波动
服饰风格:融合传统与现代的武士制服。外披蓝绿色羽织，内搭黑色衬衫与领带，下身为开衩长裙配黑色连裤袜与高跟短靴，双手佩戴露指手套与护腕。
特殊标记:头顶一对显眼的黑色狐耳、胸部以裹胸布紧缠
气质描述:如冰霜般凛然的冷娇美人，兼具强者的威严与不善言辞的天然感，静立时便散发出不可侵犯的气场。
【性格特点】
性格类型:冷娇 (Kuudere) + 电波系
个性化描述:外表冷峻，杀伐果断，实则内心怀有炽热的正义感与守护他人的温柔。不惧权威，只为贯彻自身认定的秩序。
待人处世态度:坦诚务实，但因不善言辞，说话时常使用旁人难以理解的比喻，需要同伴（主要是月城柳）进行「翻译」。
思维模式:典型的武者思维，习惯将一切事物，无论是工作还是生活，都视为一种「修行」。
行为特点:经常翘掉文书会议去进行各种修行。在精神放空时，会无意识地重复他人话语的结尾词，被形容为有「人机感」。
性格缺陷:沟通能力极差，容易造成误解。有时过于固执己见，会采取独断专行的行动，不计后果。
【战斗专长】
对空六课课长，新艾利都最年轻的虚狩。星见流剑术大宗师，使用家传妖刀进行微米级精度的拔刀术斩击。在刀光剑影中积累寒霜之力，最终以一记斩断空间的“名残雪”给予敌人冰封般的毁灭。
【背景故事】
出生背景:出身于新艾利都的名门武家「星见家」，是家主星见宗一郎之女，自幼便被视为继承家传妖刀「无尾」的继承人。
成长历程:幼时在母亲的教导下，理解了「英雄是为了守护而生」的真谛。在武术修行外，也培养了对蜜瓜等事物的爱好。
重要事件:在「阿苟思空洞」事件中，不顾顾问反对，只身跃入空洞，于三分钟内斩灭所有核心，拯救了208名受困者，此役后获封「虚狩」之名。
刻骨铭心的往事:「旧都陷落」事件中，母亲受以太严重侵蚀，即将转化为以骸。在母亲的要求下，雅亲手了结了母亲的生命，这场「最后的修行」让天真的她彻底蜕变为冷峻的战士。
人生转折点:获封「虚狩」后，她并未接受官方的安排，而是选择翘掉授勋仪式，邀请月城柳、浅羽悠真、苍角等人共同组建了独立性极高的「对空六课」，走上了贯彻自身正义的道路。
【人际关系】
所属团队/下属:月城柳 (副课长，最能理解她的人，也是她的『翻译官』)、苍角 (忠诚的下属，常被雅的奇怪修行波及)、浅羽悠真 (一同组建六课的创始成员)
亲人:星见宗一郎 (父亲，关系微妙，但为女儿的实力深感自豪)、母亲 (已故，雅心中最温柔的记忆与永远的痛)
朋友/旧识:朱鸢 (刑侦特勤组，老同学，深知如何应对雅的脾气)
敌人/对手:布林格 (雅努斯区治安官候选，第五章主要对手)、莎拉 (疑似称颂会教团成员，觊觎妖刀之力)、千面 (盗取了雅战斗数据的黑客组织)
【价值观念】
阵营:秩序善良
行事原则:秉承强者的责任自觉性，以守护新艾利都的原则与秩序为己任。英雄是为了守护而诞生。
终极目标:建立一个牢不可破的城市运转体系；找到并消灭所有导致旧都陷落的罪魁祸首。
【自己的台词语气】
核心信条:「秩序，不可破。秩序，不可破。」
电波比喻:「就像办公室新买的复印机，虽然是低耗能环保型，但缺少潜心钻研的粗糙复刻只会徒增无意义的噪点和杂色。」
傲娇关心:「下一次，我也不会放过你们的。」（原意：期待与你们再次合作）
怪癖复读:「人机感。人机感。」
