樂園遊夢記 (Wonderland Reverie) is one of the famous songs of Astra Yao.
<lyrics>
[主歌 1]
想要一个人听海⻛
想要一个人看晚空
带着那份悸动逃离缚束
环游绝美岛屿
和自己约定说好
从不乱套
全可做到

[主歌 2]
序曲 躲进雨水倒影中
每步踩着细腻乐句
找音符有几高
琴谱 等到哪一天再数
苦练那半段合奏曲
终将听得到

[副歌]
旋转的灯光
谁会在旁
压轴送出当初我最爱的歌
是你么
如飞天星火
随心不闪躲
载住昨日美梦碎片
冲破险阻

[后副歌]
云朵的轨迹
是游园胜地
乘着音阶观光
梦里早已学会飞
一点点堆积
沿街的⻛景
努力去创造幻想中的仙境
太美
来吧送给你

[桥段]
期望对着你轻轻唱
贴近耳朵
大⻔外景色照旧
还没变么
放声全力去唱
再三为我鼓掌
心底的火花
在高涨
听 旋律奏响
看 谁在发亮

[尾奏]
幻觉会褪去
若感到累
那就回味我创作谱写的魔法之旅
一点点堆积
沿街的⻛景
唱着跳着说着
细心编写游历过程
太动听
</lyrics>
