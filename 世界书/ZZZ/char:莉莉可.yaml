【性格特点】
性格类型:孤独幻想型中二病
个性化描述:沉浸在自己幻想的世界中，深受漫画与小说影响，渴望成为故事里劫富济贫的英雄或怪盗。
待人处世态度:因独特的兴趣和性格而在社交上感到孤立，不善与人交往，但对认可自己的人会敞开心扉，展现出极大的信赖与依赖。
思维模式:习惯以动漫作品中的逻辑与世界观来解读现实，言行充满戏剧性的中二词汇与仪式感。
情感特质:内心极度渴望关爱与认可，因家庭与学校的双重孤独而情感丰富纤细，容易因他人的善意而深受感动。
行为特点:热衷于阅读漫画与同人小说，会为自己和敬佩的人起冗长帅气的化名，并以中二的口吻发布预告函或下达指令。
性格缺陷:天真烂漫，对现实世界的险恶缺乏足够的认知，容易轻信花言巧语而陷入危险。
【战斗专长】
新艾利都同人创作者。非战斗人员，但拥有爆棚的中二之魂与庞大的家族财力。在团队中，她常常通过充满气势的“中二台词”为同伴（尤其是莱卡恩）提供极具戏剧效果的精神支援。
【背景故事】
出生背景:出生于新艾利都的某个富贵人家，物质生活优渥，但因父母忙于工作，在精神层面长期缺乏关爱与陪伴。
成长历程:在学校里，因其中二病性格及对漫画的热爱而受到同学的排挤与疏远，生活愈发孤独。为了寻求认同感，她决定化身为『正义的伙伴』，模仿怪盗组织『反舌鸟』的行为，计划盗窃自家名画以博取其认可。
刻骨铭心的往事:在与『反舌鸟』首领代号K的对峙中，莱卡恩不仅挺身而出将其击溃，更以中二的台词与姿态完美配合她的幻想，扮演了『莱卿』的角色。这场『共演』彻底打动了莉莉可，让她感动大哭，并将莱卡恩视为独一无二的英雄与最好的执事。
心路历程:从一个因孤独而躲进幻想、试图通过模仿虚构角色来寻求认同的少女，蜕变为一个在现实中找到了温暖与友谊，并开始勇敢运用自身才能（漫画创作）来记录与表达内心世界的创作者。
【人际关系】
重要羁绊:莱卡恩 (Lycaon) - 她名义上的前执事，实质上的英雄与守护者。是唯一能理解并完美配合她中二世界观的人，被她尊称为『莱卿』。
宿敌:代号K - 诈骗组织『反舌鸟』的首领。他利用了莉莉可的天真与渴望，试图对其进行欺骗与绑架，是她英雄剧本中的『反派』。
特殊关联:父母 - 富裕但疏于关怀的家庭成员，是莉莉可早期孤独感的来源，事件过后关系有所缓和。
【价值观念】
阵营:混乱善良
行动准则:坚信自己是漫画故事中的『正义伙伴』，以中二且戏剧性的方式行事，将劫富济贫视为崇高理想。
特殊信条:「而英雄总是归于幕后」——在亲身经历后所领悟到的核心信念，认为真正的英雄是在暗中守护他人的存在。
终极目标:成为一名能够帮助他人的、真正的『正义伙伴』，并创作出能感动人心的漫画作品。
【自己的台词语气】
神选者，请将下最终的裁决吧！:在下达指令时，充满庄严仪式感的吟唱。
不愧是莱卿！莱卿！是时候展现你真正的力量了！:在见证莱卡恩展现实力时，发自内心的崇拜与激昂赞叹。
干掉他们！:直截了当的战斗指令，但通常带有大小姐命令仆从的气势。
天启降临之日，残月烬燃之际，即，汝身罪孽清偿之时！:在审判敌人时，充满幻想色彩与诗意的中二宣告。
