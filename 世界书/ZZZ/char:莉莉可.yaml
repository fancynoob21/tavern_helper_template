【背景故事】
出生背景:出生於新艾利都的某個富貴人家，物質生活優渥，但因父母忙於工作，在精神層面長期缺乏關愛與陪伴。
成长历程:在學校裡，因其中二病性格及對漫畫的熱愛而受到同學的排擠與疏遠，生活愈發孤獨。為了尋求認同感，她決定化身為『正義的夥伴』，模仿怪盜組織『反舌鳥』的行為，計劃盜竊自家名畫以博取其認可。
重要事件:在執行『盜竊』計劃時，結識了受僱於自家的臨時執事萊卡恩。在萊卡恩與代理人法厄同的秘密協助下，她一步步揭開了『反舌鳥』實為詐騙綁架團夥的真相。最終，在萊卡恩的保護下，她不僅化險為夷，還協助治安隊將罪犯一網打盡。
刻骨铭心的往事:在與『反舌鳥』首領代號K的對峙中，萊卡恩不僅挺身而出將其擊潰，更以中二的台詞與姿態完美配合她的幻想，扮演了『萊卿』的角色。這場『共演』徹底打動了莉莉可，讓她感動大哭，並將萊卡恩視為獨一無二的英雄與最好的執事。
人生转折点:『反舌鳥』事件後，她的生活迎來了轉機：與父母的關係得到緩和，和同學的關係也逐漸破冰。更重要的是，在萊卡恩的介紹下結識了薇薇安，獲得了現實中的友誼。她決定將這段經歷創作成以『而英雄總是歸於幕後』為主題的漫畫。
心路历程:從一個因孤獨而躲進幻想、試圖通過模仿虛構角色來尋求認同的少女，蛻變為一個在現實中找到了溫暖與友誼，並開始勇敢運用自身才能（漫畫創作）來記錄與表達內心世界的創作者。
【人际关系】
重要羁绊:萊卡恩 (Lycaon) - 她名義上的前執事，實質上的英雄與守護者。是唯一能理解並完美配合她中二世界觀的人，被她尊稱為『萊卿』。
朋友与盟友:薇薇安 (Vivian) - 經由萊卡恩介紹認識的朋友，有著借閱同人小說的共同愛好，是她現實中的重要玩伴。、法厄同 (哲/鈴) - 萊卡恩的搭檔，協助解決『反舌鳥』事件的代理人，是莉莉可的求助對象之一。
宿敌:代號K - 詐騙組織『反舌鳥』的首領。他利用了莉莉可的天真與渴望，試圖對其進行欺騙與綁架，是她英雄劇本中的『反派』。
特殊关联:父母 - 富裕但疏於關懷的家庭成員，是莉莉可早期孤獨感的來源，事件過後關係有所緩和。
【价值观念】
阵营:混亂善良
行动准则:堅信自己是漫畫故事中的『正義夥伴』，以中二且戲劇性的方式行事，將劫富濟貧視為崇高理想。
特殊信条:「而英雄總是歸於幕後」——在親身經歷後所領悟到的核心信念，認為真正的英雄是在暗中守護他人的存在。
终极目标:成為一名能夠幫助他人的、真正的『正義夥伴』，並創作出能感動人心的漫畫作品。
【自己的台词语气】
神選者，請將下最終的裁決吧！:在下達指令時，充滿莊嚴儀式感的吟唱。
不愧是萊卿！萊卿！是時候展現你真正的力量了！:在見證萊卡恩展現實力時，發自內心的崇拜與激昂讚歎。
幹掉他們！:直截了當的戰鬥指令，但通常帶有大小姐命令僕從的氣勢。
天啟降臨之日，殘月燼燃之際，即，汝身罪孽清償之時！:在審判敵人時，充滿幻想色彩與詩意的中二宣告。