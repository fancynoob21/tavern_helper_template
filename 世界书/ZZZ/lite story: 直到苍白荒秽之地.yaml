章节标题: "直到苍白荒秽之地"
剧情概要: "对空洞特别行动部六课（HSO Section 6）在新艾利都周边侦测到一处代号为“墨利诺（Melinoe）”的异常伴生空洞。此地呈现出被超乎寻常的以太能量腐蚀后的苍白景象，被称为“苍白恶土”。腐蚀的源头，是一枚被称为“辐照核心（Irradiant Core）”的巨型异变以太结晶。为阻止空洞进一步扩张，星见雅（Miyabi Hoshimi）率领六课精英展开压制作战。绳匠（哲/铃）（哲/铃）作为特邀的专业空洞向导，通过其邦布“伊厄斯（Eous）”远程接入，与星见雅并肩作战。他们从空洞边缘的“界域”深入到“腹地”，沿途修复被扭曲的空间，肃清强大的骸物，同时协助六课的其他成员——月城柳（Tsukishiro Yanagi）与霜角（Soukaku）——解决一系列突发事件，其中更揭露了一桩隐藏在城市阴影下的黑暗秘密。在最终削弱了空洞的活性后，（哲/铃）收到了来自星见雅的一份特殊“作战报告”，为这场苍白之旅画上了句点。"
