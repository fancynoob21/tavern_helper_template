章节标题: "满级小学生"
剧情概要: "白祇重工的年轻社长珂蕾妲·贝洛伯格，在验收一所小学翻新工程时，发现附近出现了一个危险的伴生空洞。她向校方示警，但校长埃顿不仅置之不理，反而迅速结清尾款，意图划清界限。珂蕾妲不忍看到师生身陷险境，决定亲自调查。她与搭档格莉丝伪装成转学生和老师潜入校园，并委托绳匠（哲/铃）（哲/铃）协助。利用校园合唱活动的机会，一行人成功窃取了通往空洞的钥匙。深入空洞后，他们揭露了校长埃顿勾结黑帮，在空洞内非法开采以太资源的罪行。冲突导致空洞环境失稳并扩张，将校长之女阿弥及她的两位朋友丹与莉夏卷入其中。（哲/铃）与白祇重工众人再次进入空洞，在危机中救出孩子们，并与执迷不悟的校长进行最终对质。事件以埃顿被免职、孩子们安全转移告终，但其并未受到法律的严惩，留下了一个复杂而现实的结局。"
