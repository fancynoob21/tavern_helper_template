气质描述:一个集害羞、社恐、爱哭与惊人音乐才华于一身的矛盾综合体。在人群中她像一只受惊的小动物，恨不得立刻消失；但一旦进入音乐的世界，她便能沉浸其中，爆发出令人惊叹的创造力。她的气质是“废柴”与“天才”的奇妙结合，笨拙的肢体与灵动的乐思在她身上形成了独特的反差萌。
