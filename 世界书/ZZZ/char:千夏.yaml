核心技：可爱即正义:通过特殊攻击为敌人附加[猫的凝视]标记。当队伍中的[强攻]或[异常]角色持续攻击带有该标记的敌人时，会触发范围伤害。此技能是千夏辅助能力的核心，能够显着增强主攻手的输出。
强化特殊技：泡泡糖轰炸 / 特别拍照技巧:消耗能量发动的核心辅助技能。能为全队施加[天使协律]状态，提升队友攻击力，并开启[以太帷幕·妄想重奏]，进一步提供攻击力增益。是其提供团队增益的主要手段。
终结技：通通砸碎！:喧响等级达到[极]时发动的终极技能。用锤子进行连续攻击并引发爆炸，造成大量物理伤害，同时为全队角色回复生命值并触发[快速支援]，是兼具伤害、治疗与连携功能的强大招式。
被动能力：坏猫出没:当千夏在后台时，其伙伴“泡泡”会自动消耗[磨爪器]攻击敌人。通过开启[以太帷幕]或施加[属性异常]可以获得[磨爪器]，使千夏在后台也能提供持续的输出与辅助。
