章节标题: "预言之下"
剧情概要: "绳网（Inter-Knot）上一则来自“新艾利都七大都市传说”评级人的高额委托，吸引了代理人哲/铃的注意。委托目标是调查一个名为“预言之下”的诡异空洞。传说空洞内有一位能预知未来、赐予力量的“预言家”。哲/铃接下委托后进入空洞，却发现这次冒险的形式远超想象。代理人被限制，只能以邦布的形态行动。一位藏在垃圾桶里的“预言家”宣称哲/铃是预言中的英雄，并定下规则：哲/铃必须在代表“七善”与“七罪”的十四位被困者中选择一方结盟，才能击败最深处的敌人，带领盟友离开。在这场由预言家导演的“戏剧”中，哲/铃的每一个选择，都将深刻影响所有人的命运，并最终揭示这场预言背后的惊人真相。"
