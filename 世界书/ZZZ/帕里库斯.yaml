帕里库斯是战斗中遭遇的以太变异体，由A少女与小枝分别转化而成。这对虚影总以成双形态出现，凭独特生理特征区分彼此，二者间存在深厚羁绊。  
"哇！好险！别只盯着一个打，当心女士们的偷袭！"  
"等等，'女士'？在空洞待太久让你连虚影都觉得眉清目秀了？"  
"老兄，我分得清虚影和女士。我发誓，帕里库斯绝对是'女士'。"  
"不可能！"  
"那长发？那双腿？根本是'厂妹'级尤物——我姐教我的词。"  
"你姐最近还好？"  
"确实好些了。但下个月医药费？得从这些虚影辣妹身上狠捞一笔。"  
"当大哥不容易啊？这么着：我拖住帕里库斯，你把你姐号码给我。"  
"哈，真以为我会给你啊！"  
——两名年轻空洞劫掠者的遗言  
【战斗情报】  
战斗中，帕里库斯采用近远程结合的进攻方式。当其中一方死亡时，另一方将进入狂暴状态，大幅提升攻击速度与凶猛程度。
