市长五月花（或简称市长）是新艾利都现任市长兼五月花家族家主，維多利亞居家服務的资助者与主人。  
【档案】  
作为现任市政首脑与权倾一时的五月花家主，市长与TOPS及称颂会均存龃龉。他曾是卡萝尔·阿娜友人，认为法厄同兄妹的视觉植入体蕴含可能影响全城的强大力量。他亦是維多利亞居家服務的幕后主人，视其为私人情报机构。  
【历史】  
旧都陷落前，他是赫利俄斯機關高级研究员卡萝尔·阿娜的友人。当冯莱卡恩仍属嘲鸫时，市长向其递出"橄榄枝"——莱卡恩为其效力即可获庇护。莱卡恩与雨果·維拉德决裂后接受此约，成为維多利亞居家服務成员。旧都陷落后，他命維多利亞居家服務在法厄同调查化为未知蚀变复合体的圣徒时密切监视，必要时予以协助。确认兄妹可信且与其目标一致后，市长联络二人，分享通过研究卡萝尔被掳前遗留数据组装的H.D.D.升级组件，使兄妹重获曾被抑制的以太适性，得以亲身进入空洞。
