行为特点:擁有諸多貓科習性，如強烈的捕食慾望、被觸碰尾巴會炸毛、貓舌（吃不了燙或辣的食物）、喜歡蜷縮在溫暖的地方
性格缺陷:過度多疑，因過去的創傷而難以真正信賴他人，初期常以『忘恩負義』的姿態作為自我保護的偽裝
