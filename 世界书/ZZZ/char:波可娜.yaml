【背景故事】
出生背景:出身於外環最貧窮的小鎮，為貓希人種族，自幼嚮往城裡的生活
成长历程:曾與青梅竹馬的摯友米萊娜成立傭兵團，但在即將成功時被其背叛，米萊娜私吞所有資產後消失無蹤。被迫獨自背負巨額債務的波可娜從此封閉內心，成為一個只相信利益的獨行傭兵與情報販子，並在外環的混亂中闖出名堂
重要事件:為利益加入龐培領導的機車族『凱旋者』並成為幹部。在『火獄騎行』事件中，受命阻截『卡呂冬之子』，卻反被柏妮思·懷特用噴火器點燃尾巴後擊敗。龐培死後，在柏妮思的持續邀請與一系列事件推動下，正式加入『卡呂冬之子』
刻骨铭心的往事:被唯一信賴的摯友米萊娜徹底背叛，人財兩空。這段經歷是她利己主義性格的根源，也使她對『信賴』與『夥伴』等詞彙抱持著深深的懷疑與戒備
人生转折点:與『卡呂冬之子』的相遇，尤其是被純粹直接的柏妮思『撿』回團隊。這段經歷讓她冰封的內心開始融化，重新學習如何去信賴他人，是她從獨狼轉變為團隊一員的關鍵
心路历程:從『對未來充滿嚮往的單純少女』，到『被背叛後封閉內心的利己主義傭兵』，最終在『卡呂冬之子』中，逐漸卸下心防，重新學習信賴與羈絆，找到了『一個可以安心睡午覺的地方』
