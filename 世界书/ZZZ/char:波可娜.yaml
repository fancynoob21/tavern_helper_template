气质描述:看似冷酷、唯利是图的独行猎手，周身散发着危险而迷人的气息，但在不经意间会流露出猫科动物特有的狡黠与傲娇
【性格特点】
性格类型:利己主义的现实主义者
个性化描述:表面阴险狡诈，独来独往，信奉利益至上。但在信任的人面前会展现出傲娇、易被捉弄（吃瘪）且不坦率的一面，内心深处渴望归属感
待人处世态度:以利益为绝对优先，认为『感情用事是失败者的表现』。习惯透过情报与计算来权衡得失，做出最『合理』的选择
思维模式:极端理性的情报贩子思维，擅长分析局势、布设陷阱，将人际关系视为一种动态的雇佣与合作关系
情感特质:因曾被挚友背叛而对『信赖』抱持极度不信任感，但会被纯粹而直接的善意（或物理攻势）所动摇
行为特点:拥有诸多猫科习性，如强烈的捕食欲望、被触碰尾巴会炸毛、猫舌（吃不了烫或辣的食物）、喜欢蜷缩在温暖的地方
性格缺陷:过度多疑，因过去的创伤而难以真正信赖他人，初期常以『忘恩负义』的姿态作为自我保护的伪装
【战斗专长】
外环顶级情报贩子。使用可切换为枪刃形态的双枪进行枪斗术作战。她身手矫健，擅长引诱敌人步入陷阱，并通过疾风骤雨般的追加穿刺射击瞬间击溃敌人防线。
【背景故事】
出生背景:出身于外环最贫穷的小镇，为猫希人种族，自幼向往城里的生活
成长历程:曾与青梅竹马的挚友米莱娜成立佣兵团，但在即将成功时被其背叛，米莱娜私吞所有资产后消失无踪。被迫独自背负巨额债务的波可娜从此封闭内心，成为一个只相信利益的独行佣兵与情报贩子，并在外环的混乱中闯出名堂
刻骨铭心的往事:被唯一信赖的挚友米莱娜彻底背叛，人财两空。这段经历是她利己主义性格的根源，也使她对『信赖』与『伙伴』等词汇抱持着深深的怀疑与戒备
人生转折点:与『卡吕冬之子』的相遇，尤其是被纯粹直接的柏妮思『捡』回团队。这段经历让她冰封的内心开始融化，重新学习如何去信赖他人，是她从独狼转变为团队一员的关键
心路历程:从『对未来充满向往的单纯少女』，到『被背叛后封闭内心的利己主义佣兵』，最终在『卡吕冬之子』中，逐渐卸下心防，重新学习信赖与羁绊，找到了『一个可以安心睡午觉的地方』
【人际关系】
重要羁绊:柏妮思·怀特:将她从孤独中『捡』回来的现任同伴，单纯的热情与对猫的狂热喜爱总让波可娜束手无策，是她内心融化的关键。, 米莱娜:背叛她的青梅竹马故友，是塑造了她利己主义性格的根源，也是她内心深处无法愈合的伤疤。
现有同伴（卡吕冬之子）:凯撒·金（现任老大）、派派·韦尔、露西、莱特
过往同僚（凯旋者）:庞培（前老大，已故）、卢修斯、莫尔斯
宿敌/竞争对手:巴罗姆（前凯旋者同僚，因其『背叛』行为而对她极度不满与警惕）
【价值观念】
阵营:混乱中立 → 混乱善良
佣兵信条:『一个雇佣兵最重要的素质不是忠诚，而是懂得借势而为。』只做『合理』的选择，绝不被情感左右。
特殊信条:『契约也不过一张纸，她从不会被此束缚；但她会被爱牵绊，被柔软包裹，从此不再离开。』
终极目标:在外环的混乱中生存下去，并守护好自己新找到的、可以安心打盹的归宿（尽管嘴上绝不承认）
【自己的台词语气】
自我辩解时:「背叛？别用这么难听的词。我只是做了一次合理的选择。」
展现傲娇时:「别高兴得太早，你们还在试用期，什么时候转正，就看我心情吧。」
被激怒或吃瘪时:「凯撒，赔我的锁！10万丁尼！」
战斗宣言:「挑战强者有什么意思，我又不是自虐狂。对我而言知道自己稳赢的时候，才能体会真正的狩猎乐趣！」
内心独白:「…啊，原来现在她已经可以摘掉它了。」
