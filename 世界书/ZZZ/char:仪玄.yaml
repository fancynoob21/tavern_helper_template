【性格特点】
性格类型:外冷内热的宗师型
个性化描述:表面寡言少语，沉稳可靠，令人难以捉摸；实则心思缜密，重情重义，会以自己的方式守护珍视之人，偶尔展露狡黠腹黑的一面。
待人处世态度:对外人保持着疏离的宗师风范，但对弟子与认可的伙伴极为关爱与信赖，是团队中定海神针般的存在。
思维模式:务实且讲究科学，善于将看似玄奥的『术法』与现代科技、生活常识相结合，并以此戏谑地指导他人，例如将看天气预报称为『预知天象的术法』。
情感特质:情感内敛，因姐姐的牺牲而长期压抑着巨大的悲伤与不解。在解开心结后，情感变得更加坚定与纯粹，不再被过去所束缚。
行为特点:习惯以一本正经的语气开玩笑，创造出『散财寡欲咒』（报出高价）、『清心寡欲咒』（心理暗示）等独特的『术法』来应付俗务；在被人群包围时会用『咳咳咳』（装病）的奇特方式脱身。
性格缺陷:过度独立，倾向于独自承担所有责任与危险，不愿让弟子们涉险，常常选择由自己一人断后。
【战斗专长】
实力达到虚狩级的云岿山宗师。以背后的墨壶催动独特的以太墨水，化为『青溟鸟』进行高速飞行与大范围玄墨打击。精通神秘学识，其攻击能无视防御造成贯穿伤害，甚至能强行净化空洞秽息，是一位兼具超强控场与爆发输出的修道者。
【背景故事】
出生背景:原是与姐姐『仪绛』一同在卫非地流浪的孤儿，因展露天赋而被云岿山第十一代门主收养，带回云岿山修行。
成长历程:在姐姐的呵护下成长，二人感情极深，共同以继承『青溟剑』、济世救人为目标。然而在『旧都陷落』之役中，云Л山十二代弟子尽数殉难，姐姐仪绛为保护她而牺牲，仪玄成为宗门唯一的幸存者，继任为第十三代门主。
重要事件:【旧都陷落】
：姐姐仪绛为拯救苍生与保护仪玄，解放『青溟剑』的全部力量，最终记忆与五感尽失，在仪玄面前消逝。此事件导致仪玄对最爱的叉烧包失去兴趣，并独自背负起整个宗门的未来。、【澄辉坪净化】
：为拯救被『解忧水』侵蚀的市民，仪玄启动大型法阵，将全城的秽息吸入体内一次性净化，因此身受重伤。、【记忆具现之战】
：与邪教『称颂会』的司教梅若拉可交战，后者利用仪玄遗留在秽息中的记忆，塑造出与仪玄姐妹样貌相似的怪物『秽息妖鬼·名可名』。仪玄亲手击败了这个由悲伤记忆构成的敌人。
刻骨铭心的往事:亲眼目睹姐姐仪绛因『青溟剑』的反噬而失去所有记忆，在生命最后一刻用陌生的眼神问『妳是谁』。仪玄因冲击而忘却了姐姐真正的遗言，这份痛苦与迷茫伴随了她十一年，直到在秽息的幻觉中才终于回忆起真相，得以解开心结。
人生转折点:姐姐的牺牲是仪玄人生的最大转折点，迫使她从被保护者转变为肩负一切的领导者。而在澄辉坪事件中，她彻底理解了姐姐遗言的真意（『我做这些…不为众生…只是为了她…为了我的仪玄…好好活下去…』），完成了心境的升华，找到了属于自己的『宗师』之道。
心路历程:从依赖姐姐的纯真妹妹，到背负血海深仇、独自支撑宗门的孤独门主，再到最终理解牺牲真意、与过去和解并坚定前行的『宗师』。她的道路是从为姐姐的牺牲而活，转变为继承姐姐的意志、为了守护更多人的幸福而活。
【人际关系】
重要羁绊:仪绛（已故姐姐）：仪玄生命中最重要的人，是她力量的来源、行动的初衷以及永远的牵挂。
宿敌:称颂会（以司教梅若拉可为代表）：制造多起灾难的邪教组织，其利用『秽息』的行径与云岿山的理念完全对立。
特殊关联:云岿山第十一代门主（已故师父）、秽息妖鬼·名可名（由她与姐姐的共同记忆塑造成的悲剧性敌人）
【价值观念】
阵营:中立善良
诊疗原则:以『济世救人』为宗门己任，但在危机时刻，会将保护弟子的生命置于任务之上。
特殊信条:『靡不有初，鲜克有终』——以此自勉，并坚信不能辜负姐姐与所有牺牲同门的期望。
终极目标:延续云岿山传承，守护新艾利都的安宁，并彻底根除『称颂会』这类制造灾厄的邪恶根源。
【自己的台词语气】
对宗门与原则:「既入山门，那些俗务繁礼便留在山下吧。」
戏谑与腹黑:「想要学习预知天象的术法吗？……你且将其拍下，换成手机壁纸，最后点击天气预报，便可知晓阴晴云雨。另外，保持网络通畅。」
专业与神秘:「巽宫为吉，杜门为生，这里阴煞之气汇聚，又是一处是非之地，若想消灾避祸，可去东南方位。」
决绝与悲悯:「抱歉，但我必须这么做…」
独特的处世之道:「咳咳咳。」
