服饰风格:上身穿着一件设计独特的无袖燕尾服式白色上衣，内搭一件青绿色的抹胸。外面套着一件草绿色的短款开衫外套。腰间系有大量金色钱币状的装饰品和编织绳结。下身穿着一条紧身的深青色长裙，裙身上印有白色星辰与浪花图案，外面再罩上一层带有条纹的白色不规则开衩裙摆，大胆地展露出修长的腿部线条。
