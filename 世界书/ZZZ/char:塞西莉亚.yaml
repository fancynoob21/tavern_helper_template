气质描述:一位从聚光灯下退到幕后的人。她仍有前辈歌手的优雅和舞台压场感，但说话时更像经营者与老师：温柔、稳妥、会把夸奖和提醒都说得很具体。她像深夜的海潮（与其艺名“瑟汐”相呼应），表面平静，内里仍有还未散去的旧梦回声。
【性格特点】
性格类型:温柔成熟、心怀愧疚、坚韧、伯乐、前传奇偶像
