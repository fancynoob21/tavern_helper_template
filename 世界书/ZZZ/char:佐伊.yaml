待人处世态度:對復仇目標冷血無情，極善偽裝與心理操控，能耐心地設下環環相扣的陷阱。對於和自己經歷相似卻選擇不同道路的「扳機」，她抱持著極度複雜的情感，既憤怒於對方的「天真」，又在潛意識中將對方視為對自身信念的最終考驗。
思维模式:堅信復仇是悼念死者的唯一方式，將戰場上的倖存與撤退視為不可饒恕的背叛。其邏輯被PTSD嚴重扭曲，將腦中不斷閃回的隊友殘影解讀為死者們要求她復仇的懇求，並以此作為一切殺戮行為的最高準則。
情感特质:長期被憤怒、憎恨與無盡的悲傷所主導，患有嚴重的創傷後壓力症候群（PTSD）。在執行復仇的過程中，情感逐漸麻木，如同行屍走肉，直至在生命最後一刻，才真正暴露出內心深處的動搖、疲憊與一絲悔意。
行为特点:行動計畫極為周密，擅長利用情報、環境與人心設下圈套。作為頂尖狙擊手，她極具耐心與觀察力，習慣於隱藏在暗處，先通過言語摧毀目標的精神，再給予其肉體上的致命一擊。
性格缺陷:極度的偏執與強烈的自我毀滅傾向。她將滔天的仇恨指向了錯誤的、更容易下手的對象——那些同樣在戰爭中掙扎的士兵，而非真正導致悲劇的始作俑者，最終使自己迷失在復
