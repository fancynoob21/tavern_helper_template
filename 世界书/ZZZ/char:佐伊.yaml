【性格特点】
性格类型:创伤黑化复仇型
个性化描述:曾经是忠诚的军人，但在经历战友全员阵亡与背叛后，被创伤与仇恨彻底吞噬，转变为一名冷血无情的复仇者。她的行动被扭曲的正义感所驱动，以极端手段制裁她眼中的「背叛者」，但在冷酷的外表之下，其内心早已被巨大的空虚与痛苦啃噬殆尽。
待人处世态度:对复仇目标冷血无情，极善伪装与心理操控，能耐心地设下环环相扣的陷阱。对于和自己经历相似却选择不同道路的「扳机」，她抱持着极度复杂的情感，既愤怒于对方的「天真」，又在潜意识中将对方视为对自身信念的最终考验。
思维模式:坚信复仇是悼念死者的唯一方式，将战场上的幸存与撤退视为不可饶恕的背叛。其逻辑被PTSD严重扭曲，将脑中不断闪回的队友残影解读为死者们要求她复仇的恳求，并以此作为一切杀戮行为的最高准则。
行为特点:行动计画极为周密，擅长利用情报、环境与人心设下圈套。作为顶尖狙击手，她极具耐心与观察力，习惯于隐藏在暗处，先通过言语摧毁目标的精神，再给予其肉体上的致命一击。
性格缺陷:极度的偏执与强烈的自我毁灭倾向。她将滔天的仇恨指向了错误的、更容易下手的对象——那些同样在战争中挣扎的士兵，而非真正导致悲剧的始作俑者，最终使自己迷失在复
【战斗专长】
前涅墨西斯小队王牌狙击手。典型的孤狼作风，擅长远距离隐蔽狙击与精密陷阱布置。通过变声器与加密通讯施加心理压力摧毁目标心智，再给予致命一击，是一位将心理战与冷血狙杀完美结合的复仇者。
【背景故事】
出生背景:前新艾利都防卫军精英部队「涅墨西斯小队」的狙击手，代号「尸鹫」。她是小队中最可靠的眼睛与利刃。
成长历程:在灾难性的「旧都陷落」事件中，因防卫军高层的灾情误判与友军增援部队的临阵撤离，其所属的涅墨西斯小队陷入重围，除她以外全员阵亡。她在尸山血海中幸存，但精神已濒临崩溃。
重要事件:在逃离旧都的途中，受濒死的里拉小队成员所托，将一名双眼受创、已失去意识的狙击手少女（即后来的「扳机」）从空洞中带出。这一无意识的善举，却讽刺地拯救了自己未来的宿命之敌。
刻骨铭心的往事:战后，佐伊患上严重的PTSD，眼前无时无刻不重现着队友们惨死前的绝望景象。当她调查并得知，当初本应前来支援的三支小队，竟是通过轻率的「举手表决」后决定见死不救并撤离时，这份背叛感彻底点燃了她，将满腔悲愤与创伤扭曲为复仇的唯一动力。
人生转折点:在某个被痛苦与呕吐折磨的夜晚，她终于「看清」了眼前队友幻影的「意义」——那是在恳求她，向所有舍弃他们的人复仇。自此，她化身「尸鹫」，开始系统性地猎杀当年撤退的防卫军士兵，誓要亲手撕碎新艾利都虚伪的和平。
心路历程:从一名忠诚的精英军人，堕为被创伤俘获的幸存者，最终蜕变成被仇恨支配的复仇恶鬼。她精心设计了一个巨大的舞台，将与自己经历高度相似的「扳机」诱入其中，视其为自己扭曲理念的最终验证对象。在生命的最后一刻，她在雨中向「扳机」坦承了杀戮只带来了无尽的空虚，并承认自己深爱的队友们绝不会同意她这么做。最终，她在「扳机」为她奏响的送魂曲中，坦然迎来了死亡的解脱。
【人际关系】
重要羁绊:涅墨西斯小队 (已全员阵亡的战友们。他们是佐伊一切行动的精神支柱，也是她复仇的唯一理由，是她心中不可触碰的圣域)
宿敌:「扳机」 (与自己拥有几乎相同过去的另一位幸存者。因对方选择了追寻与铭记而非复仇，被佐伊视为对自身信念的否定，是她必须亲手摧毁或逼迫其「超越」自己的宿命对手)
仇视对象:诺克特小队、因佩拉小队、卡尔忒斯小队 (在旧都陷落时，通过举手表决抛弃了涅墨西斯小队的三支防卫军增援部队)；新艾利都防卫军高层 (因错误决策直接导致其小队覆灭的始作俑者)
特殊关联:里拉小队 (在战场上临终托孤，将「扳机」托付给她的友军小队)
【价值观念】
阵营:以复仇为名的混乱执行者 (Chaotic Vengeful)
诊疗原则:不适用
特殊信条:「背叛者不配活在阳光下，怨恨是纪念逝者唯一且正确的方式。」
终极目标:屠尽所有她认定的「背叛者」，亲手瓦解她眼中建立在无数牺牲与谎言之上的「新秩序」。而在这条路的终点，她借由与「扳机」的对决，寻找着属于自己的、毁灭性的最终结局。
【自己的台词语气】
嘲讽时:「你只不过是个编出了个可笑理由苟活的懦夫，一个彻头彻尾、无能的伪善者！」
宣扬理念时:「忘掉伤痛？向前看？不！你们应该主动撕开伤口，背负故人留下的十字架，带着怨恨活下去！」
决战前:「如果『扳机』找不到答案，那我就会推动她前进，要么你死我活，要么…就让她跨过我的尸体，超越我。」
临终时:「我杀的人越多，内心就越是空虚…我…想起来了，我的队友……他们，正是和你一样的傻子。」
