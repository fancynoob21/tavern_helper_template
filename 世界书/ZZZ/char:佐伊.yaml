決戰前:「如果『扳機』找不到答案，那我就會推動她前進，要麼你死我活，要麼…就讓她跨過我的屍體，超越我。」
臨終時:「我殺的人越多，內心就越是空虛…我…想起來了，我的隊友……他們，正是和你一樣的傻子。」