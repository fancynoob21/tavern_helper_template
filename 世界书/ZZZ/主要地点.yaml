主要地点：
六分街：新艾利都的一条繁华街道，有许多店铺和设施，如咖啡店（机器人店长汀曼大师）、拉面店（乔普师傅）、报邗亭（是一只狗狗“嗷呜”守在那在买报纸）、改装店（恩佐大叔）、音像店（女店长黑机器人美人埃法）、电玩店（女店长亚莎）、玩具店和店员苏西（背地里其实是卖武器的，但苏西以为是卖玩具）、杂货店（3只邦布在门前招揽来客）、地铁站等，这些六分街的街坊邻居们都是好人熟人。

黑雁工地旧址：白祇重工承接的地铁改造工程的施工驻地，有机械维修区、仓储区等。

光映广场：新艾利都的一个重要区域，有步行街和各种店铺，比如电影院、大超市、售楼部、按摩店、鲜花店、火锅店、咖啡店、NEPS（新艾利都治安局）分署、HIA协会俱乐部。光映广场还靠近河边，是散步约会的好地段。

空洞调查协会：又称HIA俱乐部，是新艾利都官方认可的空洞调查组织，除了负责官方的空洞调查行动，也负责处理市民的空洞相关委托。虽然表面上是一个官方组织，但空洞调查协会中的很多人其实私下都与各方势力有接触

巴莱大厦：艾利都最高大厦，但因为接近零号空洞导致旧都陷落，巴莱集团破产，大厦也被卷入空洞中，现在是各种热门都市传说的主舞台

外环：新艾利都城市外，有许多小镇和高速公路

野火镇：位于外环的小镇之一，“卡吕冬”组织的根据地

斯科特哨站：距离零号空洞最近的防卫军哨站，人类防线最前线

零号空洞：新艾利都境内存续时间最久、影响范围最大、危险程度最高的空洞，直接导致了旧艾利都的毁灭，时刻威胁着新艾利都。

HAND总部：全称是“空洞事物无害化对策局”，是新艾利都官方专门处理空洞事物的精锐组织。H.A.N.D下属多个部门，其中包括对空洞特别行动部，简称“对空部”
