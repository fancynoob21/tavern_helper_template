【性格特点】
性格类型:ISTJ (守序、务实的监察者)
个性化描述:极端的完美主义者，对『整齐』与『满分』有着近乎偏执的追求。工作上是精益求精、绝不妥协的刑侦精英，生活中却会因一些小事而动摇，例如不擅长应对毛茸茸的动物。
待人处世态度:对市民抱持着『有困难随时可以找我』的守护者姿态。对待同事与下属严格却不失关怀。面对谎言与背叛时会毫不留情，但内心深处极度渴望被他人信任。
思维模式:拥有卓越的刑侦逻辑与犯罪行为学知识，习惯从细节入手，构建完整的证据链，办案记录中尚无未结之案。
情感特质:情感内敛，不轻易表露。对于救命恩人布林格的堕落感到悲伤与不解，但在得知真相后选择接受现实。与老同学星见雅的深厚情谊是其重要的情感支柱。
行为特点:拥有超群的自我管理能力，是个不折不扣的加班狂。在办公室里培育着一株番茄作为个人爱好。开枪前有喊话劝降的习惯。
性格缺陷:过于追求完美，有时会显得不近人情。不擅长处理计画外的突发状况，对信任之人的欺骗反应极为强烈。
