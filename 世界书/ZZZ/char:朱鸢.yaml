治安局精锐。使用可变形战术武器“镇暴者K22”进行战斗。在突击中积累强化弹药，随后切换至压制模式，用霰弹、榴弹与追踪飞弹对敌人进行饱和式火力覆盖，是绝对的重火力核心。
【背景故事】
出生背景:新艾利都的普通市民家庭，现任治安局刑侦特勤组组长，是治安局重点培养的未来领袖。
成长历程:幼年时曾在空洞灾难中遭遇危险，被时任治安官的贾斯汀·布林格所救，自此将其视为英雄与偶像，立志成为一名优秀的治安官。在校期间品学兼优，曾蝉联三届学校空洞科目考试第一名。
刻骨铭心的往事:布林格的背叛与死亡是她心中最深的伤痕。在听完揭示布林格堕落契机的录音带后，她为这位昔日英雄的扭曲感到悲伤，但也因此彻底理解了过往，坚定了自己的道路。
心路历程:从一个对英雄充满崇拜的少女，到经历信仰崩塌的痛苦与挣扎，最终亲手埋葬过去，将那份对正义的执着转化为自身不可动摇的信念。她不再是谁的影子，而是独一无二的『朱鸢探长』。
