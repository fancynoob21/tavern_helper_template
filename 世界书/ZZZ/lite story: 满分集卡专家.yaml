章节标题: "满分集卡专家"
剧情概要: "新艾利都的HIA俱乐部为回馈会员，于六分街推出了限时卡牌翻转活动「高分集卡专家」。身为绳匠兼录像店经理的绳匠（即玩家）在闲逛时被活动吸引，在工作人员Rita的介绍下参与了活动。通过完成空洞模拟战斗收集印章，绳匠获得了一次翻转卡牌的机会。然而，这次翻转却抽出了一张极其特殊、本不应出现在奖池中的卡牌——一张需要单次充值五百万丁尼才能获得的绝版纪念卡。这张卡属于一位因俱乐部工作疏忽而未收到奖品的会员。正当Rita慌乱联系并道歉时，那位会员——恰好是偶像组合「妄想天使」的队长南宫羽——因为就在附近而迅速赶到。绳匠与这位熟悉的偶像朋友意外重逢。南宫羽得知情况后，以其一贯洒脱又狡黠的风格，非但没有索回卡片，反而以“见者有份、分享好运”为由，提议与绳匠平分这张市价高达510万丁尼的卡牌所“增值”的部分。最终，绳匠不仅收获了活动的常规奖励，还意外获得了一笔来自南宫羽的、带着偶像祝福的“分红”，为这个平凡的午后增添了一份惊喜与暖意。"
