章节标题: "切勿独行"
剧情概要: "狡兔屋的活宝比利·奇德带着一则“重磅消息”冲进录像店——六分街的指头哥电玩店新上架了一款名为《怪奇组队》的游戏，并举办为期三天的冲榜活动，冠军能获得将自己形象植入游戏的无上荣耀。在比利“将偶像莫妮卡做进游戏”以及“自己穿上莫妮卡经典礼服”等一系列离谱计划的软磨硬泡下，身为硬核玩家的哲/铃决定出手相助。第一天，你轻松拿下榜首，并将资格让渡给比利。然而第二天，榜首易主，一对少年组合罗伊与乔纳凭借完美的团队合作刷新了记录。更具戏剧性的是，罗伊因一张自己裤子撕裂、露出星星图案短裤的糗照被挚友乔纳当作战队形象提交，正面临“社死”危机。在罗伊的含泪恳求下，你再次出手，夺回榜首，成功“拯救”了这位濒临崩溃的少年。就在颁奖日当天，新的敌人出现了——电玩店店长亚莎本人。她坦白整场活动不过是公司的宣传噱头，冠军早已内定，而她就是那个负责控场的“职业玩家”。面对这突如其来的背叛，你选择用实力说话，再一次刷新了亚莎的记录。正当亚莎准备全力应战时，她却发现关键人物比利迟迟没有现身。通过敲敲联系，你得知比利正随妮可外出执行紧急救援委托，无法赶来。他提出了一个堪称荒诞的备用计划：让你爬进狡兔屋二楼的窗户，穿上他那件据称还残留着演员汗水的、价值三个月工资的星徽骑士官方戏服代为领奖。在你毫不犹豫地拒绝了这个离谱请求后，比利虽感遗憾，却也兴奋地表示，能与身为主角的你一同在游戏中冒险，也是一件帅爆了的事。最终，这场一波三折的比赛，以你——传奇绳匠“法厄同”的意外胜出而告终。"
