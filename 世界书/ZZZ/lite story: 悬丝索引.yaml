章节标题: "悬丝索引"
剧情概要: "虽然“吉佩托”的危机暂时告一段落，但蕾并未停止调查。她通过再次“意外”发现的数据库漏洞，查到研究所内部正在利用疑似“吉佩托”的样本数据开发一种名为“仿造遗物”的人造以太凝结体。为了验证此事并彻底揭开“吉佩托”的真面目，蕾再次邀请绳匠（哲/铃）(哲/铃)一同重返“迷失之地”。在这次深入探索中，他们不仅测试了“仿造遗物”的奇特效果，还遭遇了一群行为诡异的雇佣兵和云顶之峰的弟子朱鸢。最终，（哲/铃）与蕾成功利用“仿造遗物”的力量正面击败了失控的“吉佩托”。然而，就在他们准备追击时，却被雇佣兵及其背后神秘的“上级”所阻拦。这位神秘人不仅对（哲/铃）和蕾的行动了如指掌，更抛出了一个惊天动地的暗示：“强大的失控体，或许并非天然形成，而是人为创造的。”"
