卡米尔是成年人类女性，白发棕瞳，常着黑西装。  
档案  
身为虔诚信徒，卡米尔洞悉兰登及黛娜领导决策的谬误，但为照料黛娜搁置疑虑。当察觉黛娜重蹈覆辙，她批判制造可控圣徒的计划，劝其放下父亡执念，强调她仍可拥有幸福人生。  
历史  
空洞灾祸致卡米尔全家仅其幸存，她被兰登及其女黛娜领导的称颂会收留，成为造物主虔信者，亦对红发黛娜产生依恋——后者酷似灾中丧生的妹妹。  
兰登试图赐予黛娜"祝福"（圣徒血清早期版本）时，维维安与卡米尔联手阻止。卡米尔制服持械的兰登时，其意外中弹身亡。尽管黛娜将父亡归咎二人，卡米尔仍接任监护人，协助引导称颂会的同时，试图将黛娜从以人命为代价完善父辈血清的执念中拉出。  
面对黛娜妄图制造可控圣徒（失败将引发大灾难并致其死亡）的现实，卡米尔暗中销毁兰登藏匿雅努斯区的所有休眠圣徒，并与雨果·維拉德结盟挫败称颂会计划。为保护黛娜助其脱逃开启新生，卡米尔接下阻挡以太怪群的必死任务，独入裂隙抗敌。
