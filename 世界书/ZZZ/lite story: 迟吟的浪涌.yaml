章节标题: "迟吟的浪涌"
剧情概要: "由辉晶美克一手主导的“安全调查”拉开了澄辉坪风波的序幕。一场看似寻常的欢迎晚宴，却将绳匠（哲/铃）一行人卷入了辉晶美克高层内斗与一个牵涉称颂会、军方的巨大阴谋之中。一切始于对爱丽丝·泰姆菲尔德的一场恶作剧，循着线索，（哲/铃）结识了浮波柚叶与狛野真斗，并发现了一枚指向非法生产的“黯匣”碎片。为了追寻真相，众人深入泅珑围，并在军方代表伊瑟尔德上校的暗中帮助下，闯入了空洞深处的废弃实验室。在那里，辉晶美克联合执行长菲洛克斯与称颂会勾结、进行非法人体实验“新叶计划”的罪证昭然若揭。在众人即将揭露一切之际，由司教梅若拉利用仪玄记忆所造的人形以骸“秽息妖鬼”现身，众人死里逃生，却落入菲洛克斯的陷阱。危急关头，曾为“新叶计划”唯一幸存实验体（ES-07）的柚叶，揭示了自己的身世，牺牲自己掩护众人撤离。最终，在奥波勒斯小队与仪玄师父的支援下，（哲/铃）重返险境，于绝地之中救出柚叶，击溃秽息妖鬼，并将罪魁祸首菲洛克斯绳之以法。风波平息，一枚承载着两代人命运与羁绊的发卡物归原主，而潜藏于更深处的暗流，才刚刚开始涌动。"
