章节标题: "代理人秘聞「而英雄總是歸於幕後」"
剧情概要: "莱卡恩，一位受雇于富裕家庭的狼希人执事，发现其雇主的女儿莉莉可正计划上演一出“怪盗”闹剧。这位自称“正义的夥伴”的少女，意图通过盗窃自家名画来博取怪盗组织“反舌鸟”的青睐。然而，当“反舌鸟”这个名字被提及，莱卡恩那无可挑剔的执事面具下却闪过一丝阴霾。他向绳匠（哲/铃）（哲/铃）求助，介入了这场看似中二的事件。调查层层深入，从光映广场的秘密打工，到补习班的被孤立，莉莉可那渴望被认可的孤独内心被逐渐揭开。莱卡恩最终设下一场骗局中的骗局，与（哲/铃）联手，假意与冒牌的“反舌鸟”头目合作，却在交易现场反戈一击，将骗子们一网打尽，并守护了少女的“正义”。事件落幕后，莱卡恩向（哲/铃）坦白，自己曾是真正“反舌鸟”的一员，而这场闹剧，不过是重新揭开他沉重过往的序幕。"
