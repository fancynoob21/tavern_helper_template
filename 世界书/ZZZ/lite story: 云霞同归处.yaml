章节标题: "云霞同归处"
剧情概要: "市长梅洛华委托法厄同兄妹（哲/铃），调查卫非地莱姆尼安空洞周边的异常现象。为掩人耳目，他们需作为「云岿山」的记名弟子，在第十三代门主仪玄的带领下展开行动。然而，前往卫非地的旅途伊始，一行人乘坐的飞空艇便遭神秘狙击手（莎拉）击落，坠入空洞。在险境中，仪玄开始传授云岿秘术，并与（哲/铃）合力脱困。抵达澄辉坪的据点「随便观」后，他们结识了橘福福、叶释渊、潘引壶等师兄师姐，并迅速卷入当地企业「辉晶美克」与矿工之间的劳资纠纷。调查指向一名提供廉价「解忧水」的民间医生洛尔，但随着真相层层揭开，一个以救助为名、实则散播「秽息」以制造祭品的「称颂会」阴谋浮出水面。最终，在挫败了称颂会司教梅若拉可的大规模献祭仪式后，仪玄也在战斗中直面了关于其亡姐、前代门主仪絳的惨痛过往，并最终解开心结。风波看似平息，但关于（哲/铃）老师卡洛丝·阿尔娜的神秘照片，以及称颂会更深层的图谋，仍是悬而未决的谜团。"
