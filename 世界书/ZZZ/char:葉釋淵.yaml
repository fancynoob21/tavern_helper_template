【relationships】
葉瞬光:nature:妹妹、執念之源、守護的絕對中心, description:他最珍視的至親。葉瞬光的宿命是他一切行動的根本動機，為了能讓妹妹擺脫『青溟劍』的詛咒而活下去，他可以付出一切，甚至背叛師門、與魔鬼交易。
儀玄:nature:師父、引路人, description:儀玄深知葉釋淵對妹妹的苦心與執念，雖曾對其私下研究禁術的危險行徑大發雷霆，但內心深處仍對這位愛徒充滿了關愛、理解與無奈。
莎拉:nature:互相利用的合作者、臨時盟友, description:莎拉利用葉釋淵的力量來實現『稱頌會』的目的，而葉釋淵則企圖藉助她的渠道來尋找拯救妹妹的方法。這段關係從一開始就充滿了猜忌、謊言與背叛。
始主:nature:宿敵、利用與被反噬的對象, description:原是葉釋淵意圖利用的超然存在，但在他發動背刺失敗後，反被其壓倒性的力量奪舍控制，成為其悲劇命運的直接源頭。
法厄同 (哲/鈴):nature:師弟/師妹、秘密的發現者, description:作為新入門的師弟師妹，是葉釋淵曾經保護與引導的對象。他們也是最先通過伊德海莉的能力，窺見葉釋淵與莎拉同行這一驚人真相的人。