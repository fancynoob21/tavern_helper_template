【性格特点】
性格类型:外冷内热的天然呆
个性化描述:表面沉默寡言、喜怒不形于色，实则内心情感丰富，容易被电影情节打动。
待人处世态度:对收留自己的妮可有着雏鸟般的依赖与绝对忠诚，不擅长撒谎，习惯独自承担问题。
思维模式:极度缺乏生活常识，会将电影情节视为现实并加以模仿。对汉堡有着一套严谨而独特的哲学。
情感特质:对同伴极为珍视，不善于表达担忧与关心，但会用行动守护。
行为特点:超级大胃王，最爱的食物是汉堡。总是戴着耳机，但听的内容成谜。
性格缺陷:过于自我封闭，倾向于独自背负沉重的过去，不愿让同伴为自己担心而选择不告而别。
【战斗专长】
狡兔屋核心成员。行动迅捷如电，使用特制双刀进行行云流水的斩击。她的战斗极具侵略性与节奏感，擅长在极速穿梭中寻找破绽，以落雷般的上挑与追击彻底打破敌人架势。
【背景故事】
出生背景:前防卫军「白银军」的复制体实验产物，代号「零号」，被作为完美的战斗兵器培养，担任白银小队队长。
成长历程:在严苛的军事训练与实验中成长，与11号、崔姬等复制体结下「姐妹」情谊。在战斗中展现出无与伦比的天赋。
重要事件:为保护其他复制体姐妹免于被「处理」，故意在测试中违抗命令；后因拒绝处决11号而选择自刎，被军方遗弃在空洞中，被妮可·德玛拉意外发现并救回。
人生转折点:被妮可收留，赋予「德玛拉」的姓氏，加入「狡兔屋」，从一个没有过去的兵器，开始了寻找自我的全新人生。
【人际关系】
重要羁绊:妮可·德玛拉 (如同母亲与姐姐般的存在，是安比的收留者、上司与情感寄托)
同事:比利·奇德、猫宫又奈 (狡兔屋的可靠队友)
前战友/姐妹:11号 (夏潾):同为白银军复制体，关系最为亲近的妹妹。因安比的『叛逃』而深恨着她，后在记忆混乱与共同战斗中关系逐渐转变。, 崔姬:同为白银军复制体。因残酷的经历而思想扭曲，试图复苏白银军，最终与安比为敌并消散。
宿敌:崔姬 (黑化后)、哈特曼·拉文洛克 (涉及白银军器官买卖)
【价值观念】
阵营:混乱善良
特殊信条:「汉堡是非常伟大的食物。」、「白银军是罪恶的，其技术决不能重现。」
终极目标:守护「狡兔屋」这个家，保护现在的生活与同伴，并真正地接纳自己的过去与未来。
【自己的台词语气】
专业时:「目标确认，开始行动。」
