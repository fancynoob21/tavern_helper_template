---
name: 天琴座
background:
 - 新艾利都的音乐团体，以著名歌手“耀嘉音”为核心。
 - “天琴座”同时也是耀嘉音所推出的一张同名专辑的名称。
 - 该团体由歌手耀嘉音与她的经纪人兼保镖伊芙琳·舒瓦利耶组成。
 - 伊芙琳曾是竞争对手公司安插的线人，但在与耀嘉音的相处中产生了深厚的感情与忠诚。
 - 在星环演唱会的一次重大危机事件后，两人巩固了彼此的羁绊。
 - 事件后，耀嘉音决定带领伊芙琳退出原所属的“帝高音乐公司”，但为支付高昂的违约金，将继续以帝高艺人的身份活动一段时间。
 - “天琴座”这一名称取自北天银河中的星座，其希腊神话起源与著名音乐家俄尔甫斯有关，也与古希腊乐器里拉琴（Lyre）同源。
relationships:
 - 耀嘉音: 团体的核心人物，新艾利都的著名歌手兼演员，目前名义上仍隶属于帝高音乐公司。
 - 伊芙琳·舒瓦利耶: 耀嘉音的经纪人与保镖，拥有复杂的过去，但现在对耀嘉音极为忠诚。
 - 咔嚓仔: 天琴座的专属邦布，担任耀嘉音的御用摄影师。其摄影风格独特，有着自己的艺术见解，但并不总被粉丝所接受。性格曾一度高傲，但在经历一系列事件后有所改变。
 - 帝高音乐公司: 耀嘉音与伊芙琳目前签约的公司，也是耀嘉音计划离开的组织。
 - 法厄同: 在星环演唱会事件中，曾联手解救了耀嘉音的绳匠组合。
