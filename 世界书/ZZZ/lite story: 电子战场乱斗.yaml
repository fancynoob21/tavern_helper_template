章节标题: "电子战场乱斗"
剧情概要: "在影星『耀嘉音』所代言的VR游戏《电子战乱斗》封测中，一位智慧构造体『愛芮』因游戏缺陷陷入意识昏迷，生命垂危，而投资方『秩序维护局』（TOPS）却试图掩盖真相。为了拯救阿里亚，耀嘉音绕开TOPS，动用了尚在试验阶段的『邦布意识同感技术』原型机，以自己的邦布『咔嚓仔』的形象，找到了HIA玩家记录中的VR高手——绳匠『法厄同』（（哲/铃））。在法厄同的录像店里，耀嘉音发现了他收藏的自己主演的电影，因而认定他是个值得信赖的好人。（哲/铃）接受了委托，连续数日登录阿里亚的游戏账号，在虚拟战场中清除大量以骸，以刺激并稳定其混乱的意识。在一次次的并肩作战中，二人结下了奇特的友谊。最终，在（哲/铃）的不懈努力下，阿里亚成功苏醒。事后，耀嘉与（哲/铃）约定未来定会亲自见面道谢，并毅然解除了与TOPS的代言合同。"
