重要事件:芭萊大廈事件：與法厄同等人合作，為回收雇主資產進入空洞。在斷電的危急情況下，獨自衝入敵陣，瞬間擊潰所有叛軍，但也因能量耗盡而當場睡著，首次在主角面前展現了其恐怖的戰鬥實力。、代理人秘聞事件：為了完成回收邦布的委託，同時又要應付朋友們關於期末小組作業的『實時通話』要求，在繩匠的幫助下艱難地維持著秘密。但朋友們因擔心而跟蹤她進入空洞，引發了一連串危機與誤會。
刻骨銘心的往事:在空洞中，當跟蹤而來的朋友們遭遇高危以骸襲擊時，艾蓮在身份可能暴露的警告下，依然毫不猶豫地選擇了挺身而出，拯救朋友。這件事讓她意識到，朋友是值得她去『麻煩』的存在。
人生轉折點:朋友三人組在經歷空洞事件後，雖然對艾蓮的身份產生了更離奇的誤解（以為她是實習空洞調查員），但彼此的關係卻因此變得更加牢固和坦誠。艾蓮也最終釋懷，不必再為是否要轉學來逃避這份『麻煩』而苦惱，選擇了與朋友共赴拉麵之約，接納了這份甜蜜的負擔。
心路歷程:從一個純粹的『麻煩迴避者』和『節能主義者』，逐漸轉變為一個願意為了守護重要的日常與友情而直面『麻煩』的少女。她學會了在隱藏秘密的同時，用自己的方式笨拙地守護著與朋友們的羈絆。
