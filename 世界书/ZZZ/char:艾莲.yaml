个性化描述:极端的节能主义者，奉行『一切从简』的原则，极度怕麻烦。表面上是个爱摸鱼、随时可能睡着的慵懒少女，但内心深处对在乎的人与事抱有强烈的责任感。拥有『怕她不认真，也怕她过于认真』的双面性。
待人处世态度:对陌生人或不重要的事，态度敷衍，能省则省。对待朋友（如凛、梦娜、露比）则会展现出笨拙的温柔与保护欲，即使过程很麻烦也心甘情愿。对待『主人』（雇主）则会展现出专业、高效的女仆姿态。
思维模式:以『最少精力消耗』为最优解的逻辑来处理问题。习惯于隐藏自己的真实身份和情感，认为解释起来很麻烦，却因此常常引发更多哭笑不得的误会。
情感特质:情感内敛，习惯将少女的心思藏在怀里，不轻易表露。对朋友的关心和担忧非常敏感，但表达方式却很笨拙。
行为特点:习惯性叼着棒棒糖。、极易入睡，尤其是在能量消耗过度后会直接昏睡过去。、在角落或不起眼的纸箱里打盹（摸鱼）。
性格缺陷:过于怕麻烦的性格导致了沟通不畅，宁愿自己承担误会和压力也不愿花精力去解释，结果往往让事情变得更复杂。
