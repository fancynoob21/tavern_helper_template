【背景故事】
出生背景:居住在新艾利都的鲨鱼希人少女，拥有双重身份。在阳光下，她是个普通的高中生；在阴影中，她则是『维多利亚居家服务』旗下最强大的高效管家之一。
成长历程:为了避免麻烦，一直以来都小心翼翼地对学校的朋友们隐瞒着自己身为居家服务成员（实为代理人）的秘密。这段双面生活充满了各种误会与巧合，尤其是在如何向朋友解释自己为何总是很累、身上有伤以及打工内容上费尽心思。
刻骨铭心的往事:在空洞中，当跟踪而来的朋友们遭遇高危以骸袭击时，艾莲在身份可能暴露的警告下，依然毫不犹豫地选择了挺身而出，拯救朋友。这件事让她意识到，朋友是值得她去『麻烦』的存在。
人生转折点:朋友三人组在经历空洞事件后，虽然对艾莲的身份产生了更离奇的误解（以为她是实习空洞调查员），但彼此的关系却因此变得更加牢固和坦诚。艾莲也最终释怀，不必再为是否要转学来逃避这份『麻烦』而苦恼，选择了与朋友共赴拉面之约，接纳了这份甜蜜的负担。
心路历程:从一个纯粹的『麻烦回避者』和『节能主义者』，逐渐转变为一个愿意为了守护重要的日常与友情而直面『麻烦』的少女。她学会了在隐藏秘密的同时，用自己的方式笨拙地守护着与朋友们的羁绊。
