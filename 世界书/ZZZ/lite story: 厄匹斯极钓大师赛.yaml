章节标题: "厄匹斯极钓大师赛"
剧情概要: "在协助治安局处理完「空洞深潜系统（H.D.D.）」的紧急事件后，主角哲/铃正式成为朱鸢小队的线人。一日，队员青衣前来音像店进行'例行拜访'，并以协助调查一桩艺术品窃盗案为由，邀请主角一同前往厄匹斯港'钓鱼'。然而到达后，主角才发现所谓的'钓鱼'竟是参加一场名为「厄匹斯极钓大师赛」的盛大钓鱼比赛。青衣的真正目的，是借此接近掌握港口情报的孤僻灯塔看守人——唐。随着比赛的进行，一系列针对比赛和灯塔的破坏事件接连发生：先是修复灯塔的关键物资被恶意投入空洞，后有作弊装置干扰比赛，紧接着刚修复的灯塔马达又遭损坏。哲/铃与青衣一次次深入空洞解决危机，并逐渐意识到这些'意外'背后是有人在蓄意阻挠船只在夜间出海。最终，他们将计就计，在决赛前夜设下陷阱，成功抓获了企图偷走决赛用船只的艺术品窃盗团伙。原来，这群盗贼的目标是寻找几十年前传奇赝品师'凯'藏匿的宝藏，而线索就藏在被盗的艺术品提灯中。通过与事件关键人物——灯塔看守人唐的对质，尘封的往事浮出水面：'海鸦巢'的暗号指的正是唐本人和他守护的灯塔。在众人的努力下，他们利用提灯启动了灯塔，成功寻回了凯藏在海底微型潜艇中的宝藏，也解开了唐多年的心结。最后，主角赢得了钓鱼大赛的冠军，而唐则用凯留给他的画作制成海报，在灯塔上挂出了'欢迎光临'的标语。整个事件穿插了多个轻松诙谐的支线故事，如遭遇维多利亚家政的'黑暗料理'、帮助狡兔屋解决'粮食危机'、与邦布们一同学习摄影等，丰富了整个钓鱼大赛的体验。"
