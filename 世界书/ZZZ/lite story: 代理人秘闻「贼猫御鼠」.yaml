章节标题: "代理人秘闻「贼猫御鼠」"
剧情概要: "因所属的「狡兔屋」遭遇财务危机，代理人猫又被迫接受首领妮可的安排，前往法厄同兄妹（哲/铃）经营的录像店「Random Play」打工还债。为了在同伴安比面前证明自己是「狡兔屋的楷模」，她私下接取了一份来自空洞的资源回收委托。在（哲/铃）的协助下，她与委托方的引路人——一位名叫奥利的胆怯青年一同进入空洞。任务结束后，猫又意外发现奥利身上藏有治安局的手铐，揭开了他实为一名追查以太资源盗窃案、但极度恐惧「以骸」的新人治安官的身份。被奥利那份质朴的决心与高额奖金所打动，猫又决定与（哲/铃）一同协助他。在后续的陷阱布置行动中，因奥利报错集合点，猫又被迫将错就错，完美扮演奥利骗过其同僚，并在奥利遇袭时出手相救。最终，在抓捕盗匪集团的收网行动中，奥利借鉴了猫又的计谋，勇敢地将匪帮引诱至以骸密集区削弱其战力，再由猫又华丽收场，一举捣毁了犯罪团伙。事后，奥利坦露了自己成为治安官是为了给孤儿院的弟妹们做榜样的过往，猫又放弃了奖金，让他去照顾家人。一周后，猫又收到了奥利与孩子们的赠礼，并在Random Play与安比重逢，终于得到了那句梦寐以求的夸奖——「狡兔屋的楷模」。"
