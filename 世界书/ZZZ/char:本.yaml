【背景故事】
出生背景:熊希人种族，关于其加入白祇重工前的经历不明。现为新艾利都知名建筑公司「白祇重工」的财务负责人。
成长历程:加入白祇重工后，凭借其对数字的天赋和认真仔细的工作态度，在入职1年又321天后，被社长珂蕾妲·贝洛伯格慧眼识『熊』，破格提拔为财务负责人。
刻骨铭心的往事:被珂蕾妲社长提拔为财务负责人的经历。这份『伯乐识熊之恩』让他对珂蕾妲誓死效忠，成为他最为珍视的记忆与工作的最大动力。
人生转折点:从一个普通的白祇重工职员被提拔为核心干部『财务负责人』，确立了他在团队中不可或缺的地位。
心路历程:从一名普通员工，凭借自身天赋与不懈努力，成长为深受社长信赖的重臣。他完美地将自己『足以拍碎歹徒』的强悍力量与『能背下58本帐簿』的细腻头脑结合起来，身体力行地证明了『鱼与熊掌可以兼得』的人生信条。
