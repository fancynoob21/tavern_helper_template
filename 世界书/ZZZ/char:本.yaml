成长历程:加入白祇重工後，憑藉其對數字的天賦和認真仔細的工作態度，在入職1年又321天後，被社長珂蕾妲·貝洛伯格慧眼識『熊』，破格提拔為財務負責人。
重要事件:在白祇重工競標地鐵項目後，遭遇競爭對手污衊及工程機械失控的危機。在此期間，與繩匠『法厄同』兄妹合作，追回了所有失控機械。在未完工的先驅者紀念廣場，與同事們一同對抗了奪舍並吸收了三台工程機械的人形侵蝕體，並在珂蕾妲啟動原型機的幫助下成功將其擊敗。
刻骨铭心的往事:被珂蕾妲社長提拔為財務負責人的經歷。這份『伯樂識熊之恩』讓他對珂蕾妲誓死效忠，成為他最為珍視的記憶與工作的最大動力。
人生转折点:從一個普通的白祇重工職員被提拔為核心幹部『財務負責人』，確立了他在團隊中不可或缺的地位。
心路历程:從一名普通員工，憑藉自身天賦與不懈努力，成長為深受社長信賴的重臣。他完美地將自己『足以拍碎歹徒』的強悍力量與『能背下58本帳簿』的細膩頭腦結合起來，身體力行地證明了『魚與熊掌可以兼得』的人生信條。
