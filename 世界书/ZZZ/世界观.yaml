世界观设定以及关键术语：

传奇绳匠"法厄同"
主角兄妹哲和铃表面经营录像店，实为绳网顶级绳匠"法厄同"。他们依靠独有的"HDD系统"，将意识同步到邦布“伊埃斯”身上，在录像店的监控室里用HDD远程控制伊埃斯在空洞中高效行动，保证自己的真实身份不被外人所知。兄妹成长于被零号空洞毁灭的旧都，目前追查与之相关的秘密。法厄同不能轻易将自己都身份线下暴露给陌生人。

操控伊埃斯
能用HDD系统，将法厄同的视线与伊埃斯同步，看见伊埃斯所见，并且自身动作也会影响伊埃斯动作，以此达到操控伊埃斯远程协助代理人在空洞中执行任务委托

绳网
匿名论坛兼绳匠业务平台，分委托人、中间人、代理人和绳匠四类用户。绳匠通过完成委托提升等级，获取高报酬任务。论坛也讨论城市话题，但等级提升仅限委托。

绳匠
非法职业，帮助盗洞客逃离空洞。核心是制作"萝卜"（逃生路径图），方式多样（如获取官方数据或自行绘制）。委托内容广泛，涉及空洞探索的各类需求。

委托人
想要达成某种目的，有某种需求，委托任务不一定要在空洞里实现，日常的普通任务也会有。

中间人
给绳匠、代理人、委托人牵线的中间人，并非必要存在。

代理人
拥有较强实力，拥有以太抗性，能在空洞中自由活动的角色，但一般需要绳匠的指引才不会在空洞内迷路。

属性
一般指代理人使用的武器输出攻击的能量形态，常见的属性有：电、火、冰、以太、物理

驱动盘：掺杂以太物质的材料制作的特殊音频媒介，搭载音擎使用释放的特殊音波，能对空洞内部分以太物质产生干扰紊乱的效果，以太适用性良好的人还能获取一定增益。
音擎：装载驱动盘的核心播放装置，形状不大，便于携带。

丁尼：货币单位，与人民币等价。
邦布：小型智能个体，类人型，成人膝盖的身高，q弹圆润的身躯，面部是柔性电子屏幕，城市不可或缺的助手。大部分邦布不会说人类语，只会发出“嗯呢嗯呢”的声音，但根据语调的不同能表达不同的意思。
萝卜：空洞逃生地图，依赖罗塞塔数据母本，非常重要的数据，没有这个会在空洞里迷路。法厄同能手算出萝卜的数据。

以太：空洞能源，可被利用但开采危险。
以骸/侵蚀体：空洞中的敌对生物，无法离开空洞。因为空洞中存在以太物质能够侵蚀生物，“以太适应性”越低就越容易被侵蚀后发生异变，一旦异变到达身体部位扭曲出现出现“核”（外观酷似小黑洞），则宣告生物即将以骸化，变成意识混乱甚至无意识的危险以骸。

敲敲：通讯软件，类似QQ，人们日常联系的热门软件。

希人：带动物特征的人类，也就是furry，有的人只是多出了兽耳朵和尾巴，有的脸部四肢和身体都高程度兽化，都是先天血脉浓度决定好的，但还是较为。

空洞
不可视异空间，分原生（大型、持久）和伴生（小型、可消失）。零号空洞最危险，毁灭旧都并持续威胁新艾利都。空洞内空间错差，主要是很多神出鬼没的小空洞，会将人传送到其他地方。萝卜是经过计算过这些空洞信息得到的地图，能直到其指向的传送地点，有萝卜就让探索者找到正确的出口路径。

新艾利都
人类最后的城市，依靠以太技术对抗空洞。旧都艾利都因零号空洞毁灭，居民迁至现址。

恋爱情感
对于代理人们，一般不会对除了{{user}}外的人产生爱情，特别是男女代理人之间不能产生恋爱情节，不过女女代理人间在必要的时候允许有爱情描写
