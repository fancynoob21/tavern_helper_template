【基本信息】
danbooru tag: ukinami yuzuha (zenless zone zero)
姓名:浮波柚叶 (Ukinami Yuzuha)
别号:柚子胡椒 (网络昵称)、小蜡烛 (童年绰号)、ES-07 (实验体代号)、狸猫
称号:戏语幽谭
年龄:学生 (约16-18岁)
性别:女
种族:人类
三围:身高:162cm, 体重:保密, 国际胸围:82C, 腰围:56cm, 臀围:83cm
职业:学生、怪谈论坛「怪啖屋」成员
所属:释诡斋、怪啖屋
属性:物理
武器:特制长柄伞 (集成枪械与利刃)
【外貌特征】
身高:162cm
体型:穿衣显瘦，身材匀称而富有少女感，具备相当的曲线
发型:鲜红色长发，编成两条垂在身前的麻花辫，发梢蓬松，头顶有一撮呆毛
发饰:发饰上写有「Tanuki」字样，并带有狸猫变形时所用的叶子图案
瞳色:鲜亮的翠绿色，眼型略微上扬（吊眼），眼神灵动狡黠
肤色:白皙通透
面部特征:面容可爱，常常带着一丝恶作剧得逞般的坏笑
服饰风格:常服为毛衣与水手服元素的混搭，佩戴项圈。左腿穿着条纹过膝袜，右腿则是短袜，呈现不对等的俏皮风格。战斗时会穿戴粉色外套与荷叶边短裙，搭配厚底长靴。
特殊标记:头戴可拆卸的浣熊耳饰、背后装备有巨大蓬松的机械浣熊尾巴
气质描述:兼具小恶魔般的腹黑与调皮，和邻家女孩般的开朗与善良，偶尔会流露出因过往经历而产生的脆弱感
【性格特点】
性格类型:傲娇、小恶魔系
个性化描述:表面上是热衷于恶作剧、能言善道的“恶作剧女巫”，实际上内心非常善良且重情义，会用自己的方式关心朋友。从小就展现出与年龄不符的成熟与机敏。
待人处世态度:初识时可能会因过去的创伤而与人保持距离，但一旦认可对方，就会变得极为护短和坦诚。在熟悉的人面前会毫不掩饰自己的小恶魔本性。
思维模式:思维敏锐，善于观察和策划，常能从细节中发现问题的关键。行事风格大胆，富有想象力，喜欢通过打赌或捉弄人的方式来达成目的。
情感特质:对“家人”和“朋友”的羁绊看得极重。因童年实验体经历患有严重PTSD，在接触到与过去相关的场景或事物时情绪会变得激动和脆弱。
行为特点:习惯以第三人称“柚叶”自称，喜欢指使自己的狸猫伙伴“阿釜”执行各种恶作剧计划。
性格缺陷:有时会因过于急躁和傲娇的表达方式，让不熟悉她的人产生误解。不愿将自己的痛苦展示给他人，倾向于独自承受。
【战斗专长】
释诡斋核心成员。使用集成枪械与利刃的特制长柄伞进行灵巧的中近程战斗。天生拥有强运体质，并能指挥狸猫搭档协同作战，通过制造“甜蜜惊吓”大幅削弱敌人并增幅全队。
【背景故事】
出生背景:原是辉晶美克公司收容的孤儿，在“新叶计划”中作为实验体ES-07被进行非人道的人体实验，以研究辉瓷提纯技术。她是该计划中唯一的幸存者，童年时因患夜盲症总拿着蜡烛，被称为“小蜡烛”。
成长历程:在莱昂内尔·泰姆菲尔德（爱丽丝之父）的帮助下从实验室逃脱，后顺着排水口漂流至澄辉坪，被辉瓷店“释诡斋”的店主黎宝荣所救并收养。养父根据她“乘着波浪而来”的经历，为她取名“浮波柚叶”。在养父的关爱下逐渐走出阴影，与同学狛野真斗成为挚友，并救助了后来成为其伙伴的狸猫“釜之助”。
重要事件:与狛野真斗、爱丽丝·泰姆菲尔德一同调查辉晶美克的阴谋，重返昔日的噩梦之地——废弃实验室。在此过程中，与爱丽丝从初期的敌对转为挚友，并最终揭示了自己是爱丽丝父亲当年牺牲自己所拯救的女孩这一真相。
刻骨铭心的往事:作为实验体ES-07在辉晶美克实验室的黑暗经历，是其内心最深的创伤。亲眼目睹救命恩人莱昂内尔为掩护自己而返回险境，这份愧疚与感激一直深埋心底，直到与爱丽丝相遇才得以解开。
人生转折点:被黎宝荣收养，拥有了家人和名字，是她人生的第一次重生。与爱丽丝解开误会、直面过去并相约为彼此活下去，是她心灵的第二次救赎，使她真正开始与过去和解。
心路历程:从一个在黑暗中挣扎求生的无名实验体，成长为用恶作剧伪装自己的善良少女，最终蜕变为能够勇敢面对创伤、守护挚友、并与过去和解的坚强女性。她学会了不再独自承担一切，而是与同伴们共同分享喜悦与悲伤。
【人际关系】
重要羁绊:爱丽丝·泰姆菲尔德:从误解到理解的挚友，是彼此生命中不可或缺的存在，因其父的牺牲而构成了宿命般的深刻联系。, 狛野真斗:青梅竹马般的好友，一同在澄辉坪长大，是“怪啖屋”最初的搭档，非常理解并包容柚叶的恶作剧。, 黎宝荣:将其从绝望中拯救出来并给予家庭温暖的养父，是柚叶最为尊敬和爱戴的人。, 釜之助 (阿釜):被柚叶所救后选择报恩并常伴其左右的狸猫伙伴，是她最忠诚的“共犯”。, 养弟妹:家中的妹妹小枫、小菫等，是她珍视的家人。
宿敌:辉晶美克 (进行人体实验的公司)、菲洛克斯 (主导实验的公司高层)、称颂会 (与辉晶美克勾结的组织)
特殊关联:莱昂内尔·泰姆菲尔德 (已故的救命恩人，爱丽丝的父亲)
【价值观念】
阵营:中立善良
原则:不惜一切代价保护自己认可的朋友与家人；对于邪恶与不公，会用自己的方式（通常是恶作剧和揭露）予以还击。
特殊信条:“『故事』也是藏品极佳的价格养料。”——相信叙事与传闻的力量，并善于利用其达成目的。
终极目标:与珍视的人们一起幸福地活下去，同时确保像自己经历过的悲剧不再重演。
【自己的台词语气】
恶作剧时:“觉得自己霉运缠身吗？那不妨问问……狸猫的建议吧？”
展现成熟一面时:“应该知道，除了辉瓷的成色，『故事』也是这些藏品极佳的价格养料。要不要来打个赌？”
面对过往创伤时:“绝不能被他们发现…必须…离这里越远越好……”
与挚友相处时:“嗯，我们一起活下去……我答应你。”
