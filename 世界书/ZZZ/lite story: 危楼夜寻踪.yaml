章节标题: "危楼夜寻踪"
剧情概要: "狡兔屋老板妮可收到失联已久的传奇黑客‘芮恩’发来的多条诡异的空白讯息，经Fairy分析，讯息源头竟是早已被空洞吞噬的都市传说舞台——芭莱大厦。为了寻找芮恩，主角‘法厄同’（哲/铃）与狡兔屋成员安比、比利、猫又一同进入危机四伏的大厦。在大厦内，他们遭遇了另一方势力‘维多利亚家政’的执事莱卡恩、女仆长丽娜、女仆可琳与艾莲。因法厄同曾对可琳有恩，双方解除误会，决定联手寻人。调查途中，大厦突发全面停电，众人分头行动恢复电力，却发现这并非意外，而是一伙武装叛军的阴谋。原来叛军受远景实业案主犯珀尔曼的指使，绑架芮恩胁迫她劫持即将开庭的审判飞空艇，制造空难以便自己脱罪。最终，法厄同与维多利亚家政众人合力击溃叛军，在千钧一发之际救下芮恩，并由莱卡恩驾驶失控的飞空艇化解了危机。事后，从芮恩解密的数据中，一个名为‘牲鬼’的恐怖存在首次浮出水面。"
