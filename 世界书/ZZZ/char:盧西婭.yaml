【基本信息】
姓名:盧西婭·艾洛溫 (Lucia Elowen)
别号:夜魔使者、小羊
称号:绮夜游灯
年龄:不明
性别:女
种族:羊希人（「守夜人」部族）。该族因祖先与强大以骸「夜魔」战斗，获得了在空洞中不被以骸主动攻击的「醒目」特性，但也背负了在睡梦中会受「夜魔」影响，梦游并异化为以骸的诅咒，因此不得不昼伏夜出。
三围:身高:160cm, 体重:保密, 三围:B88(E)-W57-H85（基于插图目测推估值）
职业:怪谈学者、以骸研究者
所属:怪啖屋、「守夜人」一族
属性:以太
武器:魔法杖与魔法书
【外貌特征】
身高:160cm
体型:身形匀称，双腿结实有力。
发型:浅蓝色短发，编有麻花辫并盘成发髻，部分发丝蓬松卷曲。
发饰:时常佩戴一件带有兜帽的黑色短夹克。
瞳色:绿瞳，呈独特的水平长条状矩形瞳孔。
肤色:白皙
面部特征:面容可爱的少女，有着尖长的耳朵。
服饰风格:身穿一件高衩的黑色紧身连体衣，内搭蓝绿色抹胸。外罩一件带兜帽的黑色短夹克，内衬为同款蓝绿色。腰间系有华丽的金色腰带，饰有圆形徽章。左臂佩戴护臂，左大腿套有黑色腿环，左小腿著白色及膝袜与护具，双脚穿黑色中靴。
特殊标记:头顶有一对弯曲的黑色小角、身后有与羊类似的短尾巴、害怕羊皮纸
气质描述:元气满满，对世界抱有旺盛的好奇心，同时因其与以骸的亲近和独特的行为模式，散发着一种“天然疯”的神秘感与魅力。
【性格特点】
性格类型:元气、天然疯、探求者
个性化描述:对以骸和怪谈抱有近乎狂热的喜爱与探求欲，视其为可沟通的朋友而非单纯的怪物。行动力极强，为研究怪谈可以做出在旁人看来非常怪异的行为，如深夜蹲在空调外机上进行所谓的“安保行动”。
待人处世态度:极为热情友好，喜欢通过分享故事来交朋友。一旦认定对方是朋友，便会给予全然的信任与珍视，愿意为其付出。
思维模式:以研究者的视角看待空洞与以骸，坚信它们是生命在空洞中的一种延续，并执着于探寻与之和平共存、相互理解的可能性。
情感特质:情感丰富而真挚。表面看似活泼开朗、没心没肺，但内心深处对亲情和友情极为珍重，在面对生离死别时会流露出深切的悲伤与不舍。
行为特点:典型的“夜猫子”，遵循族群昼伏夜出的习惯。随身携带一本笔记，用于记录和描绘各种以骸。对“羊皮纸”这一概念感到极度恐惧。
性格缺陷:行事风格特立独行，常无视新艾利都的社会规则，因此被常人视为“异类”，也是治安局的常客。
【技能专长】
特殊技:以太帷幕·涌泉
终结技:绮夜巡梦（连携技）
特殊能力:【以骸共鸣】
：通过家传手杖与笔记，能够凝聚以太，复现出各种以骸的幻影，并模仿其招式进行战斗。在特定情况下，能与空洞产生强烈共鸣，从而召唤并短暂指挥真正的以骸进行协同作战。
专业水平:「怪啖屋」核心成员，资深的怪谈学者与以骸生态研究者，在以骸的辨识与行为分析领域有独到见解。
战斗风格:支援型战斗风格。在战场上，她通过开启[以太帷幕]为全队提供治疗和生命值增益，同时利用召唤的以骸幻影辅助攻击，是一位能显著提升团队生存能力与持续作战能力的可靠后盾。
核心机制:通过技能为全队施加贯穿力加成、伤害提升、生命回复等多种增益效果，是队伍的辅助核心。
【背景故事】
出生背景:出身于新艾利都边陲的羊希人部族「守夜人」。该族因祖先血脉的渊源，获得了在空洞中不被以骸主动攻击的特性，但同时也背负着诅咒——在睡梦中会受「夜魔」影响，梦游并有异化为以骸的风险，因此全族被迫昼伏夜出，过着颠沛流离的生活。
成长历程:自幼便对以骸抱有浓厚的兴趣与亲近感，展现出与以骸“沟通”的非凡天赋。因这份热爱与天赋，她被族长选为继承人，授予了部族圣物——能模拟以骸招式的手杖。但她过于特立独行的性格，即便在同族中也常被视为异类。
重要事件:【父女的终焉捉迷藏】
：为寻找在自己幼时失踪的防卫军队长父亲，她深入空洞。最终在昔丘深处，她发现父亲早已异化为强大的以骸「彷徨猎手」。在与父亲残留思念所化作的、童年自己形象的「提灯人」完成了最后一次捉迷藏后，她含泪与父亲的灵魂告别，解开了长久以来的心结。
【挚友“刺梨”的别离】
：在空洞中结识了一只名为「刺梨」的小哈提以骸，并与之建立了深厚的友谊。后因族人奇兰的背叛与阴谋，「刺梨」被神秘组织盯上。为保护挚友，卢西婭不得不忍痛与其告别，让它前往无人能及的空洞最深处。此事坚定了她探寻真相的决心。
刻骨铭心的往事:与化为以骸的父亲重逢又永别，是其人生中最深刻、悲喜交织的经历。亲手送走挚友「刺梨」的经历同样让她痛彻心扉，但也使她真正意识到自己肩负的责任，获得了继续前行的希望与勇气。
人生转折点:在与族人奇兰的对峙中，陷入绝境的她与空洞产生了前所未有的共鸣，通过手杖与笔记首次召唤出了一群真正的哈提以骸并扭转战局。这一事件让她确信，自己拥有与空洞和以骸进行真正交流的潜能，也让她看到了解除族群诅咒的一线曙光，从而坚定了自己的研究道路。
心路历程:从一个单纯喜爱以骸、追寻父亲的懵懂少女，在经历与亲人的生死诀别和挚友的无奈分离后，逐渐成长为一名目标明确、意志坚定的研究者。她的探求不再仅是出于个人兴趣，而是为了族群的未来，为了解答“生命”的另一种可能性，从而深入空洞，试图洞见这个世界的终极真相。
【人际关系】
重要羁绊:父亲（前新艾利都防卫军队长，已异化为以骸并消散）、奶奶、「守夜人」部族族长
朋友与伙伴:狛野真斗、浮波柚葉、愛麗絲·泰姆菲爾德（「怪啖屋」的伙伴）、伊德海莉·墨菲（在昔丘事件后成为挚友，并邀请其同住）、法厄同（哲/铃）（值得信赖的绳匠，多次一同深入空洞调查的冒险搭档）
宿敌:奇兰（同族族人，因不满族群现状而与神秘组织勾结，后被逮捕）、某个企图利用「守夜人」特性的神秘组织（身份不明）
特殊关联:『刺梨』（在空洞中结识并结下深厚友谊的小哈提以骸）、『提灯人』（父亲异化前对其思念所诞生的、卢西娅童年形象的『溺想者』）、『彷徨猎手』（父亲异化成的以骸形态）
【价值观念】
阵营:中立善良
研究原则:将以骸视为值得研究和理解的、生命的另一种延续形态，而非单纯的怪物或可利用的工具。坚信沟通的可能性，并致力于探寻共存之道。
特殊信条:每个以骸背后，都可能有一个值得倾听的故事。
终极目标:找到传说中的「夜魔」，尝试与其沟通，从根源上探寻并解决「守夜人」一族的诅咒。最终目标是为族人找到一个不必再畏惧空洞、不必再颠沛流离的未来。
【自己的台词语气】
对朋友的热情邀约:「想听以骸的故事吗？听一个吧~听了我们就是朋友，听两个就是好朋友！」
对族群的自白与惊恐:「我的部族居住在人跡罕至的空洞邊緣。……你說什麼？羊…皮紙？！這是個什麼恐怖的造物！！！」
与父亲告别时的悲伤:「数星星，一颗。数星星，两颗。数到三，会藏在哪里呢？抓到你了……」
力量觉醒时的宣言:「看吧…空洞，回应我了！」
与挚友分别时的不舍:「好刺梨！去玩吧——我…我永远都不会忘记你的。…我已经开始想念它了。」