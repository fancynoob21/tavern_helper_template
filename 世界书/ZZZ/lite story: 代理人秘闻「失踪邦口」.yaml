章节标题: "代理人秘闻「失蹤邦口」"
剧情概要: "治安局代理人青衣为执行「朱鸢计划」，削弱市民对「绳网」的依赖，不情愿地开始了点对点社区服务。在搭档借故离开后，她偶然来到了主人公哲/铃兄妹经营的音像店「Random Play」。在哲/铃的协助下，青衣接下了一位名叫赫莉的希人小女孩的求助——寻找她失踪的邦布「泰迪」。这次委托让身为智能机械的青衣对人类赋予“生命”的定义产生了深刻的疑惑。初步调查将线索指向了空洞，然而官方渠道因「邦布失踪不予立案」而中断。在试图通过「绳网」雇佣绳匠失败后，哲/铃兄妹以其黑客身份「法厄同」秘密介入，协助青衣深入空洞。行动中，法厄同的代理人偶「伊埃斯」遭绑架团伙「邦邦邦绑」袭击而瘫痪，迫使青衣做出极端选择——与法厄同、伊埃斯进行感官共享，以自身承担以太侵蚀为代价继续追击。最终，青衣在身体濒临崩溃的极限状态下，成功捣毁了匪帮，救出了包括泰迪在内的所有被绑架邦布。在背负着邦布们撤离空洞时，她第一次真切感受到了「生命的重量」。事件结束后，青衣对哲/铃兄妹的真实身份似乎已有所察觉，但选择了心照不宣的默契。"
