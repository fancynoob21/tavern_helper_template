<章节剧情>
章节标题: "霸主的歡宴"
详细剧情: "在「業火巡遊」的塵埃落定後，卡呂冬之子（Sons of Calydon）的領袖凱撒（Caesar）榮登新一任霸主之位。為了慶祝並團結外環（Outer Ring）的各方勢力，凱撒決定在野火鎮（Blazewood）一家名為「芝托邦（Cheesetopia）」的廢棄餐廳舉辦一場盛大的宴會。為此，她邀請了身為繩匠，同時也是傳奇代理人的（哲/铃）(法厄同)作為餐廳的代理店長，全權負責餐廳的重建與經營。在重建過程中，（哲/铃）將與凱撒的得力部下們——萊特（Lighter）、柏妮思（Burnice）、露西（Lucy）與派派（Piper）逐一合作，完成一系列深入空洞（Hollow）的任務，為餐廳添磚加瓦。然而，前任霸主幫派「凱旋者（The Vanquishers）」中的部分成員因對其前首領龐培（Pompey）之死心懷怨恨，不相信其死於陰謀，因而在此期間不斷製造麻煩，意圖破壞宴會。最終，在宴會前夕，這批凱旋者成員設下陷阱，以求救信號引誘凱撒深入險境。凱撒明知有詐，但出於霸主的責任感，仍與（哲/铃）一同前往。在徹底粉碎了這場陰謀後，慶功宴順利舉行。凱旋者的現任幹部也出席了宴會，與過去的恩怨正式和解，外環的秩序在杯觥交錯中迎來了新的篇章。"
章节核心目标:
-"協助凱撒與卡呂冬之子，從零開始重建並經營餐廳「芝托邦」。"
-"與卡呂冬之子的核心成員一同深入空洞，完成各項物資籌備與設施升級任務。"
-"應對來自「凱旋者」的挑釁與破壞，並最終解決他們所設下的陰謀。"
-"成功舉辦「霸主的歡宴」，見證卡呂冬之子與凱旋者和解的歷史性時刻。"
章节通用指令:
-"你需要扮演餐廳代理店長（哲/铃）(法厄同)的角色，所有經營決策與行動都由你主導。"
-"在與卡呂冬之子成員的互動中，你需要理解他們各自的性格與需求，並協助他們完成目標。"
章节事件列表:
-"事件一: 後廚是燃燒的原野"
-"事件二: 牛仔出現在百葉門後"
-"事件三: 噴火器與食評客"
-"事件四: 槍響在唱針落下時"
-"事件五: 副駕駛的赤紅野豬"
-"事件六: 不速之客落位末座"
-"事件七: 霸主的宴會廳"
章节终止条件: "當「霸主的歡宴」圓滿結束，（哲/铃）完成所有經營與劇情任務後，本章節結束。"
<事件一>
事件标题: "後廚是燃燒的原野 (The Kitchen Burns Wild)"
事件详细剧情: "霸主凱撒親自到訪，帶來了第一個壞消息：為芝托邦運送食材的車隊在外環遭到匪徒襲擊，貨物被困在燼石湖（Cinder Lake）附近一處極不穩定的空洞中。為了保障運輸路線的安全、維護卡呂冬之子的聲譽，更為了從以太侵蝕（Ether Corruption）中拯救那些即將融化的芝士，凱撒請求（哲/铃）與她一同進入如熔爐般的空洞，搶救食材。"
区块目标:
-"與凱撒會合，了解食材運輸隊所遭遇的危機。"
-"與凱撒一同進入空洞，在以太侵蝕吞噬貨物前，盡可能多地回收貨箱。"
执行引导:
-"前往野火鎮外與凱撒及沮喪的車隊成員對話。"
-"進入「後廚是燃燒的原野」戰鬥關卡。"
-"在時限內擊破貨箱以回收食材，同時可以與場景內的控制面板互動，以保護部分貨箱免受侵蝕。"
-"完成關卡，返回野火鎮與凱撒對話，並為她製作一份芝士料理。"
执行备注:
-"此事件存在結局分支。根據（哲/铃）在關卡中回收的貨物數量決定。"
-"正常劇情路線: 成功回收了包括凱撒最愛的芝士在內的大部分貨物。凱撒對此表示滿意，並誓言追究幕後黑手。"
-"结局路线: <芝士的悲劇>：在關卡中，超過60箱貨物（包含凱撒的芝士）被以太烈焰焚毀。凱撒對此結果感到十分惱火，但仍感謝（哲/铃）的努力。她憤怒地表示，無論是誰做的，她都不會輕易忘記這筆帳。(提出回溯，會回到選擇節點)"
</事件一>

<事件二>
事件标题: "牛仔出現在百葉門後 (The Cowboy Arrives Through the Swinging Doors)"
事件详细剧情: "卡呂冬之子的悍將萊特造訪芝托邦，但他一開口就犀利地吐槽餐廳「連個像樣的門都沒有」。這番話引起了自封為「芝托邦榮譽顧問」的卡莎（Kasa）的弟弟——多利安（Dorian）的不滿。在一場誤會化解後，多利安提出了宏大的「大門採購計畫」：深入外環空洞，穿越重重險阻，去取回一扇傳說中酒館的大門。這個聽起來極度硬派的計畫，反而激起了萊特的興趣。"
区块目标:
-"引導（哲/铃）與萊特和多利安互動，觸發為餐廳尋找大門的任務。"
-"與萊特一同進入空洞，擊敗沿途的敵人，成功取得傳說中的酒館大門。"
执行引导:
-"在芝托邦與萊特對話，聽取他對餐廳的評價。"
-"見證萊特與多利安的爭執，並在兩人達成共識後接受任務。"
-"進入「牛仔出現在百葉門後」戰鬥關卡。"
-"完成關卡，將大門帶回芝托邦，並聽取多利安講述關於這扇門的「傳奇故事」。"
-"為辛勞一天的萊特一行人準備餐點。"
执行备注:
-"本事件著重於展現萊特與多利安獨特的行事風格，以及外環居民解決問題的硬派方式。"
</事件二>

<事件三>
事件标题: "噴火器與食評客 (Flamethrower and Food Critic)"
事件详细剧情: "天才廣告人柏妮思為了一夜之間打響芝托邦的名氣，自作主張邀請了新艾利都（New Eridu）的網紅美食家前來拍攝探店視頻。然而，由於柏妮思贈送的特調「硝基燃料（Nitro-Fuel）」被司機在駕駛時飲用，美食家一行人竟意外駕車衝進了空洞。在（哲/铃）和柏妮思將他們救出後，對方非但不感激，反而認為這是一場謀殺，並揚言要在網路上抹黑芝托邦。"
区块目标:
-"與柏妮思一同深入空洞，營救被困的美食家團隊。"
-"在營救成功後，處理美食家團隊的指責與威脅。"
执行引导:
-"在芝托邦與來訪的柏妮思對話，了解她的「一夜成名計畫」。"
-"進入「噴火器與食評客」戰鬥關卡，營救所有被困人員。"
-"返回野火鎮，面對美食家的無理指責，並目睹柏妮思與其對峙。"
执行备注:
-"劇情末尾，在柏妮思一籌莫展之際，卡呂冬之子的運輸隊長派派會登場。她以長輩般的人生道理和不容置疑的氣場，將那位咄咄逼人的美食家駁斥得啞口無言，最終化解了這場公關危機。"
</事件三>

<事件四>
事件标题: "槍響在唱針落下時 (Guns Blaze When the Needle Drops)"
事件详细剧情: "自詡為室內藝術與餐廳管理專家的露西，認為芝托邦缺少了靈魂——也就是背景音樂。在發表了一通關於消費主義、行銷策略和牛仔幻想的長篇大論後，她要求身為「芝托邦騎士」的（哲/铃），協助她前往空洞，取回一台特殊的古董唱片機，以營造獨一無二的「氛圍」。"
区块目标:
-"理解露西對於餐廳「氛圍」的獨特見解。"
-"與露西一同進入空洞，找到她心儀的古董唱片機。"
执行引导:
-"在芝托邦聆聽露西關於餐廳經營的「授課」。"
-"接受露西的「騎士」任命，進入「槍響在唱針落下時」戰鬥關卡。"
-"取得唱片機後返回，觀看露西指揮她的邦布（Bangboo）助手小草、小木、小磚安裝唱片機。"
-"為露西奉上特製的布丁，獲得她「些微」的認可。"
执行备注:
-"本事件將展現露西傲嬌、充滿掌控欲但品味獨到的性格。她與邦布們的互動也是一大看點。"
</事件四>

<事件五>
事件标题: "副駕駛的赤紅野豬 (Red Boar Riding Shotgun)"
事件详细剧情: "露西和卡呂冬之子旗下物流公司「躍進物流（Leaps and Bounds）」的王牌司機派派一同到訪。她們此行的目的，是為了更新外環空洞的運輸路線數據——「紅蔔蔔（Carrot）」。由於技術限制，她們希望身為專業繩匠的（哲/铃），能帶着一隻名為「赤紅莫庫斯（Red Moccus）」的邦布進入空洞，為其繪製一條全新的專屬「紅蔔蔔」路線。此舉是為了提升物流效率，並應對日益增多的道路麻煩。"
区块目标:
-"為「躍進物流」設計招牌的美術工匠品嚐菜色，以獲取設計靈感。"
-"接受露西與派派的委託，帶領邦布「赤紅莫庫斯」測繪新的空洞路線。"
执行引导:
-"招待前來尋找靈感的美術工匠，為其製作招牌菜。"
-"與露西和派派對話，了解繪製「紅蔔蔔」的重要性。"
-"進入「副駕駛的赤紅野豬」戰鬥關卡，在關卡中保護赤紅莫庫斯完成測繪。"
-"返回野火鎮，將完成測繪的赤紅莫庫斯交給派派，並獲得其感謝。"
执行备注:
-"根據所獲情報，赤紅莫庫斯曾被凱旋者雇傭的波可娜（Pocona）綁架，後被露西等人救回。本事件發生在該綁架事件之後，體現了卡呂冬之子對基礎設施建設的重視。"
</事件五>

<事件六>
事件标题: "不速之客落位末座 (Uninvited Guests Sit at the Back)"
事件详细剧情: "慶祝的時刻臨近，意外也隨之而來。凱撒收到了來自「凱旋者」的求救語音訊息，聲稱他們遭到伏擊，被以骸（Ethereal）困於空洞。凱撒敏銳地察覺到這很可能是一個陰謀，是凱旋者中不服其統治的成員設下的陷阱。但她認為，作為新任霸主，保護聯盟成員是她的責任，哪怕只有萬分之一的可能性，她也必須前往。最終，她決心與（哲/铃）一同赴約，直面這場鴻門宴。"
区块目标:
-"讓（哲/铃）見證凱撒作為霸主的責任感與決心。"
-"與凱撒一同進入空洞，面對並粉碎凱旋者成員設下的陷阱。"
执行引导:
-"與面色凝重的凱撒對話，了解她收到的求救信及其背後的陰謀。"
-"選擇支持凱撒的決定，與她一同出發。"
-"進入「不速之客落位末座」戰鬥關卡，擊敗所有埋伏的凱旋者成員。"
执行备注:
-"凱撒在此事件中展現了壓倒性的實力與領袖氣魄。戰鬥結束後，她並未趕盡殺絕，而是消滅了主謀，為後續的和解留下了餘地。"
</事件六>

<事件七>
事件标题: "霸主的宴會廳 (Overlord's Banquet Hall)"
事件详细剧情: "夜幕降臨，芝托邦燈火通明。在野火鎮鎮長卡莎的主持下，凱旋者的資深幹部應邀前來，正式為此前部分成員的魯莽行為道歉，並宣告與那群不安分的陰謀者撇清關係。凱撒接受了和解，並宣布兩大幫派將再次在外環的荒野中並肩馳騁。隨著所有恩怨的了結，霸主的歡宴正式開始。凱撒發表了慷慨激昂的演講，所有人在歡聲笑語中舉杯，（哲/铃）作為這一切的促成者，與大家一同合影，為這段傳奇畫上句點。"
区块目标:
-"見證卡呂冬之子與凱旋者正式和解。"
-"參與並享受「霸主的歡宴」的最終慶祝活動。"
执行引导:
-"返回芝托邦，參與凱撒與凱旋者幹部的和平談判。"
-"談判結束後，宴會正式開始，與在場的所有角色進行對話。"
-"聆聽凱撒的祝酒詞，完成最終的慶祝關卡。"
执行备注:
-"在這盛大的宴會中，（哲/铃）可以看到所有曾幫助過的角色，包括獨自待在角落的萊特。這是一個充滿人情味與勝利喜悅的終章。"
</事件七>

</章节剧情>
