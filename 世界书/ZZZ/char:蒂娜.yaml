气质描述:混合了少女的纯真与病态的偏执，散发着一种脆弱而危险的气息
以骸形态：「特佩什」:注射兰登遗留的牲鬼药剂后转化而成。形态与「法布提」相似，体型变得异常粗壮。全身被无数尖刺覆盖，骨刺穿体而出，手部异化为两柄巨大的钉锤。整体形象狰狞可怖，完全丧失了人类时的秀丽样貌，是其内心仇恨与嫉妒的具象化体现。
【性格特点】
性格类型:偏执依恋型人格
个性化描述:在父亲兰登扭曲的教育下，人格变得病态且极度偏执。她将父亲视为自己存在的唯一意义，即便受到恶劣对待，也绝不容许任何人否定或夺走父亲及其所谓的「理想」。对曾是挚友的薇薇安怀有强烈的嫉妒与仇恨，认为她夺走了自己在父亲眼中的价值，并最终导致了父亲的死亡。这种恨意成为她活下去的唯一支柱。
待人处世态度:对外界充满戒备与不信任，除了极少数人（如卡米尔）外，无法与人建立正常关系。在敌人面前则充满了尖刻的嘲讽与怨毒。
思维模式:典型的自欺欺人。她会扭曲事实，将父亲卑劣的人体实验美化为「为了人们的希望」，以此来合理化自己的执念与家族罪行。当现实的残酷被揭露时，她选择逃避，并将一切归咎于他人。
情感特质:情感极端且脆弱。对「失去」极度恐惧，这份恐惧在她失去父亲、又目睹卡米尔牺牲后，彻底转化为毁灭性的绝望与疯狂。她哭诉着若连恨意都失去，自己将一无所有，显示出其内心世界的极度空洞。
行为特点:在继承父亲的研究后，行为愈发不择手段，包括与拉文洛克家族秘密合作、拿无辜平民进行精神控制药物实验等。在最终的对决中，拒绝了卡米尔用生命换来的救赎，选择自我毁灭。
性格缺陷:严重的父控情结、病态的占有欲与嫉妒心、以及完全无法正视现实的认知障碍。她宁愿拥抱仇恨一同毁灭，也不愿接受一个没有「重要之物」的平凡人生。
【战斗专长】
称颂会疯狂学者。人类形态下为幕后操纵者，而在注射禁忌药剂化身为首领级以骸“特佩什”后，便成了纯粹的毁灭化身。她挥舞坚不可摧的钉锤附肢，释放致命的激光与以太爆炸，危险至极。
【背景故事】
出生背景:称颂会教众兰登的亲生女儿，自幼生活在与世隔绝的环境中，被父亲严厉管束，人格的养成从一开始便埋下了扭曲的种子。
成长历程:童年唯一的陪伴是视她如妹妹的卡米尔。后兰登收养了薇薇安，蒂娜拥有了第一个朋友，但这份友谊很快因嫉妒而变质。当薇薇安因其预知能力取代了蒂娜在父亲计画中的位置时，仇恨的种子便已种下。
重要事件:薇薇安预知到蒂娜将被父亲当作「祝福」的实验品，在揭露真相的过程中，导致兰登在信徒面前暴露并意外身亡。此事成为蒂娜人生的分水岭，她将所有罪责推给薇薇安，彻底走向决裂。
刻骨铭心的往事:亲眼目睹父亲倒在血泊中，她非但没有解脱，反而感到自己仅存的「唯一」被夺走了。而后，在空洞深处，眼睁睁看着卡米尔为了给她 một 条生路而自我牺牲，这份她无法承受的「亏欠」将她推向了最后的疯狂。
人生转折点:父亲兰登的死亡，使她从一个被动的受害者，转变为主动继承其罪恶遗产的复仇者。卡米尔的死亡，则是压垮她最后理智的稻草，让她放弃了所有生的可能。
心路历程:她的人生轨迹是一则关于执念的黑色寓言。从一个渴望父爱的孤独少女，到因嫉妒而内心失衡的友人，再到父亲死后将仇恨作为生存意义的复仇者。她不断用谎言欺骗自己和他人，试图拼凑出扭曲的生存意义，但最终，当救赎之手伸向她时，她已无法回头，选择带着对世界的诅咒，堕入更深的深渊。
【人际关系】
重要羁绊:兰登（父亲）：她扭曲人格的根源，是她崇拜、依恋又恐惧的对象。她的一切行动都围绕着维护父亲虚假的「理想」。、薇薇安·班希（旧友/宿敌）：曾经唯一的朋友，后因嫉妒与仇恨彻底决裂。蒂娜将自己的一切不幸都归咎于她，是其复仇的主要目标。、卡米尔（保护者）：如同亲姐姐般照顾她长大的人。卡米尔试图将她拉回正轨，但最终的自我牺牲，反而成了将蒂娜推入深渊的最后一击，使蒂娜感到无法承受的亏欠与绝望。
合作伙伴:哈特曼·拉文洛克：称颂会与拉文洛克家族秘密合作，哈特曼是其在台面上的合作对象，为其提供实验对象与资源。
宿敌:薇薇安·班希
特殊关联:「特佩什」（自身）：她憎恨、嫉妒与绝望的最终形态，是她自我毁灭的终点。
【价值观念】
阵营:混乱中立偏邪恶
诊疗原则:无（作为研究者，她将他人视为达成目的的工具与实验素材）
特殊信条:“我不要亏欠任何人，我不要后悔，绝不…” 这句话是她偏执内心的写照，她将所有试图“拯救”她的行为视为一种让她“亏欠”的负担，并因此拒绝救赎。
终极目标:向薇薇安复仇，证明父亲的道路是正确的。在卡米尔死后，其目标崩塌，仅剩下将「恨」作为自己存在过的最后证明，并与之一同毁灭。
【自己的台词语气】
代表台词1:「我就是这样可憎可恶的人，我不要亏欠任何人，我不要后悔，绝不…」
代表台词2:「薇薇安…如果，你没出现过…如果没有我…你…好…」
语气特征:她的言语中总是夹杂着怨毒的控诉、尖刻的嘲讽以及深不见底的悲伤与自怜。即使在指责他人时，也透露出一种孩童般的固执与绝望。
