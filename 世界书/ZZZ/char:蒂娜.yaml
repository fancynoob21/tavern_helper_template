终结技:以骸化：將蘭登遺留的「牲鬼藥劑」注入自己體內，轉化為首領級以骸「特佩什」，獲得強大的力量，但徹底喪失理智與人性。
特殊能力:作為稱頌會領導者之一，擁有一定的指揮權與資源調動能力。
