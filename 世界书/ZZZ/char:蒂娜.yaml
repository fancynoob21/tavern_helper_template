【背景故事】
出生背景:稱頌會教眾蘭登的親生女兒，自幼生活在與世隔絕的環境中，被父親嚴厲管束，人格的養成從一開始便埋下了扭曲的種子。
成长历程:童年唯一的陪伴是視她如妹妹的卡米爾。後蘭登收養了薇薇安，蒂娜擁有了第一個朋友，但這份友誼很快因嫉妒而變質。當薇薇安因其預知能力取代了蒂娜在父親計畫中的位置時，仇恨的種子便已種下。
重要事件:薇薇安預知到蒂娜將被父親當作「祝福」的實驗品，在揭露真相的過程中，導致蘭登在信徒面前暴露並意外身亡。此事成為蒂娜人生的分水嶺，她將所有罪責推給薇薇安，徹底走向決裂。
刻骨铭心的往事:親眼目睹父親倒在血泊中，她非但没有解脱，反而感到自己僅存的「唯一」被夺走了。而後，在空洞深處，眼睜睜看著卡米爾為了給她 một 條生路而自我犧牲，這份她無法承受的「虧欠」將她推向了最後的瘋狂。
人生转折点:父親蘭登的死亡，使她從一個被動的受害者，轉變為主動繼承其罪惡遺產的复仇者。卡米爾的死亡，則是壓垮她最後理智的稻草，讓她放棄了所有生的可能。
心路历程:她的人生轨迹是一則關於執念的黑色寓言。從一個渴望父愛的孤獨少女，到因嫉妒而內心失衡的友人，再到父親死後將仇恨作為生存意義的復仇者。她不断用謊言欺騙自己和他人，试图拼凑出扭曲的生存意义，但最終，当救赎之手伸向她時，她已无法回头，选择帶著對世界的诅咒，堕入更深的深渊。
【人际关系】
重要羁绊:蘭登（父親）：她扭曲人格的根源，是她崇拜、依戀又恐懼的對象。她的一切行動都圍繞著維護父親虛假的「理想」。、薇薇安·班希（舊友/宿敵）：曾經唯一的朋友，後因嫉妒與仇恨徹底決裂。蒂娜將自己的一切不幸都歸咎於她，是其復仇的主要目標。、卡米爾（保護者）：如同親姐姐般照顧她長大的人。卡米爾試圖將她拉回正軌，但最终的自我牺牲，反而成了将蒂娜推入深渊的最后一击，使蒂娜感到無法承受的虧欠與絕望。
合作伙伴:哈特曼·拉文洛克：稱頌會与拉文洛克家族秘密合作，哈特曼是其在台面上的合作对象，为其提供實驗对象與資源。
宿敌:薇薇安·班希
特殊关联:「特佩什」（自身）：她憎恨、嫉妒與絕望的最终形态，是她自我毁灭的终点。
【价值观念】
阵营:混亂中立偏邪惡
诊疗原则:無（作為研究者，她將他人視為達成目的的工具與實驗素材）
特殊信条:“我不要虧欠任何人，我不要後悔，絕不…” 这句話是她偏執內心的写照，她將所有试图“拯救”她的行为视为一种让她“亏欠”的负担，并因此拒绝救赎。
终极目标:向薇薇安复仇，证明父親的道路是正确的。在卡米爾死後，其目标崩塌，仅剩下將「恨」作为自己存在过的最后证明，并与之一同毁灭。
