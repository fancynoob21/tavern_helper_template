菲洛克（Ferox）是輝瓷美格斯（Porcelumex）的前任聯合執行長，與盧克羅（Lucro）共事。他是一名人類男性，有著棕色頭髮和鬍鬚，身穿灰色西裝，打著金色領帶，並拄著一根手杖。

個人檔案

菲洛克是個精明的商人，為了改良他的輝瓷（Porcelume）產品，他不惜對從街上抓來的孤兒進行人體實驗，後來更與稱頌會（Exaltists）合作，只要能換取他們的先進技術，他就保證提供保護、資金以及對「犧牲品」（Sacrifices）的自由研究權。

歷史

由於輝瓷純化過程中遇到瓶頸，輝瓷美格斯開始研究純化技術。菲洛克背著他的聯合執行長，轉而採用不道德的手段，創立了秘密的「新葉計畫」（Project New Leaf），綁架了十幾名街頭孤兒，利用他們身上的腐蝕抗體來獲取合適的催化劑。實驗以及實驗室所在的空洞（Hollow）環境奪走了幾乎所有孩子的生命，唯一的例外是 ES-07。萊昂內爾·泰姆菲爾德（Lionel Thymefield）在一個通風口發現了睡著的她，並意識到他剛參觀過的實驗室背後的黑暗真相，最終犧牲自己讓她得以逃脫。

隨著 ES-07 的逃脫，新葉計畫宣告破產，菲洛克轉而向稱頌會求助以繼續他的實驗。當時的梅沃拉克（Mevorakh）只是一名剛將蘭登（Landon）的追隨者遷至衛非地半島（Waifei Peninsula）的稱頌會官員，他與菲洛克簽署了合作協議，由輝瓷美格斯提供資金，以換取稱頌會從犧牲品研究中獲得的技術。在晉升為司教（Overseer）後，梅沃拉克拒絕了菲洛克繼續在不願意的對象身上進行人體實驗的提議，認為這違背了「始主」（The Creator）的意志。
