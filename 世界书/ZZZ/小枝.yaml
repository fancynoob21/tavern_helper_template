小枝是银牙小队的成员之一，也是《士兵0号——安比特工故事：银之回响》的主要反派。她与其他银牙小队成员外貌相似，但左眼戴着黑色眼罩并装有机械义肢。  
狡猾而聪明的小枝在银牙小队服役期间，用谋略与后备计划弥补了战斗力的不足。废墟中断肢求生的折磨使她变得愤世嫉俗、冷酷无情，但内心深处仍渴望回到"家人"在世时团聚"欢愉"的时光，因此试图重建银牙公司。  
【历史】  
小枝曾是黑曜石防卫军银牙小队的克隆士兵。与安比的大多数"妹妹"相似，她的战斗技艺不及队长精湛，遂以智谋策略弥补，常设计战阵布局与应急预案。  
当银牙小队执行自杀式任务时，小枝在队友尸骸与瓦砾下幸存，但四肢遭严重侵蚀被迫截肢。发现她的空洞劫掠者将其卖至黑市，使其如商品般被多次转手，直到被一名叛逃军医购得。该军医为她安装义肢，并提供重建银牙小队的机会：小枝结合从防卫军档案库窃取的不完整研究数据与自身记忆，成功复现克隆技术。然而她掌握的数据不足，仅能制造A少女等"缺陷体"，于是利用新生的"妹妹们"进行器官摘除以筹措研究资金并接触TOPS组织。其同伙还绑架了11号士兵。  
被安比与特工揭露后，小枝试图说服前任队长共同重建银牙小队；但安比持反对立场，认为银牙技术是绝不应重现的邪恶造物。  
面对安比的拒绝与对克隆同胞的负罪感，她开始注射客户提供的血清。A少女却夺过注射器将另一半血清注入自己体内。血清作用下，二人化为虚影帕里库斯，最终被0号士兵安比与11号士兵击败。濒死之际，遭侵蚀的小枝仍能言语，在逝去前短暂重温了安比照料下作为银牙队员的记忆。
