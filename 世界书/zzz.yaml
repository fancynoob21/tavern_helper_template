    内容: |-
      卡萝尔·阿娜是赫利俄斯机关高级研究主任，市长五月花之友。黑色短发，红瞳尖耳。她亦是铃与哲的导师兼养母。其成就包括创制空洞深潜系统与邦布厄俄斯。她为兄妹植入直连大脑的特殊视觉植入体，使其能与厄俄斯及HDD独特共鸣，代价是降低天然以太适性。她总携邦布在学院门口迎接养子女，喜立于院匾右侧。
      旧都陷落当日，学院遭不明势力围攻时，她被巨手掳走——此前已救下哲、铃、厄俄斯与HDD。因研究性质，她被指认为大灾难元凶，与众多名字同刻耻辱柱。卡萝尔的失踪与构陷促使铃与哲成为代理人，期冀借观测数据查明真相，洗刷师名。
