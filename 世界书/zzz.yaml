      关于造物主的信息甚少，仅知旧都陷落前夜，赫利俄斯机关遭神秘武装团体与"怪物"围攻时，卡萝尔·阿娜被造物主的一只巨手掳走；此外，造物主近期协助称颂会测试能将人类转化为强大存在"圣徒"的灵药P07。称颂会成员常在净化祷词中呼唤造物主之名以求赐福。

  - 名称: npc:无面者
