    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    内容: |-
      无面者是黑客与代理人的组织，以擅闯空洞、篡改胡萝卜数据、袭击抢劫受害者并污染空洞数据而恶名昭彰。尽管常被HIA列为跨链节犯罪目标，他们却能入侵HIA删除犯罪记录，其专长之一正是通过黑客组织发动电子战。虽声名狼藉，在法厄同陨落后仍跻身跨链节顶级代理账户之列。
      在特别篇《虚拟复仇》中，无面者将六课成员困于虚拟现实程序，意图窃取深度同步建模数据并灭口，但计划遭月城柳挫败，组织成员随后被捕。法厄同故事第五章《陨星风暴(B)》揭示，无面者受莎拉雇佣专门针对星见雅——其建模数据可解封无尾剑，而这本是星见家族成员的专属能力。

