    内容: 法厄同是管理新艾利都六分街"随机播放"影像店的兄妹组合。玩家选择其中一人作为主角。其业务合法，但暗地从事更游走法律边缘的副业——传奇绳匠"法厄同"，承接空洞导航委托。他们的"秘密武器"是H.D.D.系统与"妖精"：前者使其能在空洞内直接控制邦布欧斯，后者通过数据采集能力生成空洞地图，赋予无与伦比的空间洞察力。长期目标是调查空洞零号，查明其成因并揭露赫利俄斯机关事件真相。

  - 名称: lore:绳网
    启用: true
