    内容: |-
      莱莎·克里斯蒂，亦称莱莎奶奶，是患认知腐蚀综合征的老妇，此精神障碍缓慢摧毁并重置其记忆。
      年轻时她总梦想成为演员。但最终落脚白波医院照顾新生儿。尽管如此，她深爱工作，悉心照料婴儿。游戏故事41年前，她决定报名都市小姐选美。比赛中她如黑马崛起，一路杀入决赛。但决赛当日，空洞吞噬了她工作的医院。得知消息后她立刻弃赛，冲下红毯奔入空洞。最终抵达医院，在废墟中搜寻并救下尽可能多的婴儿。慌乱中她记不清婴儿名字，仅凭特征及昵称"小甜心"辨认。但长期滞留空洞导致她晚年患上认知腐蚀综合征。
      如今老妇人记忆退化至仅寻找"小甜心"。她误打误撞让丽娜帮她找婴儿。任务中记忆进一步倒退，甚至卡在空洞吞噬旧医院的时刻。冲入医院救"小甜心"时，她反需法厄同与丽娜搭救。任务尾声，记忆倒退至遗忘婴儿。她现居养老院，偶被当年所救现已长大的婴儿探访。

