    内容: '# 地点档案：澄辉坪\n名称：澄辉坪 (Failume Heights)\n位置：新艾利都 -
      卫非地半岛\n简介：卫非地半岛的主要居住区，坐落于山海之间。起初只是山坡上的一个小聚落，随着航天城的建立以及“辉瓷”工业的蓬勃发展而迅速繁荣。这里通过发达的缆车系统连接各处，甚至有一条直通勒莫宁空洞中的航天城废墟，便利矿工作业。\n氛围：充满了浓厚的生活气息和独特的粤式风情，是传统文化与现代工业共存的繁华地段。\n核心地标：\n[随便观：著名的当地庙宇，香火旺盛]\n[释诡斋：神秘的心理咨询场所]\n[澄辉坪缆车站：连接半岛交通的枢纽]\n[望海路：风景优美的沿海道路]\n主要商铺：\n[饮茶仙：当地人最爱的早茶去处]\n[德丰大押：老字号当铺]\n[BooBox：邦布自助雇佣站]\n[阿朔占卜：提供命理咨询服务]",'

