      青溟是仪玄可召唤的鸟形使灵。原称青溟剑，云阙顶世代相传的强力咒剑，代价为逐渐剥夺持剑者感官记忆。仪玄与姐姐仪绛创相对安全的御剑法，将其显化为鸟形。但旧都陷落时，仪绛因过度引剑力牺牲记忆与生命。后揭示青溟未吞噬记忆，历代持剑者集体意志仍存其中。
