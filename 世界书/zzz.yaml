    内容: |-
      代理人是《绝区零》中能在空洞内作战的战斗人员。
      其共同特征包括：具备高以太适性、拥有攻击专长（攻击/眩晕/异常/支援/防御）、归属于某种属性（物理/冰/火/电/以太）、装备特定音擎，以及隶属于特定阵营。

