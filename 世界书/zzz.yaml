  - 名称: item:黑锚
    启用: true
    激活策略:
      类型: 绿灯
      关键字:
        - 黑锚
    插入位置:
      类型: 角色定义之后
      顺序: 10
    激活概率: 100
    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    内容: |-
      黑锚是帮派。主要盘踞厄尔庇斯港，因一名暴徒威胁维纳斯被法厄同撞见而冲突。
      某时起，黑锚开始在空洞进行多笔不明交易，细节与参与者高度机密。这些活动被邦布商人记录，若泄露公众将致丑闻风险。故该帮派选择在空洞内行动抹杀所有邦布：原计划清除特定记录的邦布因空洞复杂特性无法找到而改变。为此，帮派在绳网伪装普通客户，安排新手绳匠引路至商人，因雇佣单纯新手更易灭口。
      然此行动或成帮派终结之始。雇佣的绳匠目睹帮派成员灭口商人，暗中破坏后潜逃。不久后，义警邦布神北风闻其袭击并开始追猎。帮派受压后追踪维纳斯（为他们雇佣绳匠的经纪人），威胁其透露绳匠位置。这吸引当时在厄尔庇斯港的哲/铃注意，威胁报告新艾利都公共安全。得知情况后，他们同意暂将维纳斯转移至六分街，却落入二把手拉娜陷阱，险遭帮派成员围殴时神北现身相救。解决数名暴徒后，他们设法从其中一人得知帮派据点位置。掌握情报并确保维纳斯安全后，法厄同与神北突袭据点剿灭黑锚。成员被成功制服，试图携账簿求援的拉娜被公共安全逮捕（神北匿名举报），黑锚就此终结。

