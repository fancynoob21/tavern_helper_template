    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    内容: |-
      [空洞劫掠者：指未经授权进入空洞探索奥秘或寻宝的个体。他们避免与空洞调查协会或公共安全官员接触以免被捕，但在特定情况下可能合作。劫掠者间互动亦充满不确定性，故多数人彼此戒备]
      [绳匠：指引导他人穿越空洞的未授权个体，无论对方是劫掠者或普通市民；多数绳匠通过委托接单，知名者亦有中间人作联络渠道；方法（千差万别，最常见形式是非法的萝卜导航数据）]
      [绳网（绳网）：发布绳匠委托的匿名留言板；需注册账号；绳网上的中间人与绳匠设有信誉评级；支持加密私信功能。普通市民亦可注册，部分讨论与空洞无关话题]

