  - 名称: npc:4412号
    启用: true
    激活策略:
      类型: 绿灯
      关键字:
        - 4412号
      次要关键字:
        逻辑: 与任意
        关键字:
          - "4412"
    插入位置:
      类型: 角色定义之后
      顺序: 10
    激活概率: 100
    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    内容: |-
      4412号是一只具有卓越智慧和决心的探索型邦布。它曾隶属于白星院，并被指派与埃洛温一同工作，但在琶音断层的调查行动终止后，它带着完好无损的记忆逃了出来。两年后，当它得知琶音断层的探索计画重启时，它回到了斯科特前哨，决心查明阿洛温究竟发生了什么事。

      在《琶音断层之谜》事件期间，4412号协助代理人和11号士兵调查过去，揭示了埃洛温是一名叛军间谍，她在研究院的研究员们遭到一只危险的以骸袭击时，放弃了原本的任务去拯救他们。在得知埃洛温的命运后，4412号愿意按照规定被清除记忆并销毁，但雷告诉了它研究院的提议：继续为他们工作，并且可以保留它的记忆。尽管埃洛温希望4412号能忘记她并找到自己生命的意义，但4412号认为她所给予的名字和记忆更为重要，因此决定留在研究院。

