    内容: |-
      莱特曾是佣兵。他与另三名佣兵戴恩·德里斯科尔、尼克·卡敏、拉缇娜·凯瑟琳创立公司，莱特为首领。他与各成员及其家人亲近，但因判断失误，战友身亡，唯莱特幸存。愧疚悔恨中，他知放弃生命无济于事，遂贷款巨资支持阵亡同伴家庭及其他成员作遣散费。无力偿还，他被送入地下拳场"打工"抵债。莱特自述，其间他"如行尸走肉"，从一对手到下一对手。值得注意的是，其中一名拳手是贝鲁姆，莱特打破其二十连胜后他宣称莱特为对手。
      当老爹（时任卡吕冬之子首领）还清莱特债务并收留他时，事情改变。起初，莱特视此机车帮为另一拳赛秀，但随时间推移他与所有成员亲近，并真心想保护他们不再失去朋友。

