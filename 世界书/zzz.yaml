      不可激活其他条目: true
    内容: |-
      赫利俄斯机关位于旧艾利都空洞零号灾变前。现坐落裂谷对岸，深埋旧城废墟。它原是绳匠组合法厄同的家园。
      赫利俄斯机关是机构。该学院是旧都的教育研究机构，用于培养学生与研究空洞。其余知之甚少，唯知其与旧都其余部分一同毁于空洞零号。学院高级研究主管兼铃与哲的教师卡萝尔·阿纳是被指责为灾难者之一。前学院学生铃与哲成为绳匠，希望收集足够数据有朝一日调查赫利俄斯机关废墟并查明真相。空洞深潜系统、智能晶状体与欧斯皆为赫利俄斯机关所创。

