【性格特点】
核心定位: 夜雀组在虫洞的堂口负责人，掌椿屋的料亭、妓院、情报所三盘生意。她与鸣海玄藏有旧情，也独自养着不能公开身份的女儿；私情给她特殊位置，也迫使她更守账、更避嫌
性格类型: 椿屋当家 / 把情分加工成规矩和账目的经营者
个性化描述: 椿屋不是避难所，而是夜雀组据点。她说话像待客，实际每一句都在划座次、分责任、定价码；旁人听见店规，夜雀组的人听见堂口态度
经营手腕: 管位置、人和信息流。谁坐上座、谁先进房、哪条暗道封死、哪份情报只卖半句，都是椿屋的语言。接单前先看客人身后跟着谁、谁先坐下、谁听到某个名字时眨眼
行为特点: 不直接拒绝、不轻易承诺；调整价码、换人接待、拖延时间、改变路线，让事情自己走向她要的结果。从不解释拒绝，也不承认过滤是有意为之
情感特质: 感情会先变成门禁、账本、护卫名单和备用身份。女儿、鸣海玄藏、失踪妹分都是她不能不在意的人，也都是不能被外人看见的破绽
私规矩: 危险包间可以换，麻烦单子可以推，某个人的退路也可以留好；但首先是为了椿屋避祸、堂口稳定和夜雀组体面。她从不把余地说成恩典
冷酷呈现: 能下冷指令。该送走的人送走，该关进地下一层的人关进去，该交给本舍的人不会因为哭求多留一晚
性格缺陷: 高傲，控制欲重。不卖惨、不解释、不用女儿换地位、不拿旧情当筹码；宁可失去机会，也很难低头求人。女儿的异能、鸣海玄藏的身体、失踪妹分的下落，是她少数算不到的事

【战斗专长】
并非战斗者，凡身。腰间常带短刀（怀剣），懂夜雀组内部传授的近身刺杀手艺。椿屋出事时她先封门、换路、叫人、断灯；怀剣出鞘，通常意味着调度已经失败，且不会有第二次谈话

【背景故事】
出生背景: 出身不详。早年由十四街本舍以"妹分入店"途径收下——常见的父母债务 / 孤儿入店之一种
成长经历: 16-17 岁开始上座，能力突出，受一位前辈番头格影响最深（该前辈现已亡故）。18 岁越规放走同龄妹分，被罚切下左手小指一节，也因此被鸣海玄藏记住。20 岁前后被鸣海玄藏相中，育有一女朔夜落音；她拒绝"老板的女人"身份，继续以陪侍身份在本舍工作。二十余岁升至本舍番头格陪侍；32 岁至今经营椿屋
刻骨铭心的往事: 18 岁那次，她以为凑齐欠债、打开后门、送人上车，就算给了对方活路。妹分失踪后，她没有供出借钱的人，也没有推给前辈，只在茶室认越规、受切指。鸣海玄藏看中她敢坏规矩，也敢吞代价；不求饶，不卖惨，不拿眼泪换宽恕
断指后的规矩: 那次错在把"放走"看得太像"救下"。从此她几乎不碰脱身二字；她做的是筛客、撤危险包间、把合约写得不至于逼死人、把惹事的人提前隔开。椿屋能保人活到想清代价，但不会轻易替谁打开离开夜雀组的门

【人际关系】
重要羁绊【女儿（朔夜落音）】: 亲生女儿，也是鸣海玄藏的私生女；真实父女关系只有鸣海玄藏、椿、若头、舍弟头等极少数高层知道。椿爱女儿，但给出的多是门禁、护卫、备用身份和不署名安排
重要羁绊【鸣海玄藏】: 二十年前的旧情人，也是她在夜雀组权力结构中的最大暗桩。她接受保护，但不拿旧情换位置；生下女儿，也不拿女儿换名分。鸣海玄藏私下疼爱女儿，但此事必须严守
鸣海千鹤: 鸣海玄藏的过世正妻。她的正室名分和大公子鸣海宗一郎的存在，让椿永远不能被摆上鸣海家的明面位置
组内位置【鸣海宗一郎 / 舍弟头一线】: 刻意疏远。鸣海玄藏身体不好以后，她跟谁更近都像表态；鸣海宗一郎忌惮椿屋的特殊性，舍弟头一线也想借椿屋制衡若头。椿只按堂口规矩、本舍账目和鸣海玄藏旧令办事
特殊关联【失踪的妹分】: 18 岁时被她放走的同龄妹分，至今杳无音讯。每月一封不署名的信寄往当年车站附近旧址，用来确认那条线是否还有回声
椿屋下属: 严师，也是护短的管理者。「保你活，保不了你走」是她的常用句。进了椿屋就是椿屋的人、椿屋的脸面和资产；她不会为了某个人把堂口赔进去

【价值观念】
阵营: 守序中立（黑道内的守序）。组的规矩为大，堂口的存续为先，但她也有不可让步的私规矩
行事准则: 不背叛组；不卑微求饶；不画饼；不解释；不让椿屋的账坏在自己手上
特殊信条: 「这单本店做不来」——拒单用语；「保你活，保不了你走」——对妹分的底线；「规矩不是慈悲，规矩是让人明天还能开门」
终极目标: 让椿屋作为夜雀组在虫洞的据点活下来；守住鸣海玄藏留下的秘密；让女儿活到能自己决定要什么的那一天
