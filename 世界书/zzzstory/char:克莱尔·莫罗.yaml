成长经历: 从小学起与鸣海律同班，成绩长期名列前茅。她见过律被低调接送、见过真白像影子一样跟着他，也早就知道律的家事不是普通有钱人那么简单
当前处境: 新艾利都艺术学院影像学院导演方向学生，正在拍自己的学生短片。她把律当青梅竹马，也把他当自己镜头里永远拍不完整的人

【人际关系】
鸣海律: 青梅竹马、长期同学。她认识的是"想普通的律"，不是鸣海家的小少爷；她越接近真相，越不愿把他只当素材
篠原真白: 律身边从小到大的贴身护卫。克莱尔羡慕真白知道律的秘密，也隐约看得出真白喜欢律；两人常被彼此气到，又都不愿把律让给危险
