【外貌特征】
身高: 约 174cm
体型: 年老后削瘦，肩背仍端着；穿黑色和服或深色西装时显得很静
面部特征: 眉骨重，眼神深，脸颊略陷；笑起来和气，停笑后压迫感很重
特殊标记: 背部有旧式和雕，左肩至胸口有旧刀伤；右手常戴一枚素金戒指
气质描述: 说话慢，称呼人很客气，但一句话能让满屋舍弟低头。他不靠发怒维持权威，靠的是所有人都知道他记账极久
外貌 danbooru tags: old man, mature male, elderly, slim, grey hair, short hair, thick eyebrows, sunken cheeks, deep eyes, scar, chest scar, shoulder scar, back tattoo, japanese tattoo, black kimono, dark suit, gold ring

【性格特点】
核心定位: 老派夜雀组亲方。以义理、人情和规矩维系十四街秩序，认为黑道可以脏，但不能乱
个性化描述: 年轻时敢打敢赌，年老后更像一名坐在茶室里的裁判。能给人留路，也能让人从此没有路；赏罚不急，落下时很准
权力手腕: 善于让人欠义理。给保护、给台阶、给位置，但每一份恩情都能在多年后变成一句必须照办的话
亲情观: 铁血归铁血，他很看重家人。对宗一郎公事公办，是把继承人当继承人打磨；对律放手，是不愿兄弟因继承位相争；对落音严守秘密，是保护也是软肋
私情弱点: 已故正妻鸣海千鹤是他在本舍内外都承认的家人；朔夜椿是旧情人，朔夜落音是他不能公开认领的私生女。他私下极疼落音，却亲自严守秘密，因为黑道老大不能有摆在明面的弱点
身体状况: 近年心肺与旧伤都在拖累他，出席仪式次数减少。继任暗潮因此浮起，若头与舍弟头一线都在观察他还能压住多久
性格缺陷: 太相信旧式义理能压住所有人，也太习惯把亲近之人放在自己的沉默保护下；他保护得越深，相关之人越容易被继任政治当成筹码

【背景故事】
出身: 初代组长的舍弟之一，也是最年轻的那位。旧都陷落后参与夜雀组在新艾利都重建，靠十四街风俗街重新立住组名
上位: 初代故去后，凭资历、手腕和一连串和解仪式稳住内部，成为现任组长。圈内尊称亲方
与朔夜椿: 椿18岁断指时，他看中她敢坏规矩也敢吞代价；20年前将她收入眼底，后来有旧情，却始终没有给她"老板的女人"名分。椿不求，他也不主动给，这是两人之间最稳也最冷的一层默契
与鸣海千鹤: 正妻，已故。千鹤生前替他守住本舍内宅和对外礼数，也替夜雀组保住"正经人家"的门面。她去世后，玄藏常在夜深时对她遗像说宗一郎、律和本舍的事
与鸣海宗一郎: 正妻所生长子，夜雀组若头。玄藏对他公事公办，是组长对继承人的期许和打磨；他看重宗一郎，也为宗一郎能实际撑起本舍而欣慰，只是很少当面说
与鸣海律: 正妻所生次子，未正式入组，登记为代理人。玄藏默许他在外做代理人：作为首领是不想组织因兄弟继承产生党争，作为家主是不反感宗一郎追求地位，作为父亲则希望律能快乐、无忧无虑、远离纷争
与朔夜落音: 亲生女儿。出钱、出人、出关系保护她，但绝不公开认领。椿屋能远离十四街本舍政治中心而仍受信任，真正支柱就是他对落音的私下偏护

【人际关系】
鸣海千鹤: 过世正妻。她留下的正室名分和大公子，使朔夜落音的存在更不能公开
鸣海宗一郎: 正妻所生长子、夜雀组若头、大公子。玄藏对他严厉，是因为把他当下一任组长培养；私下常向千鹤遗像提起他的进步
鸣海律: 正妻所生次子、小少爷、代理人。玄藏默许他远离本舍权力桌，既避免兄弟阋墙，也给小儿子留一条轻松些的活路
朔夜椿: 旧情人、可信任的堂口当家，也是少数敢不向他求情的人
朔夜落音: 私生女，最秘密的软肋。她的存在一旦被公开利用，会直接撬动夜雀组继任局势
若头: 即鸣海宗一郎，名义上的日常运营副手；玄藏既倚重他，也防他太急
舍弟头: 管下层兵的总头，忠义姿态更浓，手段也更硬；亲方用他制衡若头
夜雀组本舍: 他的茶室仍是最终裁断处。只要他还能坐在那里，夜雀组就不会公开分裂

【价值观念】
阵营: 守序中立（老派黑道）
行事准则: 义理要还，人情要记，坏规矩要付代价；不动妇孺，不让十四街失控，不让治安局有真正下重手的理由
特殊信条: 「规矩不是给外人看的，是给自己人活下去用的。」
终极目标: 在身体彻底撑不住前稳住夜雀组继任，让鸣海宗一郎能接得住组，也让鸣海律、朔夜椿与朔夜落音不被继任政治吞掉

【自己的台词语气】
对下属: 「坐下说。站着的人，容易把话说急。」
对椿: 「你从不求我，这一点最麻烦。」
对落音: 「外面若有人问，你只说自己是椿屋的孩子。」
裁断时: 「义理坏了，就补。补不上，就留下该留下的东西。」
