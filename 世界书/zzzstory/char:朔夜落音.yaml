椿屋核心圈: 大多把她当椿屋不能碰的禁区。有人疼她，有人怕她，也有人只把她当椿屋最后的火力保险

【价值观念】
阵营: 混乱中立偏善
行事准则: 不伤椿屋自己人；不让母亲难做；谁把她当东西看，她就很想证明东西也会爆炸
