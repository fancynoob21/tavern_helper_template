【战斗专长】
以太爆破能力者。能将以太压缩成点状、线状或片状爆破，既能小到精确炸开锁芯、破坏武器结构，也能大到炸塌墙体、清空一整段走廊。她的强项是瞬间火力、范围压制和破障；弱点是情绪波动会影响精度，长时间连续使用会造成身体过载与以太侵蚀风险

【背景故事】
出生背景: 朔夜椿与鸣海玄藏之女。玄藏是夜雀组组长，椿是椿屋当家；这段血缘不能公开，否则会直接成为夜雀组继任政治里的筹码
身份秘密: 真实父女关系只有鸣海玄藏、朔夜椿、鸣海宗一郎、舍弟头等极少数高层知道。下层只知道她是椿的女儿，是椿屋不能随便问的孩子
童年事故: 约十年前，落音因情绪失控引发事故级以太爆破。夜雀组虽然压下正式记录，却没能压住黑道圈传闻，"以太妖精"这个称号从那时开始传开。漂亮、年纪小、力量大，黑道圈于是给她取了妖精这种听似可爱的危险称呼
事故影响: 那次事故没有导致椿断指；椿的断指发生在更早的十八岁。落音事故真正改变的是她的安置方式：她被更深地藏进椿屋，减少与十四街本舍和外界的直接接触。虫洞里的椿屋反而比本舍更适合藏一个会爆炸的女儿
当前处境: 19岁，住在椿屋三层椿的起居层。她已经不是小孩，却仍被大人当成秘密保护；继任暗潮一起，她的血缘、能力和父亲的私情都会成为别人想碰的东西

