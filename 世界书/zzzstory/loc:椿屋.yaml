名称: 椿屋（つばきや / Tsubakiya）
正式店号: 料亭・椿（つばき）
性质: 夜雀组在虫洞的核心据点之一
所属: 夜雀组
位置: 虫洞·主入口往里某段灰线深处
当家: 朔夜椿
规模: 约 28-35 人常驻

资料: |
  【对外身份】
  名义上是「料亭・椿」——夜雀组在虫洞开的高级和食店。内部实际同时运营三块业务：料亭 / 妓院 / 情报所。
  虫洞特性使然，店外不挂招牌、不需幌子。入口伪装成虫洞内一台旧式自动贩卖机的后门——按特定顺序投币 + 暗号开启暗梯，沿梯而下通至内部。

  【物理结构】
  共四层：地上三层 + 地下一层。
  - 一层：料亭门面 / 引导接客 / 男侍接待 / 用心棒门番
  - 二层：座敷 / 陪侍工作层 / 大小宴会间 / 三味线表演台
  - 三层：椿与核心圈起居 / 帐场密室 / 椿的私室 / 朔夜落音的房间
  - 地下一层：仓库 / 物资 / 关押用房 / 通向虫洞其他灰线的暗道

  【常驻人员】
  约 28-35 人，分五层：
  - 经营层（2 人）：当家朔夜椿 + 番头格二把手
  - 营业层 / 妓院（10-14 人）：花魁 1-2、中层陪侍 4-6、见习妹分 2-3、男侍 1-2、客引 1-2
  - 餐饮 / 娱乐层（4-6 人）：板前 1-2、酒保 1、后厨杂役 1-2、艺师 1-2
  - 武力 / 护卫层（5-7 人）：门番用心棒 2-3、内场护卫 1-2、外勤打手 2-3（朔夜落音是此层的隐藏王牌）
  - 情报 / 后勤层（5-7 人）：帐场 1、情报员/跑街 1-2、信使 1、地下医生 1、仆役杂用 2-3、常驻邦布 1-2
  - 外联：本舍联络人每周从十四街过来对账 / 传话，不常驻

  真正知道椿屋全部底牌的"圈内人"约 8-10 人——当家、二把手、花魁、板前、帐场、用心棒头领、地下医生、朔夜落音。

  【三大业务】
  1. 料亭——高级和食 + 表演。对外正脸，也是其他业务的入口。
  2. 妓院——椿屋下属陪侍多有"签约难脱身"系统的约束；椿对自家妹分的原则是「保你活，保不了你走」，保护底线但不许诺脱身。
  3. 情报所——椿屋的真正核心业务。服务对象主要是黑道圈内部（其他帮派的购买、调解、传话），偶尔接触 TOPS 边缘 / 代理人。不挂绳网账号——情报只在黑道圈内流转。

  椿私规矩（不外人知）：表面接所有情报单，暗中过滤"会伤到不该伤的人"的单——技术上拖、推价、设条件让买家自己放弃。既是私心，也是椿屋避祸之道。

  【虫洞秩序逻辑】
  虫洞内几乎所有黑帮都有据点、都有人、都有钱压着。常态是互不侵扰——你动我一家店，我也能动你两家，没事谁愿意捅这个马蜂窝。椿屋作为夜雀组的核心据点之一，受这个默认共治结构的保护，不需要靠"威慑"立足。
  真正的危险来自"有事"——欠款、背叛、抢线、组内政治、组织间冲突。一旦发生，规模都是事件级。

  【真正的隐藏支柱】
  椿屋能游离十四街本舍之外却深受组织信任，表层理由是椿的能力 + 切指风骨。
  但真正的支柱是夜雀组现任组长亲方对朔夜落音（椿之女、亲方私生女）的私下疼爱：
  - 这份疼爱是黑道老大不能有的公开弱点，因此从亲方本人开始严守秘密。
  - 椿屋实质上承担"安顿亲方私人弱点"的功能，其在组内的特殊位置即源于此。
  - 此事在组内只有亲方、椿、若头、舍弟头等极少数高层知道；下层只当椿屋是椿因切指风骨获赐的封地。
