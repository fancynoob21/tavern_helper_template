名称: NEON NEST
别号: 霓虹巢 / Neon Nest
位置: 弧光区南缘·巢灯街，位于新艾利都大学步行圈边缘，往南两站可到雅努斯区主商业带
类型: 高级青年公寓 / 学区住宅
管辖: 新艾利都治安局都市秩序部辖区
现状: 正常运营，因设计感和租金都很高，在学生圈里小有名气

【外观与氛围】
NEON NEST 是弧光区南缘·巢灯街上一栋很显眼的高层公寓，外立面由灰白混凝土、深色玻璃和细窄霓虹灯带组成。夜里楼体边缘会亮起柔和的蓝粉色光，不刺眼，但从街口一抬头就能看见。

楼下是一圈小型生活商业：咖啡店、便利店、自助洗衣、夜间轻食吧、共享自习室和快递柜。白天常有新大学生抱着电脑进出，傍晚则能看到穿西装的年轻白领、拖着行李箱的留学生、背着器材包的代理人短暂停留。它不像老街区那样有人情味浓，但足够干净、方便、安静，是那种"贵得有理由"的地方。

公寓大堂有一面巨大的电子住户公告屏，轮播天气、空洞警报等级、楼下店铺优惠和一些莫名其妙的生活标语。物业邦布会在大堂巡逻，遇到住户忘带门禁卡时会发出过分严肃的提示音。

【楼层与设施】
- 大堂：电子门禁、住户公告屏、快递柜、访客登记终端、物业邦布值守点
- 低层商业：咖啡店、便利店、自助洗衣、夜间轻食吧、共享自习室
- 住户楼层：多数为一层四户，部分高价楼层为一层两户，电梯厅宽敞，走廊短而干净
- 天台：半开放屋顶花园，有自动贩卖机、长椅和几处能俯瞰大学区夜景的位置
- 地下车库：车位紧张但管理严格，常能见到代理人改装车、教授的老车和留学生租来的小型电动车

【律与真白所在楼层】
鸣海律与篠原真白住在同一高价楼层，该层一层两户。律一户，真白一户，门口都能看见电梯与安全梯方向。
律的房间更像大学生独居公寓：课本、委托资料、训练器材、代理人装备箱和没收拾完的外卖袋常混在一起。
真白的房间则整洁得多：白色家具、花瓶、课本、料理工具和按日期排列的急救用品都摆得很乖。外人看只会觉得她生活习惯好，不会想到她其实能在三分钟内收拾好出门装备。

【常驻类型化人流】
- 新艾利都大学学生：赶课、熬夜做报告、在楼下咖啡店占座
- 年轻白领与研究员：租金付得起，但生活节奏很乱
- 留学生家庭：常在大堂讨论快递、门禁和垃圾分类
- 兼职代理人：不一定住在这里，但常来楼下轻食吧或便利店补给
- 物业邦布：负责巡楼、收快递、提醒住户交管理费，语气比真人物业更认真
- 深夜外卖员：经常在大堂等住户下楼，和物业邦布互相嫌弃

【场景适合发生】
大学生日常 / 电梯偶遇 / 深夜外卖 / 楼下咖啡店赶报告 / 天台谈心 / 住户之间关于噪音和快递的小纠纷 / 代理人任务后带伤回家 / 物业邦布误会住户关系 / 克莱尔来找律时在大堂撞见真白 / 空洞警报响起时整栋楼短暂进入避险流程
