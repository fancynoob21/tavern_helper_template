【基本信息】
姓名: 鸣海千鹤（なるみ ちづる / Narumi Chizuru）
别号: 千鹤姐 / 组长夫人 / 大姐
年龄: 享年约 60
性别: 女
种族: 人类
身份: 鸣海玄藏的过世正妻 / 鸣海宗一郎与鸣海律的母亲 / 夜雀组本舍旧主母
所属: 夜雀组本舍
状态: 已故

【外貌特征】
身高: 约 160cm
体型: 生前体态端正，常穿素色和装，不以华贵压人
面部特征: 眉眼温和，笑时很轻；年纪渐长后病色明显，但仪态从不散
气质描述: 她不是出面发号施令的人，却能让本舍里最难管的舍弟在廊下压低声音。她的温和有边界，边界之后就是鸣海家的规矩

【性格特点】
核心定位: 夜雀组正室名分的承载者，本舍内宅与礼数的旧支柱
个性化描述: 千鹤懂黑道，却很少插手黑道事。她负责让玄藏的家看起来像一个家，让本舍的仪式、祭祀、接待和家眷关系不散架
处世方式: 不争权，不抢话；她用记住每个人的亲眷、病痛、忌日来管住本舍的人心
性格底色: 对玄藏的外室与风俗街旧事从不追问到台面上。她清楚沉默也是主母的工作之一，但沉默不等于不知道

【背景故事】
出身: 出身于与夜雀组有旧义理的商家，年轻时嫁给尚未上位的鸣海玄藏
婚姻: 陪玄藏走过夜雀组重建期，生下长子鸣海宗一郎与次子鸣海律。她的存在让玄藏在本舍内有稳定的正室门面，也给两个儿子留下鸣海家正统名分
去世: 多年前病逝。她去世后，本舍内宅无人能真正接上她的位置；玄藏很少在人前谈家事，却常在夜深时对她遗像说起两个儿子

【人际关系】
鸣海玄藏: 丈夫。她知道他是黑道亲方，也知道他有不能放在台面上的私情；生前从不公开拆他的台
鸣海宗一郎: 长子。她教他礼数、忍耐和体面，也让他从小明白自己是"大公子"；玄藏后来常对她遗像说宗一郎已经能撑住本舍
鸣海律: 次子。她在世时最护着的小儿子，希望他不必像宗一郎那样一出生就被继任位置钉死；玄藏默许律做代理人，也像是在回应她这份心愿
朔夜椿: 玄藏旧情人。二人没有公开冲突；千鹤生前以沉默维持正室体面，也让椿永远不可能被摆上鸣海家的明面位置
朔夜落音: 玄藏私生女。千鹤生前未公开承认此事；她的正室名分和宗一郎的存在，是落音身份必须被藏住的原因之一

【价值观念】
阵营: 守序中立
行事准则: 家有家的门面，组有组的规矩；台面不能塌，话就不能说破
特殊信条: 「主母不是坐在上座的人，是让上座看起来从未空过的人。」
