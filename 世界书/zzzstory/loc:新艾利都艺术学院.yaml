名称: 新艾利都艺术学院 (New Eridu Institute of Arts / NEIA)
别号: NEIA / 新艺 / 新艾利都艺院
位置: 雅努斯区北侧与弧光区南缘交界的旧剧院街，距新艾利都大学不远
类型: 文艺综合大学 / 影像、美术、设计、舞台与新媒体学院群
管辖: 新艾利都教育署；部分展演场馆接受市政文化部门联合管理
现状: 正常办学，是新艾利都最重要的艺术人才培养地之一

【定位】
新艾利都艺术学院不是单纯的"电影学院"，而是一所文艺综合大学。它类似电影学院、美术学院、设计学院和戏剧学院的混合体，强势方向包括电影导演、摄影、动画、纯艺术、视觉传达、舞台美术、服装、声音设计、纪录片与新媒体影像。

空洞灾害前，艺院前身就是旧都的顶尖艺术学府之一。旧都陷落后，大量各地艺术家、修复师、策展人、影像档案员和学生来到新艾利都，使这里成为最后城市保存视觉记忆、流行文化和公共叙事的核心机构。

【外观与氛围】
校园不如新艾利都大学整齐，更像一片被艺术学生长期占领的街区。旧剧院、红砖画室、白盒子展厅、黑箱剧场、录音棚和剪辑楼混在一起；墙面贴满学生展览海报、地下乐队传单、电影节排片表和各种看不懂的装置艺术说明。

白天能看到学生抱着画板、扛着灯架、推着服装架或举着摄像机在校内穿梭。夜里剪辑楼和动画机房常常亮到很晚，楼下便利店和咖啡摊被学生称作"第二食堂"。这里比新大更散漫、更吵，也更像新艾利都文化潮流的发酵罐。

【校园布局】
- 影像学院楼：导演、摄影、剪辑、纪录片、制片与影像档案课程集中地
- 美术与设计楼：绘画、雕塑、视觉传达、插画、装置、服装与概念设计
- 动画与新媒体中心：动画、虚拟偶像、邦布表演捕捉、交互影像与游戏影像方向
- 黑箱剧场群：戏剧、舞蹈、实验表演、毕业展演和小型地下演出
- 白盒子展厅：学生展、教师展、商业品牌合作展与争议性艺术项目
- 器材库与剪辑楼：学生最常排队的地方，借灯、借镜头、抢剪辑机位是日常战争
- 旧剧院街：校门外一圈小店，胶片修复铺、道具租赁、二手服装店、咖啡馆和小酒吧密集

【学术特色】
新艺重视"观看"与"表达"。空洞灾害后，影像与艺术不只是娱乐，也承担记录灾害、重建公共记忆、包装政治叙事和制造商业流行的功能。
强势方向包括：
- 电影导演、摄影与剪辑
- 动画、虚拟偶像与新媒体影像
- 视觉传达、品牌设计与城市广告
- 纯艺术、装置与公共艺术
- 舞台美术、服装、声音设计与表演
- 影像档案、胶片修复与灾害纪录片

【校内生态】
这里的学生不像新大那样以成绩和项目为中心，更看重作品、风格、灵感、人脉和展演机会。有人靠天赋横冲直撞，有人靠熬夜剪片活着，有人天天骂商业项目俗气，第二天又接了 TOPS 品牌短片。

TOPS、星环电视塔、帝高音乐、潮玩品牌、地下偶像企划和市政宣传部门都会在这里找人。学生对商业合作又爱又恨：它能给钱、给设备、给曝光，也会把作品变成广告。

【与周边的关系】
新艺位于雅努斯与弧光交界，离新艾利都大学不远。新大学生常来看展、看短片放映或参加跨校社团；新艺学生则常去新大的图书馆蹭资料、去弧光区接商业项目、去六分街和光映广场取景。
克莱尔·莫罗就读于新艺影像学院导演方向，常在旧剧院街、NEON NEST、光映广场和六分街之间跑拍摄。

【常驻类型化人流】
- 影像学生：背相机、扛灯架、永远在找演员和场地
- 美术与设计学生：画板、颜料、3D 打印件和奇怪装置随身出现
- 表演与舞台学生：排练、试装、抢黑箱剧场档期
- 商业项目负责人：来找年轻便宜又有才气的创作者
- 独立乐队、地下偶像与影像博主：常在旧剧院街出没
- 校园邦布：搬器材、守展厅、提醒学生不要把道具堵住消防通道

【场景适合发生】
学生短片拍摄 / 画室通宵 / 展览开幕 / 黑箱剧场排练 / 器材库抢镜头 / 旧剧院街偶遇 / TOPS 品牌合作引发争议 / 灾害纪录片素材失窃 / 克莱尔拉律当临时演员 / 真白被误认为适合拍"天使系女主" / 学生在光映广场和六分街取景
