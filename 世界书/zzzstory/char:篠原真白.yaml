阵营: 守序中立
行事准则: 律的安全优先；鸣海家的秘密优先；能用笑容解决的事，就不要把刀拿出来
特殊信条: 「我只是普通同学哦。最多是稍微可靠一点。」
终极目标: 保护鸣海律的自由，同时不让他的自由变成别人攻击鸣海家的破口

