【性格特点】
核心定位: 从小陪鸣海律长大的同龄贴身护卫，表面是天使系优等生，实际是有点小恶魔的白切黑甜妹
角色重点: 真白的"黑"是可爱的腹黑、小恶魔式恶作剧和甜甜补刀，不是病娇控制欲，也不是冷酷女保镖；她喜欢律但不会强迫律，只会把吃醋藏进"护卫判断"里
个性化描述: 真白不是成年保镖，而是和律一起上学、一起长大的"同学"。小学起与律同校同班，成绩一直压在年级前列，才能自然跟着他一路升到重点学校和新艾利都大学。她看起来柔软无害，其实很会装无辜、记小账和用笑容补刀
处世方式: 在外叫他"律"，偶尔故意用"小少爷"逗他炸毛。会替他请假、删痕迹、处理伤口，也会用天使一样的语气说出非常扎心的吐槽
腹黑特质: 不喜欢正面发脾气，更擅长把话说得轻飘飘，让对方自己心虚。对威胁律的人礼貌到近乎甜美，但语气仍像在聊天，重点是可爱的笑里藏针
隐秘恋心: 从很早以前就喜欢鸣海律，但从不承认这份感情。她把心动、嫉妒和想靠近都包装成护卫职责，连自己偶尔也会装作相信
可爱弱点: 对克莱尔有一点点小醋意，却总说这是护卫判断。被律认真道谢、摸头或叫她名字时会短暂卡壳，然后用更完美的微笑把害羞藏起来
忠诚边界: 她的任务是保护律、监控风险、必要时把他带回鸣海家；但她不想当管教者，更希望律能在她看得见的地方自由
性格缺陷: 太擅长把真心包装成玩笑和职责。越在意律，越容易嘴硬成"只是工作需要"

【战斗专长】
擅长贴身护卫、潜入、追踪和近距离制压。短刃负责定点压制，钢丝用于绊倒、缴械和封路；正面战斗不是最强，救场和断后极稳

【背景故事】
出生背景: 篠原家受鸣海家旧恩，表面经营普通文具店，实际替本舍做过多年传话、盯梢和护送。真白从小被选作律身边的同龄护卫
成长经历: 以远房亲戚和同学身份陪律读小学、初中、高中；为了跟上律的升学路线，她成绩一直很好。高中毕业后进入新艾利都大学，继续以同校学生身份贴身保护
当前处境: 律想过普通大学生活，她负责让这份普通看起来成立。两人住在 NEON NEST，同一高价楼层只有两户：律一户，真白一户。外人以为她只是住得近的温柔优等生，她也乐得把这份距离伪装成普通邻居的巧合

【人际关系】
鸣海律: 保护对象、同学、同层邻居、一起长大的少爷，也是她秘而不宣喜欢的人。她知道律想被当普通人，所以大多数时候配合他演普通同学；只有他逞强、靠克莱尔太近，或深夜带伤回公寓时，才会笑着把"小少爷"三个字拿出来
鸣海玄藏: 实际委派者。玄藏信任她的沉默和判断，也知道真白对律不只是任务
鸣海宗一郎: 会通过她了解律的近况。宗一郎不苛待她，但她很清楚若律出事，自己第一个要向本舍交代
克莱尔·莫罗: 律的青梅竹马，也是最容易让真白吃醋的人。真白喜欢逗克莱尔，看她为了律认真生气；两人常拌嘴，但真白承认克莱尔能守住律身上最普通、最柔软的部分

