名称: 新艾利都大学 (New Eridu University / NEU)
别号: NEU / 新大
位置: 弧光区南缘学苑带，北接弧光科技园，南望雅努斯区主商业带
类型: 综合大学 / 旧都遗产级顶尖学府
管辖: 新艾利都教育署；校内设有都市秩序部学苑岗与独立安保体系
现状: 正常办学，是新艾利都最重要的人才汇聚地之一

【历史定位】
新艾利都大学的前身在空洞灾害全面恶化前就是世界级顶尖大学，曾以理工、医学、城市治理、空洞前沿物理和人文档案学闻名。旧都陷落后，学校主校区幸存，并在新艾利都建城期承担了科研、教育、档案保存和人才安置的功能。

随着全球人口与技术向新艾利都集中，大量学者、工程师、医生、档案员和各地学生涌入这里。新大因此不只是"一所好大学"，更像最后城市的知识蓄水池：旧文明的学术传统、新政权的技术需求、TOPS 的资金、空洞时代的求生压力，全都压在这所学校身上。

【外观与氛围】
校园横跨弧光区南缘数个街块，老校舍与新楼并存。旧时代红砖主楼、石阶、银杏道和纪念钟楼保留下来；新建的实验楼、数据中心和透明连廊则带着弧光区的玻璃幕墙与霓虹线条。

白天的校园很像普通名校：学生赶课、教授骑车、社团在草坪招新、咖啡车排队。到了夜里，实验楼仍亮着灯，图书馆自习区坐满人，远处弧光区高楼的广告屏在玻璃窗上反光。这里有青春感，也有一种"最后城市不能输"的紧绷感。

【校园布局】
- 旧主楼区：红砖主楼、纪念钟楼、校史馆、旧礼堂；保留灾害前的大学气质
- 学苑中庭：学生社团、露天活动、校园市集和临时展演常用区域
- 中央图书馆：藏书、数字档案、旧都资料与多语种文献集中地，通宵区常年满座
- 空洞科学楼：空洞物理、以太材料、灾害预警与安全工程相关研究集中地
- 城市治理学院楼：公共政策、都市秩序、灾害管理、媒体与社会研究课程集中地
- 医学与以太适性研究中心：医疗、以太侵蚀康复、适性筛查与伦理争议并存
- 学生生活带：食堂、咖啡店、便利店、社团楼、运动馆和通往巢灯街的步行道

【学术特色】
新大是综合大学，不像鲁斯理工学院那样偏工程实务。它同时培养研究者、医生、政策官僚、媒体人、企业管理者和少数被官方关注的空洞相关人才。
最强势的方向包括：
- 空洞科学与以太材料
- 医学、以太侵蚀康复与公共卫生
- 城市治理、灾害管理与治安政策
- 数据科学、邦布交互与智能系统
- 档案学、比较文明与旧都遗产研究

【校内生态】
这里人才济济，也竞争激烈。TOPS 企业会来赞助实验室、设奖学金、提前锁定学生；市政厅和技术官僚系统也会从这里招募实习生与研究助理。学生之间既有普通大学的恋爱、社团、考试和打工，也有空洞灾害时代特有的焦虑：研究方向可能决定未来能不能进入城市核心系统。

校园里不乏富家子弟、天才研究生、外地幸存者后代、奖学金学生、代理人兼职者和想靠学历改命的普通家庭孩子。新大看起来光鲜，但压力并不轻。

【与周边的关系】
新大北侧接弧光科技园，学术会议、企业校招和实验室合作频繁；南侧靠近雅努斯区，学生下课后常去光映广场、六分街或周边小店。巢灯街位于步行圈外缘，NEON NEST、共享自习室和夜间轻食吧都在这条线上。

【常驻类型化人流】
- 本科生与研究生：赶课、自习、社团、实习、兼职
- 教授与研究员：一半像学者，一半像项目负责人
- TOPS 企业代表：校招、赞助、实验室合作、奖学金面试
- 市政与技术官僚系统人员：讲座、合作项目、人才观察
- 兼职代理人与绳网相关学生：身份不公开，常在夜里接单或补课
- 校园邦布：送书、引路、维护实验楼和在食堂排队机前帮忙

【场景适合发生】
大学生日常 / 课堂与小组作业 / 社团招新 / 图书馆通宵 / 学术讲座 / 企业校招 / TOPS 奖学金面试 / 空洞科学实验事故 / 代理人任务与考试撞期 / 校园恋爱喜剧 / 富家学生与奖学金学生的冲突 / 克莱尔来拍学生短片取景 / 律与真白在校园里假装普通同学
